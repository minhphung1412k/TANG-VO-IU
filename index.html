<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - BẢN NÂNG CẤP VĨNH CỬU</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        /* --- MODULE 1: CORE VARIABLES (Hệ thống biến số) --- */
        :root {
            --p: #ff2d75;
            --s: #00e5ff;
            --g: #ffcf5e;
            --bg-dark: #020205;
            --glass: rgba(7, 7, 15, 0.9);
            --neon-shadow: 0 0 15px rgba(255, 45, 117, 0.7);
            --transition-v1: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- MODULE 2: RESET & LAYOUT --- */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg-dark); 
            overflow: hidden; 
            font-family: 'Quicksand', sans-serif;
            perspective: 1000px;
        }

        /* --- MODULE 3: FIX NỀN ĐEN TRIỆT ĐỂ (TRIPLE LAYER) --- */
        #master-background {
            position: fixed; inset: 0; z-index: 1;
            background-color: #050510; /* Lớp 1: Màu nền sâu */
        }

        /* Lớp 2: Ảnh thành phố với cơ chế CSS Overlays */
        #city-layer {
            position: absolute; inset: 0;
            background-image: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.4;
            filter: contrast(1.1) brightness(0.8);
            z-index: 2;
            transition: transform 2s ease-out, filter 0.3s;
        }

        /* Lớp 3: Vignette & Lighting (Hệ thống giả lập ánh sáng đêm) */
        #lighting-layer {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, transparent 20%, #000 90%);
            z-index: 3;
            pointer-events: none;
        }

        /* Lớp phản xạ pháo hoa (Flash Layer) */
        #flash-system {
            position: absolute; inset: 0;
            z-index: 4; opacity: 0;
            mix-blend-mode: screen;
            background: #fff;
            transition: opacity 0.1s ease;
        }

        /* --- MODULE 4: ENGINE PHÁO HOA CỰC MẠNH --- */
        canvas#firework-canvas {
            position: fixed; inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* --- MODULE 5: GIAO DIỆN ĐĂNG NHẬP 4D NEON --- */
        .auth-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotateX(10deg);
            width: 95%; max-width: 550px;
            z-index: 1000;
            display: none; /* Hiện sau intro */
            animation: floatUI 4s ease-in-out infinite;
        }

        @keyframes floatUI {
            0%, 100% { transform: translate(-50%, -50%) rotateX(5deg); }
            50% { transform: translate(-50%, -52%) rotateX(0deg); }
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 60px;
            padding: 65px 45px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), var(--neon-shadow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng tia sét/neon chạy quanh card */
        .auth-card::after {
            content: ''; position: absolute; inset: 0;
            border-radius: 60px; padding: 2px;
            background: linear-gradient(var(--angle), var(--p), transparent, var(--s), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: rotateGlow 4s linear infinite;
        }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotateGlow { to { --angle: 360deg; } }

        .auth-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 45px;
            text-shadow: 0 0 20px var(--p), 0 0 40px var(--p);
            letter-spacing: 3px;
        }

        /* --- INPUT FIELD MODULE (Nâng cấp Icon) --- */
        .field-group {
            position: relative;
            margin-bottom: 30px;
            perspective: 1000px;
        }

        .field-group i.input-icon {
            position: absolute; left: 25px; top: 50%;
            transform: translateY(-50%);
            font-size: 22px; color: var(--p);
            z-index: 10;
            filter: drop-shadow(0 0 8px var(--p));
            transition: 0.3s;
        }

        .field-group input {
            width: 100%;
            padding: 24px 70px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff; font-size: 17px;
            transition: var(--transition-v1);
        }

        .field-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--s);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
            transform: scale(1.03) translateZ(20px);
        }

        .field-group input:focus + i.input-icon {
            color: var(--s);
            transform: translateY(-50%) scale(1.2);
        }

        .eye-toggle {
            position: absolute; right: 25px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; color: #666; font-size: 18px;
            padding: 10px; z-index: 10;
        }

        .btn-glow {
            width: 100%;
            padding: 22px;
            margin-top: 15px;
            background: linear-gradient(45deg, var(--p), #ff5e3a, var(--p));
            background-size: 200% auto;
            border: none; border-radius: 30px;
            color: #fff; font-weight: 900; font-size: 1.1rem;
            letter-spacing: 4px; cursor: pointer;
            box-shadow: 0 15px 45px rgba(255, 45, 117, 0.4);
            transition: 0.5s;
            animation: gradientShift 3s linear infinite;
        }
        @keyframes gradientShift { to { background-position: 200% center; } }
        .btn-glow:hover { transform: scale(1.02) translateY(-5px); box-shadow: 0 25px 60px var(--p); }

        /* --- MENU 4 MỤC MODULE --- */
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-top: 15px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 35px 15px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: var(--transition-v1);
        }

        .menu-item:hover {
            background: var(--p);
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 15px 40px var(--p);
        }

        .menu-item i {
            font-size: 35px; color: var(--g);
            margin-bottom: 15px; display: block;
            filter: drop-shadow(0 0 10px var(--g));
        }

        .menu-item span {
            font-weight: 700; font-size: 15px; color: #fff; display: block;
        }

        /* --- MODULE 6: SOUND & NOTIF --- */
        #music-container {
            position: fixed; top: 40px; right: 40px;
            z-index: 10000; display: none;
        }

        .vinyl {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #111 url('https://cdn-icons-png.flaticon.com/512/261/261845.png');
            background-size: cover;
            border: 5px solid #222;
            cursor: pointer;
            box-shadow: 0 0 25px var(--p);
        }
        .spinning { animation: rotateVinyl 3s linear infinite; }
        @keyframes rotateVinyl { to { transform: rotate(360deg); } }

        #notif-box {
            position: fixed; top: -120px; left: 50%;
            transform: translateX(-50%);
            background: #fff; color: var(--p);
            padding: 20px 50px; border-radius: 100px;
            font-weight: 900; z-index: 100000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; align-items: center; gap: 15px;
        }
        #notif-box.active { top: 50px; }

        #intro-screen {
            position: fixed; inset: 0;
            background: #000; z-index: 999999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="master-background">
        <div id="city-layer"></div>
        <div id="lighting-layer"></div>
        <div id="flash-system"></div>
    </div>

    <canvas id="firework-canvas"></canvas>

    <div id="notif-box">
        <i class="fas fa-heart-crack fa-beat"></i>
        <span id="notif-txt">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="intro-screen" onclick="launchGenesis()">
        <div style="font-size: 120px; color: var(--p); filter: drop-shadow(0 0 30px var(--p));" class="fa-beat">
            <i class="fas fa-heart"></i>
        </div>
        <h2 style="margin-top: 50px; letter-spacing: 20px; font-weight: 300; color: #fff;">MỞ TRÁI TIM</h2>
    </div>

    <div id="music-container" onclick="togglePlay()">
        <div class="vinyl" id="vinyl-disk"></div>
    </div>
    <div id="yt-frame"></div>

    <div class="auth-container" id="login-ui">
        <div class="auth-card">
            <h2 class="auth-title">BÌNH MINH ❤️ THUÝ VÂN</h2>
            
            <div class="field-group">
                <i class="fas fa-user-heart input-icon"></i>
                <input type="text" id="username" placeholder="Nhập tài khoản đi baby" autocomplete="off">
            </div>

            <div class="field-group">
                <i class="fas fa-fingerprint input-icon"></i>
                <input type="password" id="password" placeholder="Nhập mật khẩu nha bé iu" autocomplete="off">
                <div class="eye-toggle" onclick="togglePass()">
                    <i class="fas fa-eye" id="eye-icon"></i>
                </div>
            </div>

            <button class="btn-glow" onclick="checkAuth()">ĐĂNG NHẬP VÀO TRÁI TIM</button>
        </div>
    </div>

    <div class="auth-container" id="menu-ui">
        <div class="auth-card">
            <h2 class="auth-title" style="font-size: 2rem;">GỬI THUÝ VÂN</h2>
            <div class="menu-grid">
                <div class="menu-item" onclick="boom(15)"><i class="fas fa-clock-rotate-left"></i><span>Kỉ niệm</span></div>
                <div class="menu-item" onclick="boom(15)"><i class="fas fa-heart-pulse"></i><span>Hiện tại</span></div>
                <div class="menu-item" onclick="boom(15)"><i class="fas fa-infinity"></i><span>Lời hứa ở tương lai</span></div>
                <div class="menu-item" onclick="cheerUp()"><i class="fas fa-face-grin-stars"></i><span>Nếu em buồn...</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /**
         * SUPREME ENGINE 110: TOÀN BỘ LOGIC CHI TIẾT
         */
        const canvas = document.getElementById('firework-canvas');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-layer');
        const flash = document.getElementById('flash-system');
        
        let w, h, player, mActive = false;
        let rockets = [], particles = [];

        function setSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setSize);
        setSize();

        // Engine Hạt Pháo Hoa (Advanced Particle Physics)
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 15 + 5;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.alpha = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.gravity = 0.2;
                this.friction = 0.93;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Engine Tên Lửa (Dynamic Rocket Motion)
        class Rocket {
            constructor() {
                this.x = Math.random() * w;
                this.y = h;
                this.targetY = Math.random() * (h * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
                this.velocity = -Math.random() * 5 - 15;
            }
            update() {
                this.y += this.velocity;
                this.velocity += 0.15; // Giảm tốc khi lên cao
                if (this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                return true;
            }
            explode() {
                // LIGHTING SYSTEM: Bừng sáng thành phố
                city.style.filter = "brightness(2) contrast(1.5) saturate(1.5)";
                city.style.transform = "scale(1.1)";
                flash.style.opacity = "0.5";
                flash.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}, transparent 80%)`;
                
                setTimeout(() => {
                    city.style.filter = "brightness(0.8) contrast(1.1)";
                    city.style.transform = "scale(1)";
                    flash.style.opacity = "0";
                }, 400);

                for (let i = 0; i < 300; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
            draw() {
                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // YouTube Audio Module
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-frame', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function togglePlay() {
            const disk = document.getElementById('vinyl-disk');
            if(mActive) {
                player.pauseVideo();
                disk.classList.remove('spinning');
                mActive = false;
            } else {
                player.unMute(); player.playVideo();
                disk.classList.add('spinning');
                mActive = true;
            }
        }

        // Auth & Navigation Module
        function togglePass() {
            const p = document.getElementById('password');
            const i = document.getElementById('eye-icon');
            p.type = p.type === 'password' ? 'text' : 'password';
            i.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }

        function checkAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-ui').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('login-ui').style.display = "none";
                    document.getElementById('menu-ui').style.display = "block";
                    boom(20);
                }, 600);
            } else {
                const box = document.getElementById('notif-box');
                box.classList.add('active');
                setTimeout(() => box.classList.remove('active'), 3500);
            }
        }

        function launchGenesis() {
            const intro = document.getElementById('intro-screen');
            intro.style.transition = "1.5s cubic-bezier(0.19, 1, 0.22, 1)";
            intro.style.transform = "translateY(-100%)";
            setTimeout(() => {
                intro.style.display = "none";
                document.getElementById('login-ui').style.display = "block";
                document.getElementById('music-container').style.display = "block";
                togglePlay();
                // Start Auto Fireworks
                setInterval(() => { if(Math.random() < 0.25) rockets.push(new Rocket()); }, 800);
            }, 1000);
        }

        function boom(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i * 200); }
        function cheerUp() { alert('Thuý Vân ơi, hãy luôn hạnh phúc nhé!'); boom(30); }

        // Render Loop
        function loop() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
            ctx.fillRect(0, 0, w, h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
