<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vườn Bí Mật ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background: #000; }

        /* NỀN THIÊN NHIÊN HOÀNG HÔN CỰC ĐẸP */
        .bg {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
            z-index: -1; transform: scale(1.1); transition: 3s ease;
        }

        #canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* MÀN HÌNH KHỞI ĐỘNG */
        #intro {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1s;
        }
        .heart-icon { font-size: 100px; color: #ff4d6d; filter: drop-shadow(0 0 30px #ff4d6d); animation: pulse 1s infinite; }

        /* KHUNG CHỮ */
        .glass {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 400px; padding: 35px 25px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 30px;
            text-align: center; display: none; z-index: 10;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.5rem; margin-bottom: 30px; }

        /* INPUT & CON MẮT */
        .box { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px 50px; border-radius: 15px; border: none;
            background: rgba(255,255,255,0.9); font-weight: 700; outline: none;
        }
        .box i:first-child { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #ff4d6d; }
        .eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #333; padding: 5px; }

        .btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, #ff4d6d, #ff8e72);
            color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.5);
        }

        /* MENU 4 MỤC CHUẨN YÊU CẦU */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item {
            background: rgba(255, 255, 255, 0.2); padding: 25px 10px; border-radius: 20px;
            color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .item:hover { background: #ff4d6d; transform: scale(1.05); }

        /* LOA BẬT TẮT */
        #music-toggle {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            background: rgba(255,255,255,0.3); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: #fff; cursor: pointer; z-index: 100; border: 2px solid #fff;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    </style>
</head>
<body>

    <div class="bg" id="bg"></div>
    <canvas id="canvas"></canvas>

    <div id="intro" onclick="go()">
        <div class="heart-icon"><i class="fas fa-heart"></i></div>
        <p style="color:white; margin-top:20px; letter-spacing:4px;">CHẠM ĐỂ BẮT ĐẦU</p>
    </div>

    <div id="music-toggle" onclick="control()">
        <i id="m-icon" class="fas fa-compact-disc fa-spin"></i>
    </div>

    <audio id="audio" loop>
        <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Impact/Kevin_MacLeod_-_Impact_Andante.mp3" type="audio/mpeg">
    </audio>

    <div class="glass" id="login-box">
        <h2>Vợ Yêu ❤️</h2>
        <div class="box">
            <i class="fas fa-user"></i>
            <input type="text" id="u" placeholder="TÊN ĐĂNG NHẬP">
        </div>
        <div class="box">
            <i class="fas fa-lock"></i>
            <input type="password" id="p" placeholder="MẬT KHẨU">
            <i class="fas fa-eye eye" onclick="show()"></i>
        </div>
        <button class="btn" onclick="check()">ĐĂNG NHẬP</button>
    </div>

    <div class="glass" id="menu-box">
        <h2>Trái Tim Của Anh</h2>
        <div class="grid">
            <div class="item" onclick="fire(5)">CHUYỆN QUÁ KHỨ</div>
            <div class="item" onclick="fire(5)">CHUYỆN HIỆN TẠI</div>
            <div class="item" onclick="fire(5)">CHUYỆN TƯƠNG LAI</div>
            <div class="item" onclick="alert('Anh hứa sẽ mãi yêu em!')">LỜI NHẮN NHỦ VÀ LỜI HỨA</div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        let play = true;

        function go() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('music-toggle').style.display = 'flex';
                document.getElementById('bg').style.transform = 'scale(1)';
                audio.play();
                fire(10); // Bắn pháo hoa lúc bắt đầu
            }, 1000);
        }

        function show() {
            const p = document.getElementById('p');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function check() {
            if(document.getElementById('u').value === "anhyeuemlamdonha" && document.getElementById('p').value === "xindungboroianh") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('menu-box').style.display = 'block';
                fire(20); // Pháo hoa rực lửa khi đăng nhập đúng
            } else { alert("Sai mật mã rồi bé ơi!"); }
        }

        function control() {
            const icon = document.getElementById('m-icon');
            if(play) { audio.pause(); icon.classList.remove('fa-spin'); icon.classList.replace('fa-compact-disc', 'fa-play'); }
            else { audio.play(); icon.classList.add('fa-spin'); icon.classList.replace('fa-play', 'fa-compact-disc'); }
            play = !play;
        }

        // HỆ THỐNG PHÁO HOA & HOA RƠI SIÊU MƯỢT
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let parts = [];
        function fire(num) {
            for(let i=0; i<num; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                let color = `hsl(${Math.random()*360}, 100%, 60%)`;
                for(let j=0; j<30; j++) {
                    parts.push({ x, y, vx: Math.cos(j)*Math.random()*10, vy: Math.sin(j)*Math.random()*10, life: 1, color });
                }
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            parts.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
                if(p.life <= 0) parts.splice(i, 1);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            });
            // Thêm hoa rơi nhẹ nhàng
            ctx.fillStyle = "rgba(255,182,193,0.5)";
            for(let i=0; i<2; i++) {
                ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 2, 0, Math.PI*2); ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
