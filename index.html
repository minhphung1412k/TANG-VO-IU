<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Vợ Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* NỀN THIÊN NHIÊN RỰC RỠ */
        #bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1a0005 0%, #000 100%);
        }
        .aurora {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: conic-gradient(from 0deg, transparent, #ff0055, transparent, #00f, transparent);
            opacity: 0.15; animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MÀN HÌNH CHỜ HOA HỒNG */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1.5s ease;
        }
        .rose-glow {
            font-size: 110px; filter: drop-shadow(0 0 40px #ff0055);
            animation: breathe 2.5s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        /* KHUNG ĐĂNG NHẬP CHÁY RỰC */
        .glass-container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 45px 30px;
            width: 90%; max-width: 380px; text-align: center;
            display: none; box-shadow: 0 0 60px rgba(255, 0, 85, 0.2);
            position: relative; overflow: hidden;
        }
        .glass-container::before {
            content: ''; position: absolute; inset: -5px;
            background: linear-gradient(45deg, #ff0055, #ffcc00, #00f, #ff0055);
            z-index: -1; animation: borderMove 4s linear infinite;
            filter: blur(10px); opacity: 0.5;
        }
        @keyframes borderMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.8rem; margin-bottom: 30px; }

        /* INPUT & EYE BUTTON */
        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: white;
            outline: none; text-align: center; font-size: 16px;
        }
        .eye-btn {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            color: #ffb3c1; cursor: pointer; font-size: 22px;
        }

        .btn-fire {
            background: linear-gradient(45deg, #ff0055, #ff4500);
            color: white; border: none; padding: 18px; width: 100%;
            border-radius: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 85, 0.4);
        }

        /* NÚT LOA */
        #music-ctrl {
            position: fixed; bottom: 30px; right: 30px;
            width: 55px; height: 55px; background: rgba(255,0,85,0.2);
            border-radius: 50%; display: none; align-items: center;
            justify-content: center; font-size: 22px; cursor: pointer;
            border: 1px solid rgba(255,0,85,0.5); z-index: 1000;
        }

        /* SPARKLES FLYING */
        .spark {
            position: absolute; pointer-events: none; border-radius: 50%;
            animation: fly linear forwards;
        }
        @keyframes fly {
            0% { transform: translate(0,0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="bg"><div class="aurora"></div></div>

    <div id="intro" onclick="startExperience()">
        <div class="rose-glow">🌹</div>
        <p style="color: white; margin-top: 30px; letter-spacing: 5px; font-weight: bold; text-shadow: 0 0 15px #ff0055;">CHẠM ĐỂ BẮT ĐẦU</p>
    </div>

    <audio id="piano-music" loop>
        <source src="https://files.catbox.moe/LbQvd99RSiY.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-container" id="login-box">
            <h2>Vợ Yêu ❤️</h2>
            <div class="input-group">
                <input type="text" id="usr" placeholder="Tên tài khoản..." autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="pwd" placeholder="Mật khẩu..." autocomplete="off">
                <span class="eye-btn" onclick="toggleView()">👁️</span>
            </div>
            <button class="btn-fire" onclick="access()">KHÁM PHÁ ✨</button>
            <p id="err" style="color: #ffff00; font-size: 14px; display: none; margin-top: 15px;">Mật mã trái tim sai rồi! ❌</p>
        </div>

        <div class="glass-container" id="main-menu">
            <h2>Thiên Đường Của Em</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px;">
                <div style="background: rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 13px; border: 1px solid #ff0055;">CHUYỆN QUÁ KHỨ</div>
                <div style="background: rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 13px; border: 1px solid #ff0055;">CHUYỆN HIỆN TẠI</div>
                <div style="background: rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 13px; border: 1px solid #ff0055;">HỨA HẸN TƯƠNG LAI</div>
                <div style="background: rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 13px; border: 1px solid #ff0055;">LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <div id="music-ctrl" onclick="toggleAudio()">🔊</div>

    <script>
        const audio = document.getElementById('piano-music');

        function startExperience() {
            audio.play().catch(() => console.log("Audio play deferred"));
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('music-ctrl').style.display = 'flex';
            }, 1200);
            setInterval(spawnSpark, 150);
        }

        function toggleView() {
            const p = document.getElementById('pwd');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function access() {
            const u = document.getElementById('usr').value;
            const p = document.getElementById('pwd').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-menu').style.display = "block";
            } else {
                document.getElementById('err').style.display = "block";
            }
        }

        function toggleAudio() {
            if(audio.paused) {
                audio.play(); document.getElementById('music-ctrl').innerText = "🔊";
            } else {
                audio.pause(); document.getElementById('music-ctrl').innerText = "🔇";
            }
        }

        function spawnSpark() {
            const s = document.createElement('div');
            s.className = 'spark';
            const size = Math.random() * 6 + 2;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            const colors = ['#ff0055', '#ffcc00', '#00f2ff', '#ffffff'];
            s.style.background = colors[Math.floor(Math.random()*colors.length)];
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";
            s.style.setProperty('--x', (Math.random() * 400 - 200) + "px");
            s.style.setProperty('--y', (Math.random() * 400 - 200) + "px");
            s.style.animationDuration = Math.random() * 2 + 2 + "s";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 4000);
        }
    </script>
</body>
</html>
