<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Vợ Yêu ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #ffebee;
            --dark-pink: #f73378;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', cursive, sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Hiệu ứng bong bóng bay nhẹ nhàng phía sau */
        .bg-bubbles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* Form Đăng Nhập */
        #login-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.3);
            text-align: center;
            z-index: 10;
            width: 320px;
            border: 2px solid var(--primary-pink);
            transition: 0.5s;
        }

        h2 { color: var(--dark-pink); margin-bottom: 25px; font-size: 1.4em; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ffcdd2;
            border-radius: 25px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-pink); box-shadow: 0 0 8px rgba(255, 133, 162, 0.5); }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 12px;
            cursor: pointer;
            color: #888;
        }

        button {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover { background: var(--dark-pink); transform: scale(1.05); }

        #error-msg { color: #d32f2f; font-size: 0.9em; margin-top: 15px; display: none; }

        /* Màn hình chính sau đăng nhập */
        #main-content {
            display: none;
            z-index: 10;
            text-align: center;
            animation: fadeIn 1.5s;
        }

        .menu-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .menu-item {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--soft-pink);
            color: var(--dark-pink);
            font-weight: bold;
        }

        .menu-item:hover {
            transform: translateY(-10px);
            background: var(--primary-pink);
            color: white;
        }

        /* Loa phát nhạc */
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .playing { animation: spin 3s linear infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Trái tim bay */
        .heart { position: absolute; color: var(--primary-pink); animation: float 4s ease-in infinite; z-index: 5; }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="login-box">
        <h2>VỢ YÊU ĐĂNG NHẬP MỚI ĐƯỢC XEM ❤️</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Tên tài khoản...">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Mật khẩu...">
            <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePass()"></i>
        </div>
        <button onclick="checkLogin()">Mở Quà Ngay</button>
        <p id="error-msg">VỢ IU NHẬP SAI ROIII ❌</p>
    </div>

    <div id="main-content">
        <h1 style="color: var(--dark-pink);">Chào mừng Vợ Yêu đã quay lại!</h1>
        <div class="menu-container">
            <div class="menu-item">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-item">CHUYỆN HIỆN TẠI</div>
            <div class="menu-item">LỜI HỨA CỦA TƯƠNG LAI</div>
            <div class="menu-item">LÝ DO ANH YÊU EM VÀ LỜI NHẮN NHỦ</div>
        </div>
    </div>

    <div id="music-control" onclick="toggleMusic()">
        <i class="fa-solid fa-compact-disc" id="music-icon"></i>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

    <script>
