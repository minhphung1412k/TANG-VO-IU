<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - SIÊU PHẨM V120</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #ff2d75; --s: #00e5ff; --g: #ffcf5e;
            --bg: #050510;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- SIÊU FIX NỀN THÀNH PHỐ --- */
        #world {
            position: fixed; inset: 0; z-index: 1;
            /* Lớp nền gradient dự phòng nếu ảnh lỗi */
            background: linear-gradient(to bottom, #050510, #101030);
        }

        #city-backdrop {
            position: absolute; inset: 0;
            background-image: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg');
            background-size: cover; background-position: center;
            opacity: 0.45; filter: contrast(1.2) brightness(0.7);
            z-index: 2; transition: 0.5s;
        }

        #flash-overlay {
            position: absolute; inset: 0; z-index: 3;
            pointer-events: none; opacity: 0; transition: 0.15s;
            mix-blend-mode: screen;
        }

        canvas#firework-canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* --- GIAO DIỆN ĐĂNG NHẬP THẦN THÁNH --- */
        .ui-wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; z-index: 1000; display: none;
        }

        .crystal-card {
            background: rgba(10, 10, 25, 0.8);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-radius: 50px; padding: 60px 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(255, 45, 117, 0.3), inset 0 0 20px rgba(255,255,255,0.05);
            text-align: center; position: relative; overflow: hidden;
            animation: cardShow 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes cardShow { from { opacity: 0; transform: scale(0.8) translateY(50px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .auth-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.3rem;
            background: linear-gradient(45deg, #fff, var(--p), var(--s));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px; filter: drop-shadow(0 0 15px var(--p));
        }

        /* --- INPUTS & ICONS (FIX CỨNG) --- */
        .input-group { position: relative; margin-bottom: 30px; }
        
        .input-group i {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            color: var(--p); font-size: 22px; z-index: 10;
            filter: drop-shadow(0 0 10px var(--p));
        }

        .input-group input {
            width: 100%; padding: 22px 65px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            color: #fff; font-size: 17px; transition: 0.4s;
        }

        .input-group input:focus {
            background: rgba(255,255,255,0.1); border-color: var(--s);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4); transform: translateY(-3px);
        }

        .eye-toggle { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #777; padding: 10px; z-index: 10; }

        .btn-rainbow {
            width: 100%; padding: 22px; background: linear-gradient(45deg, var(--p), #ff758c, var(--s), var(--p));
            background-size: 300% 300%; border: none; border-radius: 25px;
            color: #fff; font-weight: 900; letter-spacing: 5px; cursor: pointer;
            transition: 0.5s; animation: gradientRun 5s infinite alternate;
            box-shadow: 0 10px 30px rgba(255, 45, 117, 0.5);
        }
        @keyframes gradientRun { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .btn-rainbow:hover { transform: scale(1.05); box-shadow: 0 20px 50px var(--p); }

        /* --- MENU VIP --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .menu-card {
            background: rgba(255,255,255,0.03); padding: 30px 15px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s;
        }
        .menu-card:hover { background: var(--p); transform: translateY(-10px); box-shadow: 0 15px 30px var(--p); }
        .menu-card i { font-size: 35px; color: var(--g); margin-bottom: 15px; display: block; filter: drop-shadow(0 0 10px var(--g)); }
        .menu-card span { font-weight: 700; color: #fff; }

        /* --- MUSIC PLAYER --- */
        #music-box {
            position: fixed; bottom: 40px; right: 40px; z-index: 10000;
            width: 80px; height: 80px; cursor: pointer; display: none;
        }
        .music-disc {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(45deg, #111, #333); border: 4px solid var(--p);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--p); animation: rotate 3s linear infinite; animation-play-state: paused;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .music-disc i { color: var(--p); font-size: 30px; }

        /* --- NOTIF & INTRO --- */
        #notif { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #fff; color: var(--p); padding: 20px 60px; border-radius: 100px; font-weight: 900; z-index: 100000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #notif.active { top: 40px; }
        #intro { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <div id="world">
        <div id="city-backdrop"></div>
        <div id="flash-overlay"></div>
    </div>

    <canvas id="firework-canvas"></canvas>

    <div id="notif">VỢ IU NHẬP SAI ÒI ĐÓ</div>

            <i class="fas fa-heart"></i>
        </div>
        <h1 style="margin-top: 40px; letter-spacing: 15px; font-weight: 300;">CHẠM ĐỂ MỞ</h1>
    </div>
