<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - BẢN 82 ASCENSION PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff007b; --s: #00f2ff; --g: #ffd700; --v: #7000ff; --blur-intense: blur(40px); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        /* --- SIÊU NỀN TẢNG ĐỒ HỌA GLSL --- */
        #glsl-canvas { position: fixed; inset: 0; z-index: 1; filter: contrast(1.3) brightness(1.2); }

        /* --- GIAO DIỆN HÌNH HỌC LƯỢNG TỬ --- */
        .quantum-ui {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
        }

        .singularity-card {
            width: 98%; max-width: 500px; padding: 55px 35px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 70px 20px 70px 20px;
            backdrop-filter: var(--blur-intense) saturate(250%); -webkit-backdrop-filter: var(--blur-intense) saturate(250%);
            box-shadow: 0 0 120px rgba(0,0,0,0.9), inset 0 0 50px rgba(255,255,255,0.02);
            text-align: center; transition: all 1.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .title-plasma {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.5rem;
            margin-bottom: 45px; background: linear-gradient(45deg, #fff, var(--p), var(--s), var(--v));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop_shadow(0 0 20px var(--p)); animation: plasma-flow 8s infinite alternate;
            letter-spacing: 2px;
        }
        @keyframes plasma-flow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* --- INPUTS PORTAL & ORBITAL EYE --- */
        .input-portal { position: relative; margin-bottom: 35px; }
        .input-portal input {
            width: 100%; padding: 25px 30px; padding-right: 80px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; color: #fff; font-size: 17px; font-weight: 500;
            transition: 0.6s; box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .input-portal input:focus {
            border-color: var(--v); transform: scale(1.03);
            box-shadow: 0 0 60px rgba(112, 0, 255, 0.3);
        }

        /* ORBITAL EYE 4D */
        .orbital-eye {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%) rotateY(0deg);
            width: 50px; height: 50px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.4) 100%);
            border: 2px solid var(--s);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 0 25px var(--s);
        }
        .orbital-eye:hover { transform: translateY(-50%) rotateY(360deg) scale(1.1); background: var(--s); }
        .orbital-eye i { color: #fff; font-size: 20px; text-shadow: 0 0 10px #fff; }

        .btn-cosmic {
            width: 100%; padding: 25px; border: none; border-radius: 30px;
            background: linear-gradient(45deg, var(--p), var(--g), var(--v), var(--s));
            background-size: 400% 400%; animation: cosmic-gradient 6s infinite;
            color: #fff; font-weight: 900; letter-spacing: 6px; cursor: pointer;
            box-shadow: 0 25px 60px rgba(255,0,123,0.5); transition: 0.6s;
        }
        @keyframes cosmic-gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .btn-cosmic:hover { transform: translateY(-7px) scale(1.03); box-shadow: 0 35px 80px var(--p); }

        /* --- MENU MA TRẬN LƯỢNG TỬ --- */
        .quantum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 25px; }
        .grid-node {
            background: rgba(255,255,255,0.01); padding: 45px 15px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: 0.7s;
            position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        /* Bố cục phá vỡ mọi quy tắc */
        .grid-node:nth-child(1) { transform: translate(-20px, -10px) rotate(-5deg); }
        .grid-node:nth-child(2) { transform: translate(20px, 15px) rotate(5deg); }
        .grid-node:nth-child(3) { transform: translate(-10px, 20px) rotate(3deg); }
        .grid-node:nth-child(4) { transform: translate(15px, -10px) rotate(-3deg); }

        .grid-node:hover {
            background: var(--v); transform: scale(1.15) rotate(0deg) !important;
            box-shadow: 0 0 70px var(--v); z-index: 10;
        }
        .grid-node i { font-size: 40px; margin-bottom: 18px; color: var(--g); display: block; filter: drop-shadow(0 0 12px var(--g)); }
        .grid-node span { font-weight: 900; font-size: 15px; letter-spacing: 3px; color: #fff; }

        /* --- CỔNG ĐỘC NHẤT --- */
        #singularity-gate {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .gate-core { font-size: 90px; color: var(--s); animation: core-pulse 1s infinite alternate; filter: drop-shadow(0 0 40px var(--s)); }
        @keyframes core-pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.4); opacity: 1; } }

        /* --- CHUYỂN CẢNH VẾT NỨT VŨ TRỤ --- */
        .cosmic-rift { opacity: 0; transform: scale(0.01) rotateZ(360deg); filter: blur(100px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="singularity-gate" onclick="initiate()">
        <i class="fa-solid fa-atom gate-core"></i>
        <h2 style="margin-top: 50px; letter-spacing: 18px; font-weight: 300; color: rgba(255,255,255,0.6);">CHẠM ĐỂ SƯỚNG</h2>
    </div>

    <canvas id="glsl-canvas"></canvas>
    <div id="yt-container" style="position: absolute; visibility: hidden;"></div>

    <div class="quantum-ui">
        <div class="singularity-card" id="login-module" style="display: none;">
            <h1 class="title-plasma">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-portal">
                <input type="text" id="username" placeholder="nhập tài khoản đi bây bi">
            </div>
            <div class="input-portal">
                <input type="password" id="password" placeholder="nhập mật khẩu bé ưi">
                <div class="orbital-eye" onclick="togglePasswordView()">
                    <i class="fa-solid fa-eye" id="eye-icon"></i>
                </div>
            </div>
            <button class="btn-cosmic" onclick="authenticate()">TRUY CẬP TRÁI TIM</button>
        </div>

        <div class="singularity-card" id="menu-module" style="display: none; opacity: 0; transform: scale(0.05);">
            <h1 class="title-plasma" style="font-size: 2rem;">GỬI THUÝ VÂN</h1>
            <div class="quantum-grid">
                <div class="grid-node" onclick="spawnFire(25)"><i class="fa-solid fa-star"></i><span>KỈ NIỆM</span></div>
                <div class="grid-node" onclick="spawnFire(25)"><i class="fa-solid fa-meteor"></i><span>HIỆN TẠI</span></div>
                <div class="grid-node" onclick="spawnFire(25)"><i class="fa-solid fa-galaxy"></i><span>TƯƠNG LAI</span></div>
                <div class="grid-node" onclick="showLove()"><i class="fa-solid fa-heart-crack"></i><span>YÊU EM</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('glsl-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, ytPlayer, particles = [], rockets = [], buildings = [];

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            initCityEnvironment();
        }
        window.onresize = resizeCanvas;

        function initCityEnvironment() {
            buildings = [];
            for(let i=0; i<60; i++) {
                buildings.push({
                    x: Math.random() * W,
                    w: 50 + Math.random() * 90,
                    h: Math.random() * (H * 0.5) + 60,
                    colorHue: Math.random() * 360,
                    windows: Array.from({length: 20}, () => Math.random() > 0.8)
                });
            }
        }

        class Spark {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.01 + 0.007;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.15; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color; ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        class RocketEntity {
            constructor() {
                this.x = Math.random() * W; this.y = H;
                this.targetY = Math.random() * (H * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            update() {
                this.y -= 15;
                if(this.y <= this.targetY) {
                    for(let i=0; i<200; i++) particles.push(new Spark(this.x, this.y, this.color));
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 25; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill();
            }
        }

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-container', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function initiate() {
            document.getElementById('singularity-gate').classList.add('cosmic-rift');
            setTimeout(() => {
                document.getElementById('singularity-gate').style.display = 'none';
                document.getElementById('login-module').style.display = 'block';
                ytPlayer.unMute(); ytPlayer.playVideo();
                resizeCanvas(); gameLoop();
                setInterval(() => { if(Math.random() < 0.25) rockets.push(new RocketEntity()); }, 500);
            }, 1200);
        }

        function authenticate() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "thuyvanchithuongbminh" && pass === "bminhcungchicuoithvanthoi") {
                const loginMod = document.getElementById('login-module');
                loginMod.style.transform = "scale(0.1) rotate(1080deg)"; loginMod.style.opacity = "0";
                setTimeout(() => {
                    loginMod.style.display = 'none';
                    const menuMod = document.getElementById('menu-module');
                    menuMod.style.display = 'block';
                    setTimeout(() => { menuMod.style.opacity = "1"; menuMod.style.transform = "scale(1)"; }, 200);
                    spawnFire(40);
                }, 1500);
            } else { alert("Chưa đúng rồi bây bi ơi! ❤️"); }
        }

        function togglePasswordView() {
            const inp = document.getElementById('password'), icon = document.getElementById('eye-icon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            icon.className = inp.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }

        function spawnFire(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new RocketEntity()), i*150); }
        function showLove() { alert('Bình Minh yêu Thuý Vân hơn cả vũ trụ!'); spawnFire(50); }

        function gameLoop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0,0,W,H); // Light trail effect

            buildings.forEach(b => {
                ctx.fillStyle = '#080815'; ctx.fillRect(b.x, H - b.h, b.w, b.h);
                // Advanced Neon glow
                ctx.strokeStyle = `hsl(${b.colorHue}, 100%, 60%)`; ctx.lineWidth = 2;
                ctx.shadowBlur = 10; ctx.shadowColor = `hsl(${b.colorHue}, 100%, 70%)`;
                ctx.strokeRect(b.x, H - b.h, b.w, b.h);
                // Dynamic windows
                b.windows.forEach((wnd, i) => {
                    if(wnd && Math.random() > 0.05) {
                        ctx.fillStyle = `hsla(${b.colorHue + 60}, 100%, 80%, ${Math.random() * 0.7 + 0.3})`;
                        ctx.fillRect(b.x + (i%4)*15 + 10, H - b.h + Math.floor(i/4)*25 + 15, 8, 8);
                    }
                });
                ctx.shadowBlur = 0; // Reset shadow for other elements
            });

            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
