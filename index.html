<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Người Anh Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #ff4d6d; --warm: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background-color: #000; }

        /* HÌNH NỀN THIÊN NHIÊN - ĐẢM BẢO KHÔNG BỊ ĐEN */
        .main-bg {
            position: fixed; inset: 0;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: transform 2s ease;
        }

        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
            z-index: -1;
        }

        /* HIỆU ỨNG HOA RƠI */
        canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

        /* INTRO MÀN HÌNH CHỜ */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s; cursor: pointer;
        }
        .heart { font-size: 80px; color: var(--primary); animation: beat 1s infinite; text-shadow: 0 0 20px var(--primary); }

        /* GLASS CARD */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 40px 25px; border-radius: 30px;
            width: 90%; max-width: 400px; text-align: center;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.2rem; margin-bottom: 25px; }

        .input-box { position: relative; margin-bottom: 15px; }
        input {
            width: 100%; padding: 15px 40px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.9); font-weight: 600; outline: none;
        }
        .input-box i:first-child { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; padding: 5px; }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary); color: #fff; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        /* MENU 4 MỤC THEO YÊU CẦU */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .menu-item {
            background: var(--warm); padding: 20px 10px; border-radius: 15px;
            color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .menu-item:hover { background: var(--primary); transform: translateY(-5px); }

        /* ICON BẬT TẮT NHẠC */
        #music-btn {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: white; cursor: pointer; z-index: 10000; border: 1px solid #fff;
        }

        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div class="main-bg" id="bg"></div>
    <div class="overlay"></div>
    <canvas id="petal-canvas"></canvas>

    <div id="intro" onclick="startNow()">
        <div class="heart"><i class="fas fa-heart"></i></div>
        <p style="color: white; margin-top: 15px; letter-spacing: 3px;">CHẠM ĐỂ BẮT ĐẦU</p>
    </div>

    <div id="player"></div>

    <div id="music-btn" onclick="toggleMusic()">
        <i id="m-icon" class="fas fa-compact-disc fa-spin"></i>
    </div>

    <div class="card" id="login-card">
        <h2>Xin Chào Vợ ❤️</h2>
        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" id="user" placeholder="TÊN ĐĂNG NHẬP">
        </div>
        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" id="pass" placeholder="MẬT KHẨU">
            <i class="fas fa-eye eye" onclick="togglePass()"></i>
        </div>
        <button class="btn" onclick="checkLogin()">ĐĂNG NHẬP</button>
    </div>

    <div class="card" id="menu-card">
        <h2>Khu Vườn Tình Yêu</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="alert('Chuyện quá khứ...')">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-item" onclick="alert('Chuyện hiện tại...')">CHUYỆN HIỆN TẠI</div>
            <div class="menu-item" onclick="alert('Chuyện tương lai...')">CHUYỆN TƯƠNG LAI</div>
            <div class="menu-item" onclick="alert('Lời hứa...')">LỜI NHẮN NHỦ VÀ LỜI HỨA</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Khởi tạo Nhạc YouTube
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: '7maJOI3QMu0',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': '7maJOI3QMu0' },
                events: { 'onReady': onPlayerReady }
            });
        }
        function onPlayerReady(event) { event.target.mute(); event.target.playVideo(); }

        let isMusicPlaying = true;
        function startNow() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-card').style.display = 'block';
                document.getElementById('music-btn').style.display = 'flex';
                // Bật tiếng và phát nhạc khi người dùng tương tác
                player.unMute();
                player.playVideo();
            }, 1000);
        }

        function toggleMusic() {
            const icon = document.getElementById('m-icon');
            if(isMusicPlaying) {
                player.pauseVideo();
                icon.classList.remove('fa-spin');
                icon.classList.replace('fa-compact-disc', 'fa-play');
            } else {
                player.playVideo();
                icon.classList.add('fa-spin');
                icon.classList.replace('fa-play', 'fa-compact-disc');
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            // Sử dụng thông tin đăng nhập bạn đã cung cấp trước đó
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-card').style.display = 'none';
                document.getElementById('menu-card').style.display = 'block';
                document.getElementById('bg').style.transform = 'scale(1.2)';
            } else {
                alert("Thông tin không chính xác!");
            }
        }

        // Hiệu ứng hoa rơi
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const petals = [];
        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 5 + 2;
                this.v = Math.random() * 2 + 1;
            }
            draw() {
                ctx.fillStyle = "rgba(255, 182, 193, 0.8)";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.s, 0, Math.PI*2);
                ctx.fill();
            }
            update() {
                this.y += this.v;
                this.x += Math.sin(this.y/50);
                if(this.y > canvas.height) this.y = -10;
            }
        }
        for(let i=0; i<60; i++) petals.push(new Petal());
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
