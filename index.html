<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAME: THVAN QUANTUM ADVENTURE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; overflow: hidden; 
            font-family: 'Orbitron', sans-serif; color: #fff;
        }

        /* GIAO DIỆN GAME HUD */
        #ui-layer {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            pointer-events: none;
        }
        .stats { font-size: 12px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin-bottom: 10px; }
        .progress-container { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #00f2ff; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #ff007b); transition: 0.3s; }

        /* MÀN HÌNH BẮT ĐẦU (START SCREEN) */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            border: 10px double #00f2ff; margin: 20px;
        }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 1.5rem; color: #ff007b; margin-bottom: 30px; line-height: 1.5; }
        .start-btn {
            padding: 20px 40px; background: transparent; border: 4px solid #00f2ff;
            color: #00f2ff; font-family: 'Press Start 2P'; cursor: pointer;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .start-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 50px #00f2ff; }

        /* HIỆU ỨNG THÔNG BÁO TRONG GAME */
        #game-msg {
            position: fixed; bottom: 15%; width: 100%; text-align: center;
            font-family: 'Press Start 2P'; font-size: 10px; color: #ffd700;
            pointer-events: none; opacity: 0; transition: 0.5s;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stats">PLAYER: THUÝ VÂN</div>
        <div class="stats">LOVE ENERGY: <span id="score">0</span>%</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="game-msg">BÌNH MINH YÊU VÂN NHẤT!</div>

    <div id="overlay">
        <h1>PROJECT: THVAN<br>QUANTUM LOVE</h1>
        <p style="margin-bottom: 40px; letter-spacing: 5px;">HÃY THU THẬP CÁC HẠT SÁNG ĐỂ MỞ KHOÁ TRÁI TIM</p>
        <button class="start-btn" onclick="startGame()">START MISSION</button>
    </div>

    <div id="yt-player" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.body.appendChild(canvas);

        let w, h, yt, animationId;
        let score = 0;
        let gameActive = false;
        let player = { x: 0, y: 0, r: 20 };
        let particles = [];
        let stars = [];
        let items = [];

        const quotes = [
            "VÂN LÀ XINH NHẤT!",
            "BÌNH MINH CHỈ YÊU VÂN",
            "MẬT MÃ: THUÝ VÂN",
            "NĂNG LƯỢNG TRÀN ĐẦY!",
            "SẮP TỚI ĐÍCH RỒI BẤY BÌ"
        ];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = Array.from({length: 200}, () => ({
                x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, v: Math.random()*2+1
            }));
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-player', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            gameActive = true;
            yt.unMute();
            yt.playVideo();
            spawnItem();
            animate();
        }

        window.addEventListener('mousemove', (e) => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        function spawnItem() {
            if(!gameActive) return;
            items.push({
                x: Math.random()*w, y: -50,
                r: 10, v: Math.random()*3+2,
                color: `hsl(${Math.random()*360}, 100%, 70%)`
            });
            setTimeout(spawnItem, 1000);
        }

        function showMsg() {
            const msg = document.getElementById('game-msg');
            msg.innerText = quotes[Math.floor(Math.random()*quotes.length)];
            msg.style.opacity = 1;
            setTimeout(() => msg.style.opacity = 0, 1500);
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<20; i++) {
                particles.push({
                    x, y, color,
                    vx: (Math.random()-0.5)*10,
                    vy: (Math.random()-0.5)*10,
                    life: 1
                });
            }
        }

        function animate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,w,h);

            // Vẽ sao nền lướt đi
            stars.forEach(s => {
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                s.y += s.v;
                if(s.y > h) s.y = -10;
            });

            // Vẽ người chơi (Phi thuyền Hologram)
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 25);
            ctx.lineTo(player.x + 20, player.y + 15);
            ctx.lineTo(player.x - 20, player.y + 15);
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';

            // Xử lý vật phẩm
            items.forEach((item, index) => {
                item.y += item.v;
                ctx.fillStyle = item.color;
                ctx.shadowBlur = 15; ctx.shadowColor = item.color;
                ctx.beginPath(); ctx.arc(item.x, item.y, item.r, 0, 7); ctx.fill();

                // Va chạm
                let dx = player.x - item.x;
                let dy = player.y - item.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < player.r + item.r) {
                    items.splice(index, 1);
                    score += 5;
                    document.getElementById('score').innerText = score;
                    document.getElementById('progress-bar').style.width = score + '%';
                    createExplosion(item.x, item.y, item.color);
                    showMsg();

                    if(score >= 100) endGame();
                }
                if(item.y > h) items.splice(index, 1);
            });

            // Pháo hoa hạt nhân
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7); ctx.fill();
                return p.life > 0;
            });
            ctx.globalAlpha = 1;

            if(gameActive) requestAnimationFrame(animate);
        }

        function endGame() {
            gameActive = false;
            ctx.clearRect(0,0,w,h);
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <h1 style="color: #00f2ff">MISSION ACCOMPLISHED!</h1>
                <p style="font-size: 20px; line-height: 2">BÌNH MINH ❤ THUÝ VÂN<br>FOREVER TOGETHER</p>
                <div style="margin-top: 30px; font-size: 10px; color: #ff007b">MUSIC: ${yt.getVideoData().title}</div>
            `;
            // Nổ pháo hoa liên hoàn
            setInterval(() => createExplosion(Math.random()*w, Math.random()*h, '#ff007b'), 200);
            setInterval(() => createExplosion(Math.random()*w, Math.random()*h, '#00f2ff'), 300);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
