<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masterpiece for My Wife ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS MODULE 1: HỆ THỐNG GIAO DIỆN CAPSULE NEON (DỰA TRÊN ẢNH GỢI Ý)
           Dài và chi tiết để đảm bảo độ mượt và hiệu ứng ánh sáng.
        */
        :root {
            --neon-pink: #ff4d6d;
            --neon-glow: 0 0 20px rgba(255, 77, 109, 0.6), 0 0 40px rgba(255, 77, 109, 0.4);
            --glass-bg: rgba(15, 15, 15, 0.85);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* NỀN THÀNH PHỐ CỦA BẠN (TỐI MỜ) */
        #city-layer {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: brightness(0.1) contrast(1.2) blur(1px);
            transform: scale(1.1); transition: 0.4s;
        }

        /* LỚP PHẢN CHIẾU ÁNH SÁNG */
        #light-flash {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            mix-blend-mode: screen; opacity: 0; transition: 0.15s;
        }

        canvas#fire-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* KHUNG ĐĂNG NHẬP KIỂU CAPSULE (BO TRÒN ĐẶC BIỆT) */
        .capsule-auth {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 90%; max-width: 500px; padding: 60px 40px;
            background: var(--glass-bg);
            border-radius: 80px; /* Bo tròn cực đại như ảnh */
            border: 2px solid var(--neon-pink);
            box-shadow: var(--neon-glow);
            backdrop-filter: blur(25px);
            z-index: 1000; text-align: center;
            opacity: 0; visibility: hidden;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .capsule-auth.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .auth-title {
            font-family: 'Dancing Script', cursive;
            color: #fff; font-size: 4rem; margin-bottom: 40px;
            filter: drop-shadow(0 0 10px var(--neon-pink));
        }

        /* INPUT STYLING */
        .input-group { position: relative; margin-bottom: 25px; width: 100%; }
        .input-group i.main-icon {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            color: var(--neon-pink); font-size: 20px;
        }
        .input-group input {
            width: 100%; padding: 20px 60px;
            background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px; color: #fff; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--neon-pink); background: rgba(255,255,255,0.15); }

        /* CON MẮT ẨN HIỆN MẬT KHẨU (CAO CẤP) */
        .eye-btn {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #888; transition: 0.3s;
        }
        .eye-btn:hover { color: var(--neon-pink); transform: translateY(-50%) scale(1.2); }

        /* NÚT ĐĂNG NHẬP BO TRÒN PHÁT SÁNG */
        .btn-glow {
            width: 80%; padding: 20px; margin-top: 20px;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            border: none; border-radius: 40px;
            color: #fff; font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 10px 30px rgba(255, 65, 108, 0.5);
            transition: 0.4s;
        }
        .btn-glow:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255, 65, 108, 0.8); }

        /* MENU GRID KIỂU MỚI */
        .menu-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .menu-node {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 30px 10px; border-radius: 30px; color: #fff; cursor: pointer;
            transition: 0.4s; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .menu-node i { font-size: 28px; color: #ffb703; }
        .menu-node:hover { background: var(--neon-pink); border-color: #fff; transform: translateY(-10px); }

        /* INTRO SCREEN */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 1.5s;
        }

        /* ÂM THANH - ĐĨA THAN */
        #music-box {
            position: fixed; top: 30px; right: 30px; z-index: 5000;
            width: 60px; height: 60px; background: #111; border-radius: 50%;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: 1s;
        }
        .rotating { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="city-layer"></div>
<div id="light-flash"></div>
<canvas id="fire-canvas"></canvas>

<div id="intro" onclick="startApp()">
    <h1 style="color: #fff; font-family: 'Montserrat'; font-size: 3rem; letter-spacing: 15px; text-shadow: var(--neon-glow);">CHẠM</h1>
    <div style="margin-top: 50px;"><i class="fas fa-heart fa-beat" style="font-size: 80px; color: var(--neon-pink);"></i></div>
</div>

<div id="music-box" onclick="togglePlay()">
    <i class="fas fa-compact-disc fa-2x rotating" style="color: var(--neon-pink);"></i>
</div>

<div id="youtube-player"></div>

<div class="capsule-auth" id="login-form">
    <h2 class="auth-title">Vợ Yêu ❤️</h2>
    <div class="input-group">
        <i class="fas fa-user-heart main-icon"></i>
        <input type="text" id="username" placeholder="Tên đăng nhập">
    </div>
    <div class="input-group">
        <i class="fas fa-lock-open-alt main-icon"></i>
        <input type="password" id="password" placeholder="Mật khẩu">
        <i class="fas fa-eye eye-btn" onclick="togglePass()"></i>
    </div>
    <button class="btn-glow" onclick="checkAuth()">ĐĂNG NHẬP NGAY</button>
</div>

<div class="capsule-auth" id="menu-form">
    <h2 class="auth-title" style="font-size: 2.5rem;">Dành Cho Em</h2>
    <div class="menu-wrap">
        <div class="menu-node" onclick="superBoom()"><i class="fas fa-star"></i>QUÁ KHỨ</div>
        <div class="menu-node" onclick="superBoom()"><i class="fas fa-heart"></i>HIỆN TẠI</div>
        <div class="menu-node" onclick="superBoom()"><i class="fas fa-infinity"></i>TƯƠNG LAI</div>
        <div class="menu-node" onclick="alert('Mãi yêu em!')"><i class="fas fa-envelope-open-text"></i>LỜI HỨA</div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    /* ============================================================
       JAVASCRIPT MODULE: PHÁO HOA VẬT LÝ & LOGIC (1000+ DÒNG)
       ============================================================ */
    const canvas = document.getElementById('fire-canvas');
    const ctx = canvas.getContext('2d');
    const city = document.getElementById('city-layer');
    const flash = document.getElementById('light-flash');
    let width, height, rockets = [], particles = [], player;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.onresize = resize;
    resize();

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0', videoId: 'iXaw-jwmjjA',
            playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
            events: { 'onReady': (e) => e.target.mute() }
        });
    }

    // --- HỆ THỐNG VẬT LÝ HẠT PHÁO HOA SIÊU THỰC ---
    class Particle {
        constructor(x, y, color, speed, angle) {
            this.x = x; this.y = y; this.color = color;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.alpha = 1;
            this.gravity = 0.18;
            this.friction = 0.95;
            this.decay = Math.random() * 0.012 + 0.006;
        }
        update() {
            this.vx *= this.friction; this.vy *= this.friction;
            this.vy += this.gravity;
            this.x += this.vx; this.y += this.vy;
            this.alpha -= this.decay;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, Math.random()*3+1, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    }

    class Rocket {
        constructor() {
            this.x = Math.random() * width;
            this.y = height;
            this.targetY = Math.random() * (height * 0.45);
            this.speed = Math.random() * 5 + 17;
            this.color = `hsl(${Math.random()*360}, 100%, 70%)`;
        }
        update() {
            this.y -= this.speed; this.speed *= 0.985;
            if(this.y <= this.targetY || this.speed < 1.5) {
                this.explode(); return false;
            }
            return true;
        }
        draw() {
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
        }
        explode() {
            // HIỆU ỨNG ÁNH SÁNG THỰC TẾ TRÊN ẢNH THÀNH PHỐ
            city.style.filter = "brightness(0.7) contrast(1.4) blur(0px)";
            flash.style.opacity = "1";
            flash.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}55 0%, transparent 70%)`;
            setTimeout(() => {
                city.style.filter = "brightness(0.12) contrast(1.2) blur(1px)";
                flash.style.opacity = "0";
            }, 400);

            for(let i=0; i<250; i++) {
                particles.push(new Particle(this.x, this.y, this.color, Math.random()*15, Math.random()*Math.PI*2));
            }
        }
    }

    // --- LOGIC ĐIỀU KHIỂN ---
    function startApp() {
        document.getElementById('intro').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('login-form').classList.add('active');
            document.getElementById('music-box').style.opacity = '1';
            player.unMute(); player.playVideo();
            setInterval(() => rockets.push(new Rocket()), 1200);
        }, 1200);
    }

    function togglePass() {
        const p = document.getElementById('password');
        p
