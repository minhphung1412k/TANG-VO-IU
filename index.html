<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới Lung Linh Của Vợ ❤️</title>
    <style>
        /* NỀN CẦU VỒNG ĐỘNG CỰC MẠNH */
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8);
            background-size: 400% 400%;
            animation: rainbow 10s ease infinite;
            display: flex; justify-content: center; align-items: center;
        }

        /* LỚP PHỦ KHỞI ĐỘNG (Để lách luật âm thanh) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; text-align: center;
        }

        /* KHUNG KÍNH PHÁT SÁNG NEON */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            padding: 50px;
            width: 340px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5), inset 0 0 20px rgba(255,255,255,0.2);
            display: none; /* Hiện sau khi bấm overlay */
            z-index: 10;
        }

        h2 {
            color: #fff; font-size: 1.8rem; letter-spacing: 2px;
            text-shadow: 0 0 20px #ff00c8, 0 0 40px #ff00c8;
            margin-bottom: 30px; text-transform: uppercase;
        }

            border: none; border-radius: 50px; background: white;
