<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - FINAL</title>
    <style>
        /* --- NỀN TẢNG CỨNG (KHÔNG THỂ LỖI) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020205; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; color: white; }

        /* --- THÀNH PHỐ DỰNG BẰNG HTML THUẦN (CẤM BIẾN MẤT) --- */
        .city-bg { position: fixed; bottom: 0; width: 100%; height: 35%; z-index: 2; pointer-events: none; display: flex; align-items: flex-end; justify-content: space-around; }
        .bldg { background: #050510; border-top: 2px solid #1a1a2e; position: relative; width: 8%; }
        .bldg::after { content: ""; position: absolute; inset: 5px; background-image: radial-gradient(#ffcf5e 1px, transparent 1px); background-size: 10px 15px; opacity: 0.3; }
        /* Độ cao ngẫu nhiên cho từng tòa nhà */
        .b1 { height: 80%; width: 12%; } .b2 { height: 60%; } .b3 { height: 95%; width: 15%; }
        .b4 { height: 70%; } .b5 { height: 85%; width: 10%; } .b6 { height: 50%; }

        /* --- PHÁO HOA --- */
        canvas { position: fixed; inset: 0; z-index: 1; }

        /* --- GIAO DIỆN HIỆN ĐẠI (NEON STYLE) --- */
        .wrapper { position: relative; z-index: 10; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { 
            background: rgba(10, 10, 20, 0.95); 
            border: 2px solid #ff2d75; 
            border-radius: 25px; 
            padding: 40px 20px; 
            width: 90%; 
            max-width: 380px; 
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.3);
        }

        h1 { font-size: 22px; color: #ff2d75; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .field { position: relative; margin-bottom: 20px; }
        .field input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            background: #000; color: #fff; font-size: 16px; 
        }
        .field input:focus { border-color: #00e5ff; outline: none; }
        
        /* FIX ICON MẮT TUYỆT ĐỐI */
        .eye-btn { 
            position: absolute; right: 15px; top: 15px; width: 25px; height: 25px; 
            cursor: pointer; fill: #666; z-index: 100;
        }

        .btn-main { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            background: linear-gradient(45deg, #ff2d75, #bc13fe); 
            color: white; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* MENU PHI ĐỐI XỨNG */
        .menu-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
        .menu-item { 
            background: #1a1a2e; border: 1px solid #ff2d75; padding: 20px; 
            width: 45%; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .menu-item:hover { transform: scale(1.05); background: #ff2d75; }

        #intro { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .pulse { animation: pulse 1s infinite; color: #ff2d75; font-weight: bold; font-size: 20px; letter-spacing: 3px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }
    </style>
</head>
<body>

    <div class="city-bg">
        <div class="bldg b1"></div>
        <div class="bldg b2"></div>
        <div class="bldg b3"></div>
        <div class="bldg b4"></div>
        <div class="bldg b5"></div>
        <div class="bldg b6"></div>
    </div>

    <canvas id="fireworks"></canvas>

    <div id="intro" onclick="startApp()">
        <div class="pulse">CHẠM ĐỂ KHỞI ĐỘNG</div>
    </div>

    <div class="wrapper">
        <div class="card" id="login-form" style="display:none;">
            <h1>Bình Minh ❤️ Thuý Vân</h1>
            <div class="field">
                <input type="text" id="user" placeholder="Tên đăng nhập">
            </div>
            <div class="field">
                <input type="password" id="pass" placeholder="Mật khẩu">
                <svg class="eye-btn" onclick="togglePass()" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <button class="btn-main" onclick="checkLogin()">TRUY CẬP</button>
        </div>

        <div class="card" id="menu-box" style="display:none;">
            <h1>Gửi Thuý Vân</h1>
            <div class="menu-grid">
                <div class="menu-item" onclick="makeFireworks()">Kỉ niệm</div>
                <div class="menu-item" onclick="makeFireworks()">Hiện tại</div>
                <div class="menu-item" onclick="makeFireworks()">Tương lai</div>
                <div class="menu-item" onclick="alert('Bình Minh yêu Thuý Vân!')">Yêu em</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize; resize();

        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function startApp() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            setInterval(spawnRocket, 1000);
            update();
        }

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('menu-box').style.display = 'block';
                makeFireworks();
            } else {
                alert("Sai mật khẩu rồi vợ ơi!");
            }
        }

        function spawnRocket() {
            const x = Math.random() * canvas.width;
            const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            for(let i=0; i<40; i++) {
                particles.push({
                    x: x, y: canvas.height * 0.4,
                    vx: Math.random() * 6 - 3, vy: Math.random() * 6 - 3,
                    alpha: 1, color: color
                });
            }
        }

        function makeFireworks() { for(let i=0; i<5; i++) setTimeout(spawnRocket, i*300); }

        function update() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.alpha -= 0.01;
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.alpha <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
