<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THVAN: QUANTUM LOVE STRIKE</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --p1: #ffdeeb; --p2: #ff85c0; --p3: #f759ab; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Bebas Neue', cursive; }

        /* CẢNH BÁO XOAY NGÀN MÀN HÌNH */
        #orientation-overlay {
            position: fixed; inset: 0; background: #1a000d; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: var(--p2); padding: 20px;
        }
        @media (orientation: portrait) { #orientation-overlay { display: flex; } }

        /* GIAO DIỆN GAME */
        #hud {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            display: flex; align-items: center; gap: 20px; pointer-events: none;
        }
        .progress-container {
            width: 300px; height: 15px; background: rgba(255,255,255,0.1);
            border-radius: 20px; border: 2px solid var(--p2); overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #fff, var(--p3)); box-shadow: 0 0 20px var(--p2); transition: 0.3s; }
        
        #score-display { font-size: 24px; color: #fff; letter-spacing: 2px; }

        /* MÀN HÌNH CHỜ VIP */
        #start-gate {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle, #2d0015, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .title { font-size: 5rem; color: #fff; text-shadow: 0 0 30px var(--p3); margin-bottom: 5px; }
        .subtitle { font-family: 'Pacifico'; font-size: 1.5rem; color: var(--p1); margin-bottom: 40px; }
        
        .btn-ignite {
            padding: 20px 60px; font-family: 'Bebas Neue'; font-size: 1.5rem;
            background: transparent; border: 2px solid #fff; color: #fff;
            border-radius: 5px; cursor: pointer; transition: 0.4s; letter-spacing: 5px;
        }
        .btn-ignite:hover { background: #fff; color: #000; box-shadow: 0 0 50px #fff; transform: scale(1.1); }

        canvas { display: block; filter: contrast(110%) brightness(110%); }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <div style="font-size: 80px; margin-bottom: 20px;">🔄</div>
        <h2>VUI LÒNG XOAY NGANG MÀN HÌNH</h2>
        <p style="font-family: 'Pacifico'; margin-top: 10px;">Để trải nghiệm Vũ Trụ Tình Yêu tốt nhất</p>
    </div>

    <div id="hud">
        <div id="score-display">SYNC: 0%</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="start-gate">
        <div class="title">THVAN ODYSSEY</div>
        <div class="subtitle">Binh Minh's Special Mission</div>
        <button class="btn-ignite" onclick="launchGame()">INITIALIZE</button>
    </div>

    <div id="yt-player" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.body.appendChild(canvas);

        let w, h, yt, active = false, score = 0;
        let player = { x: 100, y: h/2, r: 25, targetY: 0 };
        let stars = [], enemies = [], sparkles = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            player.y = h/2;
            player.targetY = h/2;
            stars = Array.from({length: 100}, () => ({
                x: Math.random()*w, y: Math.random()*h, s: Math.random()*3, v: Math.random()*5+2
            }));
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-player', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function launchGame() {
            document.getElementById('start-gate').style.display = 'none';
            active = true;
            yt.unMute(); yt.playVideo();
            gameLoop();
        }

        // Điều khiển mượt mà cho điện thoại và máy tính
        const handleMove = (y) => { player.targetY = y; };
        window.addEventListener('mousemove', (e) => handleMove(e.clientY));
        window.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientY);
            e.preventDefault();
        }, {passive: false});

        function drawPlayer(x, y) {
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff85c0';
            ctx.fillStyle = '#fff';
            // Phi thuyền hình trái tim nằm ngang
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, Math.PI*2);
            ctx.fill();
            // Engine effect
            let grad = ctx.createLinearGradient(x-40, y, x, y);
            grad.addColorStop(0, 'transparent'); grad.addColorStop(1, '#f759ab');
            ctx.fillStyle = grad;
            ctx.fillRect(x-50, y-5, 40, 10);
        }

        function drawHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x-size, y-size, x-size, y+size, x, y+size*1.5);
            ctx.bezierCurveTo(x+size, y+size, x+size, y-size, x, y);
            ctx.fill();
        }

        function gameLoop() {
            if(!active) return;
            ctx.fillStyle = '#0a0005';
            ctx.fillRect(0,0,w,h);

            // 1. Vẽ sao nền (Space Warp effect)
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
                ctx.fillRect(s.x, s.y, s.v, 1);
                s.x -= s.v;
                if(s.x < 0) s.x = w;
            });

            // 2. Player movement
            player.y += (player.targetY - player.y) * 0.1;
            drawPlayer(player.x, player.y);

            // 3. Enemies (Hearts) spawn
            if(Math.random() < 0.05) {
                enemies.push({
                    x: w + 50, y: Math.random()*h, 
                    s: Math.random()*15+10, v: Math.random()*4+4,
                    hue: Math.random()*30 + 330
                });
            }

            enemies.forEach((en, i) => {
                en.x -= en.v;
                drawHeart(en.x, en.y, en.s, `hsl(${en.hue}, 100%, 75%)`);

                // Va chạm
                let dx = player.x - en.x;
                let dy = player.y - en.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < 40) {
                    enemies.splice(i, 1);
                    score += 2;
                    if(score > 100) score = 100;
                    document.getElementById('progress-bar').style.width = score + '%';
                    document.getElementById('score-display').innerText = `SYNC: ${score}%`;
                    
                    // Tạo sparkle
                    for(let j=0; j<10; j++) sparkles.push({
                        x: en.x, y: en.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, a: 1
                    });

                    if(score >= 100) victory();
                }

                if(en.x < -100) enemies.splice(i, 1);
            });

            // 4. Sparkles
            sparkles.forEach((sp, i) => {
                sp.x += sp.vx; sp.y += sp.vy; sp.a -= 0.02;
                ctx.fillStyle = `rgba(255, 133, 192, ${sp.a})`;
                ctx.fillRect(sp.x, sp.y, 3, 3);
                if(sp.a <= 0) sparkles.splice(i, 1);
            });

            requestAnimationFrame(gameLoop);
        }

        function victory() {
            active = false;
            ctx.clearRect(0,0,w,h);
            const gate = document.getElementById('start-gate');
            gate.style.display = 'flex';
            gate.innerHTML = `
                <h1 class="title" style="font-size: 3rem; color: var(--p2)">MISSION COMPLETE</h1>
                <p class="subtitle">BÌNH MINH & THUÝ VÂN: FOREVER</p>
                <p style="color: #fff; margin-top: 20px;">Tình yêu đã đạt ngưỡng Vô Cực!</p>
                <div style="font-size: 50px; margin-top: 20px;">🎉💖👑</div>
            `;
            // Pháo hoa kết thúc
            setInterval(() => {
                let x = Math.random()*w, y = Math.random()*h;
                for(let i=0; i<30; i++) sparkles.push({
                    x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, a: 1
                });
            }, 300);
            gameLoop(); // Vẫn chạy loop để vẽ sparkles
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
