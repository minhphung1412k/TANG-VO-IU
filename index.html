<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vườn Bí Mật ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background: #1a1a1a; }

        /* NỀN THIÊN NHIÊN HOÀNG HÔN CỰC ĐẸP - FIX LỖI NỀN ĐEN */
        .bg-fixed {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1475924156731-da36b85e0272?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            z-index: -2;
        }

        .overlay-warm {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, rgba(255,145,0,0.2) 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* MÀN HÌNH KHỞI ĐỘNG */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fire-heart { font-size: 110px; color: #ff4d6d; filter: drop-shadow(0 0 30px #ff4d6d); animation: pulse 1s infinite; }

        /* KHUNG CHỮ GLASSMORPHISM */
        .glass-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 400px; padding: 35px 25px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 35px;
            text-align: center; display: none; z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.6rem; margin-bottom: 25px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .input-wrap { position: relative; margin-bottom: 15px; }
        input {
            width: 100%; padding: 18px 50px; border-radius: 18px; border: none;
            background: rgba(255,255,255,0.95); font-weight: 700; outline: none; font-size: 15px;
        }
        .input-wrap i:first-child { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #ff4d6d; }
        .eye-btn { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #555; padding: 5px; }

        .btn-fire {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 65, 108, 0.5); transition: 0.3s;
        }
        .btn-fire:active { transform: scale(0.95); }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .menu-item {
            background: rgba(255, 255, 255, 0.2); padding: 25px 10px; border-radius: 20px;
            color: #fff; font-size: 13px; font-weight: 800; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .menu-item:hover { background: #ff416c; box-shadow: 0 0 20px #ff416c; }

        /* LOA ĐIỀU KHIỂN */
        #music-box {
            position: fixed; top: 20px; right: 20px; width: 55px; height: 55px;
            background: rgba(255,255,255,0.25); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: #fff; cursor: pointer; z-index: 100; border: 2px solid #fff;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>
    <div class="overlay-warm"></div>
    <canvas id="canvas"></canvas>

    <div id="intro" onclick="ignite()">
        <div class="fire-heart"><i class="fas fa-heart"></i></div>
        <p style="color:white; margin-top:20px; letter-spacing:5px; font-weight: 700;">CHẠM ĐỂ SƯỚNG</p>
    </div>

    <div id="music-box" onclick="toggleM()">
        <i id="m-icon" class="fas fa-compact-disc fa-spin fa-2x"></i>
    </div>

    <audio id="piano" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-panel" id="login-form">
        <h2>Xin Chào Vợ ❤️</h2>
        <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" id="user" placeholder="TÊN ĐĂNG NHẬP">
        </div>
        <div class="input-wrap">
            <i class="fas fa-key"></i>
            <input type="password" id="pass" placeholder="MẬT KHẨU">
            <i class="fas fa-eye eye-btn" onclick="toggleP()"></i>
        </div>
        <button class="btn-fire" onclick="access()">ĐĂNG NHẬP</button>
    </div>

    <div class="glass-panel" id="main-menu">
        <h2>Khu Vườn Tình Yêu</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="createFW()">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-item" onclick="createFW()">CHUYỆN HIỆN TẠI</div>
            <div class="menu-item" onclick="createFW()">CHUYỆN TƯƠNG LAI</div>
            <div class="menu-item" onclick="alert('Anh hứa sẽ mãi yêu em!')">LỜI NHẮN NHỦ VÀ LỜI HỨA</div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('piano');
        let mPlay = true;

        function ignite() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('music-box').style.display = 'flex';
                audio.play();
                for(let i=0; i<5; i++) setTimeout(createFW, i*300);
            }, 800);
        }

        function toggleP() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function access() {
            if(document.getElementById('user').value === "anhyeuemlamdonha" && document.getElementById('pass').value === "xindungboroianh") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
                for(let i=0; i<15; i++) setTimeout(createFW, i*200);
            } else { alert("Sai thông tin rồi vợ ơi!"); }
        }

        function toggleM() {
            const icon = document.getElementById('m-icon');
            if(mPlay) { audio.pause(); icon.classList.remove('fa-spin'); }
            else { audio.play(); icon.classList.add('fa-spin'); }
            mPlay = !mPlay;
        }

        // PHÁO HOA CHÂN THỰC BẮN TỪ DƯỚI LÊN
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let rockets = [];

        class Rocket {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height/2);
                this.v = Math.random() * 5 + 10;
                this.color = `hsl(${Math.random()*360}, 100%, 60%)`;
            }
            update() {
                this.y -= this.v;
                if(this.y <= this.targetY) {
                    explode(this.x, this.y, this.color);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
            }
        }

        function explode(x, y, color) {
            for(let i=0; i<60; i++) {
                particles.push({
                    x, y, 
                    vx: Math.cos(i) * (Math.random()*8), 
                    vy: Math.sin(i) * (Math.random()*8), 
                    life: 1, 
                    c: color
                });
            }
        }

        function createFW() { rockets.push(new Rocket()); }

        function loop() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            rockets = rockets.filter(r => {
                r.update(); r.draw(); return r.y > r.targetY;
            });
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.015;
                if(p.life <= 0) particles.splice(i, 1);
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(loop);
        }
        loop();
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
