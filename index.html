<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff2d75;
            --secondary: #00e5ff;
            --gold: #ffcf5e;
            --glass: rgba(10, 10, 20, 0.85);
            --neon-glow: 0 0 20px rgba(255, 45, 117, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #020205; 
            overflow: hidden; 
            font-family: 'Quicksand', sans-serif;
            color: #fff;
        }

        /* --- PHẦN 1: HỆ THỐNG NỀN THÀNH PHỐ VĨNH CỬU --- */
        #city-container {
            position: fixed; inset: 0; z-index: 1;
            background: #050510;
            overflow: hidden;
        }

        /* Ảnh nền với chế độ hiển thị thông minh */
        #city-image {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.35; /* Độ sáng le lói tiêu chuẩn */
            filter: contrast(1.2) saturate(0.8);
            transition: transform 0.5s ease, filter 0.3s ease;
        }

        /* Lớp phủ màu đêm để chống lỗi nền đen */
        #night-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, transparent 0%, #000 80%);
            z-index: 2;
        }

        /* Lớp phản xạ ánh sáng pháo hoa hắt vào thành phố */
        #ambient-light {
            position: absolute; inset: 0;
            z-index: 3; opacity: 0;
            mix-blend-mode: screen;
            transition: opacity 0.2s ease;
            background: white;
        }

        /* --- PHẦN 2: ENGINE PHÁO HOA --- */
        canvas#fireworks-canvas {
            position: fixed; inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* --- PHẦN 3: GIAO DIỆN ĐĂNG NHẬP (ULTRA VIP) --- */
        .supreme-wrapper {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 500px;
            z-index: 1000;
            display: none; /* Sẽ hiện sau khi Intro kết thúc */
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            border-radius: 50px;
            padding: 60px 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), var(--neon-glow);
            text-align: center;
            overflow: hidden;
            animation: cardEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Hiệu ứng viền chạy lấp lánh quanh khung */
        .main-card::before {
            content: ''; position: absolute; inset: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--secondary), transparent, var(--gold));
            background-size: 400%; z-index: -1;
            animation: borderRun 10s linear infinite;
            filter: blur(5px);
        }

        @keyframes borderRun { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }
        @keyframes cardEntrance { from { opacity: 0; transform: translateY(50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .title-heart {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.2rem;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 10px rgba(255, 45, 117, 0.5));
        }

        /* --- INPUT & ICON (FIX TRIỆT ĐỂ) --- */
        .input-box {
            position: relative; margin-bottom: 25px;
            transition: 0.3s;
        }

        .input-box i.main-icon {
            position: absolute; left: 25px; top: 50%;
            transform: translateY(-50%);
            color: var(--primary); font-size: 20px;
            z-index: 10; filter: drop-shadow(0 0 5px var(--primary));
        }

        .input-box input {
            width: 100%;
            padding: 22px 65px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #fff; font-size: 17px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 45, 117, 0.3);
            transform: scale(1.02);
        }

        .eye-toggle {
            position: absolute; right: 25px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; color: #777;
            padding: 5px; z-index: 10;
        }
        .eye-toggle:hover { color: #fff; }

        .btn-supreme {
            width: 100%;
            padding: 22px;
            background: linear-gradient(45deg, var(--primary), #ff5e3a);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.5s;
            box-shadow: 0 10px 30px rgba(255, 45, 117, 0.4);
            position: relative; overflow: hidden;
        }

        .btn-supreme:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px var(--primary);
        }

        /* --- MENU 4 MỤC (CHUYỂN ĐỘNG LẠ KỲ) --- */
        .menu-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.4s all;
            position: relative;
        }

        .menu-card:hover {
            background: var(--primary);
            transform: translateY(-10px) rotate(2deg);
            border-color: #fff;
        }

        .menu-card i {
            font-size: 30px;
            margin-bottom: 12px;
            display: block;
            color: var(--gold);
            filter: drop-shadow(0 0 5px var(--gold));
        }

        .menu-card span {
            font-weight: 700;
            font-size: 14px;
            display: block;
        }

        /* --- HỆ THỐNG ÂM THANH (PREMIUM) --- */
        #music-wrapper {
            position: fixed; top: 30px; right: 30px;
            z-index: 9999; display: none;
        }

        .vinyl-record {
            width: 75px; height: 75px;
            border-radius: 50%;
            background: #111;
            border: 4px solid #333;
            position: relative;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--primary);
        }

        .vinyl-record i { color: var(--primary); font-size: 25px; }

        .rotating { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- NOTIFICATION & INTRO --- */
        #notification {
            position: fixed; top: -100px; left: 50%;
            transform: translateX(-50%);
            background: #fff; color: var(--primary);
            padding: 18px 45px; border-radius: 100px;
            font-weight: 900; z-index: 100000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 15px;
        }
        #notification.active { top: 40px; }

        #intro-overlay {
            position: fixed; inset: 0;
            background: #000; z-index: 99999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
        }

        .heart-beat-loader {
            font-size: 100px; color: var(--primary);
            animation: heartBeat 1.2s infinite;
            filter: drop-shadow(0 0 20px var(--primary));
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="city-container">
        <img id="city-image" src="https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg" onerror="this.src='https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop'">
        <div id="night-overlay"></div>
        <div id="ambient-light"></div>
    </div>

    <canvas id="fireworks-canvas"></canvas>

    <div id="notification">
        <i class="fas fa-heart-crack fa-shake"></i>
        <span id="notif-text">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="intro-overlay" onclick="startGenesis()">
        <div class="heart-beat-loader"><i class="fas fa-heart"></i></div>
        <h1 style="margin-top: 40px; letter-spacing: 15px; font-weight: 300;">MỞ TRÁI TIM</h1>
    </div>

    <div id="music-wrapper" onclick="handleMusic()">
        <div class="vinyl-record" id="vinyl-ui">
            <i class="fas fa-music"></i>
        </div>
    </div>
    <div id="youtube-api-container"></div>

    <div class="supreme-wrapper" id="auth-ui">
        <div class="main-card">
            <h2 class="title-heart">BÌNH MINH ❤️ THUÝ VÂN</h2>
            
            <div class="input-box">
                <i class="fas fa-envelope-open-heart main-icon"></i>
                <input type="text" id="u_name" placeholder="Nhập tài khoản đi baby" autocomplete="off">
            </div>

            <div class="input-box">
                <i class="fas fa-key-skeleton-left main-icon"></i>
                <input type="password" id="u_pass" placeholder="Nhập mật khẩu nha bé iu" autocomplete="off">
                <div class="eye-toggle" onclick="togglePasswordView()">
                    <i class="fas fa-eye" id="eye-icon"></i>
                </div>
            </div>

            <button class="btn-supreme" onclick="validateIdentity()">ĐĂNG NHẬP VÀO TRÁI TIM</button>
        </div>
    </div>

    <div class="supreme-wrapper" id="menu-ui">
        <div class="main-card">
            <h2 class="title-heart" style="font-size: 1.8rem;">GỬI THUÝ VÂN</h2>
            <div class="menu-container">
                <div class="menu-card" onclick="triggerMassiveFire(15)">
                    <i class="fas fa-scroll-old"></i>
                    <span>Kỉ niệm</span>
                </div>
                <div class="menu-card" onclick="triggerMassiveFire(15)">
                    <i class="fas fa-heart-pulse"></i>
                    <span>Hiện tại</span>
                </div>
                <div class="menu-card" onclick="triggerMassiveFire(15)">
                    <i class="fas fa-shuttle-space"></i>
                    <span>Lời hứa ở tương lai</span>
                </div>
                <div class="menu-card" onclick="specialAction()">
                    <i class="fas fa-face-smile-beam"></i>
                    <span>Nếu em đang buồn...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /**
         * ENGINE CORE: XỬ LÝ TOÀN BỘ LOGIC HỆ THỐNG
         */
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        const cityImg = document.getElementById('city-image');
        const ambient = document.getElementById('ambient-light');
        
        let width, height, player, isPlaying = false;
        let rockets = [], particles = [];

        // 1. Khởi tạo kích thước màn hình
        function initResize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initResize);
        initResize();

        // 2. Engine Hạt Pháo Hoa (Star-Dust Engine)
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.008;
                this.gravity = 0.15;
            }
            update() {
                this.vx *= 0.94; this.vy *= 0.94;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 3. Engine Tên Lửa Pháo Hoa (Rocket Engine)
        class Rocket {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * (height * 0.45);
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
                this.velocity = -Math.random() * 4 - 12;
            }
            update() {
                this.y += this.velocity;
                if (this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                return true;
            }
            explode() {
                // XỬ LÝ CHIẾU SÁNG THÀNH PHỐ KHI PHÁO NỔ
                cityImg.style.filter = "brightness(1.8) contrast(1.5) saturate(1.2)";
                ambient.style.opacity = "0.5";
                ambient.style.background = `radial-gradient(circle at ${this.x}px ${this.targetY}px, ${this.color}, transparent 70%)`;
                
                setTimeout(() => {
                    cityImg.style.filter = "brightness(0.35) contrast(1.2) saturate(0.8)";
                    ambient.style.opacity = "0";
                }, 350);

                for (let i = 0; i < 250; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
            draw() {
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 4. Xử lý âm thanh Youtube
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-api-container', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function handleMusic() {
            const vinyl = document.getElementById('vinyl-ui');
            if(isPlaying) {
                player.pauseVideo();
                vinyl.classList.remove('rotating');
                isPlaying = false;
            } else {
                player.unMute();
                player.playVideo();
                vinyl.classList.add('rotating');
                isPlaying = true;
            }
        }

        // 5. Logic Đăng Nhập & Bảo Mật
        function togglePasswordView() {
            const field = document.getElementById('u_pass');
            const icon = document.getElementById('eye-icon');
            if(field.type === 'password') {
                field.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                field.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function validateIdentity() {
            const u = document.getElementById('u_name').value;
            const p = document.getElementById('u_pass').value;
            // Tài khoản bảo mật cao nhất
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('auth-ui').style.display = 'none';
                setTimeout(() => {
                    document.getElementById('menu-ui').style.display = 'block';
                    triggerMassiveFire(20);
                }, 500);
            } else {
                showNotif('VỢ IU NHẬP SAI ÒI ĐÓ');
            }
        }

        function showNotif(msg) {
            const n = document.getElementById('notification');
            document.getElementById('notif-text').innerText = msg;
            n.classList.add('active');
            setTimeout(() => n.classList.remove('active'), 3500);
        }

        // 6. Khởi động hệ thống
        function startGenesis() {
            document.getElementById('intro-overlay').style.transition = "1.5s";
            document.getElementById('intro-overlay').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = "none";
                document.getElementById('auth-ui').style.display = "block";
                document.getElementById('music-wrapper').style.display = "block";
                handleMusic();
                // Bắt đầu chu kỳ bắn pháo tự động
                setInterval(() => {
                    if(Math.random() < 0.2) rockets.push(new Rocket());
                }, 800);
            }, 1000);
        }

        function triggerMassiveFire(count) {
            for(let i=0; i<count; i++) {
                setTimeout(() => { rockets.push(new Rocket()); }, i * 250);
            }
        }

        function specialAction() {
            showNotif('Mỉm cười lên nhé Thuý Vân, có Bình Minh đây rồi!');
            triggerMassiveFire(30);
        }

        // 7. Loop Rendering (Vòng lặp đồ họa)
        function render() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            rockets = rockets.filter(rocket => {
                rocket.draw();
                return rocket.update();
            });

            particles = particles.filter(p => {
                p.draw();
                p.update();
                return p.alpha > 0;
            });

            requestAnimationFrame(render);
        }
        render();

    </script>
</body>
</html>
