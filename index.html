<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff2d75; --s: #00e5ff; --g: #ffcf5e; --bg: #010105; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); overflow: hidden; font-family: 'Montserrat', sans-serif; }

        canvas#canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* --- UI LAYER --- */
        #app-ui { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* --- GIAO DIỆN ĐỘC LẠ (NON-LINEAR) --- */
        .glass-container {
            position: relative; width: 90%; max-width: 440px;
            padding: 50px 30px; border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .title {
            font-family: 'Cinzel Decorative', cursive; font-size: 2rem;
            margin-bottom: 40px; text-align: center;
            background: linear-gradient(45deg, #fff, var(--p), var(--s));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--p));
        }

        /* --- INPUTS BREAKING THE LINE --- */
        .input-box {
            position: relative; margin-bottom: 25px;
            transform: skewX(-5deg); /* Làm lệch một chút cho độc lạ */
        }
        .input-box input {
            width: 100%; padding: 18px 50px; border: none; border-radius: 12px;
            background: rgba(0,0,0,0.6); color: #fff; font-size: 15px;
            border-bottom: 2px solid var(--s); transition: 0.3s;
        }
        .input-box input:focus { background: rgba(0,0,0,0.8); border-bottom-color: var(--p); transform: scale(1.02); }

        .icon-lead { position: absolute; left: 15px; top: 18px; width: 20px; fill: var(--s); }
        .eye-toggle { 
            position: absolute; right: 15px; top: 18px; cursor: pointer; 
            width: 24px; fill: #fff; opacity: 0.5; z-index: 10;
        }

        .btn-start {
            width: 100%; padding: 20px; margin-top: 15px; border: none; border-radius: 50px;
            background: linear-gradient(90deg, var(--p), #7000ff);
            color: #fff; font-weight: 800; letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 15px 30px rgba(255, 45, 117, 0.4);
            transition: 0.4s; transform: rotate(1deg);
        }
        .btn-start:hover { transform: scale(1.05) rotate(0); filter: brightness(1.2); }

        /* --- MENU ĐA TẦNG --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .menu-node {
            background: rgba(255,255,255,0.05); padding: 30px 10px; border-radius: 25px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.5s;
        }
        .menu-node:nth-child(even) { transform: translateY(20px); } /* Tạo độ so le */
        .menu-node:hover { background: var(--p); transform: scale(1.1) rotate(5deg); z-index: 20; }
        .menu-node svg { width: 30px; fill: var(--g); margin-bottom: 10px; }
        .menu-node span { display: block; font-weight: 700; font-size: 13px; color: #fff; }

        /* --- CƠ CHẾ CHUYỂN CẢNH --- */
        .fade-out { opacity: 0; transform: scale(1.5) rotate(10deg); filter: blur(20px); }
        .fade-in { animation: entrance 1s forwards; }
        @keyframes entrance { from { opacity: 0; transform: scale(0.5) translateY(100px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        #intro {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; text-align: center;
        }
        .heart { width: 100px; fill: var(--p); filter: drop-shadow(0 0 30px var(--p)); animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: var(--p); padding: 15px 40px; border-radius: 50px;
            font-weight: 800; z-index: 2000; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="intro" onclick="startApp()">
        <svg class="heart" viewBox="0 0 32 32"><path d="M16 28.5s-12-7-12-14.5c0-4 3-7 7-7 2.5 0 4.5 1.5 5 3.5.5-2 2.5-3.5 5-3.5 4 0 7 3 7 7 0 7.5-12 14.5-12 14.5z"/></svg>
        <h2 style="color:white; margin-top:30px; letter-spacing: 5px;">CHẠM ĐỂ BẮT ĐẦU</h2>
    </div>

    <canvas id="canvas"></canvas>
    <div id="toast">SAI RỒI VỢ IU ƠI! ❤️</div>

    <div id="app-ui">
        <div class="glass-container" id="login-box" style="display: none;">
            <h1 class="title">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-box">
                <svg class="icon-lead" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="user" placeholder="Tên tài khoản">
            </div>
            <div class="input-box">
                <svg class="icon-lead" viewBox="0 0 24 24"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/></svg>
                <input type="password" id="pass" placeholder="Mật khẩu">
                <svg class="eye-toggle" onclick="togglePass()" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <button class="btn-start" onclick="verify()">KHÁM PHÁ</button>
        </div>

        <div class="glass-container" id="menu-box" style="display: none;">
            <h1 class="title" style="font-size: 1.6rem;">GỬI THUÝ VÂN</h1>
            <div class="menu-grid">
                <div class="menu-node" onclick="boom()">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>KỈ NIỆM</span>
                </div>
                <div class="menu-node" onclick="boom()">
                    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
                    <span>HIỆN TẠI</span>
                </div>
                <div class="menu-node" onclick="boom()">
                    <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                    <span>TƯƠNG LAI</span>
                </div>
                <div class="menu-node" onclick="surprise()">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>YÊU EM</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        let rockets = [], particles = [], buildings = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            initCity();
        }
        window.onresize = resize;

        function initCity() {
            buildings = [];
            for(let i=0; i<35; i++) {
                buildings.push({
                    x: Math.random() * w,
                    w: 40 + Math.random() * 80,
                    h: 50 + Math.random() * (h * 0.35),
                    lights: Array.from({length: 15}, () => Math.random() > 0.6)
                });
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.alpha -= this.decay; }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.45);
                this.v = -Math.random() * 5 - 10;
                this.color = `hsl(${Math.random()*360}, 100%, 70%)`;
            }
            draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 7); ctx.fill(); }
            update() {
                this.y += this.v;
                if(this.y <= this.targetY) {
                    for(let i=0; i<80; i++) particles.push(new Particle(this.x, this.y, this.color));
                    return false;
                }
                return true;
            }
        }

        function startApp() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('login-box').classList.add('fade-in');
            resize();
            setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 800);
            render();
        }

        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function verify() {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                const box = document.getElementById('login-box');
                box.classList.remove('fade-in');
                box.classList.add('fade-out');
                setTimeout(() => {
                    box.style.display = 'none';
                    const menu = document.getElementById('menu-box');
                    menu.style.display = 'block';
                    menu.classList.add('fade-in');
                    for(let i=0; i<15; i++) setTimeout(() => rockets.push(new Rocket()), i*200);
                }, 1000);
            } else {
                const t = document.getElementById('toast');
                t.style.top = '40px'; setTimeout(() => t.style.top = '-100px', 3000);
            }
        }

        function boom() { for(let i=0; i<10; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function surprise() { alert('Bình Minh yêu Thuý Vân nhất đời!'); boom(); }

        function render() {
            ctx.fillStyle = 'rgba(1, 1, 5, 0.2)';
            ctx.fillRect(0,0,w,h);

            // VẼ THÀNH PHỐ GLOW (LUÔN HIỆN)
            buildings.forEach(b => {
                ctx.fillStyle = '#050510';
                ctx.fillRect(b.x, h - b.h, b.w, b.h);
                // Cửa sổ phát sáng
                ctx.fillStyle = 'rgba(255, 207, 94, 0.2)';
                b.lights.forEach((l, idx) => {
                    if(l) {
                        const row = Math.floor(idx / 3);
                        const col = idx % 3;
                        ctx.fillRect(b.x + 10 + col*20, h - b.h + 20 + row*30, 8, 12);
                    }
                });
            });

            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
