<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BÌNH MINH TẶNG EM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Orbitron:wght@400;900&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --p: #ff007b; --s: #00f2ff; --v: #7000ff;
            --bg: #000005; --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100vw; height: 100vh; background: var(--bg); overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; position: fixed; }

        /* CANVAS & BACKGROUND */
        #vortex-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; filter: saturate(1.5) brightness(1.1); }
        .master-stage { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8)); }

        /* KHUNG ĐĂNG NHẬP SIÊU TINH TẾ (THU NHỎ) */
        .login-card {
            width: 310px; padding: 40px 30px; position: relative;
            background: var(--glass); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .web-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 1.3rem; text-align: center;
            margin-bottom: 35px; background: linear-gradient(90deg, #fff, var(--p), var(--s), #fff);
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
        }
        @keyframes flow { to { background-position: 200% center; } }

        /* INPUT GROUP - NỘI DUNG CHUẨN CỦA BẠN */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group label { display: block; font-family: 'Orbitron'; font-size: 8px; color: var(--s); letter-spacing: 2px; margin-bottom: 8px; }
        
        .input-box { position: relative; display: flex; align-items: center; }
        .input-box input {
            width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05);
            border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 14px; outline: none; transition: 0.3s;
        }
        .input-box input:focus { border-bottom-color: var(--p); background: rgba(255,255,255,0.1); }

        /* ICON ẨN HIỆN MẬT KHẨU */
        .toggle-pw { position: absolute; right: 10px; cursor: pointer; color: rgba(255,255,255,0.5); transition: 0.3s; }
        .toggle-pw:hover { color: var(--s); }

        .btn-access {
            width: 100%; padding: 16px; border: none; margin-top: 10px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem;
            color: #fff; letter-spacing: 8px; cursor: pointer;
            background: linear-gradient(45deg, var(--p), var(--v));
            border-radius: 50px; transition: 0.4s;
        }
        .btn-access:hover { transform: scale(1.03); letter-spacing: 12px; box-shadow: 0 0 30px var(--p); }

        /* MÀN HÌNH CHẠM ĐỂ SƯỚNG */
        #portal { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .core { width: 80px; height: 80px; background: #fff; border-radius: 50%; box-shadow: 0 0 50px #fff; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } }

        #audio-toggle { position: fixed; top: 25px; right: 25px; z-index: 1000; width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="portal" onclick="startApp()">
        <div class="core"></div>
        <h2 style="margin-top: 30px; font-family: 'Orbitron'; letter-spacing: 12px; font-size: 18px;">CHẠM ĐỂ SƯỚNG</h2>
    </div>

    <div id="audio-toggle" onclick="toggleMute()">
        <i id="vol-icon" class="fas fa-volume-mute"></i>
    </div>

    <canvas id="vortex-canvas"></canvas>
    <div id="yt-player" style="display:none"></div>

    <div class="master-stage">
        <div class="login-card" id="login-ui">
            <h1 class="web-title">BÌNH MINH TẶNG EM</h1>
            
            <div class="input-group">
                <label>DANH TÍNH</label>
                <div class="input-box">
                    <input type="text" id="user" placeholder="tên của bé">
                </div>
            </div>

            <div class="input-group">
                <label>MẬT MÃ</label>
                <div class="input-box">
                    <input type="password" id="pass" placeholder="mật khẩu">
                    <i class="fas fa-eye toggle-pw" id="eye-icon" onclick="togglePass()"></i>
                </div>
            </div>

            <button class="btn-access" onclick="verify()">TRUY CẬP</button>
        </div>

        <div class="login-card" id="menu-ui" style="display:none; opacity:0;">
            <h1 class="web-title">DÀNH CHO VÂN</h1>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn-access" style="font-size: 9px; padding: 12px; letter-spacing: 2px;" onclick="fire(60)">KỈ NIỆM</button>
                <button class="btn-access" style="font-size: 9px; padding: 12px; letter-spacing: 2px;" onclick="fire(60)">HIỆN TẠI</button>
                <button class="btn-access" style="font-size: 9px; padding: 12px; letter-spacing: 2px;" onclick="fire(60)">TƯƠNG LAI</button>
                <button class="btn-access" style="font-size: 9px; padding: 12px; letter-spacing: 2px;" onclick="love()">YÊU ANH</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('vortex-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, yt, audioCtx, muted = true;
        let rockets = [], particles = [], stars = [], buildings = [];
        const texts = ["BMINH THƯƠNG EM", "BMINH YÊU EM", "THVAN CUTE", "THVAN XINH", "MÃI YÊU EM"];

        function boom() {
            if(muted || !audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(110, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.08, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        function initScene() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = Array.from({length: 250}, () => ({x:Math.random()*w, y:Math.random()*h, s:Math.random()*1.5, o:Math.random()}));
            buildings = [];
            let count = w < 800 ? 25 : 55;
            for(let i=0; i<count; i++) {
                buildings.push({
                    x: Math.random()*w, w: 60+Math.random()*100, h: 120+Math.random()*(h*0.6),
                    txt: Math.random() > 0.85 ? texts[Math.floor(Math.random()*texts.length)] : null
                });
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.x = x; this.y = y; this.h = hue;
                this.vx = (Math.random()-0.5)*15; this.vy = (Math.random()-0.5)*15;
                this.a = 1; this.d = 0.015 + Math.random()*0.02;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.h}, 100%, 75%, ${this.a})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.3, 0, 7); ctx.fill();
            }
            update() { this.vx *= 0.95; this.vy *= 0.95; this.vy += 0.15; this.x += this.vx; this.y += this.vy; this.a -= this.d; }
        }

        class Rocket {
            constructor() {
                this.x = Math.random()*w; this.y = h;
                this.ty = 60 + Math.random()*(h*0.4);
                this.v = 11+Math.random()*6; this.hue = Math.random()*360;
            }
            draw() { ctx.fillStyle = '#fff'; ctx.fillRect(this.x, this.y, 1.5, 10); }
            update() {
                this.y -= this.v;
                if(this.y <= this.ty) {
                    boom();
                    for(let i=0; i<180; i++) particles.push(new Particle(this.x, this.y, this.hue));
                    return false;
                }
                return true;
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-player', { videoId: 'iXaw-jwmjjA', playerVars: { loop:1, playlist:'iXaw-jwmjjA' }});
        }

        function startApp() {
            document.getElementById('portal').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            initScene(); loop();
            setInterval(() => { if(Math.random()<0.3) rockets.push(new Rocket()); }, 600);
        }

        function togglePass() {
            const p = document.getElementById('pass');
            const icon = document.getElementById('eye-icon');
            if(p.type === "password") { p.type = "text"; icon.className = "fas fa-eye-slash"; }
            else { p.type = "password"; icon.className = "fas fa-eye"; }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('vol-icon').className = muted ? "fas fa-volume-mute" : "fas fa-volume-up";
            muted ? yt.mute() : (yt.unMute(), yt.playVideo());
        }

        function verify() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-ui').style.display = 'none';
                const m = document.getElementById('menu-ui'); m.style.display = 'block';
                setTimeout(() => m.style.opacity = 1, 100); fire(80);
            } else { alert("Tên hoặc mật mã sai rồi bé ơi! ❤️"); }
        }

        function fire(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*150); }
        function love() { alert("Bình Minh yêu Thuý Vân nhất!"); fire(100); }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,5,0.25)'; ctx.fillRect(0,0,w,h);
            stars.forEach(s => { ctx.fillStyle=`rgba(255,255,255,${s.o})`; ctx.fillRect(s.x, s.y, s.s, s.s); });
            buildings.forEach(b => {
                ctx.fillStyle = '#050510'; ctx.fillRect(b.x, h-b.h, b.w, b.h);
                if(b.txt) {
                    ctx.font = 'bold 11px Orbitron'; ctx.fillStyle = 'var(--s)';
                    ctx.shadowBlur = 10; ctx.shadowColor = 'var(--s)';
                    ctx.fillText(b.txt, b.x + 5, h-b.h + 40); ctx.shadowBlur = 0;
                }
            });
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.a > 0; });
            requestAnimationFrame(loop);
        }
        window.addEventListener('resize', initScene);
    </script>
</body>
</html>
