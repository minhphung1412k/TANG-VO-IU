<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vườn Bí Mật ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background: #000; }

        /* HÌNH NỀN ĐỘC BẢN - CẶP ĐÔI LÃNG MẠN */
        .bg-nature {
            position: fixed; inset: 0;
            /* Đây là link ảnh tôi đã tạo riêng cho bạn */
            background: url('https://r.jina.ai/i/6f9087597148483f94646487e91409f5') center/cover no-repeat;
            z-index: -1;
            transition: all 1.5s ease;
        }

        #intro {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }
        
        /* TẠO HÌNH MỚI CHO NÚT BẮT ĐẦU */
        .heart-btn { font-size: 60px; filter: drop-shadow(0 0 15px #ff4d6d); animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat { 0% { transform: scale(1); } 20% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* KHUNG CHÍNH */
        .glass-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 380px; padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px; text-align: center;
            display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #ffb3c1; font-size: 2.2rem; margin-bottom: 20px; }
        input {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px;
            border: none; background: rgba(255,255,255,0.2); color: #fff;
            outline: none; text-align: center;
        }
        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: #ff4d6d; color: white; font-weight: bold; cursor: pointer;
        }

        /* 4 MỤC MENU SAU KHI ĐĂNG NHẬP */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .menu-item { background: rgba(255,255,255,0.15); padding: 15px 5px; border-radius: 10px; color: #fff; font-size: 13px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }

        /* NÚT LOA ĐIỀU KHIỂN NHẠC */
        #music-toggle {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 20px; cursor: pointer; z-index: 2000;
            display: none; border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="bg-nature" id="bg"></div>

    <div id="intro" onclick="startApp()">
        <div class="heart-btn">💖</div>
        <p style="color: white; margin-top: 15px; letter-spacing: 2px;">CHẠM ĐỂ MỞ CỬA TRÁI TIM</p>
    </div>

    <div id="music-toggle" onclick="toggleMusic()">🔊</div>

    <iframe id="yt-player" width="0" height="0" 
        src="https://www.youtube.com/embed/QEuOu_SDtLo?enablejsapi=1&loop=1&playlist=QEuOu_SDtLo" 
        frameborder="0" style="display:none;"></iframe>

    <div class="glass-card" id="login-box">
        <h2>Vợ Yêu ❤️</h2>
        <input type="text" id="u" placeholder="Tên tài khoản..." autocomplete="off">
        <input type="password" id="p" placeholder="Mật mã..." autocomplete="off">
        <button class="btn" onclick="check()">ĐĂNG NHẬP</button>
    </div>

    <div class="glass-card" id="menu-box">
        <h2>Khu Vườn Của Em</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="alert('Mọi kỉ niệm đều được trân trọng...')">KỶ NIỆM</div>
            <div class="menu-item" onclick="alert('Tương lai chỉ cần có em...')">TƯƠNG LAI</div>
            <div class="menu-item" onclick="alert('Anh hứa sẽ bên em mãi mãi...')">HỨA HẸN</div>
            <div class="menu-item" onclick="alert('Anh yêu em rất nhiều!')">YÊU EM</div>
        </div>
    </div>

    <script>
        let isPlaying = true;
        const player = document.getElementById('yt-player').contentWindow;

        function startApp() {
            // Phát nhạc
            player.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            
            // Chuyển cảnh
            document.getElementById('intro').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('music-toggle').style.display = 'flex';
            document.getElementById('bg').style.filter = "brightness(0.6) blur(2px)";
        }

        function toggleMusic() {
            const btn = document.getElementById('music-toggle');
            if(isPlaying) {
                player.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                btn.innerText = "🔈";
            } else {
                player.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                btn.innerText = "🔊";
            }
            isPlaying = !isPlaying;
        }

        function check() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('menu-box').style.display = 'block';
                document.getElementById('bg').style.filter = "brightness(0.8) blur(0px)";
            } else {
                alert("Sai mật mã rồi vợ ơi!");
            }
        }
    </script>
</body>
</html>
