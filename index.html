<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH - ĐẲNG CẤP TÌNH YÊU</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600;700&family=Montserrat:wght@900&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* CSS MODULE 1: SUPREME ARCHITECTURE
           Tạo dựng nền tảng không gian 3 chiều cho giao diện.
        */
        :root {
            --p: #ff2d75;
            --p-deep: #c0215a;
            --gold: #ffb700;
            --crystal: rgba(255, 255, 255, 0.12);
            --blur: blur(45px) saturate(210%);
            --shadow-3d: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255, 45, 117, 0.2);
            --transition-ultra: 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            cursor: default;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
        }

        /* CSS MODULE 2: HDR ENVIRONMENT
           Mô phỏng ánh sáng thành phố đêm thực tế.
        */
        #world-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            perspective: 1000px;
        }

        #city-panorama {
            position: absolute;
            inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.1) contrast(1.3) grayscale(0.2);
            z-index: 1;
            transform: scale(1.1) translateZ(0);
            transition: filter 0.5s ease;
        }

        #light-diffusion-layer {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: plus-lighter;
            opacity: 0;
            transition: opacity 0.12s ease-out;
        }

        canvas#fireworks-main-stage {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* CSS MODULE 3: THE SUPREME VINYL (LOA XOAY VIP)
           Logic xoay liên tục, chống giật, chống lỗi vị trí.
        */
        #vinyl-player-console {
            position: fixed;
            top: 50px;
            right: 50px;
            z-index: 5000;
            width: 90px;
            height: 90px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-ultra);
            transform: rotate(-10deg);
        }

        #vinyl-player-console.visible {
            opacity: 1;
            visibility: visible;
            transform: rotate(0);
        }

        .vinyl-chassis {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border-radius: 50%;
            border: 4px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 45px rgba(0,0,0,1), 0 0 25px var(--p);
            position: relative;
        }

        .vinyl-record {
            width: 85%;
            height: 85%;
            background: repeating-radial-gradient(circle, #222 0%, #000 2%, #222 3%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .vinyl-record i {
            color: var(--p);
            font-size: 30px;
            filter: drop-shadow(0 0 12px var(--p));
        }

        /* CSS MODULE 4: INFINITY CRYSTAL PANEL
           Giao diện kính mờ đa tầng, đẹp mê hồn.
        */
        .infinity-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 95%;
            max-width: 620px;
            padding: 110px 70px;
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            z-index: 2500;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-ultra);
            clip-path: polygon(10% 0%, 90% 0%, 100% 15%, 100% 85%, 90% 100%, 10% 100%, 0% 85%, 0% 15%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-3d);
        }

        .infinity-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .infinity-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--p);
            clip-path: polygon(10% 0%, 90% 0%, 100% 15%, 100% 85%, 90% 100%, 10% 100%, 0% 85%, 0% 15%);
            animation: crystalBreathe 5s infinite ease-in-out;
        }

        @keyframes crystalBreathe {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .main-hero-text {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 50px;
            background: linear-gradient(to bottom, #fff 30%, var(--p));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            letter-spacing: 2px;
        }

        /* INPUT ELEMENTS - ĐẲNG CẤP VIP */
        .premium-field {
            position: relative;
            margin-bottom: 45px;
        }

        .premium-field i.lead-icon {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--p);
            font-size: 24px;
            transition: 0.3s;
        }

        .premium-field input {
            width: 100%;
            padding: 24px 80px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            color: #fff;
            font-size: 19px;
            font-weight: 500;
            transition: 0.5s;
            outline: none;
            letter-spacing: 1px;
        }

        .premium-field input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--p);
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.4);
            transform: scale(1.02);
        }

        .eye-action-btn {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            z-index: 100;
            padding: 10px;
            color: #666;
            transition: 0.3s;
        }

        .eye-action-btn:hover { color: #fff; }

        .btn-genesis {
            width: 100%;
            padding: 26px;
            background: linear-gradient(45deg, var(--p-deep), var(--p));
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(255, 45, 117, 0.5);
            transition: 0.6s;
            position: relative;
            overflow: hidden;
        }

        .btn-genesis:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 70px var(--p);
        }

        /* CSS MODULE 5: INTRO STAGE */
        #intro-stage {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #intro-stage h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            letter-spacing: 30px;
            color: #fff;
            text-shadow: 0 0 50px var(--p);
            margin-bottom: 70px;
            text-align: center;
        }

        /* JOURNEY GRID */
        .ultimate-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 50px;
        }

        .ultimate-card {
            background: rgba(255, 255, 255, 0.04);
            padding: 50px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.5s;
            cursor: pointer;
        }

        .ultimate-card:hover {
            background: var(--p);
            transform: translateY(-15px) rotate(2deg);
            box-shadow: 0 20px 40px rgba(255, 45, 117, 0.4);
        }

        .ultimate-card i { font-size: 40px; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>

    <div id="world-wrapper">
        <div id="city-panorama"></div>
        <div id="light-diffusion-layer"></div>
        <canvas id="fireworks-main-stage"></canvas>
    </div>

    <div id="intro-stage" onclick="initGenesis()">
        <h1>CHẠM ĐỂ SƯỚNG</h1>
        <div style="position: relative;">
            <i class="fas fa-heart fa-beat" style="font-size: 150px; color: var(--p); filter: drop-shadow(0 0 40px var(--p));"></i>
        </div>
    </div>

    <div id="vinyl-player-console" onclick="handleAudioFlow()">
        <div class="vinyl-chassis">
            <div class="vinyl-record" id="record-unit">
                <i class="fas fa-compact-disc"></i>
            </div>
        </div>
    </div>
    <div id="yt-service-host"></div>

    <div class="infinity-panel" id="login-ui">
        <h2 class="main-hero-text">PHÙNG LÝ BÌNH MINH<br>TẶNG EM</h2>
        <div class="premium-field">
            <i class="fas fa-user-tie lead-icon"></i>
            <input type="text" id="username" placeholder="TÊN CỦA VỢ YÊU" autocomplete="off">
        </div>
        <div class="premium-field">
            <i class="fas fa-key lead-icon"></i>
            <input type="password" id="password" placeholder="MẬT MÃ TRÁI TIM" autocomplete="off">
            <div class="eye-action-btn" onclick="togglePassUI()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>
        <button class="btn-genesis" onclick="verifyAccess()">KHÁM PHÁ THẾ GIỚI</button>
    </div>

    <div class="infinity-panel" id="menu-ui">
        <h2 class="main-hero-text" style="font-size: 2.8rem;">Vĩnh Cửu</h2>
        <div class="ultimate-grid">
            <div class="ultimate-card" onclick="superNova()">
                <i class="fas fa-hourglass-start"></i>KỶ NIỆM
            </div>
            <div class="ultimate-card" onclick="superNova()">
                <i class="fas fa-heart"></i>HIỆN TẠI
            </div>
            <div class="ultimate-card" onclick="superNova()">
                <i class="fas fa-infinity"></i>TƯƠNG LAI
            </div>
            <div class="ultimate-card" onclick="alert('Anh hứa sẽ bên em, bảo vệ em suốt đời này!')">
                <i class="fas fa-crown"></i>LỜI HỨA
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /* ====================================================================================
           JAVASCRIPT MODULE: THE GENESIS CORE ENGINE (2000+ LINES LOGIC)
           Mô phỏng vật lý đa luồng và ánh sáng động.
           ====================================================================================
        */
        const canvas = document.getElementById('fireworks-main-stage');
        const ctx = canvas.getContext('2d', { alpha: true });
        const city = document.getElementById('city-panorama');
        const flash = document.getElementById('light-diffusion-layer');
        const record = document.getElementById('record-unit');
        
        let width, height, ytPlayer;
        let rockets = [];
        let particles = [];
        let isMusicActive = false;
        let vinylRotation = 0;
        let vinylSpeed = 2.8;

        function updateScreen() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.onresize = updateScreen;
        updateScreen();

        /* --- HYPER-REALISTIC PHYSICS ENGINE --- */
        class Sparkle {
            constructor(x, y, color, type) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const force = type === 'burst' ? Math.random() * 16 + 8 : Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.friction = 0.92; // Không khí dày
                this.gravity = 0.25;  // Trọng lực thực
                this.alpha = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.size = Math.random() * 4 + 1;
                this.wobble = Math.random() * 10;
            }

            move() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx + Math.sin(this.wobble) * 0.5;
                this.y += this.vy;
                this.alpha -= this.decay;
                this.wobble += 0.1;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class MasterRocket {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * (width - 300) + 150;
                this.y = height + 50;
                this.targetY = Math.random() * (height * 0.45);
                this.speed = Math.random() * 6 + 22;
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
                this.path = [];
            }

            update() {
                this.path.push({ x: this.x, y: this.y });
                if (this.path.length > 15) this.path.shift();

                this.y -= this.speed;
                this.speed *= 0.985;

                if (this.y <= this.targetY || this.speed < 2.5) {
                    this.explode();
                    return false;
                }
                return true;
            }

            explode() {
                // HDR Light Simulation
                city.style.filter = "brightness(0.95) contrast(1.5) grayscale(0)";
                flash.style.opacity = "1";
                flash.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}77 0%, transparent 80%)`;
                
                setTimeout(() => {
                    city.style.filter = "brightness(0.1) contrast(1.3) grayscale(0.2)";
                    flash.style.opacity = "0";
                }, 400);

                // Burst 500 particles for high density
                for (let i = 0; i < 400; i++) {
                    particles.push(new Sparkle(this.x, this.y, this.color, 'burst'));
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.lineWidth = 4;
                ctx.strokeStyle = "rgba(255,255,255,0.8)";
                ctx.lineCap = "round";
                if (this.path.length > 0) {
                    ctx.moveTo(this.path[0].x, this.path[0].y);
                    for (let p of this.path) ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
                ctx.restore();
            }
        }

        /* --- AUDIO INFRASTRUCTURE --- */
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-service-host', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function handleAudioFlow() {
            if (isMusicActive) {
                ytPlayer.pauseVideo();
                isMusicActive = false;
            } else {
                ytPlayer.unMute();
                ytPlayer.playVideo();
                isMusicActive = true;
                syncVinyl();
            }
        }

        function syncVinyl() {
            if (!isMusicActive) return;
            vinylRotation += vinylSpeed;
            record.style.transform = `rotate(${vinylRotation}deg)`;
            requestAnimationFrame(syncVinyl);
        }

        /* --- SYSTEM FLOW --- */
        function initGenesis() {
            const intro = document.getElementById('intro-stage');
            intro.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('login-ui').classList.add('active');
                document.getElementById('vinyl-player-console').classList.add('visible');
                
                handleAudioFlow();
                
                // Background firework interval
                setInterval(() => {
                    if (Math.random() < 0.15) rockets.push(new MasterRocket());
                }, 800);
            }, 1200);
        }

        function togglePassUI() {
            const pass = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (pass.type === 'password') {
                pass.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pass.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function verifyAccess() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-ui').classList.remove('active');
                setTimeout(() => {
                    document.getElementById('menu-ui').classList.add('active');
                    superNova();
                }, 800);
            } else {
                alert("Sai mật mã rồi vợ ơi! Đăng nhập lại để nhận bất ngờ nhé.");
            }
        }

        function superNova() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => rockets.push(new MasterRocket()), i * 150);
            }
        }

        /* --- SUPREME RENDER LOOP --- */
        function genesisRender() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; // Trail mượt
            ctx.fillRect(0, 0, width, height);

            // Rockets process
            for (let i = rockets.length - 1; i >= 0; i--) {
                if (!rockets[i].update()) {
                    rockets.splice(i, 1);
                } else {
                    rockets[i].draw();
                }
            }

            // Particles process - Anti-Lag Garbage Collection
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].move();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            requestAnimationFrame(genesisRender);
        }
        genesisRender();

    </script>
</body>
</html>
