<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THVAN: ETERNAL LOVE ODYSSEY</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: #ffdeeb; --p2: #ff85c0; --p3: #f759ab;
            --white: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #12000a; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* GIAO DIỆN HUD SIÊU VIP */
        #game-ui {
            position: fixed; top: 30px; left: 30px; z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            pointer-events: none; opacity: 0; transition: 1s;
        }
        .stats-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--p1); margin-bottom: 5px; }
        .bar-bg { width: 250px; height: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--p2), #fff); box-shadow: 0 0 15px var(--p2); transition: 0.3s; }

        /* MÀN HÌNH CHỜ (CINEMATIC START) */
        #start-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at center, #2d0015, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo { font-family: 'Pacifico', cursive; font-size: 4rem; color: #fff; text-shadow: 0 0 30px var(--p3); margin-bottom: 10px; }
        .sub-logo { font-size: 14px; letter-spacing: 5px; color: var(--p2); margin-bottom: 50px; }
        
        .play-btn {
            position: relative; padding: 25px 60px; font-size: 18px; font-weight: bold;
            color: #fff; background: transparent; border: 2px solid var(--p2);
            border-radius: 50px; cursor: pointer; overflow: hidden; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .play-btn:hover { background: var(--p2); box-shadow: 0 0 50px var(--p3); transform: scale(1.05); }

        /* HIỆU ỨNG TEXT THẢ THÍNH */
        #love-notif {
            position: fixed; bottom: 10%; width: 100%; text-align: center;
            font-family: 'Pacifico'; font-size: 1.8rem; color: var(--p1);
            text-shadow: 0 0 15px var(--p3); pointer-events: none; opacity: 0;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="stats-label">Sovereign: Thuý Vân</div>
        <div class="bar-bg"><div id="bar-fill"></div></div>
        <div class="stats-label" style="margin-top: 10px; text-align: right;" id="score-text">0 / 1000 Energy</div>
    </div>

    <div id="love-notif">Anh yêu Vân nhất!</div>

    <div id="start-screen">
        <div class="logo">Thuy Van</div>
        <div class="sub-logo">THE LOVE ODYSSEY</div>
        <button class="play-btn" onclick="startExperience()">Kích hoạt Trái Tim</button>
        <p style="margin-top: 30px; font-size: 10px; color: rgba(255,255,255,0.3);">RECOMMENDED: TURN ON AUDIO</p>
    </div>

    <div id="yt-player" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.body.appendChild(canvas);

        let w, h, yt, active = false, score = 0;
        let player = { x: 0, y: 0, targetX: 0, targetY: 0, size: 25 };
        let objects = [], sparks = [], backgroundStars = [];
        
        const loveLines = [
            "Vân là duy nhất!", "Mãi bên nhau nhé", "Xinh đẹp vô ngần",
            "Bình Minh ❤️ Thuý Vân", "Cả nguồn sống là Vân", "Thương Vân rất nhiều"
        ];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) {
                backgroundStars.push({x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, o: Math.random()});
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-player', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function startExperience() {
            document.getElementById('start-screen').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-ui').style.opacity = 1;
            }, 500);
            
            active = true;
            yt.unMute();
            yt.playVideo();
            gameLoop();
        }

        window.addEventListener('mousemove', (e) => {
            player.targetX = e.clientX;
            player.targetY = e.clientY;
        });

        function createSparks(x, y, color) {
            for(let i=0; i<15; i++) {
                sparks.push({
                    x, y, 
                    vx: (Math.random()-0.5)*8, 
                    vy: (Math.random()-0.5)*8, 
                    alpha: 1, color
                });
            }
        }

        function drawHeart(x, y, size, color, alpha=1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y-size/2, x-size, y-size/2, x-size, y+size/4);
            ctx.bezierCurveTo(x-size, y+size, x, y+size*1.2, x, y+size*1.5);
            ctx.bezierCurveTo(x, y+size*1.2, x+size, y+size, x+size, y+size/4);
            ctx.bezierCurveTo(x+size, y-size/2, x, y-size/2, x, y);
            ctx.fill();
            ctx.restore();
        }

        function gameLoop() {
            if(!active) return;
            
            // Background mượt mà
            ctx.fillStyle = '#12000a';
            ctx.fillRect(0,0,w,h);

            // Vẽ sao nền lấp lánh
            backgroundStars.forEach(s => {
                s.o += (Math.random()-0.5)*0.05;
                ctx.fillStyle = `rgba(255, 222, 235, ${Math.abs(s.o)})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
            });

            // Smooth Player Movement (Easing)
            player.x += (player.targetX - player.x) * 0.15;
            player.y += (player.targetY - player.y) * 0.15;

            // Hào quang Player
            let gradient = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, 50);
            gradient.addColorStop(0, 'rgba(247, 89, 171, 0.4)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath(); ctx.arc(player.x, player.y, 50, 0, 7); ctx.fill();
            
            // Vẽ "Phi thuyền" trái tim của Vân
            drawHeart(player.x, player.y - 10, 15, '#fff');

            // Tạo vật phẩm (Hearts)
            if(Math.random() < 0.04) {
                objects.push({
                    x: Math.random()*w, y: -50, 
                    size: Math.random()*10 + 10,
                    speed: Math.random()*2 + 2,
                    hue: Math.random()*20 + 330 // Dải màu hồng
                });
            }

            // Xử lý vật phẩm
            objects.forEach((obj, i) => {
                obj.y += obj.speed;
                
                // Cơ chế Magnet (Nam châm hút khi ở gần)
                let dx = player.x - obj.x;
                let dy = player.y - obj.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist < 200) {
                    obj.x += dx * 0.05;
                    obj.y += dy * 0.05;
                }

                drawHeart(obj.x, obj.y, obj.size, `hsl(${obj.hue}, 100%, 70%)`);

                // Va chạm
                if(dist < 30) {
                    createSparks(obj.x, obj.y, `hsl(${obj.hue}, 100%, 70%)`);
                    objects.splice(i, 1);
                    score += 20;
                    if(score > 1000) score = 1000;
                    
                    // Cập nhật UI
                    document.getElementById('bar-fill').style.width = (score/10) + '%';
                    document.getElementById('score-text').innerText = `${score} / 1000 Energy`;
                    
                    if(Math.random() > 0.7) triggerNotif();
                    if(score >= 1000) victory();
                }

                if(obj.y > h + 50) objects.splice(i, 1);
            });

            // Xử lý Sparks (Hiệu ứng nổ)
            sparks.forEach((s, i) => {
                s.x += s.vx; s.y += s.vy; s.alpha -= 0.02;
                ctx.fillStyle = s.color;
                ctx.globalAlpha = s.alpha;
                ctx.beginPath(); ctx.arc(s.x, s.y, 2, 0, 7); ctx.fill();
                if(s.alpha <= 0) sparks.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(gameLoop);
        }

        function triggerNotif() {
            const el = document.getElementById('love-notif');
            el.innerText = loveLines[Math.floor(Math.random()*loveLines.length)];
            el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 1500);
        }

        function victory() {
            active = false;
            document.body.innerHTML += `
                <div style="position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; animation: fadeIn 2s;">
                    <h1 style="font-family:'Pacifico'; color:#ff85c0; font-size:5rem; text-shadow:0 0 30px #f759ab">Vân là của Anh!</h1>
                    <p style="color:#fff; letter-spacing:10px; margin-top:20px">ETERNAL LOVE CONNECTED</p>
                    <div style="margin-top:40px; font-size:40px">🌸💖🌸</div>
                </div>
            `;
        }

        init();
        window.addEventListener('resize', init);
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</body>
</html>
