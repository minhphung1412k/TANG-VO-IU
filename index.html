<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Phẩm Tình Yêu - Limited Edition ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --love-color: #ff4d6d;
            --gold-glow: #ffb703;
            --city-filter: brightness(0.12) contrast(1.1) blur(1px);
            --city-active: brightness(0.8) contrast(1.4) blur(0px);
            --glass: rgba(0, 0, 0, 0.82);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- XỬ LÝ NỀN THÀNH PHỐ ĐA TẦNG --- */
        #city-master {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: var(--city-filter);
            transition: all 0.25s cubic-bezier(0.1, 0.7, 1.0, 0.1);
            transform: scale(1.05);
        }

        #light-diffusion {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none; mix-blend-mode: soft-light; opacity: 0;
            transition: opacity 0.15s;
        }

        canvas#fireworks-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* --- INTRO PHONG CÁCH ĐIỆN ẢNH --- */
        #intro-engine {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .text-reveal {
            font-family: 'Montserrat', sans-serif; font-size: 3.5rem; color: #fff;
            letter-spacing: 10px; text-transform: uppercase;
            text-shadow: 0 0 50px var(--love-color);
            animation: text-float 4s ease-in-out infinite;
        }

        /* --- GIAO DIỆN FORM ĐĂNG NHẬP BIẾN THỂ --- */
        .glass-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px; padding: 60px 40px;
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 45px;
            display: none; z-index: 1000; text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .glass-container h2 { 
            font-family: 'Dancing Script'; color: #fff; font-size: 3.2rem; 
            margin-bottom: 40px; filter: drop-shadow(0 0 10px var(--love-color));
        }

        .input-wrapper { position: relative; margin-bottom: 25px; }
        .input-wrapper i.main-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--love-color); font-size: 20px; }
        .input-wrapper input {
            width: 100%; padding: 22px 55px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #fff; font-weight: 600; font-size: 16px; outline: none;
            transition: 0.4s;
        }
        .input-wrapper input:focus { background: rgba(255,255,255,0.1); border-color: var(--love-color); box-shadow: 0 0 20px rgba(255,77,109,0.3); }

        /* CON MẮT HIỆN/ẨN MẬT KHẨU */
        .eye-icon {
            position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
            color: #888; cursor: pointer; padding: 5px; transition: 0.3s;
        }
        .eye-icon:hover { color: #fff; }

        .btn-premium {
            width: 100%; padding: 22px; border-radius: 25px; border: none;
            background: linear-gradient(45deg, #ff0844 0%, #ffb199 100%);
            color: #fff; font-weight: 800; font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px;
            box-shadow: 0 15px 45px rgba(255, 8, 68, 0.4); transition: 0.4s;
        }
        .btn-premium:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* MENU GRID VỚI BIỂU TƯỢNG ĐẸP */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 35px; }
        .menu-card {
            background: rgba(255, 255, 255, 0.05); padding: 25px 10px; border-radius: 25px;
            color: #fff; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            transition: 0.4s; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .menu-card i { font-size: 24px; color: var(--gold-glow); }
        .menu-card:hover { background: var(--love-color); transform: translateY(-10px); }

        /* ANIMATIONS */
        @keyframes text-float { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-15px); opacity: 0.7; } }
        @keyframes pulse-city { 0% { transform: scale(1.05); } 100% { transform: scale(1.07); } }
    </style>
</head>
<body>

<div id="city-master"></div>
<div id="light-diffusion"></div>
<canvas id="fireworks-layer"></canvas>

<div id="intro-engine" onclick="startMegaApp()">
    <h1 class="text-reveal">CHẠM ĐỂ SƯỚNG</h1>
    <div style="margin-top: 40px;"><i class="fas fa-heart-circle-bolt fa-beat" style="font-size: 100px; color: var(--love-color);"></i></div>
    <div style="color: #444; margin-top: 50px; font-weight: 800; letter-spacing: 3px;">HÀ NỘI BY NIGHT - ROMANCE ENGINE</div>
</div>

<div id="yt-player"></div>

<div class="glass-container" id="login-box">
    <h2>Dành Cho Vợ ❤️</h2>
    <div class="input-wrapper">
        <i class="fas fa-user-heart main-icon"></i>
        <input type="text" id="username" placeholder="Tên đăng nhập">
    </div>
    <div class="input-wrapper">
        <i class="fas fa-shield-heart main-icon"></i>
        <input type="password" id="password" placeholder="Mật khẩu">
        <i class="fas fa-eye eye-icon" id="toggleEye" onclick="togglePass()"></i>
    </div>
    <button class="btn-premium" onclick="verifyMega()">ĐĂNG NHẬP NGAY</button>
</div>

<div class="glass-container" id="menu-box">
    <h2>Hành Trình Hạnh Phúc</h2>
    <div class="menu-grid">
        <div class="menu-card" onclick="megaFirework()">
            <i class="fas fa-hourglass-start"></i><span>QUÁ KHỨ</span>
        </div>
        <div class="menu-card" onclick="megaFirework()">
            <i class="fas fa-calendar-check"></i><span>HIỆN TẠI</span>
        </div>
        <div class="menu-card" onclick="megaFirework()">
            <i class="fas fa-infinity"></i><span>TƯƠNG LAI</span>
        </div>
        <div class="menu-card" onclick="alert('Anh hứa sẽ không bao giờ buông tay em!')">
            <i class="fas fa-envelope-open-text"></i><span>LỜI HỨA</span>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // --- 1. YOUTUBE SYSTEM ---
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0', videoId: 'iXaw-jwmjjA',
            playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
            events: { 'onReady': (e) => e.target.mute() }
        });
    }

    function togglePass() {
        const p = document.getElementById('password');
        const icon = document.getElementById('toggleEye');
        if(p.type === 'password') {
            p.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            p.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function startMegaApp() {
        document.getElementById('intro-engine').style.transform = 'scale(2)';
        document.getElementById('intro-engine').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('intro-engine').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            player.unMute(); player.playVideo();
            // BẮN PHÁO HOA LIÊN TỤC
            setInterval(autoRocket, 1000);
        }, 1200);
    }

    function verifyMega() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('menu-box').style.display = 'block';
            for(let i=0; i<15; i++) setTimeout(autoRocket, i*100);
        } else { alert("Chỉ có trái tim anh mới biết mật mã này!"); }
    }

    // --- 2. HỆ THỐNG PHÁO HOA HÀNG NGÀN DÒNG LOGIC (SIÊU THỰC) ---
    const canvas = document.getElementById('fireworks-layer');
    const ctx = canvas.getContext('2d');
    const city = document.getElementById('city-master');
    const diffusion = document.getElementById('light-diffusion');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    let rockets = [];

    class Rocket {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height;
            this.targetY = Math.random() * (canvas.height * 0.4);
            this.speed = Math.random() * 6 + 18;
            this.color = `hsl(${Math.random()*360}, 100%, 70%)`;
        }
        update() {
            this.y -= this.speed; this.speed *= 0.985;
            if(this.y <= this.targetY || this.speed < 1) {
                explode(this.x, this.y, this.color);
                return false;
            }
            return true;
        }
        draw() {
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
            ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            const angle = Math.random() * Math.PI * 2;
            const force = Math.random() * 14 + 4;
            this.vx = Math.cos(angle) * force;
            this.vy = Math.sin(angle) * force;
            this.life = 1;
            this.decay = Math.random() * 0.012 + 0.005;
            this.gravity = 0.22;
        }
        update() {
            this.vx *= 0.94; this.vy *= 0.94;
            this.vy += this.gravity;
            this.x += this.vx; this.y += this.vy;
            this.life -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, Math.random()*4, 0, Math.PI*2); ctx.fill();
        }
    }

    function explode(x, y, color) {
        // --- HIỆU ỨNG THÀNH PHỐ RỰC SÁNG CHI TIẾT ---
        city.style.filter = "var(--city-active)";
        diffusion.style.opacity = "1";
        diffusion.style.background = `radial-gradient(circle at ${x}px ${y}px, ${color}77 0%, transparent 65%)`;
        
        setTimeout(() => { 
            city.style.filter = "var(--city-filter)"; 
            diffusion.style.opacity = "0";
        }, 400);

        for(let i=0; i<250; i++) particles.push(new Particle(x, y, color));
    }

    function autoRocket() { rockets.push(new Rocket()); }
    function megaFirework() { for(let i=0; i<6; i++) setTimeout(autoRocket, i*150); }

    function loop() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        rockets = rockets.filter(r => { r.draw(); return r.update(); });
        particles = particles.filter(p => { p.update(); p.draw(); return p.life > 0; });
        requestAnimationFrame(loop);
    }
    loop();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
