<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRAL SINGULARITY - MINH & VAN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Orbitron:wght@400;700;900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           [SECTION 1]: CORE CSS ARCHITECTURE 
           =========================================
        */
        :root {
            --p: #ff007b; --s: #00f2ff; --g: #ffd700; --v: #7000ff; --a: #00ff88;
            --deep: #000002; --glass: rgba(255, 255, 255, 0.015);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            width: 100%; height: 100%; background: var(--deep); 
            overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff;
        }

        /* =========================================
           [SECTION 2]: CINEMATIC LAYERS 
           =========================================
        */
        #astral-canvas {
            position: fixed; inset: 0; z-index: 5;
            filter: contrast(1.1) brightness(1.1) saturate(1.6) blur(0.4px);
            pointer-events: none;
        }

        .master-viewport {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
            perspective: 3000px;
        }

        /* GIAO DIỆN KHỐI ĐA DIỆN (THE MONOLITH) */
        .monolith-card {
            width: 92%; max-width: 600px; min-height: 700px;
            padding: 90px 60px; position: relative;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(150px) saturate(300%);
            -webkit-backdrop-filter: blur(150px) saturate(300%);
            /* Cắt vát đa chiều cực khó */
            clip-path: polygon(15% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%, 0% 15%);
            transform-style: preserve-3d;
            transform: rotateX(12deg) rotateY(-12deg);
            animation: monolithFloat 12s infinite ease-in-out;
            box-shadow: 0 0 200px rgba(0,0,0,1);
        }

        @keyframes monolithFloat {
            0%, 100% { transform: rotateX(12deg) rotateY(-12deg) translateZ(50px) translateY(0); }
            50% { transform: rotateX(8deg) rotateY(-5deg) translateZ(100px) translateY(-40px); }
        }

        /* VIỀN NĂNG LƯỢNG CHẠY QUANH (PLASMA BORDER) */
        .monolith-card::before {
            content: ''; position: absolute; inset: -2px;
            background: linear-gradient(45deg, var(--p), var(--s), var(--v), var(--a), var(--p));
            background-size: 400% 400%; animation: plasmaFlow 8s linear infinite;
            z-index: -1; clip-path: inherit; opacity: 0.6;
        }
        @keyframes plasmaFlow { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

        /* =========================================
           [SECTION 3]: HYPER-TEXT & UI ELEMENTS 
           =========================================
        */
        .cyber-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 3.2rem;
            text-align: center; margin-bottom: 70px; line-height: 1.2;
            background: linear-gradient(90deg, #fff, var(--p), var(--s), #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s infinite linear; filter: drop-shadow(0 0 30px var(--p));
        }
        @keyframes shine { to { background-position: 200% center; } }

        .input-box { position: relative; margin-bottom: 50px; transform: translateZ(60px); }
        .input-box label {
            position: absolute; top: -30px; left: 10px;
            font-family: 'Orbitron'; font-size: 10px; color: var(--s);
            letter-spacing: 6px; text-transform: uppercase;
        }
        .input-box input {
            width: 100%; padding: 25px 35px; background: rgba(0,0,0,0.95);
            border: none; border-left: 6px solid var(--p); color: #fff;
            font-size: 20px; transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%);
        }
        .input-box input:focus {
            border-left-color: var(--a); transform: scale(1.1) translateZ(30px);
            box-shadow: 0 0 80px rgba(0, 255, 136, 0.3);
        }

        .eye-scanner {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            font-size: 24px; color: var(--p); cursor: pointer; transition: 0.4s;
        }
        .eye-scanner:hover { transform: translateY(-50%) scale(1.3); text-shadow: 0 0 20px var(--p); }

        .btn-astral {
            width: 100%; padding: 35px; border: none; margin-top: 30px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem;
            color: #fff; letter-spacing: 20px; cursor: pointer;
            background: linear-gradient(45deg, var(--p), var(--v), var(--s));
            background-size: 300% 300%; animation: plasmaFlow 5s infinite;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: 0.6s; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .btn-astral:hover { transform: scale(1.1) translateZ(80px); filter: brightness(1.3); box-shadow: 0 0 100px var(--s); }

        /* =========================================
           [SECTION 4]: AUDIO ORB 3.0 
           =========================================
        */
        #audio-orb {
            position: fixed; top: 40px; right: 40px; z-index: 1000;
            width: 110px; height: 110px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: #000; border: 3px solid var(--s);
            box-shadow: 0 0 50px var(--s); transition: 0.8s;
        }
        #audio-orb:hover { transform: scale(1.2) rotate(360deg); border-color: var(--a); }
        .orb-wave {
            position: absolute; inset: -15px; border: 2px solid var(--a);
            border-radius: 50%; animation: orbPulse 2s linear infinite; opacity: 0;
        }
        @keyframes orbPulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }

        /* =========================================
           [SECTION 5]: THE GATE (PROLOGUE) 
           =========================================
        */
        #the-gate {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .gate-portal {
            width: 250px; height: 250px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 200px #fff, 0 0 400px var(--p), 0 0 600px var(--v);
            animation: portalBreath 2.5s infinite alternate ease-in-out;
            cursor: pointer;
        }
        @keyframes portalBreath { from { transform: scale(0.9); opacity: 0.7; } to { transform: scale(1.2); opacity: 1; } }

        /* =========================================
           [SECTION 6]: MENU (QUANTUM GRID) 
           =========================================
        */
        .grid-nebula { display: grid; grid-template-columns: 1fr 1fr; gap: 45px; margin-top: 60px; width: 100%; }
        .node-nebula {
            background: rgba(255,255,255,0.02); padding: 70px 20px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            text-align: center;
        }
        .node-nebula:hover {
            background: var(--s); color: #000; transform: scale(1.25) translateZ(100px);
            box-shadow: 0 0 120px var(--s); z-index: 500;
        }
        .node-nebula i { font-size: 55px; margin-bottom: 25px; color: var(--g); }
        .node-nebula span { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 6px; display: block; }

        .warp-transition { opacity: 0 !important; transform: scale(20) rotate(180deg) !important; filter: blur(100px) !important; transition: 4s !important; }
    </style>
</head>
<body>

    <div id="the-gate" onclick="igniteAstralEngine()">
        <div class="gate-portal"></div>
        <h2 style="margin-top: 80px; letter-spacing: 40px; font-family: 'Orbitron'; font-weight: 300; cursor: pointer;">CHẠM ĐỂ BẮT ĐẦU</h2>
    </div>

    <div id="audio-orb" onclick="toggleAstralSound()">
        <div class="orb-wave"></div>
        <div class="orb-wave" style="animation-delay: 1s;"></div>
        <i id="audio-icon" class="fa-solid fa-volume-xmark" style="font-size: 40px; color: var(--s);"></i>
    </div>

    <canvas id="astral-canvas"></canvas>
    <div id="youtube-sink" style="position: absolute; visibility: hidden;"></div>

    <div class="master-viewport">
        <div class="monolith-card" id="auth-ui" style="display: none;">
            <h1 class="cyber-title">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-box">
                <label>User Identity</label>
                <input type="text" id="user-id" placeholder="tên của bé ưi">
            </div>
            <div class="input-box">
                <label>Vortex Key</label>
                <input type="password" id="pass-id" placeholder="mật khẩu của bé ưi">
                <i class="fa-solid fa-fingerprint eye-scanner" onclick="togglePass()"></i>
            </div>
            <button class="btn-astral" onclick="processPhase()">TRUY CẬP VŨ TRỤ</button>
        </div>

        <div class="monolith-card" id="menu-ui" style="display: none; opacity: 0;">
            <h1 class="cyber-title" style="font-size: 2.2rem;">KHÔNG GIAN CỦA VÂN</h1>
            <div class="grid-nebula">
                <div class="node-nebula" onclick="superFire(80)">
                    <i class="fa-solid fa-meteor"></i><span>QUÁ KHỨ</span>
                </div>
                <div class="node-nebula" onclick="superFire(80)">
                    <i class="fa-solid fa-satellite"></i><span>HIỆN TẠI</span>
                </div>
                <div class="node-nebula" onclick="superFire(80)">
                    <i class="fa-solid fa-shuttle-space"></i><span>TƯƠNG LAI</span>
                </div>
                <div class="node-nebula" onclick="astralLove()">
                    <i class="fa-solid fa-heart-pulse"></i><span>YÊU EM</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /**
         * ASTRAL ENGINE v10.0 - THE FINAL FRONTIER
         * Total Lines Goal: 1000+ Detailed Logic Lines
         * Designed for: Bình Minh & Thuý Vân
         */

        const canvas = document.getElementById('astral-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, ytPlayer, isPlaying = false;
        
        // ENTITY ARRAYS
        let particles = [], rockets = [], buildings = [], stars = [], waves = [], shockwaves = [];
        let neonTexts = ["THUÝ VÂN", "BÌNH MINH", "LOVE", "FOREVER", "VÂN ❤️ MINH"];

        // --- MODULE 1: UNIVERSE ARCHITECTURE ---
        function buildUniverse() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            
            // 1.1 Starfield Generation (1500 Stars)
            stars = [];
            for(let i=0; i<1500; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    s: Math.random() * 2,
                    o: Math.random(),
                    v: 0.005 + Math.random() * 0.02
                });
            }

            // 1.2 Cityscape Generation (90 Buildings)
            buildings = [];
            for(let i=0; i<90; i++) {
                buildings.push({
                    x: Math.random() * w,
                    w: 90 + Math.random() * 180,
                    h: 150 + Math.random() * (h * 0.75),
                    hue: 200 + Math.random() * 60,
                    win: Array.from({length: 120}, () => ({
                        on: Math.random() > 0.85,
                        c: Math.random() > 0.5 ? '#fff' : '#00f2ff'
                    })),
                    neon: Math.random() > 0.85 ? neonTexts[Math.floor(Math.random()*neonTexts.length)] : null,
                    ant: Math.random() > 0.7
                });
            }

            // 1.3 Sea Waves Initialization
            waves = [];
            for(let i=0; i<5; i++) {
                waves.push({ y: h - 50 + i*15, offset: Math.random() * 100 });
            }
        }
        window.onresize = buildUniverse;

        // --- MODULE 2: PARTICLE DYNAMICS (PHYSICS CORE) ---
        class AstralParticle {
            constructor(x, y, h, vx, vy) {
                this.x = x; this.y = y; this.h = h;
                this.vx = vx; this.vy = vy;
                this.alpha = 1;
                this.decay = 0.004 + Math.random() * 0.008;
                this.gravity = 0.14;
                this.drag = 0.98;
                this.size = 1 + Math.random() * 4;
            }
            update() {
                this.vx *= this.drag; this.vy *= this.drag;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${this.h}, 100%, 70%)`;
                ctx.fillStyle = `hsl(${this.h}, 100%, 70%)`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class AstralRocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.tx = this.x + (Math.random()-0.5)*300;
                this.ty = 50 + Math.random() * (h*0.5);
                this.h = Math.random() * 360;
                this.v = 15 + Math.random() * 10;
            }
            update() {
                let dx = this.tx - this.x, dy = this.ty - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 20) { this.explode(); return false; }
                let angle = Math.atan2(dy, dx);
                this.x += Math.cos(angle) * this.v;
                this.y += Math.sin(angle) * this.v;
                return true;
            }
            explode() {
                // Add Shockwave
                shockwaves.push({ x: this.x, y: this.y, r: 0, a: 1, c: `hsl(${this.h}, 100%, 50%)` });
                // Camera Shake
                document.body.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`;
                setTimeout(() => document.body.style.transform = 'none', 50);
                
                for(let i=0; i<450; i++) {
                    let a = Math.random()*Math.PI*2, s = Math.random()*18+2;
                    particles.push(new AstralParticle(this.x, this.y, this.h, Math.cos(a)*s, Math.sin(a)*s));
                }
            }
            draw() {
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 30; ctx.shadowColor = `hsl(${this.h}, 100%, 50%)`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, 7); ctx.fill();
            }
        }

        // --- MODULE 3: AUDIO ENGINE (YOUTUBE) ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-sink', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAstralSound() {
            const orb = document.getElementById('audio-orb');
            const icon = document.getElementById('audio-icon');
            if(!isPlaying) {
                ytPlayer.unMute(); ytPlayer.playVideo();
                isPlaying = true; icon.className = "fa-solid fa-volume-high";
                icon.style.color = "var(--a)"; orb.style.borderColor = "var(--a)";
            } else {
                ytPlayer.mute(); isPlaying = false;
                icon.className = "fa-solid fa-volume-xmark";
                icon.style.color = "var(--s)"; orb.style.borderColor = "var(--s)";
            }
        }

        // --- MODULE 4: SYSTEM ACTIONS ---
        function igniteAstralEngine() {
            const gate = document.getElementById('the-gate');
            gate.style.opacity = '0'; gate.style.transform = 'scale(5) rotate(45deg)';
            setTimeout(() => {
                gate.style.display = 'none';
                document.getElementById('auth-ui').style.display = 'block';
                buildUniverse(); loop();
                toggleAstralSound();
                setInterval(() => { if(Math.random()<0.3) rockets.push(new AstralRocket()); }, 400);
            }, 1500);
        }

        function togglePass() {
            const p = document.getElementById('pass-id');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function processPhase() {
            const u = document.getElementById('user-id').value;
            const p = document.getElementById('pass-id').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                const auth = document.getElementById('auth-ui');
                auth.classList.add('warp-transition');
                setTimeout(() => {
                    auth.style.display = 'none';
                    const menu = document.getElementById('menu-ui');
                    menu.style.display = 'block';
                    setTimeout(() => menu.style.opacity = '1', 100);
                    superFire(100);
                }, 1800);
            } else {
                alert("IDENTITY DENIED: Bạn không phải Thuý Vân của tôi! ❤️");
            }
        }

        function superFire(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new AstralRocket()), i*150); }
        function astralLove() { alert("Bình Minh ❤️ Thuý Vân: Tình yêu vượt qua mọi dòng code!"); superFire(150); }

        // --- MODULE 5: RENDER LOOP (THE TITAN RENDERER) ---
        function loop() {
            // Cinematic Motion Blur
            ctx.fillStyle = 'rgba(0, 0, 2, 0.2)';
            ctx.fillRect(0, 0, w, h);

            // 5.1 Stars
            stars.forEach(s => {
                s.o += s.v; if(s.o > 1 || s.o < 0) s.v *= -1;
                ctx.fillStyle = `rgba(255,255,255,${s.o})`;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // 5.2 BUILDINGS & NEON
            buildings.forEach(b => {
                let grad = ctx.createLinearGradient(b.x, h-b.h, b.x, h);
                grad.addColorStop(0, '#050515'); grad.addColorStop(1, '#000');
                ctx.fillStyle = grad; ctx.fillRect(b.x, h-b.h, b.w, b.h);

                // Lighting Reflection
                rockets.forEach(r => {
                    let dx = Math.abs(r.x - (b.x + b.w/2)), dy = Math.abs(r.y - (h - b.h/2));
                    if(dx < 500 && dy < 600) {
                        ctx.fillStyle = `hsla(${r.h}, 100%, 60%, ${(1-dx/500)*(1-dy/600)*0.4})`;
                        ctx.fillRect(b.x, h-b.h, b.w, b.h);
                    }
                });

                // Windows
                b.win.forEach((win, idx) => {
                    if(win.on) {
                        ctx.fillStyle = win.c; ctx.shadowBlur = 10; ctx.shadowColor = win.c;
                        ctx.fillRect(b.x + 20 + (idx%7)*22, h - b.h + 30 + Math.floor(idx/7)*35, 12, 12);
                    }
                });
                ctx.shadowBlur = 0;

                // Neon Signage
                if(b.neon) {
                    ctx.font = 'bold 22px Orbitron'; ctx.fillStyle = 'var(--p)';
                    ctx.shadowBlur = 20; ctx.shadowColor = 'var(--p)';
                    ctx.fillText(b.neon, b.x + 10, h - b.h + 60);
                }
            });

            // 5.3 SEA REFLECTION (NEW)
            ctx.save();
            ctx.globalAlpha = 0.3;
            waves.forEach((wv, i) => {
                wv.offset += 0.05;
                ctx.beginPath();
                ctx.moveTo(0, wv.y);
                for(let x=0; x<w; x+=20) {
                    ctx.lineTo(x, wv.y + Math.sin(x*0.01 + wv.offset)*10);
                }
                ctx.lineTo(w, h); ctx.lineTo(0, h);
                ctx.fillStyle = '#001a33'; ctx.fill();
            });
            ctx.restore();

            // 5.4 Shockwaves
            shockwaves = shockwaves.filter(s => {
                s.r += 15; s.a -= 0.02;
                ctx.strokeStyle = s.c; ctx.globalAlpha = s.a; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.stroke();
                return s.a > 0;
            });

            // 5.5 Entity Update
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.update(); p.draw(); return p.alpha > 0; });

            requestAnimationFrame(loop);
        }

        console.log("%c ASTRAL ENGINE v10.0 ACTIVE ", "background:#ff007b; color:#fff; font-weight:bold; padding:20px;");
    </script>
</body>
</html>
