<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THVAN ETERNITY - GOD MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --cyan: #00f2ff; --magenta: #ff007b; --gold: #ffcc00;
            --dark: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { 
            background: var(--dark); color: #fff; overflow: hidden; 
            font-family: 'Orbitron', sans-serif; height: 100vh;
        }

        /* NỀN VŨ TRỤ CHÂN THỰC 4K */
        #nebula-canvas { position: fixed; inset: 0; z-index: 1; }
        #firework-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; mix-blend-mode: screen; }

        /* HUD OVERLAY (GIAO DIỆN MÁY BAY CHIẾN ĐẤU) */
        .hud-frame {
            position: fixed; inset: 0; z-index: 10;
            border: 40px solid transparent;
            border-image: url('https://i.imgur.com/8S9S7zH.png') 100 round; /* Giả lập khung HUD */
            pointer-events: none; opacity: 0.5;
        }

        /* KHỐI ĐĂNG NHẬP: THE CORE GATES */
        .center-interface {
            position: relative; z-index: 100; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .core-gates {
            width: 420px; position: relative;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(30px) saturate(180%);
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 80px 0 80px 0;
            padding: 60px 40px;
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.1), inset 0 0 40px rgba(255, 0, 123, 0.1);
            transform: perspective(1000px) rotateX(10deg);
            animation: coreHover 4s infinite ease-in-out;
        }

        @keyframes coreHover {
            0%, 100% { transform: perspective(1000px) rotateX(10deg) translateY(0); }
            50% { transform: perspective(1000px) rotateX(5deg) translateY(-20px); }
        }

        /* LABEL DẠNG MÃ CODE */
        .identity-label {
            font-size: 10px; color: var(--cyan); letter-spacing: 5px;
            margin-bottom: 15px; display: block; text-shadow: 0 0 10px var(--cyan);
        }

        /* INPUT BIẾN THÀNH THANH NĂNG LƯỢNG */
        .energy-input {
            width: 100%; background: rgba(255, 255, 255, 0.03);
            border: none; border-left: 4px solid var(--cyan);
            padding: 20px; color: #fff; font-family: 'Michroma', sans-serif;
            font-size: 12px; margin-bottom: 40px; outline: none;
            transition: 0.4s; position: relative;
        }
        .energy-input:focus {
            background: rgba(0, 242, 255, 0.1);
            border-left: 4px solid var(--magenta);
            box-shadow: -10px 0 30px rgba(255, 0, 123, 0.3);
        }

        /* NÚT KÍCH HOẠT VÔ CỰC */
        .btn-ignite {
            width: 100%; padding: 25px; background: transparent;
            border: 1px solid var(--cyan); color: var(--cyan);
            font-weight: 900; letter-spacing: 15px; text-transform: uppercase;
            position: relative; overflow: hidden; transition: 0.5s;
        }
        .btn-ignite::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            transition: 0.5s;
        }
        .btn-ignite:hover::before { left: 100%; }
        .btn-ignite:hover {
            background: var(--cyan); color: #000;
            box-shadow: 0 0 50px var(--cyan);
            letter-spacing: 20px;
        }

        /* HIỆU ỨNG SCANNER CHẠY QUA MÀN HÌNH */
        .scanner-line {
            position: fixed; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.2);
            z-index: 1000; pointer-events: none;
            animation: scanMove 3s linear infinite;
        }
        @keyframes scanMove { from { top: 0%; } to { top: 100%; } }

        /* DASHBOARD SAU KHI ĐĂNG NHẬP */
        #vip-dashboard {
            display: none; grid-template-columns: repeat(2, 1fr); gap: 20px;
            width: 100%; max-width: 500px;
        }
        .vip-card {
            background: rgba(255,255,255,0.05); padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; text-align: center; transition: 0.4s;
        }
        .vip-card:hover { 
            background: var(--magenta); transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 40px var(--magenta);
        }

    </style>
</head>
<body>

    <div class="scanner-line"></div>
    <div class="hud-frame"></div>
    <canvas id="nebula-canvas"></canvas>
    <canvas id="firework-canvas"></canvas>

    <div class="center-interface">
        <div class="core-gates" id="gate-panel">
            <h2 style="text-align: center; margin-bottom: 50px; font-size: 1.5rem; letter-spacing: 10px; color: #fff;">
                THE <span style="color: var(--magenta);">VAN</span> PROJECT
            </h2>

            <span class="identity-label">BIOMETRIC USERNAME</span>
            <input type="text" id="u" class="energy-input" placeholder="ACCESS IDENTITY..." autocomplete="off">

            <span class="identity-label">QUANTUM KEYCODE</span>
            <input type="password" id="p" class="energy-input" placeholder="VERIFY PASSCODE..." autocomplete="off">

            <button class="btn-ignite" onclick="validate()">Kích Hoạt</button>
        </div>

        <div id="vip-dashboard">
            <div class="vip-card" onclick="launch(100)">KỈ NIỆM</div>
            <div class="vip-card" onclick="launch(100)">HIỆN TẠI</div>
            <div class="vip-card" onclick="launch(100)">TƯƠNG LAI</div>
            <div class="vip-card" style="grid-column: span 2;" onclick="godMode()">ETERNAL LOVE</div>
        </div>
    </div>

    <div id="yt-player" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const fwCanvas = document.getElementById('firework-canvas');
        const fctx = fwCanvas.getContext('2d');
        const nebCanvas = document.getElementById('nebula-canvas');
        const nctx = nebCanvas.getContext('2d');
        let w, h, yt, particles = [], rockets = [];

        function init() {
            w = fwCanvas.width = nebCanvas.width = window.innerWidth;
            h = fwCanvas.height = nebCanvas.height = window.innerHeight;
            // Tạo nền sao rơi
            for(let i=0; i<200; i++) stars.push({x: Math.random()*w, y: Math.random()*h, s: Math.random()*2});
        }
        let stars = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.v = { x: (Math.random()-0.5)*20, y: (Math.random()-0.5)*20 };
                this.alpha = 1;
                this.decay = 0.01 + Math.random()*0.02;
            }
            draw() {
                fctx.globalAlpha = this.alpha;
                fctx.shadowBlur = 20; fctx.shadowColor = this.color;
                fctx.fillStyle = this.color;
                fctx.beginPath(); fctx.arc(this.x, this.y, 2, 0, Math.PI*2); fctx.fill();
            }
            update() {
                this.x += this.v.x; this.y += this.v.y;
                this.v.y += 0.2; // Trọng lực
                this.alpha -= this.decay;
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random()*w; this.y = h;
                this.targetY = 50 + Math.random()*(h*0.5);
                this.color = `hsl(${Math.random()*360}, 100%, 70%)`;
                this.v = 15;
            }
            draw() {
                fctx.fillStyle = "#fff";
                fctx.fillRect(this.x, this.y, 2, 20);
            }
            update() {
                this.y -= this.v;
                if(this.y <= this.targetY) {
                    for(let i=0; i<150; i++) particles.push(new Particle(this.x, this.y, this.color));
                    return false;
                }
                return true;
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-player', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function validate() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('gate-panel').style.display = 'none';
                const db = document.getElementById('vip-dashboard');
                db.style.display = 'grid';
                yt.unMute(); yt.playVideo();
                launch(120);
            } else {
                alert("ACCESS DENIED: SINH TRẮC HỌC KHÔNG KHỚP");
            }
        }

        function launch(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*150); }

        function godMode() {
            document.body.style.animation = "shake 0.2s infinite";
            alert("BÌNH MINH YÊU VÂN ĐẾN TẬN CÙNG CỦA THỰC TẠI!");
            launch(200);
            setTimeout(() => document.body.style.animation = "", 2000);
        }

        function animate() {
            nctx.fillStyle = '#020205'; nctx.fillRect(0,0,w,h);
            nctx.fillStyle = '#fff';
            stars.forEach(s => nctx.fillRect(s.x, s.y, s.s, s.s));

            fctx.clearRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init(); animate();
        setInterval(() => { if(Math.random()<0.2) rockets.push(new Rocket()); }, 600);
    </script>

    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</body>
</html>
