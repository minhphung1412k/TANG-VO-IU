<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BÌNH MINH TẶNG EM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Orbitron:wght@400;900&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --p: #ff007b; --s: #00f2ff; --v: #7000ff; --w: #ffffff;
            --bg: #02020a; --glass: rgba(10, 10, 20, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100vw; height: 100vh; background: var(--bg); 
            overflow: hidden; font-family: 'Quicksand', sans-serif; 
            color: #fff; position: fixed;
        }

        /* ENGINE ĐỒ HỌA THÀNH PHỐ */
        #vortex-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; filter: contrast(1.1) brightness(1.2) saturate(1.5); }

        /* XOAY NGANG MÀN HÌNH */
        #rotate-notice {
            position: fixed; inset: 0; z-index: 100000; background: #000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: var(--s); font-family: 'Orbitron';
        }
        @media screen and (orientation: portrait) { #rotate-notice { display: flex; } }

        /* GIAO DIỆN MASTER */
        .master-stage {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.8) 100%);
        }

        /* KHUNG ĐĂNG NHẬP LUXURY */
        .cyber-card {
            width: 340px; padding: 40px; position: relative;
            background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px 10px 40px 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            animation: cardFadeIn 1.5s ease;
        }

        @keyframes cardFadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .web-header { text-align: center; margin-bottom: 30px; }
        .web-header h1 { font-family: 'Cinzel Decorative', cursive; font-size: 1.4rem; color: #fff; letter-spacing: 2px; text-shadow: 0 0 15px var(--p); }
        .web-header p { font-family: 'Orbitron'; font-size: 9px; color: var(--s); letter-spacing: 4px; margin-top: 10px; text-transform: uppercase; }

        /* INPUT CÓ ICON */
        .field-group { position: relative; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .field-group:focus-within { border-bottom-color: var(--s); }
        
        .field-group i { position: absolute; left: 0; bottom: 12px; color: var(--s); font-size: 14px; opacity: 0.7; }
        
        .field-group label { display: block; font-family: 'Orbitron'; font-size: 8px; color: var(--p); letter-spacing: 2px; margin-bottom: 5px; }
        
        .field-group input {
            width: 100%; padding: 10px 30px; background: transparent;
            border: none; color: #fff; font-size: 15px; outline: none;
        }

        /* NÚT TRUY CẬP TRONG SUỐT NỔI BẬT */
        .btn-glow {
            width: 100%; padding: 16px; border: none; margin-top: 10px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem;
            color: #fff; letter-spacing: 8px; cursor: pointer;
            background: linear-gradient(45deg, var(--p), var(--v));
            border-radius: 50px; transition: 0.4s;
            box-shadow: 0 5px 20px rgba(255, 0, 123, 0.3);
        }
        .btn-glow:hover { transform: scale(1.05); letter-spacing: 12px; box-shadow: 0 0 30px var(--p); }

        /* MÀN HÌNH CHỜ */
        #portal {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .portal-ring {
            width: 120px; height: 120px; border: 2px solid var(--p); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: ringSpin 4s linear infinite;
        }
        @keyframes ringSpin { to { transform: rotate(360deg); border-color: var(--s); } }

        /* NÚT NHẠC */
        #music-btn {
            position: fixed; top: 25px; right: 25px; z-index: 1000;
            width: 45px; height: 45px; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="rotate-notice"><h2>XOAY NGANG ĐIỆN THOẠI ĐỂ TRẢI NGHIỆM ĐẸP NHẤT</h2></div>

    <div id="portal" onclick="initEngine()">
        <div class="portal-ring"><div style="width:20px; height:20px; background:#fff; border-radius:50%; box-shadow: 0 0 30px #fff;"></div></div>
        <h1 style="margin-top: 40px; font-family: 'Orbitron'; letter-spacing: 12px; font-size: 20px;">CHẠM ĐỂ SƯỚNG</h1>
    </div>

    <div id="music-btn" onclick="toggleMute()">
        <i id="m-icon" class="fas fa-volume-mute" style="color: #fff; font-size: 14px;"></i>
    </div>

    <canvas id="vortex-canvas"></canvas>
    <div id="yt-player" style="display:none"></div>

    <div class="master-stage">
        <div class="cyber-card" id="ui-login">
            <div class="web-header">
                <h1>BÌNH MINH</h1>
                <p>TẶNG EM THUÝ VÂN</p>
            </div>
            
            <div class="field-group">
                <label>DANH TÍNH</label>
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Tên của em ưi">
            </div>

            <div class="field-group">
                <label>MẬT MÃ</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Mật mã bí mật">
            </div>

            <button class="btn-glow" onclick="access()">TRUY CẬP</button>
        </div>

        <div class="cyber-card" id="ui-menu" style="display:none; opacity:0;">
            <div class="web-header"><h1>VŨ TRỤ CỦA VÂN</h1></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn-glow" style="font-size:9px; padding:12px; letter-spacing:2px;" onclick="ignite(60)">KỈ NIỆM</button>
                <button class="btn-glow" style="font-size:9px; padding:12px; letter-spacing:2px;" onclick="ignite(60)">HIỆN TẠI</button>
                <button class="btn-glow" style="font-size:9px; padding:12px; letter-spacing:2px;" onclick="ignite(60)">TƯƠNG LAI</button>
                <button class="btn-glow" style="font-size:9px; padding:12px; letter-spacing:2px;" onclick="love()">MÃI YÊU</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('vortex-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, yt, audioCtx, isMuted = true;
        let rockets = [], particles = [], stars = [], buildings = [];
        const neonMsgs = ["BMINH THƯƠNG EM", "BMINH YÊU EM", "THVAN CUTE", "THVAN XINH", "MÃI YÊU EM"];

        function boomSound() {
            if(isMuted || !audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(100, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        function initScene() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = Array.from({length: 300}, () => ({x:Math.random()*w, y:Math.random()*h, s:Math.random()*2, o:Math.random()}));
            buildings = [];
            let count = w < 800 ? 30 : 60;
            for(let i=0; i<count; i++) {
                buildings.push({
                    x: Math.random()*w, w: 50+Math.random()*120, h: 100+Math.random()*(h*0.65),
                    label: Math.random() > 0.85 ? neonMsgs[Math.floor(Math.random()*neonMsgs.length)] : null,
                    shade: 5 + Math.random()*15
                });
            }
        }

        class Part {
            constructor(x, y, hue) {
                this.x = x; this.y = y; this.h = hue;
                this.vx = (Math.random()-0.5)*18; this.vy = (Math.random()-0.5)*18;
                this.a = 1; this.d = 0.01 + Math.random()*0.02;
            }
            draw() {
                ctx.fillStyle = `hsla(${this.h}, 100%, 75%, ${this.a})`;
                ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${this.h}, 100%, 50%)`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, 7); ctx.fill();
                ctx.shadowBlur = 0;
            }
            update() { this.vx *= 0.94; this.vy *= 0.94; this.vy += 0.15; this.x += this.vx; this.y += this.vy; this.a -= this.d; }
        }

        class Rocket {
            constructor() {
                this.x = Math.random()*w; this.y = h;
                this.ty = 50 + Math.random()*(h*0.45);
                this.v = 13 + Math.random()*7; this.hue = Math.random()*360;
            }
            draw() { ctx.fillStyle = '#fff'; ctx.fillRect(this.x, this.y, 2, 12); }
            update() {
                this.y -= this.v;
                if(this.y <= this.ty) {
                    boomSound();
                    for(let i=0; i<200; i++) particles.push(new Part(this.x, this.y, this.hue));
                    return false;
                }
                return true;
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-player', { videoId: 'iXaw-jwmjjA', playerVars: { loop:1, playlist:'iXaw-jwmjjA' }});
        }

        function initEngine() {
            document.getElementById('portal').style.display = 'none';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            initScene(); animate();
            setInterval(() => { if(Math.random()<0.3) rockets.push(new Rocket()); }, 500);
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('m-icon');
            icon.className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
            isMuted ? yt.mute() : (yt.unMute(), yt.playVideo());
        }

        function access() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('ui-login').style.display = 'none';
                const m = document.getElementById('ui-menu'); m.style.display = 'block';
                setTimeout(() => m.style.opacity = 1, 100); ignite(100);
            } else { alert("Tên hoặc mật mã không đúng rồi em ơi! ❤️"); }
        }

        function ignite(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*150); }
        function love() { alert("Bình Minh yêu Thuý Vân vĩnh cửu!"); ignite(120); }

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 10, 0.25)'; ctx.fillRect(0,0,w,h);
            stars.forEach(s => { ctx.fillStyle=`rgba(255,255,255,${s.o})`; ctx.fillRect(s.x, s.y, s.s, s.s); });
            buildings.forEach(b => {
                let g = ctx.createLinearGradient(b.x, h-b.h, b.x, h);
                g.addColorStop(0, `rgb(${b.shade}, ${b.shade}, ${b.shade+10})`);
                g.addColorStop(1, '#000');
                ctx.fillStyle = g; ctx.fillRect(b.x, h-b.h, b.w, b.h);
                if(b.label) {
                    ctx.font = 'bold 11px Orbitron'; ctx.fillStyle = 'var(--s)';
                    ctx.shadowBlur = 10; ctx.shadowColor = 'var(--s)';
                    ctx.fillText(b.label, b.x + 5, h-b.h + 40); ctx.shadowBlur = 0;
                }
            });
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.a > 0; });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initScene);
    </script>
</body>
</html>
