<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vườn Cho Vợ ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Quicksand', sans-serif; }

        /* PHONG CẢNH THIÊN NHIÊN RỰC RỠ */
        #bg {
            position: fixed; inset: 0; z-index: -1;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
            filter: brightness(0.6);
        }

        /* MÀN HÌNH CHỜ */
        #intro {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .rose { font-size: 80px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* KHUNG ĐĂNG NHẬP */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px; padding: 30px;
            width: 85%; max-width: 350px; text-align: center;
            display: none; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #ffb3c1; font-size: 2.5rem; margin: 0 0 20px 0; }
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.2); color: #fff; margin-bottom: 10px;
            text-align: center; outline: none;
        }
        .btn {
            background: #ff4d6d; color: white; border: none; padding: 15px;
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        /* CÁNH HOA RƠI */
        .petal { position: absolute; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="intro" onclick="openMagic()">
        <div class="rose">🌹</div>
        <p style="color: white; margin-top: 20px; letter-spacing: 2px;">CHẠM VÀO ĐỂ BẮT ĐẦU</p>
    </div>

    <audio id="music" loop preload="auto">
        <source src="https://files.catbox.moe/kpkp67.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="login-box">
        <h2>Vợ Yêu ❤️</h2>
        <input type="text" id="u" placeholder="Tên tài khoản...">
        <input type="password" id="p" placeholder="Mật khẩu...">
        <button class="btn" onclick="check()">KHÁM PHÁ ✨</button>
    </div>

    <div class="card" id="menu-box">
        <h2>Khu Vườn Của Em</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="btn" style="font-size: 12px;">KỈ NIỆM</div>
            <div class="btn" style="font-size: 12px;">TƯƠNG LAI</div>
            <div class="btn" style="font-size: 12px;">HỨA HẸN</div>
            <div class="btn" style="font-size: 12px;">YÊU EM</div>
        </div>
    </div>

    <script>
        const music = document.getElementById('music');

        function openMagic() {
            // Phát nhạc
            music.play().catch(e => console.log("Nhạc chờ kích hoạt"));
            
            // Chuyển màn hình ngay lập tức, không dùng hiệu ứng để tránh đơ
            document.getElementById('intro').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            
            // Tạo cánh hoa
            setInterval(createPetal, 500);
        }

        function check() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('menu-box').style.display = 'block';
            } else {
                alert("Sai mật khẩu rồi vợ ơi!");
            }
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.innerHTML = '🌸';
            p.style.left = Math.random() * 100 + "vw";
            p.style.top = "-5vh";
            p.style.fontSize = Math.random() * 20 + 10 + "px";
            p.style.animationDuration = Math.random() * 5 + 3 + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 8000);
        }
    </script>
</body>
</html>
