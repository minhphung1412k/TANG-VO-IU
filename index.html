<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vườn Tình Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Quicksand', sans-serif;
            background: #000;
        }

        /* PHONG CẢNH THIÊN NHIÊN HUYỀN ẢO */
        #nature-bg {
            position: fixed; inset: 0; z-index: -1;
            background: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-position: center;
            filter: brightness(0.4) contrast(1.2);
            transform: scale(1.1);
        }

        /* HIỆU ỨNG HOA RƠI */
        .leaf {
            position: absolute; color: #ffb3c1; pointer-events: none;
            z-index: 1; animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* MÀN HÌNH CHỜ */
        #intro {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: 1.5s ease;
        }
        .rose-portal {
            font-size: 110px; filter: drop-shadow(0 0 40px #ff0055);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }

        /* KHUNG ĐĂNG NHẬP SANG TRỌNG */
        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; padding: 40px;
            width: 90%; max-width: 400px; text-align: center;
            display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            color: white;
        }

        h2 { font-family: 'Dancing Script', cursive; color: #ffb3c1; font-size: 2.8rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3); color: white;
            outline: none; text-align: center; font-size: 16px;
        }
        .eye-btn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #ffb3c1; cursor: pointer; font-size: 20px; }

        .btn-nature {
            background: linear-gradient(45deg, #ffb3c1, #ff4d6d);
            color: white; border: none; padding: 18px; width: 100%;
            border-radius: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3);
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* NÚT LOA */
        #music-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: none; align-items: center;
            justify-content: center; font-size: 25px; cursor: pointer;
            border: 1px solid #ffb3c1; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="nature-bg"></div>

    <div id="intro" onclick="startExperience()">
        <div class="rose-portal">🌹</div>
        <p style="color: #ffb3c1; margin-top: 30px; letter-spacing: 5px; font-weight: 600;">CHẠM ĐỂ VÀO KHU VƯỜN</p>
    </div>

    <audio id="piano-music" loop>
        <source src="https://files.catbox.moe/kpkp67.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-box" id="login-card">
            <h2>Vợ Yêu ❤️</h2>
            <div class="input-group">
                <input type="text" id="usr" placeholder="Tên tài khoản..." autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="pwd" placeholder="Mật khẩu..." autocomplete="off">
                <span class="eye-btn" onclick="togglePass()">👁️</span>
            </div>
            <button class="btn-nature" onclick="unlock()">KHÁM PHÁ ✨</button>
            <p id="err" style="color: #ff4d6d; font-size: 14px; display: none; margin-top: 15px;">Sai mật khẩu rồi vợ ơi! ❌</p>
        </div>

        <div class="glass-box" id="menu-card">
            <h2>Thiên Đường Của Em</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                <div style="background: rgba(255,255,255,0.1); padding: 25px 10px; border-radius: 20px; font-weight: 600; font-size: 13px; border: 1px solid #ffb3c1;">CHUYỆN QUÁ KHỨ</div>
                <div style="background: rgba(255,255,255,0.1); padding: 25px 10px; border-radius: 20px; font-weight: 600; font-size: 13px; border: 1px solid #ffb3c1;">CHUYỆN HIỆN TẠI</div>
                <div style="background: rgba(255,255,255,0.1); padding: 25px 10px; border-radius: 20px; font-weight: 600; font-size: 13px; border: 1px solid #ffb3c1;">LỜI HỨA TƯƠNG LAI</div>
                <div style="background: rgba(255,255,255,0.1); padding: 25px 10px; border-radius: 20px; font-weight: 600; font-size: 13px; border: 1px solid #ffb3c1;">LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <div id="music-toggle" onclick="toggleMusic()">🔊</div>

    <script>
        const audio = document.getElementById('piano-music');

        function startExperience() {
            // Cố gắng phát nhạc ngay lập tức
            audio.play();
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-card').style.display = 'block';
                document.getElementById('music-toggle').style.display = 'flex';
                setInterval(createLeaf, 500);
            }, 1200);
        }

        function togglePass() {
            const p = document.getElementById('pwd');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function unlock() {
            const u = document.getElementById('usr').value;
            const p = document.getElementById('pwd').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-card').style.display = "none";
                document.getElementById('menu-card').style.display = "block";
            } else {
                document.getElementById('err').style.display = "block";
            }
        }

        function toggleMusic() {
            if(audio.paused) {
                audio.play(); document.getElementById('music-toggle').innerText = "🔊";
            } else {
                audio.pause(); document.getElementById('music-toggle').innerText = "🔇";
            }
        }

        function createLeaf() {
            const l = document.createElement('div');
            l.className = 'leaf';
            l.innerHTML = '🌸';
            l.style.left = Math.random() * 100 + "vw";
            l.style.fontSize = Math.random() * 20 + 10 + "px";
            l.style.animationDuration = Math.random() * 5 + 5 + "s";
            document.body.appendChild(l);
            setTimeout(() => l.remove(), 10000);
        }
    </script>
</body>
</html>
