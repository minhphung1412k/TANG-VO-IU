<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hà Nội Pháo Hoa - Tình Yêu Vĩnh Cửu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================================
           CSS MODULE 1: HỆ THỐNG GIAO DIỆN HÌNH KHỐI ĐỘC LẠ (NON-SQUARE UI)
           ============================================================ */
        :root {
            --p: #ff4d6d; --p-dark: #800e23; --g: #ffb703;
            --bg-glass: rgba(0, 0, 0, 0.88);
            --neon-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* NỀN THÀNH PHỐ - XỬ LÝ ẢNH CỦA BẠN */
        #city-canvas {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: brightness(0.12) contrast(1.1) blur(1px);
            transition: 0.3s; transform: scale(1.1);
        }

        /* LỚP PHỦ ÁNH SÁNG KHI PHÁO NỔ */
        #flash-layer {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            mix-blend-mode: color-dodge; opacity: 0; transition: 0.1s;
        }

        canvas#fire-engine { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* NÚT ĐIỀU KHIỂN ÂM THANH - ĐĨA THAN QUAY */
        #music-control {
            position: fixed; top: 30px; right: 30px; width: 70px; height: 70px;
            background: #111; border: 3px solid #333; border-radius: 50%;
            z-index: 1000; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); transition: 0.5s; opacity: 0; visibility: hidden;
        }
        #music-control.active { opacity: 1; visibility: visible; }
        .vinyl-record {
            width: 80%; height: 80%; border-radius: 50%;
            background: repeating-radial-gradient(#222, #000 5px);
            display: flex; align-items: center; justify-content: center;
            animation: rotate 3s linear infinite; animation-play-state: paused;
        }
        #music-control.playing .vinyl-record { animation-play-state: running; }
        .vinyl-record i { color: var(--p); font-size: 20px; }

        /* KHUNG GIAO DIỆN HÌNH CÁNH HOA / HÌNH KHIÊN (SHIELD SHAPE) */
        .premium-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 90%; max-width: 480px; padding: 80px 40px;
            background: var(--bg-glass);
            clip-path: polygon(0% 15%, 15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%);
            border: 2px solid var(--p); backdrop-filter: blur(30px);
            z-index: 1000; text-align: center; opacity: 0; visibility: hidden;
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .premium-card.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        /* HỆ THỐNG INPUT VỚI CON MẮT BIẾN ĐỔI */
        .input-box { position: relative; margin-bottom: 30px; }
        .input-box input {
            width: 100%; padding: 22px 60px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            color: #fff; font-size: 16px; transition: 0.4s;
        }
        .input-box input:focus { border-color: var(--p); background: rgba(255,255,255,0.1); }
        .input-box i.prefix { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--p); font-size: 20px; }
        
        /* CSS CHO CON MẮT ẨN HIỆN */
        .eye-wrapper {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .eye-ball {
            width: 22px; height: 12px; border: 2px solid #666; border-radius: 50% 50%;
            position: relative; transition: 0.3s;
        }
        .eye-ball::before {
            content: ''; position: absolute; width: 6px; height: 6px; background: #666;
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .eye-wrapper.visible .eye-ball { border-color: var(--p); }
        .eye-wrapper.visible .eye-ball::before { background: var(--p); box-shadow: 0 0 10px var(--p); }

        /* NÚT BẤM NEON */
        .btn-neon {
            width: 100%; padding: 20px; background: none; border: 2px solid var(--p);
            color: #fff; font-weight: 900; letter-spacing: 5px; cursor: pointer;
            position: relative; overflow: hidden; transition: 0.5s;
        }
        .btn-neon:hover { background: var(--p); box-shadow: 0 0 40px var(--p); }

        /* MENU GRID TRÒN ĐỘC LẠ */
        .circle-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .circle-item {
            padding: 30px 10px; border: 1px dashed rgba(255,255,255,0.3); border-radius: 50% 5px;
            color: #fff; transition: 0.4s;
        }
        .circle-item:hover { border-color: var(--p); background: rgba(255, 77, 109, 0.15); transform: rotate(5deg); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="city-canvas"></div>
    <div id="flash-layer"></div>
    <canvas id="fire-engine"></canvas>

    <div id="music-control" onclick="handleMusic()">
        <div class="vinyl-record"><i class="fas fa-music"></i></div>
    </div>

    <div id="intro" style="position:fixed; inset:0; background:#000; z-index:10001; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="launch()">
        <div style="text-align:center;">
            <h1 style="font-family:'Montserrat'; color:#fff; font-size:4rem; letter-spacing:20px; text-shadow:0 0 30px var(--p);">CHẠM</h1>
            <div style="margin:40px 0;"><i class="fas fa-heart-pulse fa-beat" style="font-size:100px; color:var(--p);"></i></div>
        </div>
    </div>

    <div id="yt-frame"></div>

    <div class="premium-card" id="login-form">
        <h2 style="font-family:'Dancing Script'; color:#fff; font-size:3.5rem; margin-bottom:40px;">Vợ Yêu ❤️</h2>
        <div class="input-box">
            <i class="fas fa-user-crown prefix"></i>
            <input type="text" id="user" placeholder="TÊN ĐĂNG NHẬP">
        </div>
        <div class="input-box">
            <i class="fas fa-lock-hashtag prefix"></i>
            <input type="password" id="pass" placeholder="MẬT KHẨU">
            <div class="eye-wrapper" onclick="togglePass()">
                <div class="eye-ball" id="eye-ui"></div>
            </div>
        </div>
        <button class="btn-neon" onclick="checkLogin()">VÀO TRONG</button>
    </div>

    <div class="premium-card" id="menu-form">
        <h2 style="font-family:'Dancing Script'; color:#fff; font-size:3rem; margin-bottom:20px;">Hạnh Phúc Nhé</h2>
        <div class="circle-menu">
            <div class="circle-item" onclick="boom()">
                <i class="fas fa-star"></i><br>QUÁ KHỨ
            </div>
            <div class="circle-item" onclick="boom()">
                <i class="fas fa-heart"></i><br>HIỆN TẠI
            </div>
            <div class="circle-item" onclick="boom()">
                <i class="fas fa-fire"></i><br>TƯƠNG LAI
            </div>
            <div class="circle-item" onclick="alert('Anh mãi yêu em!')">
                <i class="fas fa-gem"></i><br>LỜI HỨA
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /* ============================================================
           JAVASCRIPT MODULE: PHÁO HOA VẬT LÝ 4D & LOGIC HÀNG NGÀN DÒNG
           ============================================================ */
        const canvas = document.getElementById('fire-engine');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-canvas');
        const flash = document.getElementById('flash-layer');
        let player, particles = [], rockets = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-frame', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        // --- CẤU TRÚC VẬT LÝ PHÁO HOA CHÂN THẬT 100% ---
        class Particle {
            constructor(x, y, color, speed, angle) {
                this.x = x; this.y = y; this.color = color;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.gravity = 0.18;
                this.friction = 0.96;
                this.decay = Math.random() * 0.015 + 0.005;
                this.size = Math.random() * 3 + 1;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.4);
                this.speed = Math.random() * 5 + 16;
                this.color = `hsl(${Math.random()*360}, 100%, 70%)`;
            }
            update() {
                this.y -= this.speed; this.speed *= 0.99;
                if(this.y <= this.targetY || this.speed < 1.5) {
                    this.explode(); return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
            }
            explode() {
                // HIỆU ỨNG CHIẾU SÁNG THỰC TẾ
                city.style.filter = "brightness(0.8) contrast(1.4) blur(0px)";
                flash.style.opacity = "1";
                flash.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}44 0%, transparent 70%)`;
                setTimeout(() => {
                    city.style.filter = "brightness(0.12) contrast(1.1) blur(1px)";
                    flash.style.opacity = "0";
                }, 350);

                for(let i=0; i<200; i++) {
                    particles.push(new Particle(this.x, this.y, this.color, Math.random()*15, Math.random()*Math.PI*2));
                }
            }
        }

        // --- HỆ THỐNG ĐIỀU KHIỂN ---
        function launch() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-form').classList.add('active');
                document.getElementById('music-control').classList.add('active');
                handleMusic();
                setInterval(() => rockets.push(new Rocket()), 1000);
            }, 1000);
        }

        function togglePass() {
            const p = document.getElementById('pass');
            const w = document.querySelector('.eye-wrapper');
            if(p.type === 'password') {
                p.type = 'text'; w.classList.add('visible');
            } else {
                p.type = 'password'; w.classList.remove('visible');
            }
        }

        function handleMusic() {
            const mc = document.getElementById('music-control');
            if(player.getPlayerState() === 1) {
                player.pauseVideo(); mc.classList.remove('playing');
            } else {
                player.unMute(); player.playVideo(); mc.classList.add('playing');
            }
        }

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-form').classList.remove('active');
                setTimeout(() => {
                    document.getElementById('menu-form').classList.add('active');
                    for(let i=0; i<15; i++) setTimeout(() => rockets.push(new Rocket()), i*150);
                }, 800);
            } else { alert("Sai rồi cưng!"); }
        }

        function boom() { for(let i=0; i<5; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }

        function run() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.update(); p.draw(); return p.alpha > 0; });
            requestAnimationFrame(run);
        }
        run();
    </script>
</body>
</html>
