<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFINITY: BINH MINH & THUY VAN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Orbitron:wght@400;500;700;900&family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           [1] CSS CORE: BIẾN SỐ VÀ RESET HỆ THỐNG
           ========================================= */
        :root {
            --primary: #ff007b;
            --secondary: #00f2ff;
            --gold: #ffd700;
            --violet: #7000ff;
            --accent: #00ff88;
            --bg-deep: #010105;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --border-glow: 0 0 15px var(--secondary), 0 0 30px var(--secondary);
            --text-glow: 0 0 20px var(--primary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #ffffff;
        }

        /* =========================================
           [2] LỚP NỀN: CANAVS & VŨ TRỤ
           ========================================= */
        #main-engine-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            filter: contrast(1.2) brightness(1.1) saturate(1.5);
            pointer-events: none;
        }

        /* =========================================
           [3] GIAO DIỆN CHÍNH: MASTER VIEWPORT
           ========================================= */
        .master-container {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.95) 100%);
            perspective: 2500px;
            overflow: hidden;
        }

        /* CARD ĐA DIỆN (THE CRYSTAL CARD) */
        .crystal-card {
            width: 95%;
            max-width: 580px;
            min-height: 650px;
            padding: 80px 50px;
            position: relative;
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Bố cục độc bản cắt vát */
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            backdrop-filter: blur(120px) saturate(250%);
            -webkit-backdrop-filter: blur(120px) saturate(250%);
            transform-style: preserve-3d;
            transform: rotateX(15deg) rotateY(-15deg);
            animation: crystalFloat 10s infinite ease-in-out;
            box-shadow: 0 0 150px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes crystalFloat {
            0%, 100% { transform: rotateX(15deg) rotateY(-15deg) translateY(0); }
            50% { transform: rotateX(10deg) rotateY(-8deg) translateY(-25px); }
        }

        /* HIỆU ỨNG ÁNH SÁNG CHẠY VIỀN (NEON FLOW) */
        .crystal-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, var(--secondary), var(--primary), transparent);
            background-size: 200% 100%;
            animation: borderRun 5s linear infinite;
            z-index: -1;
            padding: 2px;
            clip-path: inherit;
        }

        @keyframes borderRun {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* TIÊU ĐỀ GLITCH NEON */
        .infinity-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 70px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, var(--primary), var(--secondary), var(--accent), #fff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flowTitle 6s infinite linear;
            filter: drop-shadow(0 0 25px var(--primary));
        }

        @keyframes flowTitle {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* =========================================
           [4] INPUT SYSTEM: QUANTUM MODULES
           ========================================= */
        .quantum-field {
            width: 100%;
            position: relative;
            margin-bottom: 55px;
            transform: translateZ(40px);
        }

        .quantum-field label {
            position: absolute;
            top: -28px;
            left: 5px;
            font-family: 'Orbitron';
            font-size: 11px;
            color: var(--secondary);
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--secondary);
        }

        .quantum-field input {
            width: 100%;
            padding: 22px 35px;
            padding-right: 90px;
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--primary);
            color: #ffffff;
            font-size: 19px;
            font-family: 'Quicksand';
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            clip-path: polygon(0% 0%, 100% 0%, 100% 75%, 95% 100%, 0% 100%);
        }

        .quantum-field input:focus {
            border-left-color: var(--accent);
            transform: scale(1.08) translateZ(20px);
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.2);
            background: rgba(10, 10, 25, 0.95);
        }

        /* NÚT MẮT THẦN (CYBER EYE) */
        .cyber-eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 55px;
            height: 55px;
            border: 1px solid var(--primary);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255, 0, 123, 0.1);
            transition: 0.5s;
            z-index: 10;
        }

        .cyber-eye:hover {
            background: var(--primary);
            box-shadow: 0 0 30px var(--primary);
            transform: translateY(-50%) rotate(15deg) scale(1.1);
        }

        /* NÚT TRUY CẬP SUPERNOVA */
        .btn-infinity {
            width: 100%;
            padding: 30px;
            border: none;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.4rem;
            color: #ffffff;
            letter-spacing: 18px;
            cursor: pointer;
            background: linear-gradient(45deg, var(--primary), var(--violet), var(--secondary), var(--accent));
            background-size: 400% 400%;
            animation: gradientWave 8s infinite;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.6s;
            margin-top: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-infinity:hover {
            transform: translateY(-15px) scale(1.1) translateZ(50px);
            filter: brightness(1.2);
            box-shadow: 0 50px 100px var(--secondary);
        }

        /* =========================================
           [5] ÂM THANH: THE NEON SPHERE
           ========================================= */
        #audio-sphere {
            position: fixed;
            top: 50px;
            right: 50px;
            z-index: 1000;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0,0,0,0.9);
            border: 2px solid var(--secondary);
            box-shadow: 0 0 40px var(--secondary);
            transition: 0.8s;
        }

        #audio-sphere:hover {
            transform: rotate(180deg) scale(1.1);
            border-color: var(--accent);
            box-shadow: 0 0 60px var(--accent);
        }

        .sphere-ring {
            position: absolute;
            inset: -15px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            border-right-color: transparent;
            animation: spinRing 2s linear infinite;
            opacity: 0;
        }

        @keyframes spinRing { to { transform: rotate(360deg); } }

        /* =========================================
           [6] MÀN HÌNH CHÀO: THE VOID
           ========================================= */
        #void-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .void-heart {
            width: 200px;
            height: 200px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 100px #fff, 0 0 300px var(--primary), 0 0 500px var(--violet);
            animation: heartPulse 2s infinite ease-in-out;
        }

        @keyframes heartPulse {
            0%, 100% { transform: scale(1); filter: blur(2px); }
            50% { transform: scale(1.4); filter: blur(20px); }
        }

        /* =========================================
           [7] MENU HỆ THỐNG: GALAXY GRID
           ========================================= */
        .galaxy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 50px;
            width: 100%;
        }

        .galaxy-node {
            background: rgba(255, 255, 255, 0.03);
            padding: 60px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .galaxy-node:hover {
            background: var(--secondary);
            color: #000;
            transform: scale(1.2) rotate(3deg) translateZ(80px);
            z-index: 50;
            box-shadow: 0 0 100px var(--secondary);
        }

        .galaxy-node i {
            font-size: 50px;
            margin-bottom: 25px;
            color: var(--gold);
            filter: drop-shadow(0 0 10px var(--gold));
        }

        .galaxy-node span {
            font-family: 'Orbitron';
            font-weight: 900;
            letter-spacing: 6px;
            display: block;
        }

        /* =========================================
           [8] UTILS & ANIMATIONS
           ========================================= */
        .hidden { display: none !important; }
        .warp-speed { opacity: 0; transform: scale(5) rotate(90deg); filter: blur(50px); pointer-events: none; }

    </style>
</head>
<body>

    <div id="void-overlay" onclick="activateEngine()">
        <div class="void-heart"></div>
        <h1 style="margin-top: 100px; letter-spacing: 40px; font-family: 'Orbitron'; font-weight: 300;">CHẠM ĐỂ KHỞI ĐẦU</h1>
    </div>

    <div id="audio-sphere" onclick="controlAudio()">
        <div class="sphere-ring" id="s-ring"></div>
        <i id="audio-icon" class="fa-solid fa-volume-xmark" style="font-size: 35px; color: var(--secondary);"></i>
    </div>

    <canvas id="main-engine-canvas"></canvas>
    
    <div id="yt-player-container" style="position: absolute; top: -9999px;"></div>

    <div class="master-container">
        
        <div class="crystal-card" id="auth-module" style="display: none;">
            <h1 class="infinity-title">BÌNH MINH ❤️ THUÝ VÂN</h1>
            
            <div class="quantum-field">
                <label>Vũ Trụ Định Danh</label>
                <input type="text" id="user-input" placeholder="nhập tài khoản đi bây bi">
            </div>

            <div class="quantum-field">
                <label>Chìa Khóa Kỉ Nguyên</label>
                <input type="password" id="pass-input" placeholder="nhập mật khẩu bé ưi">
                <div class="cyber-eye" onclick="togglePass()">
                    <i id="eye-icon" class="fa-solid fa-fingerprint"></i>
                </div>
            </div>

            <button class="btn-infinity" onclick="verifyAccess()">BẮT ĐẦU HÀNH TRÌNH</button>
        </div>

        <div class="crystal-card" id="menu-module" style="display: none; opacity: 0;">
            <h1 class="infinity-title" style="font-size: 2.2rem;">KHÔNG GIAN CỦA VÂN</h1>
            <div class="galaxy-grid">
                <div class="galaxy-node" onclick="launchSupernova(60)">
                    <i class="fa-solid fa-hourglass-start"></i><span>QUÁ KHỨ</span>
                </div>
                <div class="galaxy-node" onclick="launchSupernova(60)">
                    <i class="fa-solid fa-earth-asia"></i><span>HIỆN TẠI</span>
                </div>
                <div class="galaxy-node" onclick="launchSupernova(60)">
                    <i class="fa-solid fa-shuttle-space"></i><span>TƯƠNG LAI</span>
                </div>
                <div class="galaxy-node" onclick="eternalLove()">
                    <i class="fa-solid fa-infinity"></i><span>YÊU EM</span>
                </div>
            </div>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /**
         * INFINITY ENGINE v5.0 - THE ULTIMATE EXPERIENCE
         * Được thiết kế cho: Bình Minh & Thuý Vân
         * Sức mạnh: 1000+ dòng xử lý logic
         */

        const canvas = document.getElementById('main-engine-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, ytPlayer, musicActive = false;
        
        // HỆ THỐNG QUẢN LÝ THỰC THỂ (ENTITY MANAGER)
        let stars = [];
        let rockets = [];
        let particles = [];
        let buildings = [];
        let shockwaves = [];
        let neonSigns = ["THUÝ VÂN", "BÌNH MINH", "LOVE", "FOREVER", "VÂN ❤️ MINH"];

        // --- MODULE 9.1: KHỞI TẠO VŨ TRỤ (UNIVERSE SETUP) ---
        function initUniverse() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            
            // Khởi tạo 1000 ngôi sao (Stars Module)
            stars = [];
            for(let i = 0; i < 1000; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    blinkSpeed: 0.01 + Math.random() * 0.03
                });
            }

            // Khởi tạo thành phố Generative (City Module)
            buildings = [];
            const buildingCount = 75;
            for(let i = 0; i < buildingCount; i++) {
                buildings.push({
                    x: Math.random() * w,
                    width: 70 + Math.random() * 160,
                    height: 120 + Math.random() * (h * 0.7),
                    baseHue: 210 + Math.random() * 40,
                    windows: Array.from({length: 100}, () => ({
                        active: Math.random() > 0.8,
                        color: Math.random() > 0.5 ? '#fff' : '#00f2ff',
                        flicker: Math.random() * 100
                    })),
                    hasAntenna: Math.random() > 0.6,
                    neonText: Math.random() > 0.9 ? neonSigns[Math.floor(Math.random()*neonSigns.length)] : null,
                    depth: Math.random() * 5 + 1
                });
            }
        }
        window.addEventListener('resize', initUniverse);

        // --- MODULE 9.2: VẬT LÝ HẠT (QUANTUM PHYSICS) ---
        class Particle {
            constructor(x, y, color, vx, vy) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.alpha = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.gravity = 0.12;
                this.friction = 0.97;
                this.size = 1 + Math.random() * 4;
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * w;
                this.y = h + 20;
                this.targetY = 50 + Math.random() * (h * 0.5);
                this.hue = Math.random() * 360;
                this.speed = 12 + Math.random() * 8;
                this.angle = (Math.random() - 0.5) * 1.5;
                this.active = true;
            }

            update() {
                this.y -= this.speed;
                this.x += this.angle;
                if(this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                return true;
            }

            explode() {
                // Thêm sóng xung kích (Shockwave)
                shockwaves.push({ x: this.x, y: this.y, radius: 0, alpha: 1, color: `hsl(${this.hue}, 100%, 70%)` });

                // Tạo 400 hạt photon (Particle Module)
                const pCount = 400;
                for(let i = 0; i < pCount; i++) {
                    const ang = Math.random() * Math.PI * 2;
                    const pwr = Math.random() * 20 + 2;
                    particles.push(new Particle(
                        this.x, this.y,
                        `hsl(${this.hue}, 100%, 70%)`,
                        Math.cos(ang) * pwr, Math.sin(ang) * pwr
                    ));
                }
            }

            draw() {
                ctx.save();
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.shadowBlur = 30;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, 7);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- MODULE 9.3: ÂM THANH YOUTUBE (AUDIO ENGINE) ---
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player-container', {
                videoId: 'iXaw-jwmjjA', // Bản nhạc lãng mạn
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function controlAudio() {
            const icon = document.getElementById('audio-icon');
            const ring = document.getElementById('s-ring');
            if(!musicActive) {
                ytPlayer.unMute();
                ytPlayer.playVideo();
                musicActive = true;
                icon.className = "fa-solid fa-volume-high";
                icon.style.color = "var(--accent)";
                ring.style.opacity = "1";
            } else {
                ytPlayer.mute();
                musicActive = false;
                icon.className = "fa-solid fa-volume-xmark";
                icon.style.color = "var(--secondary)";
                ring.style.opacity = "0";
            }
        }

        // --- MODULE 9.4: LOGIC ĐIỀU KHIỂN (UI CONTROLLER) ---
        function activateEngine() {
            const voidScreen = document.getElementById('void-overlay');
            voidScreen.style.opacity = '0';
            voidScreen.style.transform = 'scale(2)';
            
            setTimeout(() => {
                voidScreen.style.display = 'none';
                document.getElementById('auth-module').style.display = 'flex';
                initUniverse();
                renderLoop();
                controlAudio(); // Kích hoạt ngay khi người dùng chạm
                
                // Chu kỳ bắn pháo hoa tự động
                setInterval(() => {
                    if(Math.random() < 0.25) rockets.push(new Rocket());
                }, 450);
            }, 1500);
        }

        function togglePass() {
            const p = document.getElementById('pass-input');
            const e = document.getElementById('eye-icon');
            if(p.type === 'password') {
                p.type = 'text'; e.className = 'fa-solid fa-eye';
            } else {
                p.type = 'password'; e.className = 'fa-solid fa-fingerprint';
            }
        }

        function verifyAccess() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;

            if(user === "thuyvanchithuongbminh" && pass === "bminhcungchicuoithvanthoi") {
                const auth = document.getElementById('auth-module');
                auth.classList.add('warp-speed');
                
                setTimeout(() => {
                    auth.style.display = 'none';
                    const menu = document.getElementById('menu-module');
                    menu.style.display = 'flex';
                    setTimeout(() => menu.style.opacity = "1", 100);
                    launchSupernova(100);
                }, 1500);
            } else {
                alert("Bạn không phải Thuý Vân! Chỉ có Vân mới biết mật mã trái tim thôi ❤️");
            }
        }

        function launchSupernova(count) {
            for(let i = 0; i < count; i++) {
                setTimeout(() => rockets.push(new Rocket()), i * 150);
            }
        }

        function eternalLove() {
            alert("Bình Minh yêu Thuý Vân vĩnh cửu! Chào mừng em đến với không gian 1000 dòng code này.");
            launchSupernova(150);
        }

        // --- MODULE 9.5: CORE RENDER LOOP (THUẬT TOÁN ĐỒ HỌA CHÍNH) ---
        function renderLoop() {
            // Hiệu ứng phơi sáng (Motion Blur)
            ctx.fillStyle = 'rgba(1, 1, 5, 0.22)';
            ctx.fillRect(0, 0, w, h);

            // 1. RENDER STARS (BẦU TRỜI SAO)
            stars.forEach(s => {
                s.opacity += s.blinkSpeed;
                if(s.opacity > 1 || s.opacity < 0.2) s.blinkSpeed *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            // 2. RENDER CITY (THÀNH PHỐ CHI TIẾT)
            buildings.forEach(b => {
                // Vẽ thân tòa nhà (Deep Shading)
                let grad = ctx.createLinearGradient(b.x, h - b.h, b.x, h);
                grad.addColorStop(0, '#020208');
                grad.addColorStop(0.5, '#0a0a25');
                grad.addColorStop(1, '#000000');
                ctx.fillStyle = grad;
                ctx.fillRect(b.x, h - b.h, b.width, b.h);

                // ÁNH SÁNG HẤT TỪ PHÁO HOA (DYNAMIC LIGHT BOUNCE)
                rockets.forEach(r => {
                    let dx = Math.abs(r.x - (b.x + b.width / 2));
                    let dy = Math.abs(r.y - (h - b.h / 2));
                    if(dx < 500 && dy < 600) {
                        let force = (1 - dx / 500) * (1 - dy / 600) * 0.4;
                        ctx.fillStyle = `hsla(${r.hue}, 100%, 65%, ${force})`;
                        ctx.fillRect(b.x, h - b.h, b.width, b.h);
                    }
                });

                // Cửa sổ tòa nhà (Light Module)
                b.windows.forEach((win, idx) => {
                    if(win.active) {
                        let wx = b.x + 15 + (idx % 6) * 25;
                        let wy = h - b.h + 20 + Math.floor(idx / 6) * 40;
                        if(wx < b.x + b.width - 15 && wy < h - 15) {
                            ctx.fillStyle = win.color;
                            ctx.shadowBlur = 10;
                            ctx.shadowColor = win.color;
                            ctx.fillRect(wx, wy, 12, 12);
                        }
                    }
                });
                ctx.shadowBlur = 0;

                // Biển hiệu NEON (Neon Module)
                if(b.neonText) {
                    ctx.font = "bold 18px Orbitron";
                    ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "var(--primary)";
                    ctx.fillText(b.neonText, b.x + 10, h - b.h + 50);
                }

                // Anten cảnh báo (Safety Lights)
                if(b.hasAntenna) {
                    ctx.strokeStyle = "#222";
                    ctx.beginPath(); ctx.moveTo(b.x + b.width/2, h - b.h); ctx.lineTo(b.x + b.width/2, h - b.h - 40); ctx.stroke();
                    ctx.fillStyle = Date.now() % 1000 < 500 ? "#f00" : "transparent";
                    ctx.fillRect(b.x + b.width/2 - 3, h - b.h - 45, 6, 6);
                }
            });

            // 3. RENDER SHOCKWAVES (SÓNG XUNG KÍCH)
            shockwaves = shockwaves.filter(s => {
                s.radius += 12;
                s.alpha -= 0.02;
                ctx.save();
                ctx.strokeStyle = s.color;
                ctx.globalAlpha = s.alpha;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                return s.alpha > 0;
            });

            // 4. RENDER ROCKETS & PARTICLES
            rockets = rockets.filter(r => {
                r.draw();
                return r.update();
            });

            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.alpha > 0;
            });

            // LẶP LẠI VÔ TẬN
            requestAnimationFrame(renderLoop);
        }

        // KÍCH HOẠT HỆ THỐNG GHI NHẬT KÝ
        console.log("%c [SYSTEM]: INFINITY ENGINE DEPLOYED ", "color: #00f2ff; background: #000; font-weight: bold; padding: 10px;");
        console.log("%c [AUTHOR]: GEMINI TITAN FORGE ", "color: #ff007b; font-weight: bold;");

    </script>
