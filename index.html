<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thiên Đường Của Vợ ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a373; /* Màu vàng hồng nhẹ */
            --accent: #ffb3c1;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* PHONG CẢNH THIÊN NHIÊN ĐÊM */
        #scene-container {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at bottom, #111 0%, #000 100%);
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--d) infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .shooting-star {
            position: absolute; width: 100px; height: 1px;
            background: linear-gradient(90deg, white, transparent);
            animation: shoot var(--t) linear infinite;
        }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translateX(-200px) translateY(200px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* MÀN HÌNH KHỞI ĐỘNG */
        #intro-overlay {
            position: fixed; inset: 0; background: #000;
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rose-main {
            font-size: 90px; filter: drop-shadow(0 0 25px var(--accent));
            animation: roseBreathe 3s ease-in-out infinite;
        }
        @keyframes roseBreathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* KHUNG ĐĂNG NHẬP */
        .glass-box {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 45px 30px;
            width: 90%; max-width: 380px; text-align: center;
            display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-family: 'Dancing Script', cursive; color: var(--accent); font-size: 2.8rem; margin-bottom: 30px; }

        .input-wrapper { position: relative; margin-bottom: 18px; }
        input {
            width: 100%; padding: 16px; border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05); color: #fff;
            outline: none; text-align: center; font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .toggle-eye {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            color: var(--accent); cursor: pointer; font-size: 20px; opacity: 0.7;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white; border: none; padding: 16px; width: 100%;
            border-radius: 18px; font-weight: 700; cursor: pointer;
            margin-top: 15px; font-size: 16px; box-shadow: 0 10px 20px rgba(255, 117, 140, 0.2);
        }

        /* NỘI DUNG CHÍNH */
        .menu-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 10px; border-radius: 20px; color: var(--accent);
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: 0.3s;
        }
        .menu-card:active { background: var(--accent); color: #000; }

        /* LOA ÂM THANH */
        #music-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 55px; height: 55px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: none; align-items: center;
            justify-content: center; font-size: 22px; cursor: pointer;
            border: 1px solid var(--glass); z-index: 100;
        }
    </style>
</head>
<body>

    <div id="scene-container"></div>

    <div id="intro-overlay" onclick="launchExperience()">
        <div class="rose-main">🌹</div>
        <p style="color: #fff; margin-top: 30px; letter-spacing: 5px; font-weight: 300; opacity: 0.6;">CHẠM ĐỂ BẮT ĐẦU</p>
    </div>

    <audio id="piano-bg" loop preload="auto">
        <source src="https://files.catbox.moe/kpkp67.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-box" id="login-box">
            <h2>Vợ Yêu ❤️</h2>
            <div class="input-wrapper">
                <input type="text" id="usr" placeholder="Tài khoản..." autocomplete="off">
            </div>
            <div class="input-wrapper">
                <input type="password" id="pwd" placeholder="Mật khẩu..." autocomplete="off">
                <span class="toggle-eye" onclick="viewPass()">👁️</span>
            </div>
            <button class="btn-confirm" onclick="unlock()">KHÁM PHÁ ✨</button>
            <p id="error-msg" style="color: #ff4d6d; font-size: 13px; display: none; margin-top: 15px;">Sai rồi nha vợ ơi! ❌</p>
        </div>

        <div class="glass-box" id="main-menu">
            <h2>Thiên Đường Của Em</h2>
            <div class="menu-list">
                <div class="menu-card">CHUYỆN QUÁ KHỨ</div>
                <div class="menu-card">CHUYỆN HIỆN TẠI</div>
                <div class="menu-card">LỜI HỨA TƯƠNG LAI</div>
                <div class="menu-card">LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <div id="music-toggle" onclick="controlMusic()">🔊</div>

    <script>
        const audio = document.getElementById('piano-bg');

        // KHỞI TẠO PHONG CẢNH
        function createStars() {
            const container = document.getElementById('scene-container');
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                container.appendChild(s);
            }
        }

        function createShootingStar() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.top = Math.random() * 50 + 'vh';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.setProperty('--t', (Math.random() * 2 + 3) + 's');
            document.getElementById('scene-container').appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }

        // ĐIỀU KHIỂN CHÍNH
        function launchExperience() {
            audio.play();
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('music-toggle').style.display = 'flex';
            }, 1000);
            createStars();
            setInterval(createShootingStar, 3000);
        }

        function viewPass() {
            const p = document.getElementById('pwd');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function unlock() {
            const u = document.getElementById('usr').value;
            const p = document.getElementById('pwd').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-menu').style.display = "block";
            } else {
                document.getElementById('error-msg').style.display = "block";
            }
        }

        function controlMusic() {
            if(audio.paused) {
                audio.play(); document.getElementById('music-toggle').innerText = "🔊";
            } else {
                audio.pause(); document.getElementById('music-toggle').innerText = "🔇";
            }
        }
    </script>
</body>
</html>
