<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Món Quà Cho Vợ Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4d6d;
            --fire: #ff8e72;
            --gold: #ffb703;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* FIX NỀN: ĐẢM BẢO KHÔNG BAO GIỜ ĐEN */
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Quicksand', sans-serif; 
            background: #f9d423; /* Màu nền dự phòng nếu ảnh lỗi */
        }

        .nature-bg {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1475924156731-da36b85e0272?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.8);
            transition: 2s ease-in-out;
        }

        .warm-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
            z-index: -1;
        }

        #firework-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* MÀN HÌNH CHỜ RỰC RỠ */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .intro-title {
            color: white; font-size: 2.5rem; font-weight: 800; letter-spacing: 5px;
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            animation: glow 1.5s infinite alternate;
        }
        .heart-icon { font-size: 100px; color: var(--primary); margin-top: 20px; animation: beat 0.8s infinite; }

        /* KHUNG KÍNH HIỆN ĐẠI */
        .glass-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 420px; padding: 40px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; text-align: center;
            display: none; z-index: 100; box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.8rem; margin-bottom: 30px; }

        /* INPUT BOX */
        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px 50px; border-radius: 20px; border: none;
            background: rgba(255, 255, 255, 0.9); font-weight: 700; outline: none; font-size: 16px;
        }
        .input-group i:first-child { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .eye-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #555; }

        .btn-burn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 65, 108, 0.5); transition: 0.3s;
        }
        .btn-burn:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* MENU GRID 4 MỤC */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item {
            background: rgba(255, 255, 255, 0.2); padding: 25px 10px; border-radius: 22px;
            color: #fff; font-size: 13px; font-weight: 800; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); transition: 0.4s;
        }
        .menu-item:hover { background: var(--primary); transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255, 77, 109, 0.4); }

        /* LOA NHẠC */
        #music-btn {
            position: fixed; top: 25px; right: 25px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: white; cursor: pointer; z-index: 1000; border: 2px solid #fff;
        }

        @keyframes glow { from { text-shadow: 0 0 10px #fff, 0 0 20px var(--primary); } to { text-shadow: 0 0 20px #fff, 0 0 40px #ff0040; } }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div class="nature-bg"></div>
    <div class="warm-overlay"></div>
    <canvas id="firework-canvas"></canvas>

    <div id="intro" onclick="startExperience()">
        <h1 class="intro-title">CHẠM ĐỂ SƯỚNG</h1>
        <div class="heart-icon"><i class="fas fa-heart"></i></div>
    </div>

    <div id="player"></div>

    <div id="music-btn" onclick="toggleMusic()">
        <i id="m-icon" class="fas fa-compact-disc fa-spin fa-2x"></i>
    </div>

    <div class="glass-card" id="login-card">
        <h2>Xin Chào Vợ ❤️</h2>
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="user" placeholder="TÊN ĐĂNG NHẬP">
        </div>
        <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="password" id="pass" placeholder="MẬT KHẨU">
            <i class="fas fa-eye eye-toggle" onclick="toggleP()"></i>
        </div>
        <button class="btn-burn" onclick="doLogin()">ĐĂNG NHẬP</button>
    </div>

    <div class="glass-card" id="menu-card">
        <h2>Hạnh Phúc Mãi Mãi</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="launchFireworks(5)">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-item" onclick="launchFireworks(5)">CHUYỆN HIỆN TẠI</div>
            <div class="menu-item" onclick="launchFireworks(5)">CHUYỆN TƯƠNG LAI</div>
            <div class="menu-item" onclick="alert('Anh hứa sẽ mãi yêu em!')">LỜI NHẮN NHỦ VÀ LỜI HỨA</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'iXaw-jwmjjA', // LINK BẠN GỬI
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function startExperience() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-card').style.display = 'block';
                document.getElementById('music-btn').style.display = 'flex';
                ytPlayer.unMute();
                ytPlayer.playVideo();
                launchFireworks(10);
            }, 1000);
        }

        function toggleP() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-card').style.display = 'none';
                document.getElementById('menu-card').style.display = 'block';
                launchFireworks(20);
            } else { alert("Sai rồi vợ ơi!"); }
        }

        let isPlaying = true;
        function toggleMusic() {
            const icon = document.getElementById('m-icon');
            if(isPlaying) { ytPlayer.pauseVideo(); icon.classList.remove('fa-spin'); }
            else { ytPlayer.playVideo(); icon.classList.add('fa-spin'); }
            isPlaying = !isPlaying;
        }

        // HỆ THỐNG PHÁO HOA RỰC LỬA CHÂN THỰC
        const canvas = document.getElementById('firework-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12;
                this.life = 1;
                this.gravity = 0.15;
            }
            update() {
                this.vx *= 0.98; this.vy *= 0.98;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.015;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fill();
                // Hiệu ứng phát sáng
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            }
        }

        function launchFireworks(num) {
            const colors = ['#ff4d6d', '#ffb703', '#00f2fe', '#fff', '#7cfc00'];
            for(let i=0; i<num; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.7;
                const color = colors[Math.floor(Math.random()*colors.length)];
                for(let j=0; j<80; j++) particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
