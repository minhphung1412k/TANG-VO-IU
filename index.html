    <style>
        /* HỆ THỐNG CSS CHI TIẾT - CRYSTAL UI FRAMEWORK 
           Mục tiêu: Tạo khung hình đa giác pha lê trong suốt
        */
        :root {
            --neon-pink: #ff2d55;
            --crystal-white: rgba(255, 255, 255, 0.15);
            --crystal-border: rgba(255, 255, 255, 0.3);
            --glow: 0 0 25px rgba(255, 45, 85, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* NỀN THÀNH PHỐ TĨNH */
        #city-bg {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: brightness(0.15) contrast(1.2) blur(1px);
            transform: scale(1.05); transition: 0.5s;
        }

        /* ENGINE PHÁO HOA */
        canvas#firework-engine { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* HIỆU ỨNG ÁNH SÁNG KHI NỔ */
        #flash-overlay {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            mix-blend-mode: overlay; opacity: 0; transition: 0.1s;
        }

        /* KHUNG ĐĂNG NHẬP PHA LÊ ĐA GIÁC (CRYSTAL AUTH) */
        .crystal-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 500px; padding: 60px 40px;
            background: rgba(0, 0, 0, 0.4); /* Độ trong suốt để thấy pháo hoa */
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            
            /* Tạo hình đa giác pha lê bằng clip-path */
            clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
            
            border: 1px solid var(--crystal-border);
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.1);
            z-index: 1000; text-align: center; opacity: 0; visibility: hidden;
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .crystal-panel::before {
            content: ''; position: absolute; inset: 0;
            border: 2px solid var(--neon-pink);
            clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; } 50% { opacity: 1; filter: drop-shadow(0 0 10px var(--neon-pink)); }
        }

        .crystal-panel.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .title-love {
            font-family: 'Dancing Script', cursive; color: #fff; font-size: 3.8rem;
            margin-bottom: 30px; text-shadow: var(--glow);
        }

        /* INPUT DESIGN */
        .input-container { position: relative; margin-bottom: 25px; }
        .input-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--neon-pink); }
