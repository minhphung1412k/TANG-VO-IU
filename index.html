<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff007b; --s: #00f2ff; --g: #ffd700; --v: #7000ff; --a: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* --- SIÊU GIAO DIỆN SẶC SỠ --- */
        .nebula-container {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%);
        }

        .aurora-card {
            width: 92%; max-width: 500px; padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid transparent;
            border-image: linear-gradient(45deg, var(--p), var(--s), var(--a), var(--v)) 1;
            border-radius: 50px; /* Note: Border-image overrides border-radius, using clip-path for shape */
            clip-path: inset(0 round 50px);
            backdrop-filter: blur(50px) saturate(250%); -webkit-backdrop-filter: blur(50px) saturate(250%);
            box-shadow: 0 0 150px rgba(255, 0, 123, 0.2);
            text-align: center; transition: 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .title-neon {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.6rem;
            margin-bottom: 50px; background: linear-gradient(90deg, #fff, var(--p), var(--s), var(--g), #fff);
            background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flowText 5s linear infinite; filter: drop-shadow(0 0 20px var(--p));
        }
        @keyframes flowText { to { background-position: 300% center; } }

        /* --- INPUTS & VỆ TINH CÔNG NGHỆ --- */
        .input-group { position: relative; margin-bottom: 40px; }
        .input-group input {
            width: 100%; padding: 25px 35px; padding-right: 80px;
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; color: #fff; font-size: 18px; font-weight: 500;
            transition: 0.6s; letter-spacing: 1px;
        }
        .input-group input:focus { 
            border-color: var(--a); transform: scale(1.02);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0,255,136,0.1);
        }

        .eye-satellite-v2 {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(0,0,0,0.8); border: 2px solid var(--s);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200; transition: 0.5s;
            box-shadow: 0 0 20px var(--s);
        }
        .eye-satellite-v2:hover { border-color: var(--p); box-shadow: 0 0 30px var(--p); transform: translateY(-50%) rotate(360deg) scale(1.1); }

        .btn-supreme {
            width: 100%; padding: 25px; border: none; border-radius: 30px;
            background: linear-gradient(45deg, var(--p), var(--v), var(--s), var(--a));
            background-size: 400% 400%; animation: gradientMove 8s infinite;
            color: #fff; font-weight: 900; letter-spacing: 7px; cursor: pointer;
            box-shadow: 0 20px 60px rgba(0, 242, 255, 0.4); transition: 0.5s;
        }
        @keyframes gradientMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .btn-supreme:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 40px 80px var(--v); }

        /* --- MENU ĐA CHIỀU (MULTI-DIMENSIONAL) --- */
        .nebula-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 35px; margin-top: 30px; }
        .nebula-node {
            background: rgba(255,255,255,0.02); padding: 50px 15px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.7s;
            position: relative; overflow: hidden;
        }
        .nebula-node:nth-child(1) { transform: rotate(-4deg) translateY(-20px); }
        .nebula-node:nth-child(2) { transform: rotate(4deg) translateY(20px); }
        .nebula-node:hover {
            background: rgba(255,255,255,0.1); transform: scale(1.2) rotate(0deg) !important;
            box-shadow: 0 0 60px var(--a); z-index: 10; border-color: var(--a);
        }
        .nebula-node i { font-size: 40px; margin-bottom: 20px; color: var(--g); display: block; filter: drop-shadow(0 0 15px var(--g)); }
        .nebula-node span { font-weight: 900; letter-spacing: 3px; font-size: 14px; }

        /* --- NÚT ÂM THANH HOLOGRAM --- */
        #audio-vip {
            position: fixed; top: 40px; left: 40px; z-index: 1000;
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(0,0,0,0.7); border: 2px solid var(--a);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 25px var(--a); transition: 0.4s;
        }
        .v-bars { display: flex; gap: 4px; align-items: flex-end; height: 25px; }
        .v-bars span { width: 4px; background: var(--a); animation: v-rise 0.8s infinite alternate; }
        @keyframes v-rise { from { height: 4px; } to { height: 25px; } }

        /* --- CỔNG KHAI HỎA (IGNITION GATE) --- */
        #gate-supreme {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .gate-icon { font-size: 120px; color: var(--p); animation: gate-pulse 1s infinite alternate; filter: drop-shadow(0 0 50px var(--p)); }
        @keyframes gate-pulse { from { transform: scale(1); filter: hue-rotate(0deg); } to { transform: scale(1.4); filter: hue-rotate(90deg); } }

        /* --- HIỆU ỨNG DIMENSION WARP --- */
        .dimension-warp { opacity: 0; transform: scale(10) rotate(45deg); filter: blur(100px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="gate-supreme" onclick="igniteNebula()">
        <i class="fa-solid fa-wand-magic-sparkles gate-icon"></i>
        <h2 style="margin-top: 50px; letter-spacing: 20px; font-weight: 300; color: #fff;">CHẠM ĐỂ SƯỚNG</h2>
    </div>

    <div id="audio-vip" onclick="controlAudio()">
        <div class="v-bars" id="v-on" style="display: none;">
            <span></span><span style="animation-delay: 0.2s"></span><span style="animation-delay: 0.4s"></span>
        </div>
        <i class="fa-solid fa-volume-xmark" id="v-off" style="color: var(--a); font-size: 20px;"></i>
    </div>

    <canvas id="nebula-canvas"></canvas>
    <div id="video-engine" style="position: absolute; visibility: hidden;"></div>

    <div class="nebula-container">
        <div class="aurora-card" id="card-login" style="display: none;">
            <h1 class="title-neon">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-group">
                <input type="text" id="u-name" placeholder="nhập tài khoản đi bây bi">
            </div>
            <div class="input-group">
                <input type="password" id="p-word" placeholder="nhập mật khẩu bé ưi">
                <div class="eye-satellite-v2" onclick="toggleSecret()">
                    <i class="fa-solid fa-eye" id="eye-v2"></i>
                </div>
            </div>
            <button class="btn-supreme" onclick="verify()">KHAI MỞ TRÁI TIM</button>
        </div>

        <div class="aurora-card" id="card-menu" style="display: none; opacity: 0; transform: scale(0.01) rotate(-180deg);">
            <h1 class="title-neon" style="font-size: 1.8rem;">VŨ TRỤ CỦA VÂN</h1>
            <div class="nebula-grid">
                <div class="nebula-node" onclick="superBlast(30)"><i class="fa-solid fa-cloud-moon"></i><span>KỈ NIỆM</span></div>
                <div class="nebula-node" onclick="superBlast(30)"><i class="fa-solid fa-sun-plant-wilt"></i><span>HIỆN TẠI</span></div>
                <div class="nebula-node" onclick="superBlast(30)"><i class="fa-solid fa-shuttle-space"></i><span>TƯƠNG LAI</span></div>
                <div class="nebula-node" onclick="deepLove()"><i class="fa-solid fa-heart-circle-bolt"></i><span>YÊU EM</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('nebula-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, player, isLive = false;
        let rockets = [], particles = [], skyscrapers = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            skyscrapers = [];
            for(let i=0; i<60; i++) {
                skyscrapers.push({
                    x: Math.random() * w,
                    w: 40 + Math.random() * 100,
                    h: 50 + Math.random() * (h * 0.5),
                    hue: Math.random() * 360,
                    lightPower: Math.random()
                });
            }
        }
        window.onresize = resize;

        class NebulaPart {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const ang = Math.random() * Math.PI * 2;
                const spd = Math.random() * 15 + 2;
                this.vx = Math.cos(ang) * spd;
                this.vy = Math.sin(ang) * spd;
                this.alpha = 1; this.decay = 0.005 + Math.random() * 0.01;
                this.size = Math.random() * 4 + 1;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.15; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, 7); ctx.fill(); ctx.restore();
            }
        }

        class SuperRocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.target = Math.random() * (h * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
            }
            update() {
                this.y -= 18;
                if(this.y <= this.target) {
                    for(let i=0; i<300; i++) particles.push(new NebulaPart(this.x, this.y, this.color));
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 30; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, 7); ctx.fill();
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('video-engine', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function controlAudio() {
            const on = document.getElementById('v-on');
            const off = document.getElementById('v-off');
            if(!isLive) {
                player.unMute(); player.playVideo(); isLive = true;
                on.style.display = 'flex'; off.style.display = 'none';
            } else {
                player.mute(); isLive = false;
                on.style.display = 'none'; off.style.display = 'block';
            }
        }

        function igniteNebula() {
            document.getElementById('gate-supreme').classList.add('dimension-warp');
            setTimeout(() => {
                document.getElementById('gate-supreme').style.display = 'none';
                document.getElementById('card-login').style.display = 'block';
                resize(); nebulaLoop();
                setInterval(() => { if(Math.random() < 0.3) rockets.push(new SuperRocket()); }, 500);
            }, 1200);
        }

        function verify() {
            const u = document.getElementById('u-name').value;
            const p = document.getElementById('p-word').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                const log = document.getElementById('card-login');
                log.style.transform = "scale(5) rotate(180deg)"; log.style.opacity = "0";
                setTimeout(() => {
                    log.style.display = 'none';
                    const menu = document.getElementById('card-menu');
                    menu.style.display = 'block';
                    setTimeout(() => { menu.style.opacity = "1"; menu.style.transform = "scale(1) rotate(0deg)"; }, 200);
                    superBlast(50);
                }, 1000);
            } else { alert("Chưa đúng rồi bây bi ơi! ❤️"); }
        }

        function toggleSecret() {
            const i = document.getElementById('p-word'), e = document.getElementById('eye-v2');
            i.type = i.type === 'password' ? 'text' : 'password';
            e.className = i.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }

        function superBlast(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new SuperRocket()), i*100); }
        function deepLove() { alert('Bình Minh yêu Thuý Vân nhất vũ trụ sặc sỡ này!'); superBlast(60); }

        function nebulaLoop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0,0,w,h);
            skyscrapers.forEach(s => {
                ctx.fillStyle = '#020205'; ctx.fillRect(s.x, h - s.h, s.w, s.h);
                // Hệ thống ánh sáng Neon đa sắc
                ctx.strokeStyle = `hsla(${s.hue}, 100%, 60%, 0.4)`; ctx.lineWidth = 2;
                ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${s.hue}, 100%, 50%)`;
                ctx.strokeRect(s.x, h - s.h, s.w, s.h);
                // Đèn cửa sổ lấp lánh
                if(Math.random() < 0.1) {
                    ctx.fillStyle = `hsla(${s.hue}, 100%, 80%, ${Math.random()})`;
                    ctx.fillRect(s.x + 10, h - s.h + 20, s.w - 20, 5);
                }
            });
            ctx.shadowBlur = 0;
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(nebulaLoop);
        }
    </script>
</body>
</html>
