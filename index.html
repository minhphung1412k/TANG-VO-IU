<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Thiên Nhiên ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background-color: #000; }

        /* PHONG CẢNH THIÊN NHIÊN HÙNG VĨ */
        .bg-nature {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            filter: brightness(0.7);
            z-index: -1;
            transition: transform 10s ease-in-out;
        }

        /* MÀN HÌNH CHỜ (BÔNG HỒNG) */
        #intro {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 1s ease;
        }
        .rose-icon { font-size: 80px; animation: glow 2s infinite; filter: drop-shadow(0 0 20px red); }
        @keyframes glow { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* KHUNG ĐĂNG NHẬP TRONG SUỐT */
        .glass-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 380px; padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px; text-align: center;
            display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
