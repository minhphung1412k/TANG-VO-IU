<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Vợ Yêu - Vườn Hồng Lãng Mạn ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-gold: #b76e79;
            --deep-pink: #ff4d6d;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* NỀN PHONG CẢNH HOA HỒNG */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            filter: blur(5px); transform: scale(1.1);
            animation: bgZoom 20s infinite alternate;
        }

        @keyframes bgZoom { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* MÀN HÌNH KHỞI ĐỘNG CỰC ĐẸP */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1.5s;
        }

        .rose-trigger {
            font-size: 100px; cursor: pointer;
            filter: drop-shadow(0 0 20px var(--deep-pink));
            animation: pulseRose 2s infinite;
        }

        @keyframes pulseRose { 
            0% { transform: scale(1) rotate(0); } 
            50% { transform: scale(1.2) rotate(10deg); } 
            100% { transform: scale(1) rotate(0); } 
        }

        /* KHUNG KÍNH TRONG SUỐT */
        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px; padding: 40px;
            width: 360px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none; z-index: 10;
        }

        h1 { font-family: 'Great Vibes', cursive; color: #fff; font-size: 3rem; text-shadow: 0 0 15px var(--deep-pink); }
