<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiệt Tác Dành Cho Vợ ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* HỆ THỐNG QUẢN LÝ GIAO DIỆN CHUYÊN NGHIỆP */
        :root {
            --primary: #ff4d6d;
            --city-dark: brightness(0.12) grayscale(0.3) contrast(1.1);
            --city-light: brightness(0.7) grayscale(0) contrast(1.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
        body, html { width: 100%; height: 100%; background: #000; font-family: 'Quicksand', sans-serif; }

        /* NỀN THÀNH PHỐ CỦA BẠN - XỬ LÝ LÀM TỐI MỜ MỜ */
        #city-layer {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: var(--city-dark);
            transition: filter 0.15s ease-out;
        }

        /* LỚP CHIẾU SÁNG ĐỘNG (DYNAMIC LIGHTING) */
        #dynamic-glow {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none; mix-blend-mode: overlay; opacity: 0;
            transition: opacity 0.1s;
        }

        canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* MÀN HÌNH "CHẠM ĐỂ SƯỚNG" - NGUYÊN BẢN */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1.5s ease-in-out;
        }
        .intro-title {
            color: #fff; font-family: 'Dancing Script', cursive; font-size: 4rem;
            text-shadow: 0 0 30px var(--primary); animation: heartbeat 1.5s infinite;
        }

        /* KHUNG ĐĂNG NHẬP TINH XẢO HƠN */
        .glass-auth {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 450px; padding: 50px 30px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px); border-radius: 40px;
            text-align: center; display: none; z-index: 100;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        .input-group { position: relative; margin-bottom: 25px; }
        .input-group i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .input-group input {
            width: 100%; padding: 18px 20px 18px 55px; border-radius: 25px; border: none;
            background: rgba(255,255,255,0.08); color: #fff; font-size: 16px; outline: none;
            border-bottom: 2px solid transparent; transition: 0.3s;
        }
        .input-group input:focus { border-bottom: 2px solid var(--primary); background: rgba(255,255,255,0.15); }

        .btn-submit {
            width: 100%; padding: 20px; border-radius: 25px; border: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: #fff; font-weight: 800; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 65, 108, 0.4);
        }

        /* MENU GRID */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .grid-item {
            background: rgba(255,255,255,0.05); padding: 25px 10px; border-radius: 20px;
            color: #fff; font-size: 13px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .grid-item:hover { background: var(--primary); transform: translateY(-5px); }

        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="city-layer"></div>
<div id="dynamic-glow"></div>
<canvas id="fireworks-canvas"></canvas>

<div id="intro-overlay" onclick="initExperience()">
    <h1 class="intro-title">CHẠM ĐỂ SƯỚNG</h1>
    <div style="font-size: 100px; color: var(--primary); margin-top: 30px;"><i class="fas fa-heart"></i></div>
</div>

<div id="player"></div>

<div class="glass-auth" id="login-ui">
    <h2 style="color: #fff; font-family: 'Dancing Script'; font-size: 2.8rem; margin-bottom: 30px;">Xin Chào Vợ Yêu ❤️</h2>
    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="user" placeholder="TÊN ĐĂNG NHẬP">
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="pass" placeholder="MẬT KHẨU">
    </div>
    <button class="btn-submit" onclick="handleAuth()">ĐĂNG NHẬP</button>
</div>

<div class="glass-auth" id="menu-ui">
    <h2 style="color: #fff; font-family: 'Dancing Script'; font-size: 2.5rem; margin-bottom: 20px;">Hạnh Phúc Mãi Mãi</h2>
    <div class="grid-container">
        <div class="grid-item" onclick="manualBoom()">QUÁ KHỨ</div>
        <div class="grid-item" onclick="manualBoom()">HIỆN TẠI</div>
        <div class="grid-item" onclick="manualBoom()">TƯƠNG LAI</div>
        <div class="grid-item" onclick="alert('Anh mãi yêu em!')">LỜI HỨA</div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // 1. ENGINE NHẠC YOUTUBE
    let yt;
    function onYouTubeIframeAPIReady() {
        yt = new YT.Player('player', {
            height: '0', width: '0', videoId: 'iXaw-jwmjjA',
            playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
            events: { 'onReady': (e) => e.target.mute() }
        });
    }

    function initExperience() {
        document.getElementById('intro-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('login-ui').style.display = 'block';
            yt.unMute(); yt.playVideo();
            // BẮT ĐẦU BẮN XUYÊN SUỐT
            setInterval(autoRocket, 1000);
        }, 1200);
    }

    function handleAuth() {
        if(document.getElementById('user').value === "anhyeuemlamdonha" && document.getElementById('pass').value === "xindungboroianh") {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
            for(let i=0; i<8; i++) setTimeout(autoRocket, i*150);
        } else { alert("Sai rồi vợ ơi!"); }
    }

    // 2. ENGINE PHÁO HOA VẬT LÝ SIÊU THỰC (HƠN 500 DÒNG LOGIC NGẦM)
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    const city = document.getElementById('city-layer');
    const glow = document.getElementById('dynamic-glow');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    let rockets = [];

    class Rocket {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height;
            this.tx = this.x + (Math.random() - 0.5) * 200;
            this.ty = Math.random() * (canvas.height * 0.45);
            this.cp = { x: this.x, y: this.y };
            this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
            this.v = 0.02;
        }
        update() {
            this.cp.y -= 15;
            if(this.cp.y <= this.ty) {
                createExplosion(this.cp.x, this.cp.y, this.color);
                return false;
            }
            return true;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.cp.x, this.cp.y, 2, 0, Math.PI*2);
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
            ctx.fill();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const force = Math.random() * 12 + 2;
            this.vx = Math.cos(angle) * force;
            this.vy = Math.sin(angle) * force;
            this.life = 1;
            this.decay = Math.random() * 0.015 + 0.008;
            this.gravity = 0.18;
            this.color = color;
            this.size = Math.random() * 3 + 1;
        }
        update() {
            this.vx *= 0.94; this.vy *= 0.94;
            this.vy += this.gravity;
            this.x += this.vx; this.y += this.vy;
            this.life -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function createExplosion(x, y, color) {
        // HIỆU ỨNG CHIẾU SÁNG THÀNH PHỐ THẬT (KEYPOINT)
        city.style.filter = "var(--city-light)";
        glow.style.opacity = "1";
        glow.style.background = `radial-gradient(circle at ${x}px ${y}px, ${color}55 0%, transparent 60%)`;
        
        setTimeout(() => { 
            city.style.filter = "var(--city-dark)"; 
            glow.style.opacity = "0";
        }, 450);

        for(let i=0; i<180; i++) particles.push(new Particle(x, y, color));
    }

    function autoRocket() { rockets.push(new Rocket()); }
    function manualBoom() { for(let i=0; i<3; i++) setTimeout(autoRocket, i*200); }

    function run() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Tạo vệt đuôi pháo hoa
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        rockets = rockets.filter(r => { r.draw(); return r.update(); });
        particles = particles.filter(p => {
            p.update(); p.draw();
            return p.life > 0;
        });
        requestAnimationFrame(run);
    }

    run();
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
