<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - KIỆT TÁC VĨNH CỬU</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #ff2d75; --s: #00e5ff; --g: #ffcf5e; --bg: #010103;
            --glass: rgba(255, 255, 255, 0.03);
            --neon: 0 0 20px rgba(255, 45, 117, 0.6), 0 0 40px rgba(255, 45, 117, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff;
        }

        /* --- PHẦN 1: GIẢ LẬP THÀNH PHỐ ĐÊM GIAO THỪA (CHỐNG LỖI NỀN ĐEN) --- */
        #city-viewport {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(to bottom, #020205 0%, #0a0a1a 100%);
            overflow: hidden;
        }

        /* Tự vẽ các tòa nhà bằng CSS để không bao giờ bị lỗi ảnh */
        .city-silhouettes {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(transparent 70%, rgba(10, 10, 30, 0.9) 100%),
                url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center 30%;
            opacity: 0.4; filter: contrast(1.5) brightness(0.5) blur(1px);
            z-index: 2; transform: scale(1.1);
        }

        /* Lớp sương mù và ánh sáng hắt từ đường phố */
        .ambient-fog {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 120%, rgba(255, 45, 117, 0.15) 0%, transparent 70%);
            z-index: 3; pointer-events: none;
        }

        canvas#fire-canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* --- PHẦN 2: MỞ ĐẦU HOÀNH TRÁNG (STORYTELLING INTRO) --- */
        #intro-stage {
            position: fixed; inset: 0; z-index: 9999999;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .intro-heart {
            width: 150px; height: 150px; position: relative;
            animation: heartPulse 1.5s infinite;
        }

        .intro-heart svg { fill: var(--p); filter: drop-shadow(0 0 30px var(--p)); }

        .intro-text {
            margin-top: 50px; text-align: center;
            letter-spacing: 12px; font-weight: 300; color: rgba(255,255,255,0.7);
            animation: textFade 3s infinite alternate;
        }

        @keyframes heartPulse { 0% { transform: scale(1); } 50% { transform: scale(1.2) rotate(5deg); } 100% { transform: scale(1); } }
        @keyframes textFade { from { opacity: 0.3; letter-spacing: 10px; } to { opacity: 1; letter-spacing: 18px; } }

        /* --- PHẦN 3: GIAO DIỆN KHÔNG VIỀN (MODERN GLASS) --- */
        .master-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; z-index: 1000; display: none;
        }

        .glass-box {
            background: rgba(10, 10, 20, 0.4);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 80px; padding: 70px 50px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            text-align: center; position: relative;
        }

        .glass-box::before {
            content: ''; position: absolute; inset: -2px; border-radius: 82px;
            background: linear-gradient(45deg, transparent, rgba(255, 45, 117, 0.3), transparent);
            z-index: -1; animation: rotateBorder 6s linear infinite;
        }

        @keyframes rotateBorder { to { transform: rotate(360deg); } }

        .main-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.8rem;
            background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 50px; text-shadow: var(--neon);
        }

        /* --- INPUT FIELD MODULE (FIXED ICON 100%) --- */
        .input-item {
            position: relative; margin-bottom: 35px;
            background: rgba(255,255,255,0.02);
            border-radius: 35px; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s;
        }

        .input-item:focus-within {
            background: rgba(255,255,255,0.08);
            border-color: var(--s);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        .icon-svg {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            width: 25px; height: 25px; fill: var(--p); filter: drop-shadow(0 0 8px var(--p));
        }

        .input-item input {
            width: 100%; padding: 25px 70px; background: transparent;
            border: none; color: #fff; font-size: 18px; letter-spacing: 1px;
        }

        .eye-icon {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            cursor: pointer; opacity: 0.5; width: 22px; fill: #fff;
        }

        /* --- NÚT ĐĂNG NHẬP VIP --- */
        .btn-supreme {
            width: 100%; padding: 25px; margin-top: 20px;
            background: linear-gradient(45deg, var(--p), #7000ff);
            border: none; border-radius: 35px; color: #fff;
            font-weight: 900; font-size: 1.2rem; letter-spacing: 6px;
            cursor: pointer; box-shadow: 0 15px 40px rgba(112, 0, 255, 0.4);
            transition: 0.5s;
        }

        .btn-supreme:hover { transform: translateY(-8px); box-shadow: 0 25px 60px var(--p); letter-spacing: 10px; }

        /* --- MỤC KỶ NIỆM (FLOATING GRID) --- */
        .menu-flow {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 25px; margin-top: 20px;
        }

        .menu-blob {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 20px; border-radius: 40px;
            cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .menu-blob:hover {
            background: var(--p); transform: translateY(-15px) rotate(3deg);
            box-shadow: 0 20px 50px var(--p);
        }

        .menu-blob svg { width: 45px; height: 45px; margin-bottom: 20px; fill: var(--g); filter: drop-shadow(0 0 10px var(--g)); }

        .menu-blob span { font-weight: 700; font-size: 16px; display: block; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        /* --- HỆ THỐNG ÂM THANH (PREMIUM CONTROLLER) --- */
        #audio-panel {
            position: fixed; bottom: 40px; right: 40px; z-index: 10000;
            display: none;
        }

        .audio-disk {
            width: 90px; height: 90px; border-radius: 50%;
            background: #000; border: 4px solid var(--p);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 30px var(--p);
            animation: spinDisk 4s linear infinite; animation-play-state: paused;
        }

        @keyframes spinDisk { to { transform: rotate(360deg); } }

        .audio-disk svg { width: 40px; fill: var(--p); }

        /* --- THÔNG BÁO --- */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: var(--p); padding: 22px 60px;
            border-radius: 100px; font-weight: 900; z-index: 1000000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #toast.show { top: 50px; }

    </style>
</head>
<body>

    <div id="city-viewport">
        <div class="city-silhouettes"></div>
        <div class="ambient-fog"></div>
    </div>

    <canvas id="fire-canvas"></canvas>

    <div id="toast">VỢ IU NHẬP SAI ÒI ĐÓ</div>

    <div id="intro-stage" onclick="startGenesis()">
        <div class="intro-heart">
            <svg viewBox="0 0 32 32"><path d="M16 28.5s-12-7-12-14.5c0-4 3-7 7-7 2.5 0 4.5 1.5 5 3.5.5-2 2.5-3.5 5-3.5 4 0 7 3 7 7 0 7.5-12 14.5-12 14.5z"/></svg>
        </div>
        <div class="intro-text">CHẠM VÀO TRÁI TIM</div>
        <div style="position: absolute; bottom: 50px; font-size: 12px; opacity: 0.4; letter-spacing: 5px;">MÓN QUÀ DÀNH CHO THUÝ VÂN</div>
    </div>

    <div id="audio-panel" onclick="handleMusic()">
        <div class="audio-disk" id="disk-ui">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5z"/></svg>
        </div>
    </div>
    <div id="yt-player-core"></div>

    <div class="master-ui" id="login-ui">
        <div class="glass-box">
            <h1 class="main-title">BÌNH MINH ❤️ THUÝ VÂN</h1>
            
            <div class="input-item">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="user-field" placeholder="Tài khoản của baby" autocomplete="off">
            </div>

            <div class="input-item">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="pass-field" placeholder="Mật khẩu của bé iu" autocomplete="off">
            </div>

            <button class="btn-supreme" onclick="accessHeart()">BẮT ĐẦU HÀNH TRÌNH</button>
        </div>
    </div>

    <div class="master-ui" id="menu-ui">
        <div class="glass-box">
            <h1 class="main-title" style="font-size: 2.2rem;">KHOẢNH KHẮC</h1>
            <div class="menu-flow">
                <div class="menu-blob" onclick="fireWorks(15)">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>Kỉ niệm</span>
                </div>
                <div class="menu-blob" onclick="fireWorks(15)">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l3.59-3.58L17 12l-5 5z"/></svg>
                    <span>Hiện tại</span>
                </div>
                <div class="menu-blob" onclick="fireWorks(15)">
                    <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                    <span>Tương lai</span>
                </div>
                <div class="menu-blob" onclick="surprise()">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.5 8.25l-5.5 5.5-5.5-5.5 1.41-1.41L12 12.44l4.09-4.09 1.41 1.41z"/></svg>
                    <span>Yêu em</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /**
         * ENGINE PERFECTION V200
         */
        const canvas = document.getElementById('fire-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        let w, h, player, isMuted = true;
        let rockets = [], particles = [];

        function initSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.onresize = initSize; initSize();

        // Engine hạt pháo hoa cinematic
        class Particle {
            constructor(x, y, color, angle, speed) {
                this.x = x; this.y = y; this.color = color;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.01 + 0.005;
                this.gravity = 0.12; this.friction = 0.96;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity; this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * (w * 0.8) + (w * 0.1);
                this.y = h; this.targetY = Math.random() * (h * 0.4) + 100;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.velocity = -Math.random() * 4 - 12;
            }
            update() {
                this.y += this.velocity; this.velocity += 0.1;
                if(this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            explode() {
                // Hiệu ứng Flash hắt sáng vào thành phố
                const fog = document.querySelector('.ambient-fog');
                fog.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}55 0%, transparent 70%)`;
                setTimeout(() => fog.style.background = `radial-gradient(circle at 50% 120%, rgba(255, 45, 117, 0.15) 0%, transparent 70%)`, 300);

                for(let i=0; i<200; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 10 + 2;
                    particles.push(new Particle(this.x, this.y, this.color, angle, speed));
                }
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player-core', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function handleMusic() {
            const disk = document.getElementById('disk-ui');
            if(isMuted) {
                player.unMute(); player.playVideo();
                disk.style.animationPlayState = 'running'; isMuted = false;
            } else {
                player.mute(); disk.style.animationPlayState = 'paused'; isMuted = true;
            }
        }

        function accessHeart() {
            const u = document.getElementById('user-field').value;
            const p = document.getElementById('pass-field').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
                fireWorks(20);
            } else {
                const toast = document.getElementById('toast');
                toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000);
            }
        }

        function startGenesis() {
            const intro = document.getElementById('intro-stage');
            intro.style.opacity = '0'; intro.style.transform = 'scale(1.5)';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('login-ui').style.display = 'block';
                document.getElementById('audio-panel').style.display = 'block';
                handleMusic();
                setInterval(() => { if(Math.random() < 0.15) rockets.push(new Rocket()); }, 1000);
            }, 1500);
        }

        function fireWorks(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i * 250); }
        function surprise() { alert('Thuý Vân à, em là ngôi sao sáng nhất trong lòng anh!'); fireWorks(40); }

        function render() {
            ctx.fillStyle = 'rgba(1, 1, 3, 0.2)';
            ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
