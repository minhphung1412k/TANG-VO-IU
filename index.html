<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - BẢN 82 SUPREME</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff007b; --s: #00f2ff; --g: #ffd700; --v: #7000ff; --blur: blur(25px); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        /* --- SIÊU NỀN TẢNG ĐỒ HỌA --- */
        #main-canvas { position: fixed; inset: 0; z-index: 1; filter: contrast(1.2) brightness(1.1); }

        /* --- GIAO DIỆN PHÁ CÁCH (ASYMMETRIC) --- */
        .universe-ui {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        .crystal-card {
            width: 95%; max-width: 480px; padding: 50px 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px 15px 60px 15px; 
            backdrop-filter: var(--blur) saturate(200%); -webkit-backdrop-filter: var(--blur) saturate(200%);
            box-shadow: 0 0 100px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.05);
            text-align: center; transition: all 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .title-glitch {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.3rem;
            margin-bottom: 40px; background: linear-gradient(45deg, #fff, var(--p), var(--s));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--p)); animation: flow 5s infinite;
        }
        @keyframes flow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* --- INPUTS SIÊU CẤP & EYE ISOLATION --- */
        .input-orbit { position: relative; margin-bottom: 30px; }
        .input-orbit input {
            width: 100%; padding: 22px 30px; padding-right: 70px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px; color: #fff; font-size: 16px; font-weight: 500;
            transition: 0.5s; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .input-orbit input:focus {
            border-color: var(--s); transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        /* VỆ TINH CON MẮT - TÁCH BIỆT HOÀN TOÀN */
        .eye-satellite {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--p);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 200; transition: 0.4s;
            box-shadow: 0 0 15px var(--p);
        }
        .eye-satellite:hover { transform: translateY(-50%) rotate(180deg) scale(1.1); background: var(--p); }
        .eye-satellite i { color: #fff; font-size: 18px; }

        .btn-supreme {
            width: 100%; padding: 22px; border: none; border-radius: 25px;
            background: linear-gradient(45deg, var(--p), var(--v), var(--s));
            background-size: 300% 300%; animation: gradient 4s infinite;
            color: #fff; font-weight: 900; letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 20px 50px rgba(255,0,123,0.4); transition: 0.5s;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- MENU CHÒM SAO (CONSTELLATION) --- */
        .menu-constellation { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .node {
            background: rgba(255,255,255,0.03); padding: 40px 10px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.6s;
            position: relative; overflow: hidden;
        }
        /* Phá vỡ sự ngay ngắn */
        .node:nth-child(1) { transform: translateY(-15px) rotate(-3deg); }
        .node:nth-child(2) { transform: translateY(15px) rotate(3deg); }
        .node:nth-child(3) { transform: translateY(-5px) rotate(2deg); }
        .node:nth-child(4) { transform: translateY(20px) rotate(-2deg); }

        .node:hover {
            background: var(--p); transform: scale(1.1) rotate(0deg) !important;
            box-shadow: 0 0 50px var(--p); z-index: 10;
        }
        .node i { font-size: 35px; margin-bottom: 15px; color: var(--g); display: block; }
        .node span { font-weight: 800; font-size: 14px; letter-spacing: 2px; }

        /* --- CỔNG KHỞI ĐẦU --- */
        #gate {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .gate-pulse { font-size: 80px; color: var(--p); animation: pulseHeart 1.2s infinite; filter: drop-shadow(0 0 30px var(--p)); }
        @keyframes pulseHeart { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } }

        /* --- HIỆU ỨNG CHUYỂN CẢNH SIÊU CẤP --- */
        .warp-speed { opacity: 0; transform: scale(5) rotate(10deg); filter: blur(50px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="gate" onclick="ignite()">
        <i class="fa-solid fa-heart-pulse gate-pulse"></i>
        <h2 style="margin-top: 40px; letter-spacing: 15px; font-weight: 300; color: rgba(255,255,255,0.4);">CHẠM ĐỂ SƯỚNG</h2>
    </div>

    <canvas id="main-canvas"></canvas>
    <div id="yt-wrap" style="position: absolute; visibility: hidden;"></div>

    <div class="universe-ui">
        <div class="crystal-card" id="form-login" style="display: none;">
            <h1 class="title-glitch">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-orbit">
                <input type="text" id="user" placeholder="nhập tài khoản đi bây bi">
            </div>
            <div class="input-orbit">
                <input type="password" id="pass" placeholder="nhập mật khẩu bé ưi">
                <div class="eye-satellite" onclick="toggleView()">
                    <i class="fa-solid fa-eye" id="eye-icon"></i>
                </div>
            </div>
            <button class="btn-supreme" onclick="access()">TRUY CẬP TRÁI TIM</button>
        </div>

        <div class="crystal-card" id="form-menu" style="display: none; opacity: 0; transform: scale(0.1);">
            <h1 class="title-glitch" style="font-size: 1.8rem;">GỬI THUÝ VÂN</h1>
            <div class="menu-constellation">
                <div class="node" onclick="fire(20)"><i class="fa-solid fa-gem"></i><span>KỈ NIỆM</span></div>
                <div class="node" onclick="fire(20)"><i class="fa-solid fa-fire-alt"></i><span>HIỆN TẠI</span></div>
                <div class="node" onclick="fire(20)"><i class="fa-solid fa-infinity"></i><span>TƯƠNG LAI</span></div>
                <div class="node" onclick="surprise()"><i class="fa-solid fa-heart"></i><span>YÊU EM</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, player, particles = [], rockets = [], buildings = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            initWorld();
        }
        window.onresize = resize;

        function initWorld() {
            buildings = [];
            for(let i=0; i<50; i++) {
                buildings.push({
                    x: Math.random() * w,
                    w: 40 + Math.random() * 80,
                    h: Math.random() * (h * 0.45) + 50,
                    hue: Math.random() > 0.5 ? 330 : 190,
                    win: Array.from({length: 15}, () => Math.random() > 0.7)
                });
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.01 + 0.005;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color; ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.target = Math.random() * (h * 0.5);
                this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
            }
            update() {
                this.y -= 10;
                if(this.y <= this.target) {
                    for(let i=0; i<150; i++) particles.push(new Particle(this.x, this.y, this.color));
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, 7); ctx.fill();
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-wrap', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function ignite() {
            document.getElementById('gate').classList.add('warp-speed');
            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('form-login').style.display = 'block';
                player.unMute(); player.playVideo();
                resize(); loop();
                setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 600);
            }, 1000);
        }

        function access() {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                const fl = document.getElementById('form-login');
                fl.style.transform = "scale(0) rotate(720deg)"; fl.style.opacity = "0";
                setTimeout(() => {
                    fl.style.display = 'none';
                    const fm = document.getElementById('form-menu');
                    fm.style.display = 'block';
                    setTimeout(() => { fm.style.opacity = "1"; fm.style.transform = "scale(1)"; }, 100);
                    fire(30);
                }, 1000);
            } else { alert("Chưa đúng rồi bây bi ơi! ❤️"); }
        }

        function toggleView() {
            const inp = document.getElementById('pass'), ic = document.getElementById('eye-icon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            ic.className = inp.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }

        function fire(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function surprise() { alert('Bình Minh sẽ mãi mãi yêu Thuý Vân!'); fire(40); }

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0,0,w,h);
            buildings.forEach(b => {
                ctx.fillStyle = '#05050a'; ctx.fillRect(b.x, h - b.h, b.w, b.h);
                ctx.strokeStyle = `hsl(${b.hue}, 100%, 50%)`; ctx.lineWidth = 1;
                ctx.strokeRect(b.x, h - b.h, b.w, b.h);
                // Windows reflection
                b.win.forEach((wnd, i) => {
                    if(wnd && Math.random() > 0.1) {
                        ctx.fillStyle = `hsla(${b.hue}, 100%, 70%, ${Math.random()})`;
                        ctx.fillRect(b.x + (i%3)*20 + 10, h - b.h + Math.floor(i/3)*30 + 20, 10, 10);
                    }
                });
            });
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
