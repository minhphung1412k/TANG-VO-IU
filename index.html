<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vườn Hạnh Phúc ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4d6d;
            --gold: #ffb703;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background: #000; }

        /* HÌNH NỀN THIÊN NHIÊN HOÀNG HÔN */
        .bg-container {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            z-index: -2;
            transition: 2s filter ease;
        }

        .overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle, rgba(255,183,197,0.1) 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        /* CANVAS CHO PHÁO HOA VÀ HOA RƠI */
        #main-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* INTRO MÀN HÌNH CHỜ */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .heart-glow {
            font-size: 100px; color: var(--primary);
            filter: drop-shadow(0 0 30px var(--primary));
            animation: pulse 1s infinite;
        }

        /* KHUNG KÍNH (GLASSMORPHISM) */
        .card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 90%; max-width: 420px; padding: 40px 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; text-align: center; opacity: 0;
            display: none; transition: 0.8s all; z-index: 100;
        }
        .card.active { opacity: 1; transform: translate(-50%, -50%) scale(1); display: block; }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 0 15px rgba(255,255,255,0.5); }

        /* INPUT VÀ ICON MẮT */
        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 16px 45px; border-radius: 20px; border: none;
            background: rgba(255, 255, 255, 0.85); font-weight: 700; font-size: 15px; outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-group i:first-child { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 18px; }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #555; padding: 5px; }

        .btn-glow {
            width: 100%; padding: 16px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, #ff4d6d, #ff8e72);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5);
            transition: 0.3s;
        }
        .btn-glow:hover { transform: translateY(-3px) scale(1.02); }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item {
            background: rgba(255, 255, 255, 0.15); padding: 25px 10px; border-radius: 25px;
            color: #fff; font-size: 13px; font-weight: bold; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); transition: 0.4s;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
        .menu-item:hover { background: var(--primary); transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255, 77, 109, 0.4); }

        /* ĐIỀU KHIỂN NHẠC */
        #music-btn {
            position: fixed; top: 25px; right: 25px; width: 55px; height: 55px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: white;
