<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thành Phố Tình Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Quicksand', sans-serif; }

        /* LAYER 1: ẢNH GỐC CỦA BẠN (ĐÃ LÀM TỐI) */
        #city-layer {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: brightness(0.15) contrast(1.2); /* Tối mờ mờ như ý bạn */
            transition: filter 0.1s ease;
        }

        /* LAYER 2: LỚP PHỦ ÁNH SÁNG KHI PHÁO HOA NỔ */
        #light-mask {
            position: fixed; inset: 0; z-index: 2;
            background: radial-gradient(circle at center, rgba(255,255,255,0) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none; mix-blend-mode: overlay;
        }

        canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* GIAO DIỆN "CHẠM ĐỂ SƯỚNG" */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1.5s;
        }
        .text-glow {
            color: #fff; font-size: 3rem; font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 20px #ff4d6d, 0 0 40px #ff4d6d;
            animation: pulse 1.5s infinite;
        }

        /* KHUNG ĐĂNG NHẬP CAO CẤP */
        .glass-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 420px; padding: 45px 30px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 40px;
            text-align: center; display: none; z-index: 100;
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.3);
        }

        .input-item { position: relative; margin-bottom: 25px; }
        input {
            width: 100%; padding: 18px 55px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: #fff; font-weight: 700; outline: none;
        }
        .input-item i:first-child { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #ff4d6d; }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, #ff4d6d, #ff8e72);
            color: #fff; font-weight: 800; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5);
        }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .menu-btn {
            background: rgba(255,255,255,0.1); padding: 25px 10px; border-radius: 20px;
            color: #fff; font-size: 13px; font-weight: 700; border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="city-layer"></div>
    <div id="light-mask"></div>
    <canvas id="canvas"></canvas>

    <div id="intro" onclick="startApp()">
        <h1 class="text-glow">CHẠM ĐỂ SƯỚNG</h1>
        <i class="fas fa-heart" style="font-size: 80px; color: #ff4d6d; margin-top: 20px;"></i>
    </div>

    <div id="player"></div>

    <div class="glass-box" id="login-form">
        <h2 style="color: #fff; font-family: 'Dancing Script'; font-size: 3rem; margin-bottom: 30px;">Vợ Yêu ❤️</h2>
        <div class="input-item">
            <i class="fas fa-user"></i>
            <input type="text" id="u" placeholder="TÊN ĐĂNG NHẬP">
        </div>
        <div class="input-item">
            <i class="fas fa-lock"></i>
            <input type="password" id="p" placeholder="MẬT KHẨU">
        </div>
        <button class="btn-action" onclick="login()">ĐĂNG NHẬP</button>
    </div>

    <div class="glass-box" id="menu-form">
        <h2 style="color: #fff; font-family: 'Dancing Script'; font-size: 2.5rem; margin-bottom: 25px;">Mãi Bên Nhau Em Nhé</h2>
        <div class="menu-grid">
            <div class="menu-btn" onclick="fireworkAuto()">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-btn" onclick="fireworkAuto()">CHUYỆN HIỆN TẠI</div>
            <div class="menu-btn" onclick="fireworkAuto()">CHUYỆN TƯƠNG LAI</div>
            <div class="menu-btn" onclick="alert('Anh sẽ mãi là điểm tựa của em!')">LỜI NHẮN NHỦ</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function startApp() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-form').style.display = 'block';
                ytPlayer.unMute(); ytPlayer.playVideo();
                setInterval(fireworkAuto, 1500); // Bắn pháo hoa xuyên suốt từ đầu
            }, 1000);
        }

        function login() {
            if(document.getElementById('u').value === "anhyeuemlamdonha" && document.getElementById('p').value === "xindungboroianh") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('menu-form').style.display = 'block';
                fireworkAuto(); fireworkAuto();
            } else { alert("Sai rồi cục cưng!"); }
        }

        // HỆ THỐNG PHÁO HOA VÀ ÁNH SÁNG THÀNH PHỐ SIÊU THẬT
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-layer');
        const mask = document.getElementById('light-mask');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let rockets = [];

        class Rocket {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.v = Math.random() * 8 + 12;
                this.targetY = Math.random() * (canvas.height * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            update() {
                this.y -= this.v;
                if(this.y <= this.targetY) {
                    explode(this.x, this.y, this.color);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
            }
        }

        function explode(x, y, color) {
            // LÀM SÁNG THÀNH PHỐ TẠI ĐIỂM NỔ
            city.style.filter = "brightness(0.8) contrast(1.5)";
            mask.style.background = `radial-gradient(circle at ${x}px ${y}px, ${color}33 0%, rgba(0,0,0,0) 50%)`;
            
            setTimeout(() => { 
                city.style.filter = "brightness(0.15) contrast(1.2)"; 
                mask.style.background = "none";
            }, 500);

            for(let i=0; i<100; i++) {
                particles.push({
                    x, y
