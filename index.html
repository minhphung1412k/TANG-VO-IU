<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #ff2d75; --s: #00e5ff; --g: #ffcf5e; --dark: #050508;
            --glass: rgba(15, 15, 25, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body, html { 
            width: 100%; height: 100%; background: var(--dark); 
            overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff;
        }

        /* --- SIÊU ĐỒ HỌA THÀNH PHỐ VÀ PHÁO HOA --- */
        #master-viewport {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%);
        }

        .city-layer {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }

        .buildings {
            position: absolute; bottom: 0; width: 100%; height: 45%;
            background: 
                linear-gradient(90deg, transparent 2%, #0a0a15 2%, #0a0a15 12%, transparent 12%),
                linear-gradient(90deg, transparent 20%, #0f0f20 20%, #0f0f20 35%, transparent 35%),
                linear-gradient(90deg, transparent 45%, #050510 45%, #050510 60%, transparent 60%),
                linear-gradient(90deg, transparent 75%, #0d0d1a 75%, #0d0d1a 90%, transparent 90%);
            filter: blur(0.5px); opacity: 0.9;
        }

        .windows-glow {
            position: absolute; bottom: 0; width: 100%; height: 45%;
            background-image: radial-gradient(circle, var(--g) 1px, transparent 1px);
            background-size: 25px 35px; opacity: 0.3; animation: flicker 4s infinite;
        }
        @keyframes flicker { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }

        canvas#fire-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* --- INTRO SANG TRỌNG --- */
        #intro-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .heart-svg {
            width: 120px; fill: var(--p); filter: drop-shadow(0 0 40px var(--p));
            animation: beat 1.2s infinite;
        }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        /* --- GIAO DIỆN CHÍNH (FIXED) --- */
        .ui-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; z-index: 100; display: none;
            animation: floating 5s ease-in-out infinite;
        }
        @keyframes floating { 0%, 100% { transform: translate(-50%, -51%); } 50% { transform: translate(-50%, -49%); } }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 40px; padding: 50px 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center;
        }

        .main-h1 {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem;
            margin-bottom: 40px; color: #fff; text-shadow: 0 0 15px var(--p);
        }

        /* --- INPUTS & SVG ICONS --- */
        .input-box { position: relative; margin-bottom: 25px; }
        
        .input-box svg.lead-icon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; fill: var(--p);
        }

        .input-box input {
            width: 100%; padding: 20px 55px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            color: #fff; font-size: 16px; transition: 0.3s;
        }
        .input-box input:focus { border-color: var(--s); background: rgba(255,255,255,0.1); }

        .eye-icon {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            cursor: pointer; width: 22px; height: 22px; fill: rgba(255,255,255,0.5); z-index: 10;
        }

        .btn-main {
            width: 100%; padding: 20px; background: linear-gradient(45deg, var(--p), #7000ff);
            border: none; border-radius: 15px; color: #fff; font-weight: 800;
            letter-spacing: 3px; cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--p); }

        /* --- MENU BỐ CỤC MỚI --- */
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;
        }
        .menu-btn {
            background: rgba(255,255,255,0.05); padding: 25px 10px; border-radius: 20px;
            cursor: pointer; transition: 0.4s; border: 1px solid rgba(255,255,255,0.05);
        }
        .menu-btn:hover { background: var(--p); transform: translateY(-5px); }
        .menu-btn svg { width: 30px; fill: var(--g); margin-bottom: 10px; }
        .menu-btn span { display: block; font-weight: 700; font-size: 14px; }

        /* --- NHẠC --- */
        #music-trigger {
            position: fixed; top: 30px; right: 30px; z-index: 1000; display: none;
        }
        .music-btn {
            width: 60px; height: 60px; border-radius: 50%; background: #000;
            border: 2px solid var(--p); display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px var(--p);
        }
        .music-btn svg { width: 25px; fill: var(--p); }

        #notif {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: var(--p); padding: 15px 40px; border-radius: 50px;
            font-weight: 800; z-index: 1000000; transition: 0.5s;
        }
        #notif.active { top: 30px; }
    </style>
</head>
<body>

    <div id="master-viewport">
        <div class="city-layer"><div class="buildings"></div><div class="windows-glow"></div></div>
    </div>
    <canvas id="fire-canvas"></canvas>
    <div id="notif">VỢ IU NHẬP SAI ÒI ĐÓ</div>

    <div id="intro-screen" onclick="initApp()">
        <svg class="heart-svg" viewBox="0 0 32 32"><path d="M16 28.5s-12-7-12-14.5c0-4 3-7 7-7 2.5 0 4.5 1.5 5 3.5.5-2 2.5-3.5 5-3.5 4 0 7 3 7 7 0 7.5-12 14.5-12 14.5z"/></svg>
        <h2 style="margin-top: 30px; letter-spacing: 10px; font-weight: 300;">CHẠM ĐỂ MỞ</h2>
    </div>

    <div id="music-trigger" onclick="toggleMusic()">
        <div class="music-btn" id="m-ui"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
    </div>
    <div id="yt-player"></div>

    <div class="ui-center" id="login-ui">
        <div class="glass-card">
            <h1 class="main-h1">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-box">
                <svg class="lead-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="user" placeholder="Nhập tài khoản">
            </div>
            <div class="input-box">
                <svg class="lead-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="pass" placeholder="Nhập mật khẩu">
                <svg class="eye-icon" onclick="showHide()" viewBox="0 0 24 24">
                    <path id="eye-path" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </div>
            <button class="btn-main" onclick="login()">ĐĂNG NHẬP VÀO TRÁI TIM</button>
        </div>
    </div>

    <div class="ui-center" id="menu-ui">
        <div class="glass-card">
            <h1 class="main-h1" style="font-size: 1.8rem;">GỬI THUÝ VÂN</h1>
            <div class="menu-grid">
                <div class="menu-btn" onclick="blast(15)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>Kỉ niệm</span></div>
                <div class="menu-btn" onclick="blast(15)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span>Hiện tại</span></div>
                <div class="menu-btn" onclick="blast(15)"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span>Tương lai</span></div>
                <div class="menu-btn" onclick="surprise()"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Yêu em</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fire-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, player, playing = false;
        let rockets = [], particles = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, 7); ctx.fill(); ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.5);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.vel = -Math.random() * 4 - 10;
            }
            update() {
                this.y += this.vel;
                if(this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            explode() { for(let i=0; i<80; i++) particles.push(new Particle(this.x, this.y, this.color)); }
            draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 7); ctx.fill(); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleMusic() {
            const m = document.getElementById('m-ui');
            if(playing) { player.mute(); m.style.opacity = "0.5"; playing = false; }
            else { player.unMute(); player.playVideo(); m.style.opacity = "1"; playing = true; }
        }

        function showHide() {
            const p = document.getElementById('pass');
            const path = document.getElementById('eye-path');
            if(p.type === 'password') {
                p.type = 'text';
                path.setAttribute('d', 'M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3-3zM12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z');
            } else {
                p.type = 'password';
                path.setAttribute('d', 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z');
            }
        }

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
                blast(20);
            } else {
                const n = document.getElementById('notif');
                n.classList.add('active'); setTimeout(() => n.classList.remove('active'), 3000);
            }
        }

        function initApp() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('login-ui').style.display = 'block';
                document.getElementById('music-trigger').style.display = 'block';
                toggleMusic();
                setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 800);
            }, 1000);
        }

        function blast(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*250); }
        function surprise() { alert('Bình Minh yêu Thuý Vân nhất trên đời!'); blast(30); }

        function loop() {
            ctx.fillStyle = 'rgba(5, 5, 8, 0.25)';
            ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
