<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Vợ Yêu - Thiên Đường Ánh Sáng ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff0077;
            --secondary-color: #00f2ff;
            --bg-gradient: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        /* NỀN ĐA SẮC CHUYỂN ĐỘNG NHƯ DẢI LỤA */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #ff3366, #ff00cc, #3333ff, #00ffff);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            filter: blur(50px); opacity: 0.7; z-index: -1;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* MÀN HÌNH CHÀO MỪNG */
        #intro-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1s forwards;
        }

        .diamond-heart {
            font-size: 80px; cursor: pointer;
            filter: drop-shadow(0 0 20px var(--primary-color));
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); filter: drop-shadow(0 0 40px var(--primary-color)); }
            100% { transform: scale(1); }
        }

        /* KHUNG KÍNH PHÁT SÁNG */
        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px; padding: 40px;
            width: 360px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none; animation: slideUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { 
            font-family: 'Dancing Script', cursive; 
            color: #fff; text-shadow: 0 0 15px var(--primary-color);
            margin-bottom: 30px;
        }

        /* Ô NHẬP HIỆN ĐẠI */
        .input-group { margin-bottom: 25px; position: relative; }
        input {
            width: 100%; padding: 15px; border-radius: 20px; border: none;
            background: rgba(255, 255, 255, 0.9); outline: none;
            font-size: 16px; font-weight: bold; color: #333;
            box-sizing: border-box; transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        input:focus { transform: scale(1.05); box-shadow: 0 0 20px var(--secondary-color); }

        /* NÚT BẤM NEON XỊN XÒ */
        .btn-neon {
            background: linear-gradient(90deg, #ff0077, #7a00ff);
            color: #fff; padding: 15px 40px; border-radius: 50px;
            border: none; font-size: 1.1rem; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 119, 0.5);
            transition: 0.4s; width: 100%;
        }
        .btn-neon:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 0 40px var(--primary-color);
            letter-spacing: 2px;
        }

        /* MENU RỰC RỠ */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px 10px; border-radius: 20px;
            color: #fff; border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .menu-item:hover { background: #fff; color: var(--primary-color); transform: rotate(3deg); }

        /* LOA VÀ SÓNG NHẠC */
        #music-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 2000;
            display: none; align-items: center;
        }
        #music-btn {
            width: 65px; height: 65px; background: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; box-shadow: 0 0 25px var(--primary-color);
        }
        .wave {
            width: 4px; height: 20px; background: #fff; margin: 0 2px;
            animation: waveAnim 1s ease-in-out infinite; display: none;
        }
        @keyframes waveAnim { 0%, 100% { height: 10px; } 50% { height: 35px; } }

        /* HIỆU ỨNG HẠT LẤP LÁNH */
        .sparkle {
            position: absolute; pointer-events: none;
            animation: floatUp linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div id="intro-overlay">
        <div class="diamond-heart" onclick="startAll()">💎</div>
        <p style="color: #fff; margin-top: 20px; letter-spacing: 2px; font-weight: bold;">NHẤN VÀO VIÊN KIM CƯƠNG ĐỂ BẮT ĐẦU ❤️</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/97a06z.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-box" id="login-card">
        <h1>Vợ Yêu Đăng Nhập ❤️</h1>
        <div class="input-group">
            <input type="text" id="user" placeholder
