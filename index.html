<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Vợ Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* NỀN THIÊN NHIÊN HUYỀN ẢO */
        #bg-effect {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1a0a0c 0%, #000 100%);
        }
        
        .aurora {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle, rgba(255,105,180,0.05) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MÀN HÌNH CHỜ HOA HỒNG */
        #intro {
            position: fixed; inset: 0; background: #000;
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: opacity 1.2s ease-in-out;
        }
        .rose-icon {
            font-size: 100px; filter: drop-shadow(0 0 30px #ff4d6d);
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* BOX ĐĂNG NHẬP SANG TRỌNG */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px; padding: 40px 25px;
            width: 90%; max-width: 360px; text-align: center;
            display: none; box-shadow: 0 0 50px rgba(0,0,0,0.6);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #ffb3c1; font-size: 2.5rem; margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 18px; }
        input {
            width: 100%; padding: 16px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: white;
            outline: none; text-align: center; font-size: 16px;
        }
        .eye-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: #ffb3c1; cursor: pointer; font-size: 20px;
        }

        .btn-glow {
            background: linear-gradient(45deg, #ff4d6d, #c9184a);
            color: white; border: none; padding: 16px; width: 100%;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        /* HIỆU ỨNG ĐOM ĐÓM RỰC RỠ */
        .firefly {
            position: absolute; border-radius: 50%; pointer-events: none;
            animation: move linear infinite;
        }
        @keyframes move {
            0% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(100px, -100vh); opacity: 0; }
        }

        /* MENU MỤC NỘI DUNG */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .menu-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,179,193,0.3);
            padding: 20px 10px; border-radius: 18px; color: #ffb3c1;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="bg-effect"><div class="aurora"></div></div>

    <div id="intro" onclick="startApp()">
        <div class="rose-icon">🌹</div>
        <p style="color: white; margin-top: 20px; letter-spacing: 4px; font-weight: 300; opacity: 0.7;">CHẠM ĐỂ KHỞI ĐẦU</p>
    </div>

    <audio id="piano-audio" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-card" id="login-card">
            <h2>Vợ Yêu ❤️</h2>
            <div class="input-group">
                <input type="text" id="u" placeholder="Tài khoản..." autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="p" placeholder="Mật khẩu..." autocomplete="off">
                <span class="eye-icon" onclick="toggleView()">👁️</span>
            </div>
            <button class="btn-glow" onclick="go()">MỞ QUÀ ✨</button>
            <p id="err" style="color: #ff4d6d; font-size: 13px; display: none; margin-top: 10px;">Sai rồi nha vợ ơi! ❌</p>
        </div>

        <div class="glass-card" id="main-content">
            <h2>Dành Cho Em ❤️</h2>
            <div class="menu-grid">
                <div class="menu-btn">CHUYỆN QUÁ KHỨ</div>
                <div class="menu-btn">CHUYỆN HIỆN TẠI</div>
                <div class="menu-btn">HỨA HẸN TƯƠNG LAI</div>
                <div class="menu-btn">LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('piano-audio');

        function startApp() {
            // Fix âm thanh cho Safari/iPhone
            audio.play().catch(() => {
                console.log("Audio waiting for interaction");
            });
            
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-card').style.display = 'block';
            }, 1200);

            setInterval(createFirefly, 300);
        }

        function toggleView() {
            const p = document.getElementById('p');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function go() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(user === "anhyeuemlamdonha" && pass === "xindungboroianh") {
                document.getElementById('login-card').style.display = "none";
                document.getElementById('main-content').style.display = "block";
            } else {
                document.getElementById('err').style.display = "block";
            }
        }

        function createFirefly() {
            const f = document.createElement('div');
            f.className = 'firefly';
            const size = Math.random() * 4 + 2;
            f.style.width = size + "px";
            f.style.height = size + "px";
            const colors = ['#ffb3c1', '#ff4d6d', '#fff', '#ffd700'];
            f.style.background = colors[Math.floor(Math.random()*colors.length)];
            f.style.left = Math.random() * 100 + "vw";
            f.style.top = "100vh";
            f.style.boxShadow = `0 0 10px ${f.style.background}`;
            f.style.animationDuration = Math.random() * 5 + 5 + "s";
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 8000);
        }
    </script>
</body>
</html>
