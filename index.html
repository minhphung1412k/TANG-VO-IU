<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Món Quà Vô Giá ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --fire: #ff4d00;
            --gold: #ffb703;
            --heart: #ff0040;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* NỀN THIÊN NHIÊN HOÀNG HÔN (GRADIENT ẤM ÁP KHÔNG LO BỊ ĐEN) */
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Quicksand', sans-serif; 
            background: linear-gradient(to bottom, #ff8e72, #ff4e50, #1a1a1a);
        }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; }
        #firework-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* INTRO */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1.5s; cursor: pointer;
        }
        .big-heart {
            font-size: 120px; color: var(--heart);
            filter: drop-shadow(0 0 50px var(--heart));
            animation: pulse 0.8s infinite;
        }

        /* CARD GIAO DIỆN */
        .card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 420px; padding: 40px 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 35px; text-align: center;
            display: none; z-index: 100; color: white;
            box-shadow: 0 0 30px rgba(255, 77, 0, 0.3);
        }

        h2 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; margin-bottom: 25px; color: #fff; text-shadow: 0 0 20px var(--gold); }

        /* INPUT BOX */
        .input-box { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px 50px; border-radius: 20px; border: none;
            background: rgba(255, 255, 255, 0.95); color: #000; font-weight: 700; font-size: 16px; outline: none;
        }
        .input-box i:first-child { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--fire); }
        .eye-toggle { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #444; padding: 5px; }

        .btn-burn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 65, 108, 0.6);
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-burn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* MENU 4 MỤC */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item {
            background: rgba(255, 255, 255, 0.2); padding: 25px 10px; border-radius: 20px;
            color: #fff; font-size: 14px; font-weight: 900; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3); transition: 0.4s;
        }
        .menu-item:hover { background: var(--fire); box-shadow: 0 0 25px var(--fire); transform: translateY(-10px); }

        /* ĐIỀU KHIỂN NHẠC */
        #music-btn {
            position: fixed; top: 25px; right: 25px; width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.2); border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            color: white; cursor: pointer; z-index: 10000; border: 2px solid #fff;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="firework-canvas"></canvas>

    <div id="intro" onclick="startApp()">
        <div class="big-heart"><i class="fas fa-heart"></i></div>
        <p style="color: white; margin-top: 30px; letter-spacing: 5px; font-weight: 700; text-align: center;">CHẠM ĐỂ THẮP SÁNG TÌNH YÊU</p>
    </div>

    <div id="player"></div>
    <div id="music-btn" onclick="toggleMusic()">
        <i id="m-icon" class="fas fa-compact-disc fa-spin fa-2x"></i>
    </div>

    <div class="card" id="login-card">
        <h2>Vợ Yêu ❤️</h2>
        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" id="user" placeholder="TÊN ĐĂNG NHẬP">
        </div>
        <div class="input-box">
            <i class="fas fa-key"></i>
            <input type="password" id="pass" placeholder="MẬT KHẨU">
            <i class="fas fa-eye eye-toggle" onclick="togglePass()"></i>
        </div>
        <button class="btn-burn" onclick="login()">ĐĂNG NHẬP</button>
    </div>

    <div
