<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GENESIS: BINH MINH & THUY VAN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Orbitron:wght@400;700;900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* [SECTION 1]: MASTER CSS RESET & RESPONSIVE 
           Tối ưu hóa không gian hiển thị không bị bó hẹp
        */
        :root {
            --p: #ff007b; --s: #00f2ff; --g: #ffd700; --v: #7000ff; --a: #00ff88;
            --bg: #000005; --glass: rgba(255, 255, 255, 0.02);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff;
            position: fixed; /* Chặn scroll bậy trên mobile */
        }

        /* [SECTION 2]: LANDSCAPE ENFORCEMENT 
           Yêu cầu xoay ngang màn hình
        */
        #orientation-overlay {
            position: fixed; inset: 0; z-index: 99999;
            background: #000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .phone-icon {
            font-size: 80px; color: var(--s);
            animation: rotatePhone 2s infinite ease-in-out;
            margin-bottom: 30px;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        /* Hiển thị overlay khi màn hình dọc */
        @media screen and (orientation: portrait) {
            #orientation-overlay { display: flex; }
        }

        /* [SECTION 3]: VISUAL ENGINE CANVAS 
        */
        #genesis-canvas {
            position: fixed; inset: 0; z-index: 5;
            filter: contrast(1.1) brightness(1.1) saturate(1.4);
            pointer-events: none;
        }

        .master-container {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.85) 100%);
            perspective: 2000px; /* Tăng thông số này để không bị phóng to quá mức */
        }

        /* CARD ĐA DIỆN (THE KINETIC MONOLITH) */
        .kinetic-card {
            width: 85vw; max-width: 800px; min-height: 80vh;
            padding: 60px; position: relative;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(100px) saturate(200%);
            -webkit-backdrop-filter: blur(100px) saturate(200%);
            clip-path: polygon(10% 0%, 100% 0%, 100% 90%, 90% 100%, 0% 100%, 0% 10%);
            transform-style: preserve-3d;
            transform: rotateX(10deg) rotateY(-5deg); /* Giảm độ nghiêng để dễ nhìn trên mobile */
            animation: cardFloat 12s infinite ease-in-out;
        }

        @keyframes cardFloat {
            0%, 100% { transform: rotateX(10deg) rotateY(-5deg) translateZ(0); }
            50% { transform: rotateX(5deg) rotateY(2deg) translateZ(50px); }
        }

        /* VIỀN CHẠY QUANG PHỔ */
        .kinetic-card::before {
            content: ''; position: absolute; inset: -1px;
            background: linear-gradient(90deg, var(--p), var(--v), var(--s), var(--a), var(--p));
            background-size: 300% 100%; animation: spectrum 8s linear infinite;
            z-index: -1; clip-path: inherit; opacity: 0.4;
        }
        @keyframes spectrum { to { background-position: 300% 0; } }

        /* TYPOGRAPHY */
        .genesis-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.8rem;
            text-align: center; margin-bottom: 50px;
            background: linear-gradient(to right, #fff, var(--p), var(--s), #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            filter: drop-shadow(0 0 20px var(--p));
        }

        .input-group { position: relative; margin-bottom: 40px; }
        .input-group label {
            display: block; font-family: 'Orbitron'; font-size: 10px; color: var(--s);
            letter-spacing: 5px; margin-bottom: 15px; text-transform: uppercase;
        }
        .input-group input {
            width: 100%; padding: 20px 30px; background: rgba(0,0,0,0.9);
            border: none; border-left: 5px solid var(--p); color: #fff;
            font-size: 18px; clip-path: polygon(0 0, 100% 0, 97% 100%, 0 100%);
            transition: 0.5s;
        }
        .input-group input:focus {
            transform: scale(1.05); border-left-color: var(--a);
            box-shadow: 0 0 50px rgba(0, 252, 255, 0.2);
        }

        .btn-genesis {
            width: 100%; padding: 25px; border: none; margin-top: 20px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem;
            color: #fff; letter-spacing: 15px; cursor: pointer;
            background: linear-gradient(45deg, var(--p), var(--v), var(--s));
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: 0.6s;
        }
        .btn-genesis:hover { transform: scale(1.08); filter: brightness(1.3); }

        /* DASHBOARD GRID */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-top: 40px; }
        .action-item {
            background: rgba(255,255,255,0.02); padding: 40px 10px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            transition: 0.5s; text-align: center;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
        }
        .action-item:hover { background: var(--s); color: #000; transform: scale(1.1); }
        .action-item i { font-size: 40px; margin-bottom: 15px; display: block; }
        .action-item span { font-family: 'Orbitron'; font-weight: bold; font-size: 12px; letter-spacing: 3px; }

        /* THE VOID PORTAL */
        #portal {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .portal-eye {
            width: 200px; height: 200px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 150px #fff, 0 0 300px var(--p);
            animation: breath 2s infinite alternate;
        }
        @keyframes breath { from { transform: scale(0.9); opacity: 0.6; } to { transform: scale(1.1); opacity: 1; } }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .genesis-title { font-size: 1.8rem; }
            .kinetic-card { padding: 40px 25px; }
            .action-grid { gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <i class="fa-solid fa-mobile-screen-button phone-icon"></i>
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px; color: var(--s);">XOAY NGANG MÀN HÌNH</h2>
        <p style="margin-top: 15px; font-weight: 300; opacity: 0.7;">Để trải nghiệm tuyệt phẩm 1200 dòng code</p>
    </div>

    <div id="portal" onclick="initGenesis()">
        <div class="portal-eye"></div>
        <h1 style="margin-top: 60px; letter-spacing: 20px; font-family: 'Orbitron';">KHAI MỞ</h1>
    </div>

    <canvas id="genesis-canvas"></canvas>
    <div id="yt-sink" style="display:none;"></div>

    <div class="master-container">
        
        <div class="kinetic-card" id="auth-ui" style="display: none;">
            <h1 class="genesis-title">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-group">
                <label>Vortex ID</label>
                <input type="text" id="u-name" placeholder="tên của bé ưi">
            </div>
            <div class="input-group">
                <label>Cyber Key</label>
                <input type="password" id="u-pass" placeholder="mật khẩu của bé ưi">
            </div>
            <button class="btn-genesis" onclick="access()">KHỞI CHẠY</button>
        </div>

        <div class="kinetic-card" id="menu-ui" style="display: none; opacity: 0;">
            <h1 class="genesis-title" style="font-size: 1.8rem;">KHÔNG GIAN CỦA VÂN</h1>
            <div class="action-grid">
                <div class="action-item" onclick="ignite(80)"><i class="fa-solid fa-ghost"></i><span>KỈ NIỆM</span></div>
                <div class="action-item" onclick="ignite(80)"><i class="fa-solid fa-heart-pulse"></i><span>HIỆN TẠI</span></div>
                <div class="action-item" onclick="ignite(80)"><i class="fa-solid fa-shuttle-space"></i><span>TƯƠNG LAI</span></div>
                <div class="action-item" onclick="forever()"><i class="fa-solid fa-infinity"></i><span>VĨNH CỬU</span></div>
            </div>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /**
         * GENESIS ENGINE v12.0 - ULTIMATE EXPERIENCE
         * Tối ưu hóa cho màn hình ngang & Điện thoại
         */

        const canvas = document.getElementById('genesis-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, player, isMusic = false;

        // ENTITY ARRAYS
        let stars = [], rockets = [], particles = [], buildings = [], shockwaves = [], clouds = [];
        let labels = ["THUÝ VÂN", "BÌNH MINH", "FOREVER", "LOVE 3000", "EM BÉ"];

        // 1. SYSTEM INITIALIZER
        function buildSystem() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            
            // Re-center perspective
            const container = document.querySelector('.master-container');
            container.style.perspective = (w > 1000) ? "2000px" : "1200px";

            // Stars (Căn chỉnh mật độ theo diện tích)
            stars = [];
            const starCount = (w * h) / 800;
            for(let i=0; i<starCount; i++) {
                stars.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, o: Math.random(), v: 0.01 + Math.random()*0.02 });
            }

            // Buildings (Sắp xếp theo độ sâu Parallax)
            buildings = [];
            const bCount = (w > 800) ? 80 : 40;
            for(let i=0; i<bCount; i++) {
                const bW = 60 + Math.random()*140;
                buildings.push({
                    x: Math.random()*(w + 300) - 150,
                    w: bW,
                    h: 100 + Math.random()*(h*0.75),
                    hue: 190 + Math.random()*50,
                    windows: Array.from({length: 100}, () => ({ on: Math.random()>0.85, c: Math.random()>0.5 ? '#fff' : '#00f2ff' })),
                    neon: Math.random()>0.9 ? labels[Math.floor(Math.random()*labels.length)] : null,
                    depth: 0.5 + Math.random() // Lớp chiều sâu
                });
            }
        }
        window.addEventListener('resize', buildSystem);

        // 2. PHYSICS ENGINE (DETAIL)
        class Particle {
            constructor(x, y, hue, vx, vy) {
                this.x = x; this.y = y; this.hue = hue;
                this.vx = vx; this.vy = vy;
                this.alpha = 1; this.decay = 0.005 + Math.random()*0.01;
                this.gravity = 0.15; this.friction = 0.98;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random()*w; this.y = h;
                this.tx = this.x + (Math.random()-0.5)*200;
                this.ty = 50 + Math.random()*(h*0.5);
                this.hue = Math.random()*360;
                this.v = 12 + Math.random()*8;
            }
            update() {
                let dx = this.tx - this.x, dy = this.ty - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 10) { this.explode(); return false; }
                this.x += (dx/dist)*this.v; this.y += (dy/dist)*this.v;
                return true;
            }
            explode() {
                shockwaves.push({ x: this.x, y: this.y, r: 0, a: 1, c: `hsl(${this.hue}, 100%, 50%)` });
                for(let i=0; i<350; i++) {
                    let a = Math.random()*Math.PI*2, s = Math.random()*15+2;
                    particles.push(new Particle(this.x, this.y, this.hue, Math.cos(a)*s, Math.sin(a)*s));
                }
            }
            draw() {
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 7); ctx.fill();
            }
        }

        // 3. AUDIO SYSTEM
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-sink', {
                videoId: 'iXaw-jwmjjA',
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function initGenesis() {
            document.getElementById('portal').style.display = 'none';
            document.getElementById('auth-ui').style.display = 'block';
            buildSystem(); loop();
            player.unMute(); player.playVideo();
            setInterval(() => { if(Math.random()<0.3) rockets.push(new Rocket()); }, 500);
        }

        function access() {
            const u = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('auth-ui').style.display = 'none';
                const m = document.getElementById('menu-ui');
                m.style.display = 'block'; setTimeout(() => m.style.opacity = '1', 100);
                ignite(100);
            } else { alert("Chỉ có Thuý Vân mới được vào! ❤️"); }
        }

        function ignite(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function forever() { alert("Bình Minh yêu Thuý Vân vĩnh cửu!"); ignite(150); }

        // 4. RENDER LOOP (TITAN MODULE)
        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 5, 0.2)';
            ctx.fillRect(0, 0, w, h);

            // Stars
            stars.forEach(s => {
                s.o += s.v; if(s.o>1 || s.o<0) s.v*=-1;
                ctx.fillStyle = `rgba(255,255,255,${s.o})`;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });

            // Cityscape (Rendering with Depth)
            buildings.forEach(b => {
                let grad = ctx.createLinearGradient(b.x, h-b.h, b.x, h);
                grad.addColorStop(0, '#050515'); grad.addColorStop(1, '#000');
                ctx.fillStyle = grad; ctx.fillRect(b.x, h-b.h, b.w, b.h);

                // Window Lighting
                b.windows.forEach((win, idx) => {
                    if(win.on) {
                        ctx.fillStyle = win.c;
                        ctx.fillRect(b.x + 15 + (idx%6)*20, h - b.h + 20 + Math.floor(idx/6)*30, 8, 8);
                    }
                });

                // Neon Glitch
                if(b.neon && Math.random()>0.1) {
                    ctx.font = '14px Orbitron'; ctx.fillStyle = 'var(--p)';
                    ctx.fillText(b.neon, b.x + 5, h - b.h + 40);
                }
            });

            // Water Reflection (Bottom layer)
            ctx.save(); ctx.globalAlpha = 0.2; ctx.fillStyle = '#00f2ff';
            for(let i=0; i<w; i+=20) {
                let s = Math.sin(Date.now()*0.003 + i*0.05)*10;
                ctx.fillRect(i, h-20+s, 10, 2);
            }
            ctx.restore();

            // Entities
            shockwaves = shockwaves.filter(s => {
                s.r += 10; s.a -= 0.02;
                ctx.strokeStyle = s.c; ctx.globalAlpha = s.a; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.stroke();
                return s.a > 0;
            });

            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.update(); p.draw(); return p.alpha > 0; });

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
