<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SINGULARITY - BÌNH MINH & THUÝ VÂN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff007b; --s: #00f2ff; --g: #ffd700; --v: #7000ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; height: 100vh; width: 100vw; }

        /* --- PHÔNG NỀN THÀNH PHỐ SIÊU THỰC --- */
        #render-canvas { position: fixed; inset: 0; z-index: 1; filter: contrast(1.1) brightness(1.1); }

        /* --- GIAO DIỆN ĐA CHIỀU (CRYSTAL UI) --- */
        .hyper-wrapper {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            perspective: 2000px;
        }

        .diamond-card {
            width: 90%; max-width: 450px; padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Bố cục độc lạ: Cắt vát 3D */
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow: 0 0 80px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.05);
            transform: rotateX(5deg) rotateY(-5deg);
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardFloat 6s infinite ease-in-out;
        }
        @keyframes cardFloat { 0%, 100% { transform: translateY(0) rotateX(5deg); } 50% { transform: translateY(-20px) rotateX(-2deg); } }

        .glitch-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem; margin-bottom: 40px;
            background: linear-gradient(90deg, #fff, var(--p), var(--s), #fff);
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flow 3s infinite linear; filter: drop-shadow(0 0 15px var(--p));
        }
        @keyframes flow { to { background-position: 200% center; } }

        /* --- INPUTS PHÁ CÁCH --- */
        .input-hex { position: relative; margin-bottom: 30px; transform: skewX(-10deg); }
        .input-hex input {
            width: 100%; padding: 20px 25px; padding-right: 70px;
            background: rgba(0,0,0,0.8); border: 1px solid var(--s);
            color: #fff; font-size: 16px; border-radius: 5px; transition: 0.4s;
        }
        .input-hex input:focus { box-shadow: 0 0 30px var(--s); transform: scale(1.05); }

        /* VỆ TINH MẮT 3D - KHÔNG DÍNH CHỮ */
        .eye-drone {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%) skewX(10deg);
            width: 45px; height: 45px; border-radius: 12px;
            background: var(--p); display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 20px var(--p); transition: 0.3s;
        }
        .eye-drone:hover { filter: hue-rotate(90deg); transform: translateY(-50%) scale(1.2); }

        .btn-warp {
            width: 100%; padding: 22px; border: none; transform: skewX(-10deg);
            background: linear-gradient(45deg, var(--p), var(--v));
            color: #fff; font-weight: 900; letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 15px 40px rgba(255,0,123,0.4); transition: 0.4s;
        }
        .btn-warp:hover { transform: skewX(-10deg) translateY(-5px); box-shadow: 0 25px 50px var(--p); }

        /* --- NÚT ÂM THANH NEON --- */
        #audio-engine {
            position: fixed; top: 30px; right: 30px; z-index: 1000;
            width: 60px; height: 60px; border: 2px solid var(--s); border-radius: 15px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: rgba(0,0,0,0.5); box-shadow: 0 0 20px var(--s);
        }
        .bar { width: 4px; background: var(--s); margin: 0 2px; animation: pulse 0.5s infinite alternate; display: none; }
        @keyframes pulse { from { height: 5px; } to { height: 25px; } }

        /* --- GATE KỈ NGUYÊN --- */
        #blackhole-gate {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .core { width: 100px; height: 100px; background: #fff; border-radius: 50%; box-shadow: 0 0 100px #fff, 0 0 200px var(--p); animation: coreBreath 2s infinite; }
        @keyframes coreBreath { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.5); opacity: 1; } }

        /* --- MENU ĐỘC LẠ (NON-LINEAR) --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .menu-item {
            background: rgba(255,255,255,0.03); padding: 40px 10px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            cursor: pointer; transition: 0.5s; position: relative;
        }
        .menu-item:nth-child(1) { transform: rotate(-10deg) translateY(-20px); }
        .menu-item:nth-child(2) { transform: rotate(10deg) translateY(10px); }
        .menu-item:hover { background: var(--s); color: #000; transform: rotate(0) scale(1.1) !important; z-index: 10; }
        .menu-item i { font-size: 30px; margin-bottom: 15px; display: block; color: var(--g); }
    </style>
</head>
<body>

    <div id="blackhole-gate" onclick="ignite()">
        <div class="core"></div>
        <h2 style="color:#fff; margin-top: 50px; letter-spacing: 15px;">CHẠM ĐỂ SƯỚNG</h2>
    </div>

    <div id="audio-engine" onclick="toggleMute()">
        <div id="bars" style="display:flex; align-items:flex-end;">
            <div class="bar"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.4s"></div>
        </div>
        <i id="mute-icon" class="fa-solid fa-volume-xmark" style="color:var(--s)"></i>
    </div>

    <canvas id="render-canvas"></canvas>
    <div id="yt-player" style="position: absolute; visibility: hidden;"></div>

    <div class="hyper-wrapper">
        <div class="diamond-card" id="login-screen" style="display: none;">
            <h1 class="glitch-title">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-hex">
                <input type="text" id="user" placeholder="nhập tài khoản đi bây bi">
            </div>
            <div class="input-hex">
                <input type="password" id="pass" placeholder="nhập mật khẩu bé ưi">
                <div class="eye-drone" onclick="togglePass()">
                    <i id="e-icon" class="fa-solid fa-eye"></i>
                </div>
            </div>
            <button class="btn-warp" onclick="launch()">TRUY CẬP</button>
        </div>

        <div class="diamond-card" id="menu-screen" style="display: none; opacity: 0;">
            <h1 class="glitch-title" style="font-size: 1.5rem;">VŨ TRỤ KỈ NIỆM</h1>
            <div class="menu-grid">
                <div class="menu-item" onclick="fire(30)"><i class="fa-solid fa-ghost"></i><span>QUÁ KHỨ</span></div>
                <div class="menu-item" onclick="fire(30)"><i class="fa-solid fa-heart"></i><span>HIỆN TẠI</span></div>
                <div class="menu-item" onclick="fire(30)"><i class="fa-solid fa-rocket"></i><span>TƯƠNG LAI</span></div>
                <div class="menu-item" onclick="alert('Yêu Thuý Vân nhất!')"><i class="fa-solid fa-infinity"></i><span>VĨNH CỬU</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, player, rockets = [], particles = [], buildings = [], isMuted = true;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            buildings = [];
            for(let i=0; i<50; i++) {
                buildings.push({
                    x: Math.random() * w,
                    w: 60 + Math.random() * 100,
                    h: 100 + Math.random() * (h * 0.6),
                    shade: Math.random() * 20 + 5,
                    windows: Array.from({length: 30}, () => Math.random() > 0.8)
                });
            }
        }
        window.onresize = init;

        class Particle {
            constructor(x, y, color, vx, vy) {
                this.x = x; this.y = y; this.color = color;
                this.vx = vx; this.vy = vy;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, 7); ctx.fill();
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.alpha -= this.decay; }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.5);
                this.hue = Math.random() * 360;
            }
            draw() {
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, 7); ctx.fill();
            }
            update() {
                this.y -= 10;
                if(this.y <= this.targetY) {
                    for(let i=0; i<150; i++) {
                        const arg = Math.random() * Math.PI * 2;
                        const spd = Math.random() * 8 + 2;
                        particles.push(new Particle(this.x, this.y, `hsl(${this.hue}, 100%, 70%)`, Math.cos(arg)*spd, Math.sin(arg)*spd));
                    }
                    return false;
                }
                return true;
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleMute() {
            isMuted = !isMuted;
            if(isMuted) { player.mute(); document.querySelectorAll('.bar').forEach(b => b.style.display='none'); document.getElementById('mute-icon').style.display='block'; }
            else { player.unMute(); document.querySelectorAll('.bar').forEach(b => b.style.display='block'); document.getElementById('mute-icon').style.display='none'; }
        }

        function ignite() {
            document.getElementById('blackhole-gate').style.transform = "scale(0) rotate(720deg)";
            document.getElementById('blackhole-gate').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('blackhole-gate').style.display = 'none';
                document.getElementById('login-screen').style.display = 'block';
                init(); loop();
                setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 600);
            }, 1000);
        }

        function launch() {
            if(document.getElementById('user').value === "thuyvanchithuongbminh" && document.getElementById('pass').value === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-screen').style.transform = "scale(0) rotateY(180deg)";
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    const ms = document.getElementById('menu-screen');
                    ms.style.display = 'block'; setTimeout(() => ms.style.opacity = "1", 100);
                    fire(40);
                }, 800);
            } else alert("Sai rồi bây bi!");
        }

        function togglePass() {
            const p = document.getElementById('pass'); p.type = p.type === 'password' ? 'text' : 'password';
        }

        function fire(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0,0,w,h);
            
            // Vẽ tòa nhà Realism
            buildings.forEach(b => {
                let grad = ctx.createLinearGradient(b.x, h - b.h, b.x + b.w, h);
                grad.addColorStop(0, '#0a0a15'); grad.addColorStop(1, '#020205');
                ctx.fillStyle = grad; ctx.fillRect(b.x, h - b.h, b.w, b.h);
                
                // Ánh sáng hắt từ pháo hoa (Light Bounce)
                rockets.forEach(r => {
                    let dist = Math.abs(r.x - b.x);
                    if(dist < 200) {
                        ctx.fillStyle = `hsla(${r.hue}, 100%, 50%, ${0.1 * (1 - dist/200)})`;
                        ctx.fillRect(b.x, h - b.h, b.w, b.h);
                    }
                });

                b.windows.forEach((win, i) => {
                    if(win) {
                        ctx.fillStyle = Math.random() > 0.9 ? '#fff' : '#f1c40f';
                        ctx.shadowBlur = 5; ctx.shadowColor = ctx.fillStyle;
                        ctx.fillRect(b.x + (i%4)*15 + 10, h - b.h + Math.floor(i/4)*25 + 20, 8, 8);
                    }
                });
                ctx.shadowBlur = 0;
            });

            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
