<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thiên Đường Của Vợ - Tuyệt Tác Tình Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-color: #ff4500;
            --rose-color: #ff0055;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Montserrat', sans-serif;
        }

        /* NỀN THIÊN NHIÊN RỰC RỠ & ĐỘNG */
        #universe {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1a0005 0%, #000 100%);
        }

        .aurora-glow {
            position: absolute; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--rose-color), transparent, #00f, transparent);
            opacity: 0.1; animation: rotateAurora 20s linear infinite;
        }
        @keyframes rotateAurora { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MÀN HÌNH KHỞI ĐỘNG CHÁY RỰC */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1.5s;
        }
        .main-rose {
            font-size: 120px; filter: drop-shadow(0 0 50px var(--rose-color));
            animation: burn 2s ease-in-out infinite alternate;
        }
        @keyframes burn { 
            from { transform: scale(1) rotate(-5deg); filter: drop-shadow(0 0 20px var(--rose-color)); }
            to { transform: scale(1.2) rotate(5deg); filter: drop-shadow(0 0 60px var(--fire-color)); }
        }

        /* KHUNG ĐĂNG NHẬP RỰC LỬA */
        .fire-box {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid transparent;
            border-image: linear-gradient(to bottom right, var(--fire-color), var(--rose-color), var(--gold)) 1;
            border-radius: 5px; /* Để linear gradient border hoạt động */
            padding: 40px; width: 90%; max-width: 400px;
            text-align: center; display: none; position: relative;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.3);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 3rem; margin-bottom: 30px; text-shadow: 0 0 20px var(--rose-color); }

        /* INPUT VÀ NÚT BẤM */
        .input-group { position: relative; margin-bottom: 25px; }
        input {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
            border: none; border-bottom: 2px solid var(--rose-color);
            color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--gold); background: rgba(255,255,255,0.1); }
        
        .eye-toggle { position: absolute; right: 15px; top: 18px; color: var(--gold); cursor: pointer; font-size: 20px; }

        .btn-fire {
            background: linear-gradient(45deg, var(--fire-color), var(--rose-color));
            color: #fff; border: none; padding: 20px; width: 100%;
            border-radius: 50px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.5);
            animation: buttonGlow 2s infinite;
        }
        @keyframes buttonGlow { 0%, 100% { box-shadow: 0 0 10px var(--fire-color); } 50% { box-shadow: 0 0 30px var(--rose-color); } }

        /* HIỆU ỨNG BAY QUA BAY LẠI */
        .sparkle {
            position: absolute; pointer-events: none;
            background: white; border-radius: 50%;
            animation: fly linear forwards;
        }
        @keyframes fly {
            0% { transform: scale(0) translate(0, 0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1) translate(var(--x), var(--y)); opacity: 0; }
        }

        /* MENU MỤC NỘI DUNG */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px; }
        .menu-item {
            background: rgba(255,255,255,0.05); border-left: 5px solid var(--gold);
            padding: 20px; color: #fff; font-weight: 600; cursor: pointer;
            transition: 0.3s; text-align: left;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); transform: translateX(10px); }

        /* NÚT LOA */
        #audio-ctrl {
            position: fixed; bottom: 30px; left: 30px;
            width: 60px; height: 60px; background: var(--rose-color);
            border-radius: 50%; display: none; align-items: center;
            justify-content: center; font-size: 24px; cursor: pointer;
            box-shadow: 0 0 20px var(--fire-color);
        }
    </style>
</head>
<body>

    <div id="universe"><div class="aurora-glow"></div></div>

    <div id="intro" onclick="startMasterpiece()">
        <div class="main-rose">🌹</div>
        <p style="color: #fff; margin-top: 40px; letter-spacing: 8px; font-weight: 800; text-shadow: 0 0 10px #fff;">CHẠM ĐỂ RỰC CHÁY</p>
    </div>

    <audio id="love-piano" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="fire-box" id="login-form">
            <h2>Vợ Yêu ❤️</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Người ấy là ai?" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật mã trái tim..." autocomplete="off">
                <span class="eye-toggle" onclick="togglePass()">👁️</span>
            </div>
            <button class="btn-fire" onclick="access()">KHÁM PHÁ NGAY ✨</button>
            <p id="error" style="color: #ffff00; margin-top: 15px; display: none;">Chỉ có vợ iu mới biết mật mã thôi! ❌</p>
        </div>

        <div class="fire-box" id="content-page">
            <h2>Thiên Đường ❤️</h2>
            <div class="menu-grid">
                <div class="menu-item">🌸 CHUYỆN QUÁ KHỨ</div>
                <div class="menu-item">🕯️ CHUYỆN HIỆN TẠI</div>
                <div class="menu-item">💍 LỜI HỨA TƯƠNG LAI</div>
                <div class="menu-item">🔥 LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <div id="audio-ctrl" onclick="toggleAudio()">🔊</div>

    <script>
        const audio = document.getElementById('love-piano');

        function startMasterpiece() {
            audio.play().catch(() => console.log("Waiting for user..."));
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('audio-ctrl').style.display = 'flex';
            }, 1000);
            setInterval(spawnSparkle, 100);
        }

        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function access() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-form').style.display = "none";
                document.getElementById('content-page').style.display = "block";
                // Bùng nổ hiệu ứng khi đăng nhập đúng
                for(let i=0; i<50; i++) setTimeout(spawnSparkle, i*20);
            } else {
                document.getElementById('error').style.display = "block";
            }
        }

        function toggleAudio() {
            if(audio.paused) {
                audio.play(); document.getElementById('audio-ctrl').innerText = "🔊";
            } else {
                audio.pause(); document.getElementById('audio-ctrl').innerText = "🔇";
            }
        }

        function spawnSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 5 + 2;
            s.style.width = size + "px";
            s.style.height = size + "px";
            const colors = ['#ff4500', '#ff0055', '#ffd700', '#ffffff'];
            s.style.background = colors[Math.floor(Math.random()*colors.length)];
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";
            
            s.style.setProperty('--x', (Math.random() * 400 - 200) + "px");
            s.style.setProperty('--y', (Math.random() * 400 - 200) + "px");
            
            s.style.animationDuration = Math.random() * 2 + 1 + "s";
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 3000);
        }
    </script>
</body>
</html>
