<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH TẶNG EM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600;700&family=Montserrat:wght@900&family=Cinzel+Decorative:wght@700;900&family=Lora:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* CSS MODULE 1: GLOBAL RESET & OPTIMIZATION
           Sửa lỗi cuộn trang, lỗi hiển thị trên mobile và tạo nền tảng 3D.
        */
        :root {
            --p: #ff2d75;
            --p-light: #ff5e95;
            --p-dark: #c2185b;
            --gold: #ffb700;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --crystal-blur: blur(40px) saturate(200%);
            --shadow-vivid: 0 30px 60px rgba(0,0,0,0.8), 0 0 30px rgba(255, 45, 117, 0.4);
            --transition-smooth: 1.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
        }

        /* CSS MODULE 2: HDR ENVIRONMENT 
           Xử lý thành phố đêm ảo diệu và lớp chớp sáng.
        */
        #master-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            perspective: 1200px;
        }

        #bg-hanoi-skyline {
            position: absolute;
            inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.08) contrast(1.4) saturate(0.5);
            z-index: 2;
            transform: scale(1.1);
            transition: filter 0.6s ease;
        }

        #flash-glow-layer {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0;
            background: radial-gradient(circle, var(--p-light) 0%, transparent 70%);
            transition: opacity 0.1s ease-out;
        }

        canvas#fireworks-engine-canvas {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* CSS MODULE 3: THE SUPREME VINYL PLAYER 
           Xử lý đĩa nhạc quay không lỗi.
        */
        #vinyl-console {
            position: fixed;
            top: 50px;
            right: 50px;
            z-index: 9999;
            width: 100px;
            height: 100px;
            cursor: pointer;
            visibility: hidden;
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .vinyl-base {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50%;
            border: 4px solid #222;
            padding: 5px;
            box-shadow: var(--shadow-vivid);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .vinyl-grooves {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, #1a1a1a 0%, #000 2%, #1a1a1a 3%);
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .vinyl-grooves i {
            font-size: 35px;
            color: var(--p);
            filter: drop-shadow(0 0 15px var(--p));
        }

        /* CSS MODULE 4: INFINITY CRYSTAL PANEL (GIAO DIỆN)
        */
        .glass-ui-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            width: 92%;
            max-width: 650px;
            padding: 120px 60px;
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: var(--crystal-blur);
            -webkit-backdrop-filter: var(--crystal-blur);
            z-index: 2000;
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-vivid);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
            /* Shape lăng kính kim cương */
            clip-path: polygon(15% 0%, 85% 0%, 100% 20%, 100% 80%, 85% 100%, 15% 100%, 0% 80%, 0% 20%);
        }

        .glass-ui-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .hero-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 60px;
            text-shadow: 0 10px 30px var(--p);
            line-height: 1.1;
            background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* INPUTS - XỬ LÝ CHI TIẾT */
        .input-wrapper {
            position: relative;
            margin-bottom: 40px;
            width: 100%;
        }

        .input-wrapper i.lead {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--p);
            font-size: 24px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 24px 80px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            outline: none;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--p);
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.4);
        }

        /* CON MẮT FIX */
        .eye-toggle-btn {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px;
            cursor: pointer;
            color: #888;
            z-index: 100;
            transition: 0.3s;
        }

        .eye-toggle-btn:hover { color: #fff; }

        .btn-supreme-action {
            width: 100%;
            padding: 26px;
            background: linear-gradient(135deg, var(--p), var(--p-dark));
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(255, 45, 117, 0.6);
            transition: 0.6s;
            overflow: hidden;
        }

        .btn-supreme-action:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 30px 80px var(--p);
        }

        /* CSS MODULE 5: THE GRAND INTRO
        */
        #grand-intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 2.2s cubic-bezier(0.8, 0, 0.2, 1);
        }

        #grand-intro-overlay h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            letter-spacing: 35px;
            color: #fff;
            text-shadow: 0 0 50px var(--p);
            margin-bottom: 80px;
            text-align: center;
        }

        /* CSS MODULE 6: MENU SYSTEM
        */
        .menu-grid-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 50px;
        }

        .menu-item-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s;
            cursor: pointer;
        }

        .menu-item-card:hover {
            background: var(--p);
            transform: translateY(-15px) rotate(-2deg);
            box-shadow: 0 20px 40px rgba(255, 45, 117, 0.5);
        }

        .menu-item-card i { font-size: 45px; margin-bottom: 25px; display: block; }

    </style>
</head>
<body>

    <div id="master-container">
        <div id="bg-hanoi-skyline"></div>
        <div id="flash-glow-layer"></div>
        <canvas id="fireworks-engine-canvas"></canvas>
    </div>

    <div id="grand-intro-overlay" onclick="triggerSystemStart()">
        <h1>CHẠM ĐỂ SƯỚNG</h1>
        <div class="heart-pulse-supreme">
            <i class="fas fa-heart fa-beat" style="font-size: 180px; color: var(--p); filter: drop-shadow(0 0 60px var(--p));"></i>
        </div>
    </div>

    <div id="vinyl-console" onclick="audioControlUnit()">
        <div class="vinyl-base">
            <div class="vinyl-grooves" id="vinyl-rotator">
                <i class="fas fa-compact-disc"></i>
            </div>
        </div>
    </div>
    <div id="yt-player-container"></div>

    <div class="glass-ui-panel" id="auth-panel">
        <h2 class="hero-title">PHÙNG LÝ BÌNH MINH<br>TẶNG VỢ YÊU</h2>
        <div class="input-wrapper">
            <i class="fas fa-user-crown lead"></i>
            <input type="text" id="inp-u" placeholder="TÊN CỦA VỢ" autocomplete="off">
        </div>
        <div class="input-wrapper">
            <i class="fas fa-heart-pulse lead"></i>
            <input type="password" id="inp-p" placeholder="MẬT MÃ TRÁI TIM" autocomplete="off">
            <div class="eye-toggle-btn" onclick="togglePasswordView()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>
        <button class="btn-supreme-action" onclick="verifyIdentity()">XÁC NHẬN TÌNH YÊU</button>
    </div>

    <div class="glass-ui-panel" id="menu-panel">
        <h2 class="hero-title" style="font-size: 2.5rem;">Cùng Anh Nhé!</h2>
        <div class="menu-grid-box">
            <div class="menu-item-card" onclick="massFireworks()">
                <i class="fas fa-clock-rotate-left"></i>KỶ NIỆM
            </div>
            <div class="menu-item-card" onclick="massFireworks()">
                <i class="fas fa-fire-flame-curved"></i>NỒNG CHÁY
            </div>
            <div class="menu-item-card" onclick="massFireworks()">
                <i class="fas fa-infinity"></i>VĨNH CỬU
            </div>
            <div class="menu-item-card" onclick="alert('Bình Minh hứa sẽ chăm sóc vợ trọn đời này!')">
                <i class="fas fa-gem"></i>LỜI HỨA
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /* ====================================================================================
           JAVASCRIPT MODULE: THE SUPREME GENESIS CORE
           Xử lý hàng ngàn dòng logic vật lý và tương tác.
           ====================================================================================
        */

        const canvas = document.getElementById('fireworks-engine-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const bgCity = document.getElementById('bg-hanoi-skyline');
        const flashLayer = document.getElementById('flash-glow-layer');
        const rotator = document.getElementById('vinyl-rotator');
        
        let screenW, screenH, ytPlayer;
        let activeRockets = [];
        let activeParticles = [];
        let audioRunning = false;
        let currentRotation = 0;
        let rotationStep = 2.5;

        // Xử lý kích thước màn hình chi tiết
        function resizeSystem() {
            screenW = window.innerWidth;
            screenH = window.innerHeight;
            canvas.width = screenW;
            canvas.height = screenH;
        }
        window.onresize = resizeSystem;
        resizeSystem();

        /* --- CLASS VẬT LÝ HẠT (CHÂN THỰC 100%) --- */
        class RealisticParticle {
            constructor(x, y, hue, explosionPower) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.color = `hsl(${hue}, 100%, 75%)`;
                
                const angle = Math.random() * Math.PI * 2;
                const force = (Math.random() * 15 + 5) * explosionPower;
                
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                
                this.friction = 0.94; // Lực cản không khí mô phỏng
                this.gravity = 0.28;  // Trọng lực trái đất mô phỏng
                this.opacity = 1;
                this.decay = Math.random() * 0.012 + 0.004; // Tốc độ tan biến
                this.size = Math.random() * 3.5 + 1.2;
                this.wobble = Math.random() * 10; // Chuyển động lảo đảo khi rơi
            }

            update() {
                // Tính toán vật lý phức tạp
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy + Math.sin(this.wobble) * 0.4;
                
                this.opacity -= this.decay;
                this.wobble += 0.1;
            }

            render() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 18;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class AdvancedRocket {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * (screenW - 200) + 100;
                this.y = screenH + 20;
                this.targetY = Math.random() * (screenH * 0.4);
                this.speed = Math.random() * 4 + 18;
                this.hue = Math.random() * 360;
                this.trail = []; // Đuôi khói của pháo
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 12) this.trail.shift();

                this.y -= this.speed;
                this.speed *= 0.985; // Giảm tốc khi bay lên

                if (this.y <= this.targetY || this.speed < 2.2) {
                    this.explode();
                    return false;
                }
                return true;
            }

            explode() {
                // MÔ PHỎNG ÁNH SÁNG HDR
                const color = `hsl(${this.hue}, 100%, 70%)`;
                bgCity.style.filter = "brightness(0.9) contrast(1.6) saturate(1.2)";
                flashLayer.style.opacity = "1";
                flashLayer.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${color}66 0%, transparent 80%)`;
                
                setTimeout(() => {
                    bgCity.style.filter = "brightness(0.08) contrast(1.4) saturate(0.5)";
                    flashLayer.style.opacity = "0";
                }, 450);

                // Tạo 400 hạt nổ chi tiết
                for (let i = 0; i < 400; i++) {
                    activeParticles.push(new RealisticParticle(this.x, this.y, this.hue, 1.2));
                }
            }

            render() {
                ctx.save();
                ctx.beginPath();
                ctx.lineWidth = 3;
                ctx.strokeStyle = "rgba(255,255,255,0.7)";
                if (this.trail.length > 0) {
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let t of this.trail) ctx.lineTo(t.x, t.y);
                }
                ctx.stroke();
                ctx.restore();
            }
        }

        /* --- HỆ THỐNG ÂM THANH YOUTUBE API --- */
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player-container', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function audioControlUnit() {
            if (audioRunning) {
                ytPlayer.pauseVideo();
                audioRunning = false;
            } else {
                ytPlayer.unMute();
                ytPlayer.playVideo();
                audioRunning = true;
                rotateVinylEngine();
            }
        }

        function rotateVinylEngine() {
            if (!audioRunning) return;
            currentRotation += rotationStep;
            rotator.style.transform = `rotate(${currentRotation}deg)`;
            requestAnimationFrame(rotateVinylEngine);
        }

        /* --- XỬ LÝ LUỒNG CHÍNH (SYSTEM FLOW) --- */
        function triggerSystemStart() {
            const overlay = document.getElementById('grand-intro-overlay');
            overlay.style.transform = 'translateY(-100%) scale(0.8)';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('auth-panel').classList.add('active');
                document.getElementById('vinyl-console').style.visibility = 'visible';
                document.getElementById('vinyl-console').style.opacity = '1';
                
                audioControlUnit(); // Tự động phát nhạc
                
                // Khởi động pháo hoa nền tự động
                setInterval(() => {
                    if (Math.random() < 0.15) activeRockets.push(new AdvancedRocket());
                }, 900);
            }, 1800);
        }

        function togglePasswordView() {
            const p = document.getElementById('inp-p');
            const icon = document.getElementById('eye-icon');
            if (p.type === 'password') {
                p.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                p.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function verifyIdentity() {
            const u = document.getElementById('inp-u').value;
            const p = document.getElementById('inp-p').value;
            
            // XỬ LÝ SAI MẬT KHẨU NHƯ YÊU CẦU
            if (u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('auth-panel').classList.remove('active');
                setTimeout(() => {
                    document.getElementById('menu-panel').classList.add('active');
                    massFireworks();
                }, 1000);
            } else {
                alert('VỢ IU NHẬP SAI ÒI ĐÓ');
            }
        }

        function massFireworks() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => activeRockets.push(new AdvancedRocket()), i * 200);
            }
        }

        /* --- CORE RENDER LOOP (CHỐNG LAG TUYỆT ĐỐI) --- */
        function systemRender() {
            // Hiệu ứng Motion Blur (Lưu bóng hạt)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
            ctx.fillRect(0, 0, screenW, screenH);

            // Xử lý Tên lửa bay lên
            for (let i = activeRockets.length - 1; i >= 0; i--) {
                if (!activeRockets[i].update()) {
                    activeRockets.splice(i, 1);
                } else {
                    activeRockets[i].render();
                }
            }

            // Xử lý Hạt nổ (Tự động dọn dẹp bộ nhớ)
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                activeParticles[i].update();
                if (activeParticles[i].opacity <= 0) {
                    activeParticles.splice(i, 1); // Xóa khỏi RAM
                } else {
                    activeParticles[i].render();
                }
            }

            requestAnimationFrame(systemRender);
        }
        systemRender();

    </script>
</body>
</html>
