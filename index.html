<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khu Vườn Bí Mật Của Vợ ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Quicksand', sans-serif;
            background-color: #020d02;
        }

        /* PHONG CẢNH THIÊN NHIÊN ĐỘNG */
        #forest-bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            animation: zoomBg 20s infinite alternate;
        }
        @keyframes zoomBg { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* HIỆU ỨNG ĐOM ĐÓM SẶC SỠ */
        .firefly {
            position: absolute; border-radius: 50%; pointer-events: none;
            box-shadow: 0 0 10px #fff; animation: drift linear infinite;
        }
        @keyframes drift {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* MÀN HÌNH CHỜ */
        #intro {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .rose-glow {
            font-size: 100px; filter: drop-shadow(0 0 40px #ff4d6d);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* CARD GIAO DIỆN SANG TRỌNG */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; padding: 40px;
            width: 90%; max-width: 380px; text-align: center;
            display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.8rem; margin-bottom: 25px; text-shadow: 0 0 15px #ffb3c1; }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: rgba(255,255,255,0.2); color: white; margin-bottom: 15px;
            text-align: center; outline: none; font-size: 16px;
        }

        .btn-action {
            background: linear-gradient(45deg, #2d5a27, #4e9445);
            color: white; border: none; padding: 15px; width: 100%;
            border-radius: 15px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #music-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: none; align-items: center;
            justify-content: center; color: white; border: 1px solid white; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="forest-bg"></div>

    <div id="intro" onclick="start()">
        <div class="rose-glow">🌹</div>
        <p style="color: white; margin-top: 20px; letter-spacing: 5px;">BẬT NHẠC VÀ VÀO KHU VƯỜN</p>
    </div>

    <audio id="bg-music" loop>
        <source src="https://files.catbox.moe/kpkp67.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
