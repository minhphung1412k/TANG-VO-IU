<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Vợ Yêu ❤️</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --dark-pink: #f73378;
            --bg-color: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Form Đăng Nhập */
        #login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(255, 133, 162, 0.3);
            text-align: center;
            width: 320px;
            z-index: 100;
            border: 3px solid #ffb3c1;
        }

        h2 { color: var(--dark-pink); margin-bottom: 25px; font-size: 1.2rem; }

        .input-group { position: relative; margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #eee;
            border-radius: 50px;
            outline: none;
            box-sizing: border-box;
            font-size: 15px;
        }

        input:focus { border-color: var(--primary-pink); }

        #toggleEye {
            position: absolute; right: 20px; top: 12px;
            cursor: pointer; font-size: 1.2rem;
        }

        button#btnSubmit {
            background: var(--primary-pink);
            color: white; border: none; padding: 14px;
            width: 100%; border-radius: 50px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            margin-top: 10px;
        }

        #error-msg { color: #ff0000; font-weight: bold; margin-top: 15px; display: none; }

        /* Màn hình chính */
        #main-content {
            display: none; text-align: center; width: 90%;
            max-width: 500px; z-index: 10;
        }

        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; margin-top: 30px;
        }

        .menu-btn {
            background: white; padding: 25px 10px;
            border-radius: 20px; border: 2px solid #ffb3c1;
            color: var(--dark-pink); font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        .menu-btn:hover { background: var(--primary-pink); color: white; }

        /* Nút loa điều khiển */
        #music-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: white; width: 60px; height: 60px;
            border-radius: 50%; border: 2px solid var(--primary-pink);
            font-size: 30px; cursor: pointer; display: none;
            z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            align-items: center; justify-content: center;
        }

        /* Trái tim */
        .heart {
            position: absolute; color: var(--primary-pink);
            animation: fly 5s linear infinite; pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="login-box">
        <h2>VỢ YÊU ĐĂNG NHẬP MỚI ĐƯỢC XEM ❤️</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="Tài khoản...">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Mật khẩu...">
            <span id="toggleEye">👁️</span>
        </div>
        <button id="btnSubmit">Mở Quà Ngay ✨</button>
        <p id="error-msg">VỢ IU NHẬP SAI ÒI ❌</p>
    </div>

    <div id="main-content">
        <h1 style="color: var(--dark-pink);">Gửi Vợ Yêu Của Anh ❤️</h1>
        <div class="menu-grid">
            <div class="menu-btn">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-btn">CHUYỆN HIỆN TẠI</div>
            <div class="menu-btn">LỜI HỨA CỦA TƯƠNG LAI</div>
            <div class="menu-btn">LÝ DO ANH YÊU EM</div>
        </div>
    </div>

    <div id="music-btn" onclick="toggleMusic()">🔇</div>

    <audio id="mySong" loop>
        <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Impact_Andante/Kevin_MacLeod_-_Impact_Andante.mp3" type="audio/mpeg">
    </audio>

    <script>
        const CORRECT_USER = "anhyeuemlamdonha";
        const CORRECT_PASS = "xindungboroianh";

        const passInput = document.getElementById('pass');
        const eyeBtn = document.getElementById('toggleEye');
        const musicBtn = document.getElementById('music-btn');
        const song = document.getElementById('mySong');

        // Hiện ẩn mật khẩu
        eyeBtn.addEventListener('click', () => {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeBtn.innerText = '🔒';
            } else {
                passInput.type = 'password';
                eyeBtn.innerText = '👁️';
            }
        });

        // Đăng nhập
        document.getElementById('btnSubmit').addEventListener('click', () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();

            if (u === CORRECT_USER && p === CORRECT_PASS) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                musicBtn.style.display = 'flex'; // Hiện nút loa
                
                // Cố gắng phát nhạc ngay khi bấm nút
                const playPromise = song.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        musicBtn.innerText = '🔊'; // Phát thành công thì mất dấu X
                    }).catch(error => {
                        console.log("Trình duyệt chặn tự động phát");
                        musicBtn.innerText = '🔇'; // Bị chặn thì vẫn hiện dấu X
                    });
                }
                startHearts();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                passInput.value = "";
            }
        });

        // Bật tắt loa bằng tay
        function toggleMusic() {
            if (song.paused) {
                song.play();
                musicBtn.innerText = '🔊';
            } else {
                song.pause();
                musicBtn.innerText = '🔇';
            }
        }

        function startHearts() {
            setInterval(() => {
                const h = document.createElement('div');
                h.classList.add('heart');
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 20 + 15) + 'px';
                h.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
