<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thành Phố Ánh Sáng Kiệt Tác ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* PHẦN CÀI ĐẶT HỆ THỐNG - CHỐNG ĐƠ LAG */
        :root {
            --primary: #ff4d6d;
            --city-dim: brightness(0.1) contrast(1.1);
            --city-glow: brightness(0.7) contrast(1.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Quicksand', sans-serif; }

        /* NỀN THÀNH PHỐ TỐI BIẾN BIẾN THEO PHÁO HOA */
        #city-canvas {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: var(--city-dim);
            transition: filter 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* LỚP MẶT NẠ ÁNH SÁNG CHI TIẾT */
        #light-fx {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none; mix-blend-mode: screen; opacity: 0;
            transition: opacity 0.2s;
        }

        canvas#fireworks { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* MÀN HÌNH MỞ ĐẦU CHẤT LƯỢNG CAO */
        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 1.2s ease-in-out;
        }
        .start-btn {
            font-family: 'Dancing Script', cursive; font-size: 4rem; color: #fff;
            text-shadow: 0 0 30px var(--primary); animation: glow 2s infinite;
            background: none; border: none; cursor: pointer;
        }

        /* KHUNG ĐĂNG NHẬP THIẾT KẾ RIÊNG BIỆT */
        .auth-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; width: 380px; padding: 50px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: none; text-align: center;
        }

        .auth-container h2 { font-family: 'Dancing Script'; color: #fff; font-size: 2.5rem; margin-bottom: 30px; }

        .field { position: relative; margin-bottom: 20px; }
        .field i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .field input {
            width: 100%; padding: 15px 15px 15px 50px; border-radius: 30px; border: none;
            background: rgba(255,255,255,0.9); font-weight: bold; outline: none;
        }

        .login-btn {
            width: 100%; padding: 15px; border-radius: 30px; border: none;
            background: var(--primary); color: #fff; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4); transition: 0.3s;
        }

        /* MENU 4 MỤC */
        .menu-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;
        }
        .menu-item {
            background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px;
            color: #fff; font-size: 12px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes glow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="city-canvas"></div>
<div id="light-fx"></div>
<canvas id="fireworks"></canvas>

<div id="overlay" onclick="launchApp()">
    <button class="start-btn">CHẠM ĐỂ SƯỚNG</button>
    <p style="color: #666; letter-spacing: 5px; margin-top: 20px;">PHIÊN BẢN ĐẶC BIỆT</p>
</div>

<div id="player"></div>

<div class="auth-container" id="login-ui">
    <h2>Vợ Yêu ❤️</h2>
    <div class="field"><i class="fas fa-user"></i><input type="text" id="u" placeholder="Tên đăng nhập"></div>
    <div class="field"><i class="fas fa-lock"></i><input type="password" id="p" placeholder="Mật khẩu"></div>
    <button class="login-btn" onclick="checkAuth()">BẮT ĐẦU</button>
</div>

<div class="auth-container" id="menu-ui">
    <h2>Dành Cho Em</h2>
    <div class="menu-box">
        <div class="menu-item" onclick="forceFirework()">QUÁ KHỨ</div>
        <div class="menu-item" onclick="forceFirework()">HIỆN TẠI</div>
        <div class="menu-item" onclick="forceFirework()">TƯƠNG LAI</div>
        <div class="menu-item" onclick="alert('Mãi yêu em!')">LỜI HỨA</div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // ENGINE XỬ LÝ NHẠC YOUTUBE
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0', width: '0', videoId: 'iXaw-jwmjjA',
            playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
            events: { 'onReady': (e) => e.target.mute() }
        });
    }

    function launchApp() {
        document.getElementById('overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('login-ui').style.display = 'block';
            player.unMute(); player.playVideo();
            // Kích hoạt pháo hoa bắn xuyên suốt
            setInterval(autoLaunch, 1200);
        }, 1000);
    }

    function checkAuth() {
        if(document.getElementById('u').value === "anhyeuemlamdonha" && document.getElementById('p').value === "xindungboroianh") {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
            for(let i=0; i<10; i++) setTimeout(autoLaunch, i*100);
        } else { alert("Sai rồi bé ơi!"); }
    }

    // ENGINE PHÁO HOA VẬT LÝ HÀNG NGÀN HẠT (SIÊU THỰC)
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    const city = document.getElementById('city-canvas');
    const fx = document.getElementById('light-fx');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    let fireworkRockets = [];

    class Particle {
        constructor(x, y, color, speed, angle) {
            this.x = x; this.y = y; this.color = color;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1;
            this.decay = Math.random() * 0.015 + 0.005;
            this.size = Math.random() * 3 + 1;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
        update() {
            this.vx *= 0.95; this.vy *= 0.95;
            this.vy += 0.12; // Trọng lực rơi tia lửa
            this.x += this.vx; this.y += this.vy;
            this.life -= this.decay;
        }
    }

    function createExplosion(x, y, color) {
        // HIỆU ỨNG THÀNH PHỐ PHÁT SÁNG THEO VỊ TRÍ NỔ
        city.style.filter = "var(--city-glow)";
        fx.style.opacity = "1";
        fx.style.background = `radial-gradient(circle at ${x}px ${y}px, ${color}44 0%, transparent 70%)`;
        
        setTimeout(() => { 
            city.style.filter = "var(--city-dim)"; 
            fx.style.opacity = "0";
        }, 400);

        // Tạo 150 hạt cho mỗi quả nổ để "chân thật"
        for(let i=0; i<150; i++) {
            particles.push(new Particle(x, y, color, Math.random()*12, Math.random()*Math.PI*2));
        }
    }

    function autoLaunch() {
        const x = Math.random() * canvas.width;
        const color = `hsl(${Math.random()*360}, 100%, 65%)`;
        createExplosion(x, Math.random()*canvas.height*0.5, color);
    }

    function forceFirework() {
        for(let i=0; i<5; i++) setTimeout(autoLaunch, i*200);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.update(); p.draw();
            if(p.life <= 0) particles.splice(i, 1);
        });
        requestAnimationFrame(render);
    }
    render();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
