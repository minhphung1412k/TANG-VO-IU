<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH YÊU EM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --p: #ff2d75;
            --p-g: linear-gradient(135deg, #ff2d75, #ff5e3a);
            --glass: rgba(0, 0, 0, 0.75);
            --blur: blur(30px);
            --elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- 1. HDR CITY ENVIRONMENT (THÀNH PHỐ TỐI LE LÓI) --- */
        #city-layer {
            position: fixed; inset: 0; z-index: 1;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.05) contrast(1.5);
            transition: filter 0.3s ease-out;
            transform: scale(1.1);
            animation: cityFloat 20s infinite alternate ease-in-out;
        }
        @keyframes cityFloat { from { transform: scale(1.1) rotate(0deg); } to { transform: scale(1.15) rotate(1deg); } }

        canvas#fireworks { position: absolute; inset: 0; z-index: 5; pointer-events: none; }

        /* --- 2. DYNAMIC NOTIFICATION (FIX ALERT GOOGLE) --- */
        #notify {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--p-g); padding: 20px 45px; border-radius: 50px;
            z-index: 10000; font-weight: 700; color: #fff;
            box-shadow: 0 15px 40px rgba(255, 45, 117, 0.6);
            transition: 0.6s var(--elastic); display: flex; align-items: center; gap: 15px;
        }
        #notify.active { top: 40px; }

        /* --- 3. VINYL MUSIC PLAYER (GIỮ NGUYÊN BẢN GỐC NHƯNG ĐẸP HƠN) --- */
        #music-trigger {
            position: fixed; top: 30px; right: 30px; z-index: 5000; cursor: pointer;
            opacity: 0; transition: 1.5s;
        }
        .vinyl-box {
            width: 85px; height: 85px; border-radius: 50%; background: #111;
            border: 4px solid #333; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px var(--p); animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow { from { box-shadow: 0 0 10px var(--p); } to { box-shadow: 0 0 30px var(--p); } }
        .vinyl-inner {
            width: 90%; height: 90%; border-radius: 50%;
            background: repeating-radial-gradient(#222, #000 6px);
            display: flex; align-items: center; justify-content: center;
        }
        .vinyl-inner i { color: var(--p); font-size: 30px; }

        /* --- 4. KINETIC UI PANEL (GIAO DIỆN CHUYỂN ĐỘNG) --- */
        .master-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            width: 90%; max-width: 580px; padding: 80px 50px;
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            z-index: 2000; border-radius: 60px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; opacity: 0; visibility: hidden;
            transition: 1.5s var(--elastic);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .master-card.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .title-reveal {
            font-family: 'Cinzel Decorative', cursive; font-size: 3rem; margin-bottom: 50px;
            background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textFlow 3s infinite alternate ease-in-out;
        }
        @keyframes textFlow { from { filter: drop-shadow(0 0 5px var(--p)); } to { filter: drop-shadow(0 0 20px var(--p)); } }

        /* --- INPUTS & ICONS (FIX LỖI) --- */
        .field-group { position: relative; margin-bottom: 35px; transform: translateX(-50px); opacity: 0; transition: 0.8s 0.5s var(--elastic); }
        .master-card.active .field-group { transform: translateX(0); opacity: 1; }
        
        .field-group i.main-icon {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            color: var(--p); font-size: 22px; z-index: 10;
        }
        .field-group input {
            width: 100%; padding: 22px 70px; background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 25px;
            color: #fff; font-size: 18px; outline: none; transition: 0.4s;
        }
        .field-group input:focus { border-color: var(--p); background: rgba(255,45,117,0.05); }

        /* Mắt ẩn hiện (Fix lỗi) */
        .eye-btn {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #777; z-index: 100; transition: 0.3s; padding: 5px;
        }
        .eye-btn:hover { color: #fff; transform: translateY(-50%) scale(1.2); }

        .btn-supreme {
            width: 100%; padding: 24px; background: var(--p-g); border: none;
            border-radius: 25px; color: #fff; font-size: 1.3rem; font-weight: 900;
            letter-spacing: 6px; cursor: pointer; transition: 0.5s;
            margin-top: 20px; box-shadow: 0 10px 30px rgba(255,45,117,0.4);
        }
        .btn-supreme:hover { transform: scale(1.05); box-shadow: 0 0 50px var(--p); }

        /* --- MENU DYNAMIC --- */
        .grid-anim { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card-anim {
            background: rgba(255,255,255,0.05); padding: 40px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.5s; cursor: pointer;
        }
        .card-anim:hover { background: var(--p); transform: translateY(-15px) scale(1.05); border-color: #fff; }
        .card-anim i { font-size: 40px; margin-bottom: 20px; display: block; animation: iconJump 2s infinite; }
        @keyframes iconJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- INTRO --- */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 20000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
        #intro-screen h1 { font-size: 5rem; letter-spacing: 30px; animation: glow 2s infinite; }
        @keyframes glow { from { text-shadow: 0 0 10px #fff; } to { text-shadow: 0 0 40px var(--p); } }
    </style>
</head>
<body>

    <div id="city-layer"></div>
    <canvas id="fireworks"></canvas>

    <div id="notify">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="notify-msg">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="intro-screen" onclick="initExperience()">
        <h1 style="font-family: 'Montserrat', sans-serif; font-weight: 900; color: #fff;">CHẠM</h1>
        <i class="fas fa-heart-pulse fa-beat" style="font-size: 120px; color: var(--p); margin-top: 40px;"></i>
    </div>

    <div id="music-trigger" onclick="handleMusic()">
        <div class="vinyl-box">
            <div class="vinyl-inner" id="disc-rotator"><i class="fas fa-compact-disc"></i></div>
        </div>
    </div>
    <div id="yt-api-container"></div>

    <div class="master-card" id="login-panel">
        <h2 class="title-reveal">PHÙNG LÝ BÌNH MINH<br>YÊU EM</h2>
        
        <div class="field-group">
            <i class="fas fa-user-heart main-icon"></i>
            <input type="text" id="user-val" placeholder="Nhập tài khoản đi baby" autocomplete="off">
        </div>

        <div class="field-group">
            <i class="fas fa-key-skeleton main-icon"></i>
            <input type="password" id="pass-val" placeholder="Nhập mật khẩu nha bé iu" autocomplete="off">
            <div class="eye-btn" onclick="togglePass()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>

        <button class="btn-supreme" onclick="validate()">ĐĂNG NHẬP NGAY</button>
    </div>

    <div class="master-card" id="menu-panel">
        <h2 class="title-reveal" style="font-size: 2.2rem;">ĐIỀU ANH MUỐN NÓI</h2>
        <div class="grid-anim">
            <div class="card-anim" onclick="launchMassive(6)">
                <i class="fas fa-images"></i>KỶ NIỆM
            </div>
            <div class="card-anim" onclick="launchMassive(6)">
                <i class="fas fa-heart-circle-bolt"></i>CẢM XÚC
            </div>
            <div class="card-anim" onclick="launchMassive(6)">
                <i class="fas fa-infinity"></i>MÃI MÃI
            </div>
            <div class="card-anim" onclick="showNotify('Anh sẽ luôn ở đây che chở cho em!')">
                <i class="fas fa-hand-holding-heart"></i>LỜI HỨA
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-layer');
        const rotator = document.getElementById('disc-rotator');
        
        let w, h, player, musicOn = false, angle = 0;
        let rockets = [], particles = [];

        function setSize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = setSize; setSize();

        /* --- ENGINE PHÁO HOA CHÂN THỰC --- */
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const a = Math.random() * Math.PI * 2;
                const s = Math.random() * 14 + 4;
                this.vx = Math.cos(a) * s;
                this.vy = Math.sin(a) * s;
                this.f = 0.94; this.g = 0.25;
                this.alpha = 1; this.d = Math.random() * 0.015 + 0.005;
            }
            update() {
                this.vx *= this.f; this.vy *= this.f; this.vy += this.g;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.d;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.ty = Math.random() * (h * 0.4);
                this.s = 18; this.c = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            update() {
                this.y -= this.s; this.s *= 0.99;
                if (this.y <= this.ty) { this.explode(); return false; }
                return true;
            }
            explode() {
                // HDR Light: Làm bừng sáng thành phố
                city.style.filter = "brightness(0.9) contrast(1.8) scale(1.15)";
                setTimeout(() => city.style.filter = "brightness(0.05) contrast(1.5) scale(1.1)", 450);
                for(let i=0; i<300; i++) particles.push(new Particle(this.x, this.y, this.c));
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        /* --- SYSTEM CONTROL --- */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-api-container', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function handleMusic() {
            if(musicOn) { player.pauseVideo(); musicOn = false; }
            else { player.unMute(); player.playVideo(); musicOn = true; animateVinyl(); }
        }

        function animateVinyl() { 
            if(!musicOn) return; 
            angle += 3; rotator.style.transform = `rotate(${angle}deg)`; 
            requestAnimationFrame(animateVinyl); 
        }

        function showNotify(msg) {
            const n = document.getElementById('notify');
            document.getElementById('notify-msg').innerText = msg;
            n.classList.add('active');
            setTimeout(() => n.classList.remove('active'), 3500);
        }

        function togglePass() {
            const p = document.getElementById('pass-val');
            const i = document.getElementById('eye-icon');
            if(p.type === "password") { p.type = "text"; i.className = "fas fa-eye-slash"; }
            else { p.type = "password"; i.className = "fas fa-eye"; }
        }

        function initExperience() {
            document.getElementById('intro-screen').style.transform = "scale(2)";
            document.getElementById('intro-screen').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = "none";
                document.getElementById('login-panel').classList.add('active');
                document.getElementById('music-trigger').style.opacity = "1";
                handleMusic();
                setInterval(() => { if(Math.random() < 0.12) rockets.push(new Rocket()); }, 1000);
            }, 1000);
        }

        function validate() {
            const u = document.getElementById('user-val').value;
            const p = document.getElementById('pass-val').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-panel').classList.remove('active');
                setTimeout(() => document.getElementById('menu-panel').classList.add('active'), 800);
            } else {
                showNotify('VỢ IU NHẬP SAI ÒI ĐÓ');
            }
        }

        function launchMassive(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*250); }

        function coreLoop() {
            ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0, 0, w, h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(coreLoop);
        }
        coreLoop();
    </script>
</body>
</html>
