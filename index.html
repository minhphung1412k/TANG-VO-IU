<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH YÊU EM</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #ff2d75;
            --p-g: linear-gradient(135deg, #ff2d75, #ff5e3a);
            --glass: rgba(0, 0, 0, 0.8);
            --blur: blur(30px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- LAYER 1: THÀNH PHỐ ĐEN LE LÓI (DÙNG ẢNH CỦA BẠN) --- */
        #city-background {
            position: fixed; inset: 0; z-index: 1;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.03) contrast(1.5); /* Tối đen như đêm 30 */
            transition: filter 0.2s ease-out;
            transform: scale(1.05);
        }

        /* Lớp phủ sáng khi pháo nổ */
        #light-flash {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none; opacity: 0;
            mix-blend-mode: overlay;
            transition: opacity 0.1s;
        }

        canvas#fireworks { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

        /* --- CUSTOM ALERT (KHÔNG DÙNG GOOGLE ALERT) --- */
        #custom-notify {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--p-g); padding: 20px 40px; border-radius: 50px;
            z-index: 99999; color: #fff; font-weight: 700;
            box-shadow: 0 15px 40px rgba(255, 45, 117, 0.5);
            transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 15px;
        }
        #custom-notify.active { top: 40px; }

        /* --- GIAO DIỆN CHUYỂN ĐỘNG CỰC VIP --- */
        .glass-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            width: 90%; max-width: 500px; padding: 60px 40px;
            background: var(--glass); backdrop-filter: var(--blur);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; opacity: 0; visibility: hidden;
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1000; box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        .glass-box.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .hero-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.8rem;
            margin-bottom: 40px; background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,45,117,0.5));
        }

        /* --- INPUTS VỚI ICON ĐÃ FIX --- */
        .input-container { position: relative; margin-bottom: 25px; }
        
        .input-container i.main-icon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: var(--p); font-size: 20px; z-index: 5;
            animation: iconBreathe 2s infinite;
        }
        @keyframes iconBreathe { 0%, 100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.15); } }

        .input-container input {
            width: 100%; padding: 20px 60px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        .input-container input:focus { border-color: var(--p); background: rgba(255,255,255,0.1); }

        /* Mắt ẩn hiện - FIX LỖI */
        .eye-toggle {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #888; z-index: 10; padding: 5px;
        }
        .eye-toggle:hover { color: var(--p); }

        .btn-vip {
            width: 100%; padding: 20px; background: var(--p-g); border: none;
            border-radius: 20px; color: #fff; font-size: 1.2rem; font-weight: 900;
            letter-spacing: 4px; cursor: pointer; transition: 0.5s;
            margin-top: 15px; box-shadow: 0 10px 30px rgba(255,45,117,0.4);
        }
        .btn-vip:hover { transform: translateY(-5px); box-shadow: 0 20px 50px var(--p); }

        /* --- MENU DYNAMIC --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .menu-item {
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px;
            cursor: pointer; transition: 0.4s; border: 1px solid transparent;
        }
        .menu-item:hover { background: var(--p); transform: translateY(-10px); border-color: #fff; }
        .menu-item i { font-size: 30px; margin-bottom: 10px; display: block; animation: dance 2s infinite; }
        @keyframes dance { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }

        /* --- LOA NHẠC GIỮ NGUYÊN --- */
        #music-btn {
            position: fixed; top: 30px; right: 30px; z-index: 5000; cursor: pointer;
            width: 70px; height: 70px; background: #111; border: 3px solid #333;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--p); opacity: 0; transition: 1s;
        }
        .disc { width: 90%; height: 90%; border-radius: 50%; background: repeating-radial-gradient(#222, #000 5px); display: flex; align-items: center; justify-content: center; }
        .disc i { color: var(--p); font-size: 25px; }

        /* --- MÀN HÌNH CHỜ --- */
        #loading {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
        #loading h1 { font-size: 4rem; letter-spacing: 20px; color: #fff; text-shadow: 0 0 20px var(--p); }
    </style>
</head>
<body>

    <div id="city-background"></div>
    <div id="light-flash"></div>
    <canvas id="fireworks"></canvas>

    <div id="custom-notify">
        <i class="fas fa-heart-crack"></i>
        <span id="msg">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="loading" onclick="startApp()">
        <h1 class="fa-beat">CHẠM</h1>
        <i class="fas fa-heart fa-beat" style="font-size: 80px; color: var(--p); margin-top: 20px;"></i>
    </div>

    <div id="music-btn" onclick="toggleMusic()">
        <div class="disc" id="disc-ui"><i class="fas fa-music"></i></div>
    </div>
    <div id="youtube-box"></div>

    <div class="glass-box" id="login-ui">
        <h2 class="hero-title">PHÙNG LÝ BÌNH MINH<br>YÊU EM</h2>
        <div class="input-container">
            <i class="fas fa-user-circle main-icon"></i>
            <input type="text" id="username" placeholder="Nhập tài khoản đi baby" autocomplete="off">
        </div>
        <div class="input-container">
            <i class="fas fa-key main-icon"></i>
            <input type="password" id="password" placeholder="Nhập mật khẩu nha bé iu" autocomplete="off">
            <div class="eye-toggle" onclick="toggleEye()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>
        <button class="btn-vip" onclick="verify()">ĐĂNG NHẬP</button>
    </div>

    <div class="glass-box" id="menu-ui">
        <h2 class="hero-title" style="font-size: 2.2rem;">ĐIỀU ANH MUỐN NÓI</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="launch(8)"><i class="fas fa-camera-retro"></i>KỶ NIỆM</div>
            <div class="menu-item" onclick="launch(8)"><i class="fas fa-heartbeat"></i>CẢM XÚC</div>
            <div class="menu-item" onclick="launch(8)"><i class="fas fa-infinity"></i>VĨNH CỬU</div>
            <div class="menu-item" onclick="notify('Anh hứa sẽ yêu em mãi mãi!')"><i class="fas fa-crown"></i>LỜI HỨA</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-background');
        const flash = document.getElementById('light-flash');
        
        let w, h, player, isMusic = false, rot = 0;
        let rockets = [], particles = [];

        function initCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = initCanvas; initCanvas();

        /* --- ENGINE PHÁO HOA & ÁNH SÁNG --- */
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.005;
            }
            update() {
                this.vx *= 0.94; this.vy *= 0.94; this.vy += 0.2;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
            }
            update() {
                this.y -= 15;
                if (this.y <= this.targetY) {
                    this.explode(); return false;
                }
                return true;
            }
            explode() {
                // HIỆU ỨNG CHIẾU SÁNG THÀNH PHỐ
                city.style.filter = `brightness(1) contrast(1.8) saturate(1.5)`;
                flash.style.opacity = "1";
                flash.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}55, transparent 70%)`;
                
                setTimeout(() => {
                    city.style.filter = `brightness(0.03) contrast(1.5)`;
                    flash.style.opacity = "0";
                }, 400);

                for(let i=0; i<300; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        /* --- LOGIC HỆ THỐNG --- */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-box', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleMusic() {
            if(isMusic) { player.pauseVideo(); isMusic = false; }
            else { player.unMute(); player.playVideo(); isMusic = true; rotateDisc(); }
        }

        function rotateDisc() { if(!isMusic) return; rot += 3; document.getElementById('disc-ui').style.transform = `rotate(${rot}deg)`; requestAnimationFrame(rotateDisc); }

        function toggleEye() {
            const p = document.getElementById('password');
            const i = document.getElementById('eye-icon');
            if(p.type === "password") { p.type = "text"; i.className = "fas fa-eye-slash"; }
            else { p.type = "password"; i.className = "fas fa-eye"; }
        }

        function notify(txt) {
            const el = document.getElementById('custom-notify');
            document.getElementById('msg').innerText = txt;
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 3500);
        }

        function startApp() {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('login-ui').classList.add('active');
                document.getElementById('music-btn').style.opacity = '1';
                toggleMusic();
                setInterval(() => { if(Math.random() < 0.15) rockets.push(new Rocket()); }, 800);
            }, 1000);
        }

        function verify() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-ui').classList.remove('active');
                setTimeout(() => document.getElementById('menu-ui').classList.add('active'), 800);
            } else {
                notify('VỢ IU NHẬP SAI ÒI ĐÓ');
            }
        }

        function launch(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*300); }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
