<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới Cầu Vồng Của Vợ Yêu ❤️</title>
    <style>
        /* NỀN CẦU VỒNG CHUYỂN ĐỘNG MẠNH */
        @keyframes rainbowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Arial', sans-serif;
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400% 400%;
            animation: rainbowBG 8s linear infinite;
        }

        /* KHUNG KÍNH PHÁT SÁNG NEON */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            padding: 50px 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3), inset 0 0 20px rgba(255,255,255,0.2);
            z-index: 10;
            transition: 0.5s;
        }

        /* CHỮ PHÁT SÁNG NEON */
        h2 { 
            color: #fff; 
            text-transform: uppercase;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00c8, 0 0 30px #ff00c8;
            font-size: 1.5rem; 
            margin-bottom: 30px; 
            letter-spacing: 2px;
        }

        /* Ô NHẬP LIỆU BẢO MẬT (ĐÃ XÓA GỢI Ý) */
        .input-group { position: relative; margin-bottom: 25px; }
        input {
            width: 100%; padding: 16px; border: none; border-radius: 50px;
            background: rgba(255, 255, 255, 0.9); outline: none;
            font-size: 16px; transition: 0.4s;
            text-align: center; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        input:focus { transform: scale(1.1); box-shadow: 0 0 30px #fff; }

        #toggleEye { position: absolute; right: 20px; top: 14px; cursor: pointer; font-size: 1.5rem; }

        /* NÚT BẤM RỰC RỠ */
        button#btnSubmit {
            background: linear-gradient(45deg, #ff00c8, #7a00ff);
            color: white; border: none; padding: 16px;
            width: 100%; border-radius: 50px; font-weight: bold;
            cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 0 25px #ff00c8;
            transition: 0.3s;
        }
        button#btnSubmit:hover { transform: scale(1.05); box-shadow: 0 0 50px #fff; }

        /* MENU RỰC RỠ */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .menu-btn {
            background: rgba(255, 255, 255, 0.2);
            padding: 25px 10px; border-radius: 20px;
            border: 2px solid #fff; color: #fff;
            font-weight: bold; cursor: pointer; transition: 0.4s;
            text-shadow: 0 0 10px #000;
        }
        .menu-btn:hover { background: #fff; color: #ff00c8; transform: translateY(-10px) rotate(3deg); box-shadow: 0 0 30px #fff; }

        /* LOA VÀ HIỆU ỨNG SÓNG NHẠC */
        #music-btn {
            position: fixed; bottom: 30px; right: 30px;
            width: 80px; height: 80px; background: #fff;
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            font-size: 40px; cursor: pointer; z-index: 1000;
            box-shadow: 0 0 30px #ff00c8;
        }
        .playing { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* HẠT ÁNH SÁNG & TRÁI TIM */
        .particle { position: absolute; pointer-events: none; animation: floatUp linear forwards; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="mySong" loop preload="auto">
        <source src="https://files.catbox.moe/97a06z.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-card" id="login-box">
        <h2>VỢ YÊU ĐĂNG NHẬP ❤️</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="Nhập tên tài khoản...">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Nhập mật khẩu...">
            <span id="toggleEye" onclick="togglePass()">👁️</span>
        </div>
        <button id="btnSubmit" onclick="checkLogin()">MỞ QUÀ NGAY ✨</button>
        <p id="error-msg" style="color: yellow; font-weight: bold; margin-top: 15px; display: none; text-shadow: 0 0 10px #000;">VỢ IU NHẬP SAI ÒI ❌</p>
    </div>

    <div class="glass-card" id="main-content" style="display: none; width: 85%; max-width: 650px;">
        <h1 style="color: white; font-size: 2.5rem; text-shadow: 0 0 30px #ff00c8;">Chào Vợ Yêu Của Anh ❤️</h1>
        <div class="menu-grid">
            <div class="menu-btn">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-btn">CHUYỆN HIỆN TẠI</div>
            <div class="menu-btn">LỜI HỨA TƯƠNG LAI</div>
            <div class="menu-btn">LÝ DO ANH YÊU EM</div>
        </div>
    </div>

    <div id="music-btn" onclick="toggleMusic()">🔇</div>

    <script>
        const u_c = "anhyeuemlamdonha";
        const p_c = "xindungboroianh";

        function togglePass() {
            const p = document.getElementById('pass');
            const e = document.getElementById('toggleEye');
            p.type = (p.type === "password") ? "text" : "password";
            e.innerText = (p.type === "password") ? "👁️" : "🔒";
        }

        function checkLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const song = document.getElementById('mySong');
            const btn = document.getElementById('music-btn');

            if(u === u_c && p === p_c) {
                document.getElementById('login-box').style.transform = "translateY(-100vh) rotate(540deg)";
                document.getElementById('login-box').style.opacity = "0";
                
                setTimeout(() => {
                    document.getElementById('login-box').style.display = "none";
                    document.getElementById('main-content').style.display = "block";
                    btn.style.display = "flex";
                    
                    // PHÁT NHẠC
                    song.play().then(() => {
                        btn.innerText = "🔊";
                        btn.classList.add('playing');
                    }).catch(e => {
                        btn.innerText = "🔇";
                    });
                    
                    setInterval(spawnParticles, 80); // Tạo hạt ánh sáng dày hơn
                }, 700);
            } else {
                document.getElementById('error-msg').style.display = "block";
                document.getElementById('pass').value = "";
            }
        }

        function toggleMusic() {
            const s = document.getElementById('mySong');
            const b = document.getElementById('music-btn');
            if(s.paused) { 
                s.play(); b.innerText = "🔊"; b.classList.add('playing'); 
            } else { 
                s.pause(); b.innerText = "🔇"; b.classList.remove('playing'); 
            }
        }

        function spawnParticles() {
            const p = document.createElement('div');
            p.className = 'particle';
            const items = ['❤️', '✨', '💖', '💎', '🌈', '⭐'];
            p.innerHTML = items[Math.floor(Math.random()*items.length)];
            p.style.left = Math.random() * 100 + "vw";
            p.style.fontSize = Math.random() * 25 + 20 + "px";
            p.style.animationDuration = Math.random() * 2 + 2 + "s";
            p.style.filter = "drop-shadow(0 0 10px white)";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 4000);
        }
    </script>
</body>
</html>
