<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - ETERNAL MIRACLE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #ff2d75;
            --secondary: #00e5ff;
            --gold: #ffcf5e;
            --dark: #020205;
            --glass: rgba(5, 5, 15, 0.9);
            --neon-glow: 0 0 30px rgba(255, 45, 117, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; background: var(--dark); overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- MODULE 1: HỆ THỐNG NỀN THÀNH PHỐ BẤT TỬ --- */
        #viewport {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(circle at center, #101025 0%, #020205 100%);
        }

        #city-canvas-layer {
            position: absolute; inset: 0;
            background-image: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg');
            background-size: cover; background-position: center;
            opacity: 0.45; filter: contrast(1.3) brightness(0.6) saturate(0.8);
            z-index: 2; transform: scale(1.05); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Lớp giả lập ánh sáng đêm hắt lên từ phố xá */
        .city-glow {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, rgba(255, 45, 117, 0.1), transparent);
            z-index: 3; pointer-events: none;
        }

        /* --- MODULE 2: SUPREME FIREWORKS ENGINE --- */
        #fireworks-engine { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* --- MODULE 3: GIAO DIỆN ĐĂNG NHẬP VIP (MAGICAL GLASS) --- */
        .ui-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 520px; z-index: 1000; display: none;
            perspective: 2000px;
        }

        .supreme-card {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 60px; padding: 60px 45px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), var(--neon-glow);
            text-align: center; position: relative;
            transform-style: preserve-3d; transition: 0.5s;
        }

        .supreme-card::before {
            content: ''; position: absolute; inset: -5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--gold), var(--primary));
            background-size: 400%; z-index: -1; filter: blur(20px);
            border-radius: 65px; animation: flow 8s linear infinite; opacity: 0.5;
        }

        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

        .title-aura {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.6rem;
            color: #fff; margin-bottom: 45px; letter-spacing: 2px;
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }

        /* --- INPUT FIELD MODULE (FIX ICON 100%) --- */
        .input-wrap {
            position: relative; margin-bottom: 30px;
            transform-style: preserve-3d; transition: 0.3s;
        }

        .input-wrap i.field-icon {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            font-size: 24px; color: var(--primary); z-index: 10;
            filter: drop-shadow(0 0 10px var(--primary));
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%; padding: 24px 70px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; color: #fff; font-size: 18px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-wrap input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
            transform: scale(1.05) translateZ(30px);
        }

        .eye-btn {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #888; font-size: 20px; z-index: 11; padding: 5px;
        }

        .btn-ultimate {
            width: 100%; padding: 22px; background: linear-gradient(45deg, var(--primary), #ff758c);
            border: none; border-radius: 30px; color: #fff;
            font-weight: 900; font-size: 1.2rem; letter-spacing: 5px;
            cursor: pointer; transition: 0.5s;
            box-shadow: 0 15px 40px rgba(255, 45, 117, 0.4);
            text-transform: uppercase;
        }

        .btn-ultimate:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 60px var(--primary);
            letter-spacing: 8px;
        }

        /* --- MENU GRID SYSTEM --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .menu-item {
            background: rgba(255,255,255,0.03); padding: 35px 15px; border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s;
        }
        .menu-item:hover {
            background: var(--primary); transform: translateY(-10px);
            box-shadow: 0 20px 40px var(--primary);
        }
        .menu-item i { font-size: 40px; color: var(--gold); margin-bottom: 15px; display: block; filter: drop-shadow(0 0 10px var(--gold)); }
        .menu-item span { color: #fff; font-weight: 700; font-size: 15px; }

        /* --- PREMIUM MUSIC SYSTEM --- */
        #music-hub {
            position: fixed; top: 40px; right: 40px; z-index: 99999;
            width: 90px; height: 90px; cursor: pointer; display: none;
        }
        .vinyl-3d {
            width: 100%; height: 100%; border-radius: 50%;
            background: repeating-radial-gradient(#111, #111 10%, #222 15%);
            border: 5px solid #333; position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--primary); transition: 0.5s;
        }
        .vinyl-3d i { color: var(--primary); font-size: 35px; filter: drop-shadow(0 0 10px var(--primary)); }
        .spin { animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- NOTIFICATION & INTRO --- */
        #notif {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            background: #fff; color: var(--primary); padding: 25px 60px;
            border-radius: 100px; font-weight: 900; z-index: 1000000;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; align-items: center; gap: 20px; font-size: 1.2rem;
        }
        #notif.active { top: 50px; }

        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: #fff;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="city-canvas-layer"></div>
        <div class="city-glow"></div>
    </div>

    <canvas id="fireworks-engine"></canvas>

    <div id="notif">
        <i class="fas fa-heart-circle-exclamation fa-beat"></i>
        <span id="notif-txt">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="intro" onclick="initCore()">
        <div class="fa-beat" style="font-size: 150px; color: var(--primary); filter: drop-shadow(0 0 40px var(--primary));">
            <i class="fas fa-heart-pulse"></i>
        </div>
        <h1 style="margin-top: 60px; letter-spacing: 25px; font-weight: 300; opacity: 0.8;">MỞ TRÁI TIM</h1>
    </div>

    <div id="music-hub" onclick="handleAudio()">
        <div class="vinyl-3d" id="vinyl-ui">
            <i class="fas fa-music"></i>
        </div>
    </div>
    <div id="yt-api-node"></div>

    <div class="ui-container" id="auth-ui">
        <div class="supreme-card">
            <h2 class="title-aura">BÌNH MINH ❤️ THUÝ VÂN</h2>
            
            <div class="input-wrap">
                <i class="fas fa-user-crown field-icon"></i>
                <input type="text" id="inp-u" placeholder="Tài khoản của baby" autocomplete="off">
            </div>

            <div class="input-wrap">
                <i class="fas fa-key-heart field-icon"></i>
                <input type="password" id="inp-p" placeholder="Mật khẩu của bé iu" autocomplete="off">
                <div class="eye-btn" onclick="toggleSecret()"><i class="fas fa-eye" id="eye-ui"></i></div>
            </div>

            <button class="btn-ultimate" onclick="verifyAccess()">Đăng nhập vào trái tim</button>
        </div>
    </div>

    <div class="ui-container" id="menu-ui">
        <div class="supreme-card">
            <h2 class="title-aura" style="font-size: 2rem;">GỬI THUÝ VÂN</h2>
            <div class="menu-grid">
                <div class="menu-item" onclick="massive(15)"><i class="fas fa-calendar-heart"></i><span>Kỉ niệm</span></div>
                <div class="menu-item" onclick="massive(15)"><i class="fas fa-heart-pulse"></i><span>Hiện tại</span></div>
                <div class="menu-item" onclick="massive(15)"><i class="fas fa-sparkles"></i><span>Tương lai</span></div>
                <div class="menu-item" onclick="finalSurprise()"><i class="fas fa-face-laugh-beam"></i><span>Yêu em</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /**
         * ETERNAL ENGINE V150 - CORE LOGIC
         */
        const canvas = document.getElementById('fireworks-engine');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-canvas-layer');
        
        let w, h, player, mActive = false;
        let rockets = [], particles = [];

        function setBounds() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setBounds);
        setBounds();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.008;
                this.gravity = 0.18;
            }
            update() {
                this.vx *= 0.94; this.vy *= 0.94; this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
                this.velocity = -Math.random() * 5 - 14;
            }
            update() {
                this.y += this.velocity;
                if(this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            explode() {
                // LIGHTING REACTION
                city.style.filter = "brightness(2.2) contrast(1.6) saturate(1.8)";
                city.style.transform = "scale(1.08)";
                setTimeout(() => {
                    city.style.filter = "brightness(0.6) contrast(1.3) saturate(0.8)";
                    city.style.transform = "scale(1.05)";
                }, 300);
                for(let i=0; i<250; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
            draw() {
                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
                ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, 7); ctx.fill();
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-api-node', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function handleAudio() {
            const vinyl = document.getElementById('vinyl-ui');
            if(mActive) {
                player.pauseVideo(); vinyl.classList.remove('spin');
                mActive = false;
            } else {
                player.unMute(); player.playVideo();
                vinyl.classList.add('spin');
                mActive = true;
            }
        }

        function verifyAccess() {
            const u = document.getElementById('inp-u').value;
            const p = document.getElementById('inp-p').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
                massive(25);
            } else {
                const box = document.getElementById('notif');
                box.classList.add('active');
                setTimeout(() => box.classList.remove('active'), 3500);
            }
        }

        function toggleSecret() {
            const p = document.getElementById('inp-p');
            const eye = document.getElementById('eye-ui');
            p.type = p.type === 'password' ? 'text' : 'password';
            eye.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }

        function initCore() {
            document.getElementById('intro').style.transition = "1.5s cubic-bezier(0.19, 1, 0.22, 1)";
            document.getElementById('intro').style.transform = "translateY(-100%)";
            setTimeout(() => {
                document.getElementById('intro').style.display = "none";
                document.getElementById('auth-ui').style.display = "block";
                document.getElementById('music-hub').style.display = "block";
                handleAudio();
                setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 900);
            }, 1000);
        }

        function massive(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function finalSurprise() { alert('Thuý Vân à, em là điều tuyệt vời nhất của anh!'); massive(40); }

        function loop() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.25)';
            ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
