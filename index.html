<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH YÊU EM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600;700&family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --p: #ff2d75;
            --p-g: linear-gradient(45deg, #ff2d75, #ff5e3a);
            --gold: #ffb700;
            --glass: rgba(0, 0, 0, 0.7);
            --blur: blur(25px);
            --font-main: 'Quicksand', sans-serif;
            --font-hero: 'Cinzel Decorative', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body, html {
            width: 100%; height: 100%;
            background: #000; overflow: hidden;
            font-family: var(--font-main); color: #fff;
        }

        /* --- LAYER 1: THÀNH PHỐ HDR --- */
        #city-viewport {
            position: fixed; inset: 0; z-index: 1;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0) contrast(1.2); /* Mặc định tối đen */
            transition: filter 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
            transform: scale(1.1);
        }

        #sky-overlay {
            position: absolute; inset: 0; z-index: 2;
            background: radial-gradient(circle at center, transparent, #000);
        }

        canvas#fireworks-layer {
            position: absolute; inset: 0; z-index: 10;
            pointer-events: none;
        }

        /* --- LAYER 2: CUSTOM NOTIFICATION (FIX LỖI ALERT TRẮNG) --- */
        #custom-alert {
            position: fixed; top: -100px; left: 50%;
            transform: translateX(-50%);
            background: var(--p-g);
            padding: 20px 40px; border-radius: 50px;
            z-index: 10000; font-weight: 700;
            box-shadow: 0 10px 30px rgba(255, 45, 117, 0.5);
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 15px;
        }
        #custom-alert.show { top: 40px; }

        /* --- LAYER 3: VINYL PLAYER (LOA SỐNG ĐỘNG) --- */
        #music-box {
            position: fixed; bottom: 40px; left: 40px; z-index: 5000;
            cursor: pointer; opacity: 0; transition: 1s;
        }
        .vinyl-wrap {
            width: 80px; height: 80px; border-radius: 50%;
            background: #111; border: 3px solid #333;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--p);
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- LAYER 4: LOGIN PANEL (PRISM UI) --- */
        .prism-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 90%; max-width: 550px;
            padding: 80px 50px; background: var(--glass);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            z-index: 2000; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; opacity: 0; visibility: hidden;
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .prism-card.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .hero-text {
            font-family: var(--font-hero); font-size: 2.8rem;
            margin-bottom: 40px; line-height: 1.2;
            background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .input-group { position: relative; margin-bottom: 30px; }
        .input-group i {
            position: absolute; left: 25px; top: 50%;
            transform: translateY(-50%); color: var(--p);
            animation: pulse-icon 2s infinite;
        }
        @keyframes pulse-icon { 0%, 100% { transform: translateY(-50%) scale(1); } 50% { transform: translateY(-50%) scale(1.2); } }

        .input-group input {
            width: 100%; padding: 22px 65px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; color: #fff; font-size: 18px; outline: none; transition: 0.4s;
        }
        .input-group input:focus { border-color: var(--p); box-shadow: 0 0 20px rgba(255,45,117,0.3); }

        .btn-glow {
            width: 100%; padding: 22px; background: var(--p-g);
            border: none; border-radius: 20px; color: #fff;
            font-size: 1.2rem; font-weight: 900; letter-spacing: 5px;
            cursor: pointer; transition: 0.5s;
        }
        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--p); }

        /* --- LAYER 5: MENU (SỐNG ĐỘNG) --- */
        .icon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .icon-card {
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px;
            transition: 0.4s; cursor: pointer; border: 1px solid transparent;
        }
        .icon-card:hover { 
            background: var(--p); border-color: #fff; transform: translateY(-10px); 
        }
        .icon-card i { font-size: 35px; margin-bottom: 15px; display: block; animation: swing 3s infinite ease-in-out; }
        @keyframes swing { 0% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } 100% { transform: rotate(-10deg); } }

        /* --- INTRO --- */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 1.5s;
        }
        #intro h1 { font-size: 4rem; letter-spacing: 20px; text-shadow: 0 0 30px var(--p); }

    </style>
</head>
<body>

    <div id="city-viewport"></div>
    <div id="sky-overlay"></div>
    <canvas id="fireworks-layer"></canvas>

    <div id="custom-alert">
        <i class="fas fa-heart-crack"></i>
        <span id="alert-msg">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="intro" onclick="startApp()">
        <h1>CHẠM</h1>
        <i class="fas fa-heart fa-beat" style="font-size: 100px; color: var(--p);"></i>
    </div>

    <div id="music-box" onclick="toggleAudio()">
        <div class="vinyl-wrap"><div id="disc" style="width:90%; height:90%; border-radius:50%; background:repeating-radial-gradient(#222, #000 5px); display:flex; align-items:center; justify-content:center;"><i class="fas fa-music"></i></div></div>
    </div>
    <div id="yt-player"></div>

    <div class="prism-card" id="login-ui">
        <h2 class="hero-text">PHÙNG LÝ BÌNH MINH<br>YÊU EM</h2>
        <div class="input-group">
            <i class="fas fa-user-heart"></i>
            <input type="text" id="u" placeholder="TÊN VỢ" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-lock-hashtag"></i>
            <input type="password" id="p" placeholder="MẬT MÃ" autocomplete="off">
        </div>
        <button class="btn-glow" onclick="check()">ĐĂNG NHẬP</button>
    </div>

    <div class="prism-card" id="menu-ui">
        <h2 class="hero-text" style="font-size: 2.2rem;">ĐIỀU ANH MUỐN NÓI</h2>
        <div class="icon-grid">
            <div class="icon-card" onclick="boom(5)"><i class="fas fa-star"></i>KỶ NIỆM</div>
            <div class="icon-card" onclick="boom(5)"><i class="fas fa-fire"></i>NỒNG NÀN</div>
            <div class="icon-card" onclick="boom(5)"><i class="fas fa-infinity"></i>MÃI MÃI</div>
            <div class="icon-card" onclick="alertMsg('Bình Minh sẽ luôn yêu em!')"><i class="fas fa-crown"></i>LỜI HỨA</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fireworks-layer');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-viewport');
        const disc = document.getElementById('disc');
        
        let w, h, player, isPlay = false, rot = 0;
        let rockets = [], particles = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        /* --- CLASS HẠT PHÁO (VẬT LÝ SIÊU THỰC) --- */
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.95; this.gravity = 0.2;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.005;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction; this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.tx = this.x; this.ty = Math.random() * (h * 0.4);
                this.speed = 15; this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                this.y -= this.speed; this.speed *= 0.99;
                if (this.y <= this.ty) {
                    this.explode(); return false;
                }
                return true;
            }
            explode() {
                // CHIẾU SÁNG THÀNH PHỐ (DYNAMIC LIGHTING)
                city.style.filter = "brightness(0.9) contrast(1.5) saturate(1.5)";
                setTimeout(() => city.style.filter = "brightness(0) contrast(1.2)", 500);
                for(let i=0; i<200; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
        }

        /* --- SYSTEM LOGIC --- */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAudio() {
            if(isPlay) { player.pauseVideo(); isPlay = false; }
            else { player.unMute(); player.playVideo(); isPlay = true; spin(); }
        }

        function spin() { if(!isPlay) return; rot += 3; disc.style.transform = `rotate(${rot}deg)`; requestAnimationFrame(spin); }

        function alertMsg(txt) {
            const el = document.getElementById('custom-alert');
            document.getElementById('alert-msg').innerText = txt;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function startApp() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-ui').classList.add('active');
                document.getElementById('music-box').style.opacity = '1';
                toggleAudio();
                setInterval(() => { if(Math.random() < 0.1) rockets.push(new Rocket()); }, 1000);
            }, 1000);
        }

        function check() {
            const uu = document.getElementById('u').value;
            const pp = document.getElementById('p').value;
            if(uu === "anhyeuemlamdonha" && pp === "xindungboroianh") {
                document.getElementById('login-ui').classList.remove('active');
                setTimeout(() => document.getElementById('menu-ui').classList.add('active'), 800);
            } else {
                alertMsg('VỢ IU NHẬP SAI ÒI ĐÓ');
            }
        }

        function boom(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*300); }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, 0, w, h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
