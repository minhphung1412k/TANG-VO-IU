<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Vợ Yêu ❤️</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #fff0f3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Màn hình đăng nhập */
        #login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.2);
            text-align: center;
            width: 320px;
            z-index: 100;
            border: 3px solid #ffb3c1;
            transition: all 0.5s ease;
        }

        h2 { color: var(--primary-color); margin-bottom: 30px; font-size: 1.2rem; }

        .input-group { position: relative; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #eee;
            border-radius: 50px;
            outline: none;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        #toggleEye {
            position: absolute; right: 20px; top: 12px;
            cursor: pointer; font-size: 1.3rem;
        }

        button#btnSubmit {
            background: var(--primary-color);
            color: white; border: none; padding: 14px;
            width: 100%; border-radius: 50px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }

        button#btnSubmit:hover { transform: translateY(-3px); }

        #error-msg { color: #ff0000; font-weight: bold; margin-top: 15px; display: none; }

        /* Màn hình nội dung */
        #main-content {
            display: none; text-align: center; width: 90%;
            max-width: 500px; animation: fadeIn 2s ease;
        }

        h1 { color: var(--primary-color); font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-top: 40px;
        }

        .menu-btn {
            background: white; padding: 25px 15px;
            border-radius: 20px; border: 2px solid #ffb3c1;
            color: var(--primary-color); font-weight: bold;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .menu-btn:hover { background: var(--primary-color); color: white; transform: scale(1.05); }

        /* Nút loa điều khiển nhạc */
        #music-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: white; width: 60px; height: 60px;
            border-radius: 50%; border: 2px solid var(--primary-color);
            font-size: 25px; cursor: pointer; display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            z-index: 1000; transition: 0.3s;
        }

        /* Hiệu ứng trái tim */
        .heart {
            position: absolute; color: var(--primary-color);
            animation: fly 5s linear infinite; pointer-events: none;
        }

        @keyframes fly {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-box">
        <h2>VỢ YÊU ĐĂNG NHẬP MỚI ĐƯỢC XEM ❤️</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="Tài khoản của vợ...">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Mật khẩu bí mật...">
            <span id="toggleEye">👁️</span>
        </div>
        <button id="btnSubmit">Mở Quà Ngay ✨</button>
        <p id="error-msg">VỢ IU NHẬP SAI ÒI ❌</p>
    </div>

    <div id="main-content">
        <h1>Gửi Vợ Yêu Của Anh ❤️</h1>
        <div class="menu-grid">
            <div class="menu-btn" onclick="alert('Phần này do bạn tự viết nha!')">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-btn" onclick="alert('Phần này do bạn tự viết nha!')">CHUYỆN HIỆN TẠI</div>
            <div class="menu-btn" onclick="alert('Phần này do bạn tự viết nha!')">LỜI HỨA CỦA TƯƠNG LAI</div>
            <div class="menu-btn" onclick="alert('Phần này do bạn tự viết nha!')">LÝ DO ANH YÊU EM</div>
        </div>
    </div>

    <button id="music-btn">🔇</button>
    <audio id="mySong" loop>
        <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Impact_Andante/Kevin_MacLeod_-_Impact_Andante.mp3" type="audio/mpeg">
        </audio>

    <script>
        // Tài khoản & Mật khẩu
        const CORRECT_USER = "anhyeuemlamdonha";
        const CORRECT_PASS = "xindungboroianh";

        const passInput = document.getElementById('pass');
        const eyeBtn = document.getElementById('toggleEye');
        const musicBtn = document.getElementById('music-btn');
        const song = document.getElementById('mySong');

        // Hiện ẩn mật khẩu
        eyeBtn.addEventListener('click', () => {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeBtn.innerText = '🔒';
            } else {
                passInput.type = 'password';
                eyeBtn.innerText = '👁️';
            }
        });

        // Đăng nhập
        document.getElementById('btnSubmit').addEventListener('click', () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();

            if (u === CORRECT_USER && p === CORRECT_PASS) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                musicBtn.style.display = 'block';
                
                // Phát nhạc & Đổi icon loa sang KHÔNG có dấu x
                song.play();
                musicBtn.innerText = '🔊';
                startHearts();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                passInput.value = "";
            }
        });

        // Bật/Tắt loa (Loa hiện dấu X khi tắt)
        musicBtn.addEventListener('click', () => {
            if (song.paused) {
                song.play();
                musicBtn.innerText = '🔊';
            } else {
                song.pause();
                musicBtn.innerText = '🔇';
            }
        });

        function startHearts() {
            setInterval(() => {
                const h = document.createElement('div');
                h.classList.add('heart');
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 20 + 15) + 'px';
                h.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
