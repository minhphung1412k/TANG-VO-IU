<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #ff2d75; --s: #00e5ff; --g: #ffcf5e; --bg: #010103;
            --accent: rgba(255, 45, 117, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        /* --- CINEMATIC CORE ENGINE --- */
        #main-stage { position: fixed; inset: 0; z-index: 1; overflow: hidden; }
        canvas#render-canvas { position: absolute; inset: 0; z-index: 5; }

        /* --- THE LIVING CITY (THÀNH PHỐ LINH HỒN) --- */
        .city-wrap {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #020205 0%, #08081a 100%);
            z-index: 2;
        }
        .sky-glow {
            position: absolute; bottom: 0; width: 100%; height: 60%;
            background: radial-gradient(circle at 50% 100%, var(--accent) 0%, transparent 70%);
            opacity: 0.5;
        }

        /* --- UI LAYER --- */
        .ui-overlay {
            position: relative; z-index: 100; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        .master-box {
            width: 88%; max-width: 420px; padding: 40px 25px;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 45px; text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.05);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .hero-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.1rem; margin-bottom: 35px;
            background: linear-gradient(135deg, #fff 0%, var(--p) 50%, var(--s) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,45,117,0.4));
        }

        /* --- INPUT FIELD EVOLUTION --- */
        .input-group { position: relative; margin-bottom: 22px; }
        .input-group input {
            width: 100%; padding: 20px 25px; padding-left: 55px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            color: #fff; font-size: 16px; transition: 0.4s;
        }
        .input-group input:focus { 
            background: rgba(255,255,255,0.08); 
            border-color: var(--s); box-shadow: 0 0 20px rgba(0,229,255,0.15);
        }
        .icon-lead { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 20px; fill: var(--s); opacity: 0.8; }
        
        /* FIX ICON MẮT - SANG TRỌNG & CHUẨN XÁC */
        .eye-toggle {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            cursor: pointer; width: 24px; height: 24px; z-index: 10;
        }
        .eye-toggle svg { fill: #fff; opacity: 0.5; transition: 0.3s; }
        .eye-toggle:hover svg { opacity: 1; filter: drop-shadow(0 0 5px var(--p)); }

        /* --- BUTTONS AS ART --- */
        .btn-divine {
            width: 100%; padding: 20px; margin-top: 10px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, var(--p), #8e24aa);
            color: #fff; font-weight: 800; letter-spacing: 4px; cursor: pointer;
            box-shadow: 0 10px 40px rgba(255,45,117,0.3); transition: 0.4s;
        }
        .btn-divine:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 20px 50px var(--p); }

        /* --- MENU GRID REDESIGN --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 25px; }
        .menu-item {
            background: rgba(255,255,255,0.03); padding: 30px 10px; border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.5s;
        }
        .menu-item:hover {
            background: rgba(255, 45, 117, 0.15);
            border-color: var(--p); transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(255,45,117,0.2);
        }
        .menu-item svg { width: 32px; fill: var(--g); margin-bottom: 12px; filter: drop-shadow(0 0 8px var(--g)); }
        .menu-item span { display: block; font-weight: 700; font-size: 13px; letter-spacing: 1px; color: #eee; }

        /* --- INTRO SCREEN --- */
        #intro-gate {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .gate-heart { width: 100px; fill: var(--p); filter: drop-shadow(0 0 40px var(--p)); animation: gateBeat 1.5s infinite; }
        @keyframes gateBeat { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }

        /* --- NOTIFICATION --- */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: var(--p); padding: 18px 40px; border-radius: 50px;
            font-weight: 800; z-index: 10000; transition: 0.6s;
        }
        #toast.active { top: 30px; }

        #music-ctrl {
            position: fixed; top: 30px; right: 30px; z-index: 500; display: none;
        }
        .music-btn {
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--s);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: rgba(0,0,0,0.6); box-shadow: 0 0 20px var(--s);
        }
    </style>
</head>
<body>

    <div id="intro-gate" onclick="unlock()">
        <svg class="gate-heart" viewBox="0 0 32 32"><path d="M16 28.5s-12-7-12-14.5c0-4 3-7 7-7 2.5 0 4.5 1.5 5 3.5.5-2 2.5-3.5 5-3.5 4 0 7 3 7 7 0 7.5-12 14.5-12 14.5z"/></svg>
        <p style="margin-top: 30px; letter-spacing: 10px; font-size: 12px; opacity: 0.6;">CHẠM VÀO TRÁI TIM</p>
    </div>

    <div id="main-stage">
        <div class="city-wrap">
            <div id="city-layer"></div>
            <div class="sky-glow"></div>
        </div>
        <canvas id="render-canvas"></canvas>
    </div>

    <div id="music-ctrl" onclick="toggleAudio()">
        <div class="music-btn" id="music-ui"><svg style="width:20px; fill:var(--s)" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
    </div>
    <div id="yt-api"></div>

    <div class="ui-overlay">
        <div class="master-box" id="box-login" style="display: none;">
            <h1 class="hero-title">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-group">
                <svg class="icon-lead" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="inp-u" placeholder="Tên tài khoản vợ iu">
            </div>
            <div class="input-group">
                <svg class="icon-lead" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="inp-p" placeholder="Mật khẩu của chúng mình">
                <div class="eye-toggle" onclick="eyeToggle()">
                    <svg id="eye-svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </div>
            </div>
            <button class="btn-divine" onclick="login()">BẮT ĐẦU HÀNH TRÌNH</button>
        </div>

        <div class="master-box" id="box-menu" style="display: none; transform: translateY(30px); opacity: 0;">
            <h1 class="hero-title" style="font-size: 1.7rem;">GỬI THUÝ VÂN</h1>
            <div class="menu-grid">
                <div class="menu-item" onclick="blast(15)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>KỈ NIỆM</span></div>
                <div class="menu-item" onclick="blast(15)"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg><span>HIỆN TẠI</span></div>
                <div class="menu-item" onclick="blast(15)"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span>TƯƠNG LAI</span></div>
                <div class="menu-item" onclick="surprise()"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>YÊU EM</span></div>
            </div>
        </div>
    </div>

    <div id="toast">NHẬP SAI RỒI VỢ IU ƠI! ❤️</div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, player, playing = false;
        let particles = [], rockets = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        // CITY ENGINE 4.0 (Tạo thành phố thuật toán)
        function buildCity() {
            const cityLayer = document.getElementById('city-layer');
            let html = '';
            for(let i=0; i<30; i++) {
                const height = 10 + Math.random() * 40;
                const width = 5 + Math.random() * 10;
                const left = Math.random() * 95;
                const delay = Math.random() * 5;
                html += `<div style="position:absolute; bottom:0; left:${left}%; width:${width}%; height:${height}%; background:#050510; border-top:1px solid rgba(255,255,255,0.05); z-index:3">
                    <div style="width:100%; height:100%; opacity:0.3; background-image:radial-gradient(var(--g) 1px, transparent 1px); background-size: 10px 15px; animation: flicker 3s infinite ${delay}s"></div>
                </div>`;
            }
            cityLayer.innerHTML = html;
        }
        buildCity();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.01 + 0.005;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.15; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.5);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.speed = -Math.random() * 4 - 11;
            }
            update() { this.y += this.speed; if(this.y <= this.targetY) { this.explode(); return false; } return true; }
            draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill(); }
            explode() { for(let i=0; i<100; i++) particles.push(new Particle(this.x, this.y, this.color)); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-api', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAudio() {
            const ui = document.getElementById('music-ui');
            if(playing) { player.mute(); ui.style.opacity = "0.5"; playing = false; }
            else { player.unMute(); player.playVideo(); ui.style.opacity = "1"; playing = true; }
        }

        function eyeToggle() {
            const p = document.getElementById('inp-p');
            const svg = document.getElementById('eye-svg');
            if(p.type === 'password') {
                p.type = 'text';
                svg.innerHTML = '<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3-3zM12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/>';
            } else {
                p.type = 'password';
                svg.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
            }
        }

        function unlock() {
            document.getElementById('intro-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-gate').style.display = 'none';
                document.getElementById('box-login').style.display = 'block';
                document.getElementById('music-ctrl').style.display = 'block';
                toggleAudio();
                setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 800);
                render();
            }, 1000);
        }

        function login() {
            const u = document.getElementById('inp-u').value, p = document.getElementById('inp-p').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('box-login').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('box-login').style.display = 'none';
                    const menu = document.getElementById('box-menu');
                    menu.style.display = 'block';
                    setTimeout(() => { menu.style.opacity = '1'; menu.style.transform = 'translateY(0)'; }, 50);
                    blast(25);
                }, 600);
            } else {
                const t = document.getElementById('toast');
                t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 3000);
            }
        }

        function blast(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function surprise() { alert('Bình Minh yêu Thuý Vân hơn tất cả mọi thứ!'); blast(30); }

        function render() {
            ctx.fillStyle = 'rgba(1, 1, 3, 0.25)';
            ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(render);
        }
    </script>
    <style> @keyframes flicker { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } } </style>
</body>
</html>
