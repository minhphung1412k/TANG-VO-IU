<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH YÊU EM</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@900&family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #ff2d75;
            --p-glow: 0 0 30px rgba(255, 45, 117, 0.8);
            --glass: rgba(0, 0, 0, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- LAYER 1: THÀNH PHỐ ĐÊM (DÙNG ẢNH CỦA BẠN) --- */
        #city-viewport {
            position: fixed; inset: 0; z-index: 1;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.02) contrast(1.8) saturate(0.5); /* Tối tối le lói cực thực */
            transition: filter 0.1s ease;
            transform: scale(1.1);
        }

        /* Lớp ánh sáng loang màu trên thành phố */
        #light-diffusion {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none; mix-blend-mode: screen;
            opacity: 0; transition: opacity 0.1s;
        }

        canvas#fireworks-engine { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

        /* --- LAYER 2: NOTIFICATION (FIX LỖI ALERT TRẮNG) --- */
        #custom-alert {
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(45deg, #ff2d75, #ff5e3a);
            padding: 20px 45px; border-radius: 100px; z-index: 100000;
            color: #fff; font-weight: 700; font-size: 1.1rem;
            box-shadow: 0 20px 50px rgba(255, 45, 117, 0.6);
            transition: 0.8s cubic-bezier(0.68, -0.6, 0.32, 1.6);
            display: flex; align-items: center; gap: 15px;
        }
        #custom-alert.show { top: 40px; }

        /* --- LAYER 3: LOGIN PANEL (GIAO DIỆN VŨ TRỤ) --- */
        .cosmic-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 90%; max-width: 500px; padding: 70px 40px;
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 60px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; opacity: 0; visibility: hidden;
            transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 5000; box-shadow: 0 0 100px rgba(0,0,0,1);
        }
        .cosmic-card.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .hero-text {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.8rem;
            background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px; animation: glowPulse 3s infinite;
        }
        @keyframes glowPulse { 0%, 100% { filter: drop-shadow(0 0 5px var(--p)); } 50% { filter: drop-shadow(0 0 25px var(--p)); } }

        /* --- INPUTS & ICONS (FIX HOÀN TOÀN) --- */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group i.main-icon {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            color: var(--p); font-size: 22px; z-index: 10;
        }
        .input-group input {
            width: 100%; padding: 22px 65px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            color: #fff; font-size: 17px; outline: none; transition: 0.4s;
        }
        .input-group input:focus { border-color: var(--p); background: rgba(255,255,255,0.08); }

        /* Mắt ẩn hiện mật khẩu - Đã Fix */
        .eye-btn {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #777; z-index: 100; padding: 5px; transition: 0.3s;
        }
        .eye-btn:hover { color: #fff; transform: translateY(-50%) scale(1.2); }

        .btn-supreme {
            width: 100%; padding: 22px; background: linear-gradient(45deg, #ff2d75, #ff5e3a);
            border: none; border-radius: 25px; color: #fff; font-size: 1.3rem;
            font-weight: 900; letter-spacing: 5px; cursor: pointer; transition: 0.5s;
            box-shadow: 0 10px 30px rgba(255, 45, 117, 0.4);
        }
        .btn-supreme:hover { transform: translateY(-8px); box-shadow: 0 20px 60px var(--p); }

        /* --- MENU (GIAO DIỆN SỐNG) --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .menu-item {
            background: rgba(255,255,255,0.03); padding: 30px 15px; border-radius: 30px;
            cursor: pointer; transition: 0.5s; border: 1px solid transparent;
        }
        .menu-item:hover { background: var(--p); transform: translateY(-15px) rotate(3deg); border-color: #fff; }
        .menu-item i { font-size: 35px; margin-bottom: 15px; display: block; animation: swing 3s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }

        /* --- VINYL PLAYER --- */
        #music-box {
            position: fixed; top: 35px; right: 35px; z-index: 9999;
            width: 85px; height: 85px; cursor: pointer; opacity: 0; transition: 2s;
        }
        .disc-wrap {
            width: 100%; height: 100%; border-radius: 50%; background: #111;
            border: 4px solid #333; box-shadow: 0 0 30px var(--p);
            display: flex; align-items: center; justify-content: center;
        }
        .disc-inner { width: 90%; height: 90%; border-radius: 50%; background: repeating-radial-gradient(#222, #000 6px); display: flex; align-items: center; justify-content: center; }
        .disc-inner i { color: var(--p); font-size: 30px; }

        /* --- INTRO --- */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 100000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
        #intro h1 { font-family: 'Montserrat', sans-serif; font-size: 5rem; letter-spacing: 30px; color: #fff; }
    </style>
</head>
<body>

    <div id="city-viewport"></div>
    <div id="light-diffusion"></div>
    <canvas id="fireworks-engine"></canvas>

    <div id="custom-alert">
        <i class="fas fa-heart-circle-exclamation fa-beat"></i>
        <span id="alert-text">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="intro" onclick="startUniverse()">
        <h1 class="fa-beat">CHẠM</h1>
        <i class="fas fa-heart-pulse fa-beat" style="font-size: 100px; color: var(--p); margin-top: 40px;"></i>
    </div>

    <div id="music-box" onclick="toggleAudio()">
        <div class="disc-wrap"><div class="disc-inner" id="disc-ui"><i class="fas fa-compact-disc"></i></div></div>
    </div>
    <div id="youtube-target"></div>

    <div class="cosmic-card" id="auth-box">
        <h2 class="hero-text">PHÙNG LÝ BÌNH MINH<br>YÊU EM</h2>
        <div class="input-group">
            <i class="fas fa-user-astronaut main-icon"></i>
            <input type="text" id="u-in" placeholder="Nhập tài khoản đi baby" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-shuttle-space main-icon"></i>
            <input type="password" id="p-in" placeholder="Nhập mật khẩu nha bé iu" autocomplete="off">
            <div class="eye-btn" onclick="toggleView()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>
        <button class="btn-supreme" onclick="verify()">KHÁM PHÁ NGAY</button>
    </div>

    <div class="cosmic-card" id="menu-box">
        <h2 class="hero-text" style="font-size: 2.2rem;">ĐIỀU ANH MUỐN NÓI</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="boom(12)"><i class="fas fa-meteor" style="color:#ffeb3b"></i>KỶ NIỆM</div>
            <div class="menu-item" onclick="boom(12)"><i class="fas fa-heart-circle-check" style="color:#ff5252"></i>CẢM XÚC</div>
            <div class="menu-item" onclick="boom(12)"><i class="fas fa-infinity" style="color:#00e5ff"></i>VĨNH CỬU</div>
            <div class="menu-item" onclick="fireNotif('Anh sẽ yêu em đến tận cùng vũ trụ!')"><i class="fas fa-crown" style="color:#e1bee7"></i>LỜI HỨA</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fireworks-engine');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-viewport');
        const diffusion = document.getElementById('light-diffusion');
        
        let w, h, player, isMusic = false, rotation = 0;
        let rockets = [], particles = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        /* --- ENGINE PHÁO HOA & ÁNH SÁNG HDR --- */
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.01 + 0.006;
            }
            update() {
                this.vx *= 0.95; this.vy *= 0.95; this.vy += 0.2;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            update() {
                this.y -= 14;
                if (this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            explode() {
                // ĐIỂM NHẤN: THÀNH PHỐ BỪNG SÁNG THEO MÀU PHÁO
                city.style.filter = `brightness(1) contrast(2) saturate(1.5)`;
                diffusion.style.opacity = "1";
                diffusion.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}55 0%, transparent 75%)`;
                
                setTimeout(() => {
                    city.style.filter = `brightness(0.02) contrast(1.8) saturate(0.5)`;
                    diffusion.style.opacity = "0";
                }, 350);

                for(let i=0; i<350; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        /* --- HỆ THỐNG ĐIỀU KHIỂN --- */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-target', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAudio() {
            if(isMusic) { player.pauseVideo(); isMusic = false; }
            else { player.unMute(); player.playVideo(); isMusic = true; rotateDisc(); }
        }

        function rotateDisc() { if(!isMusic) return; rotation += 4; document.getElementById('disc-ui').style.transform = `rotate(${rotation}deg)`; requestAnimationFrame(rotateDisc); }

        function fireNotif(txt) {
            const el = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerText = txt;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3500);
        }

        function toggleView() {
            const f = document.getElementById('p-in');
            const i = document.getElementById('eye-icon');
            f.type = f.type === 'password' ? 'text' : 'password';
            i.className = f.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }

        function startUniverse() {
            document.getElementById('intro').style.transform = "translateY(-100%)";
            setTimeout(() => {
                document.getElementById('intro').style.display = "none";
                document.getElementById('auth-box').classList.add('active');
                document.getElementById('music-box').style.opacity = "1";
                toggleAudio();
                setInterval(() => { if(Math.random() < 0.15) rockets.push(new Rocket()); }, 800);
            }, 1000);
        }

        function verify() {
            const u = document.getElementById('u-in').value;
            const p = document.getElementById('p-in').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('auth-box').classList.remove('active');
                setTimeout(() => document.getElementById('menu-box').classList.add('active'), 1000);
            } else {
                fireNotif('VỢ IU NHẬP SAI ÒI ĐÓ');
            }
        }

        function boom(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*250); }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
