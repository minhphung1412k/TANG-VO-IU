<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - INFINITY 82</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #ff007b; --s: #00f2ff; --g: #ffd700; --v: #7000ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; color: #fff; }

        canvas { position: fixed; inset: 0; z-index: 1; }

        /* --- UI CẤU TRÚC ĐA TẦNG --- */
        .master-container {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.85) 100%);
        }

        .glass-box {
            width: 95%; max-width: 480px; padding: 60px 35px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
            box-shadow: 0 0 100px rgba(0,0,0,1);
            text-align: center; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .shimmer-text {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem;
            margin-bottom: 45px; background: linear-gradient(to right, #fff, var(--p), var(--s), #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite; filter: drop-shadow(0 0 15px var(--p));
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- INPUT & VỆ TINH CON MẮT --- */
        .input-wrapper { position: relative; margin-bottom: 30px; }
        .input-wrapper input {
            width: 100%; padding: 22px 30px; padding-right: 75px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; color: #fff; font-size: 16px; transition: 0.5s;
        }
        .input-wrapper input:focus { border-color: var(--s); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); transform: translateY(-2px); }

        .eye-vessel {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--p);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; transition: 0.4s;
            box-shadow: 0 0 15px var(--p);
        }
        .eye-vessel:hover { background: var(--p); transform: translateY(-50%) rotate(360deg) scale(1.1); }

        .btn-ignite {
            width: 100%; padding: 22px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, var(--p), var(--v));
            color: #fff; font-weight: 900; letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 20px 45px rgba(255,0,123,0.4); transition: 0.5s;
        }
        .btn-ignite:hover { transform: scale(1.05); box-shadow: 0 25px 60px var(--p); }

        /* --- MENU PHI ĐỐI XỨNG (ASYMMETRIC) --- */
        .dynamic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .grid-item {
            background: rgba(255,255,255,0.03); padding: 40px 10px; border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.6s;
        }
        .grid-item:nth-child(odd) { transform: translateY(-10px); }
        .grid-item:nth-child(even) { transform: translateY(10px); }
        .grid-item:hover { background: var(--s); color: #000; transform: scale(1.1) translateY(0) !important; box-shadow: 0 0 50px var(--s); }
        .grid-item i { font-size: 32px; margin-bottom: 15px; color: var(--g); display: block; }

        /* --- NÚT ÂM THANH VIP --- */
        #audio-toggle {
            position: fixed; top: 30px; right: 30px; z-index: 500;
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(0,0,0,0.6); border: 2px solid var(--s);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 20px var(--s); transition: 0.3s;
        }
        #audio-toggle:active { transform: scale(0.9); }
        .music-bars { display: flex; gap: 3px; align-items: flex-end; height: 20px; }
        .music-bars span { width: 3px; background: var(--s); animation: bar-rise 1s infinite alternate; }
        .music-bars span:nth-child(2) { animation-delay: 0.2s; }
        .music-bars span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bar-rise { from { height: 5px; } to { height: 20px; } }

        /* --- CỔNG VÀO (GATE) --- */
        #gate-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        .heart-icon { font-size: 100px; color: var(--p); filter: drop-shadow(0 0 40px var(--p)); animation: heart-throb 1.2s infinite; }
        @keyframes heart-throb { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        /* --- HIỆU ỨNG ZOOM DỊCH CHUYỂN --- */
        .zoom-warp { opacity: 0; transform: scale(5) rotate(20deg); filter: blur(50px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="gate-screen" onclick="startApp()">
        <i class="fa-solid fa-heart heart-icon"></i>
        <p style="margin-top: 40px; letter-spacing: 12px; color: rgba(255,255,255,0.5);">CHẠM ĐỂ SƯỚNG</p>
    </div>

    <div id="audio-toggle" onclick="toggleAudio()">
        <div class="music-bars" id="m-bars" style="display: none;">
            <span></span><span></span><span></span>
        </div>
        <i class="fa-solid fa-volume-xmark" id="m-off" style="color: var(--s);"></i>
    </div>

    <canvas id="fireworks-canvas"></canvas>
    <div id="player-container" style="position: absolute; visibility: hidden;"></div>

    <div class="master-container">
        <div class="glass-box" id="box-login" style="display: none;">
            <h1 class="shimmer-text">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-wrapper">
                <input type="text" id="user" placeholder="nhập tài khoản đi bây bi">
            </div>
            <div class="input-wrapper">
                <input type="password" id="pass" placeholder="nhập mật khẩu bé ưi">
                <div class="eye-vessel" onclick="togglePass()">
                    <i class="fa-solid fa-eye" id="e-icon"></i>
                </div>
            </div>
            <button class="btn-ignite" onclick="checkAccess()">TRUY CẬP TRÁI TIM</button>
        </div>

        <div class="glass-box" id="box-menu" style="display: none; opacity: 0; transform: scale(0.2);">
            <h1 class="shimmer-text" style="font-size: 1.8rem;">GỬI THUÝ VÂN</h1>
            <div class="dynamic-grid">
                <div class="grid-item" onclick="blast(20)"><i class="fa-solid fa-moon"></i><span>KỈ NIỆM</span></div>
                <div class="grid-item" onclick="blast(20)"><i class="fa-solid fa-bolt"></i><span>HIỆN TẠI</span></div>
                <div class="grid-item" onclick="blast(20)"><i class="fa-solid fa-rocket"></i><span>TƯƠNG LAI</span></div>
                <div class="grid-item" onclick="loveCall()"><i class="fa-solid fa-heart-pulse"></i><span>YÊU EM</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, ytPlayer, isMuted = true;
        let rockets = [], particles = [], builds = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            initBuildings();
        }
        window.onresize = resize;

        function initBuildings() {
            builds = [];
            for(let i=0; i<45; i++) {
                builds.push({
                    x: Math.random() * w,
                    w: 35 + Math.random() * 80,
                    h: 50 + Math.random() * (h * 0.4),
                    hue: Math.random() > 0.5 ? 330 : 200,
                    blinkRate: Math.random() * 0.05
                });
            }
        }

        class Part {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = 0.008 + Math.random() * 0.012;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.15; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color; ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, 7); ctx.fill(); ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.target = Math.random() * (h * 0.5);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            update() {
                this.y -= 12;
                if(this.y <= this.target) {
                    for(let i=0; i<180; i++) particles.push(new Part(this.x, this.y, this.color));
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3.5, 0, 7); ctx.fill();
            }
        }

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player-container', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAudio() {
            const bars = document.getElementById('m-bars');
            const off = document.getElementById('m-off');
            if(isMuted) {
                ytPlayer.unMute(); ytPlayer.playVideo(); isMuted = false;
                bars.style.display = 'flex'; off.style.display = 'none';
            } else {
                ytPlayer.mute(); isMuted = true;
                bars.style.display = 'none'; off.style.display = 'block';
            }
        }

        function startApp() {
            document.getElementById('gate-screen').classList.add('zoom-warp');
            setTimeout(() => {
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('box-login').style.display = 'block';
                resize(); loop();
                setInterval(() => { if(Math.random() < 0.25) rockets.push(new Rocket()); }, 600);
            }, 1000);
        }

        function checkAccess() {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                const login = document.getElementById('box-login');
                login.style.transform = "scale(0) rotate(720deg)"; login.style.opacity = "0";
                setTimeout(() => {
                    login.style.display = 'none';
                    const menu = document.getElementById('box-menu');
                    menu.style.display = 'block';
                    setTimeout(() => { menu.style.opacity = "1"; menu.style.transform = "scale(1)"; }, 100);
                    blast(30);
                }, 1200);
            } else { alert("Nhập sai rồi bé ưi! ❤️"); }
        }

        function togglePass() {
            const inp = document.getElementById('pass'), ic = document.getElementById('e-icon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            ic.className = inp.type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
        }

        function blast(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*150); }
        function loveCall() { alert('Bình Minh yêu Thuý Vân nhất hệ mặt trời!'); blast(40); }

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0,0,w,h);
            builds.forEach(b => {
                ctx.fillStyle = '#050510'; ctx.fillRect(b.x, h - b.h, b.w, b.h);
                ctx.strokeStyle = `hsla(${b.hue}, 100%, 50%, 0.3)`; ctx.strokeRect(b.x, h - b.h, b.w, b.h);
                if(Math.random() < b.blinkRate) {
                    ctx.fillStyle = `hsla(${b.hue}, 100%, 70%, 0.5)`;
                    ctx.fillRect(b.x + 5, h - b.h + 10, b.w - 10, 10);
                }
            });
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
