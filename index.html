<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÌNH MINH YÊU THUÝ VÂN</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">

    <style>
        :root { --p: #ff2d75; --gold: #ffcf5e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- NỀN THÀNH PHỐ (FIX CỨNG HIỂN THỊ) --- */
        #bg-city {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg');
            background-size: cover; background-position: center;
            z-index: 1; filter: brightness(0.4);
            transition: filter 0.2s ease;
        }

        /* Lớp phủ nháy sáng */
        #light-flash {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: white; opacity: 0; mix-blend-mode: overlay; transition: 0.1s;
        }

        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* --- GIAO DIỆN TRÁI TIM CHUYỂN ĐỘNG --- */
        .glass-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 450px; z-index: 100;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px);
            padding: 50px 30px; border-radius: 40px; text-align: center;
            border: 2px solid var(--p); box-shadow: 0 0 30px var(--p);
            display: none; animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -60%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

        .title { font-family: 'Cinzel Decorative', cursive; color: #fff; font-size: 1.8rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--p); font-size: 18px; }
        .input-group input {
            width: 100%; padding: 15px 50px; background: rgba(255,255,255,0.05);
            border: 1px solid #333; border-radius: 15px; color: #fff; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--p); background: rgba(255,255,255,0.1); }

        .eye-btn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; }

        .btn-heart {
            width: 100%; padding: 16px; background: linear-gradient(45deg, var(--p), #ff5e3a);
            border: none; border-radius: 15px; color: #fff; font-weight: 900; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,45,117,0.3);
        }
        .btn-heart:hover { transform: scale(1.02); box-shadow: 0 10px 30px var(--p); }

        /* --- MENU --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .menu-item {
            background: rgba(255,255,255,0.03); padding: 20px 10px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
        }
        .menu-item:hover { background: var(--p); transform: translateY(-5px); }
        .menu-item i { font-size: 24px; margin-bottom: 8px; display: block; color: var(--gold); }
        .menu-item span { color: #fff; font-size: 13px; font-weight: bold; display: block; }

        /* --- COMPONENTS --- */
        #music-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #fff;
            border: 2px solid var(--p); cursor: pointer;
        }
        #notif { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #fff; color: var(--p); padding: 12px 30px; border-radius: 50px; font-weight: bold; z-index: 2000; transition: 0.5s; }
        #notif.active { top: 20px; }
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #fff; }
    </style>
</head>
<body>

    <div id="bg-city"></div>
    <div id="light-flash"></div>
    <canvas id="fw-canvas"></canvas>

    <div id="notif">VỢ IU NHẬP SAI ÒI ĐÓ</div>

    <div id="intro" onclick="initApp()">
        <i class="fas fa-heart fa-beat" style="font-size: 60px; color: var(--p);"></i>
        <h2 style="margin-top: 20px; letter-spacing: 5px;">MỞ TRÁI TIM</h2>
    </div>

    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-music" id="m-icon"></i></div>

    <div class="glass-box" id="auth-box" style="display: none;">
        <h2 class="title">BÌNH MINH ❤️ THUÝ VÂN</h2>
        <div class="input-group">
            <i class="fas fa-user-heart"></i>
            <input type="text" id="u" placeholder="Nhập tài khoản đi baby">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="p" placeholder="Nhập mật khẩu nha bé iu">
            <i class="fas fa-eye eye-btn" onclick="togglePass()"></i>
        </div>
        <button class="btn-heart" onclick="check()">ĐĂNG NHẬP VÀO TRÁI TIM</button>
    </div>

    <div class="glass-box" id="menu-box" style="display: none;">
        <h2 class="title">GỬI THUÝ VÂN</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="fire(10)"><i class="fas fa-history"></i><span>Kỉ niệm</span></div>
            <div class="menu-item" onclick="fire(10)"><i class="fas fa-heart"></i><span>Hiện tại</span></div>
            <div class="menu-item" onclick="fire(10)"><i class="fas fa-rocket"></i><span>Lời hứa ở tương lai</span></div>
            <div class="menu-item" onclick="smile()"><i class="fas fa-face-laugh-beam"></i><span>Nếu em buồn...</span></div>
        </div>
    </div>

    <div id="yt"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fw-canvas');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('bg-city');
        const flash = document.getElementById('light-flash');
        
        let w, h, player, mPlay = false;
        let rockets = [], particles = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const a = Math.random() * Math.PI * 2;
                const s = Math.random() * 6 + 2;
                this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
                this.alpha = 1; this.decay = 0.02;
            }
            update() { this.vx *= 0.95; this.vy *= 0.95; this.vy += 0.1; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
            draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, 7); ctx.fill(); }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.4);
                this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
            }
            update() {
                this.y -= 12;
                if(this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            explode() {
                city.style.filter = "brightness(1.5)";
                flash.style.opacity = "0.3";
                setTimeout(() => { city.style.filter = "brightness(0.4)"; flash.style.opacity = "0"; }, 200);
                for(let i=0; i<80; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
            draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 7); ctx.fill(); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt', { height: '0', width: '0', videoId: 'iXaw-jwmjjA', playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' }, events: { 'onReady': e => e.target.mute() } });
        }

        function toggleMusic() {
            const icon = document.getElementById('m-icon');
            if(mPlay) { player.pauseVideo(); icon.className = 'fas fa-music'; mPlay = false; }
            else { player.unMute(); player.playVideo(); icon.className = 'fas fa-pause'; mPlay = true; }
        }

        function check() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('menu-box').style.display = 'block';
            } else { const n = document.getElementById('notif'); n.classList.add('active'); setTimeout(() => n.classList.remove('active'), 3000); }
        }

        function initApp() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('auth-box').style.display = 'block';
            toggleMusic();
            setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 1000);
        }

        function togglePass() { const p = document.getElementById('p'); p.type = p.type === 'password' ? 'text' : 'password'; }
        function fire(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function smile() { alert('Thuý Vân à, cười lên nhé! Anh luôn yêu em!'); fire(20); }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
