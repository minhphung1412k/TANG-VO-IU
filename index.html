<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE OMNIVERSE - THVAN SUPREME</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --n: #00f2ff; --p: #ff007b; --g: #ffd700; --v: #7d00ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #000; overflow: hidden; font-family: 'Syncopate', sans-serif; height: 100vh; color: #fff; }

        /* NỀN ĐA CHIỀU */
        canvas { position: fixed; inset: 0; }
        #bg-canvas { z-index: 1; filter: contrast(120%) brightness(80%); }
        #fw-canvas { z-index: 5; pointer-events: none; mix-blend-mode: screen; }

        /* CURSOR CÔNG NGHỆ GEN 5 */
        #cursor {
            position: fixed; width: 40px; height: 40px; border: 2px solid var(--n);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }
        #cursor-eye { width: 6px; height: 6px; background: var(--p); border-radius: 50%; box-shadow: 0 0 15px var(--p); }

        /* GIAO DIỆN TRẠM KHÔNG GIAN */
        .omni-interface {
            position: relative; z-index: 100; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* KHỐI ĐĂNG NHẬP "CHÂN KHÔNG" */
        .vacuum-module {
            width: 480px; padding: 80px 50px; position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40% 10% 40% 10%;
            box-shadow: 0 0 120px rgba(0, 0, 0, 1), inset 0 0 50px rgba(0, 242, 255, 0.1);
            animation: modulePulse 8s infinite alternate ease-in-out;
            text-align: center;
        }

        @keyframes modulePulse { 
            0% { transform: scale(1) rotate(0deg); border-radius: 40% 10% 40% 10%; }
            100% { transform: scale(1.05) rotate(2deg); border-radius: 10% 40% 10% 40%; }
        }

        /* NÚT NHẠC DẠNG "HOLOGRAM CORE" */
        #hologram-audio {
            position: fixed; bottom: 50px; left: 50px; z-index: 1000;
            width: 80px; height: 80px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .audio-ring {
            position: absolute; inset: 0; border: 2px solid var(--n);
            border-radius: 50%; animation: ring-spin 4s linear infinite;
        }
        .audio-ring:nth-child(2) { border-color: var(--p); animation-duration: 2s; animation-direction: reverse; }
        @keyframes ring-spin { to { transform: rotate(360deg); } }

        /* INPUT SECTOR */
        .input-sector { position: relative; margin-bottom: 45px; }
        .input-sector label { font-size: 7px; color: var(--n); letter-spacing: 8px; margin-bottom: 12px; display: block; text-transform: uppercase; }
        
        .field-input {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding: 15px; color: #fff; font-family: 'Syncopate';
            font-size: 12px; text-align: center; outline: none; transition: 0.6s;
        }
        .field-input:focus { 
            border-bottom-color: var(--p); letter-spacing: 5px; 
            text-shadow: 0 0 15px var(--p);
        }

        /* NÚT KÍCH HOẠT OMNI */
        .btn-activate {
            width: 100%; padding: 25px; border: none;
            background: linear-gradient(45deg, var(--v), var(--p));
            color: #fff; font-family: 'Cinzel Decorative'; font-size: 14px;
            font-weight: 900; letter-spacing: 15px; cursor: pointer;
            border-radius: 5px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.5s;
        }
        .btn-activate:hover { letter-spacing: 25px; box-shadow: 0 0 60px var(--p); transform: scale(1.05); }

        /* VIP DASHBOARD */
        #vip-nav { display: none; opacity: 0; grid-template-columns: 1fr 1fr; gap: 25px; width: 450px; }
        .nav-gate {
            padding: 40px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; cursor: pointer; transition: 0.5s;
            font-family: 'Cinzel Decorative'; font-size: 12px; letter-spacing: 5px;
        }
        .nav-gate:hover { background: var(--n); color: #000; box-shadow: 0 0 40px var(--n); transform: translateY(-10px) rotate(3deg); }

    </style>
</head>
<body>

    <div id="cursor"><div id="cursor-eye"></div></div>
    <canvas id="bg-canvas"></canvas>
    <canvas id="fw-canvas"></canvas>

    <div id="hologram-audio" onclick="controlNexus()">
        <div class="audio-ring"></div>
        <div class="audio-ring"></div>
        <i class="fas fa-compact-disc" style="font-size: 30px; color: var(--n); z-index: 2;"></i>
    </div>

    <div class="omni-interface">
        <div class="vacuum-module" id="login-ui">
            <h1 style="font-family: 'Cinzel Decorative'; font-size: 2rem; margin-bottom: 60px; color: #fff; text-shadow: 0 0 20px var(--n);">THVAN OS</h1>
            
            <div class="input-sector">
                <label>IDENTIFICATION_LINK</label>
                <input type="text" id="user" class="field-input" placeholder="NHẬP TK NHA VÂN IU" autocomplete="off">
            </div>

            <div class="input-sector">
                <label>SOUL_ENCRYPTION</label>
                <input type="password" id="pass" class="field-input" placeholder="NHẬP MẬT KHẨU NHÁ BẤY BÌ" autocomplete="off">
            </div>

            <button class="btn-activate" onclick="launchOmni()">ACTIVATE</button>
        </div>

        <div id="vip-nav">
            <div class="nav-gate" onclick="galaxy(100)">MEMORIES</div>
            <div class="nav-gate" onclick="galaxy(100)">EXISTENCE</div>
            <div class="nav-gate" onclick="galaxy(100)">ETERNITY</div>
            <div class="nav-gate" style="grid-column: span 2; background: var(--p);" onclick="singularity()">GOD_MODE_LOVE</div>
        </div>
    </div>

    <div id="nexus-player" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const bgC = document.getElementById('bg-canvas');
        const fwC = document.getElementById('fw-canvas');
        const btx = bgC.getContext('2d');
        const ftx = fwC.getContext('2d');
        let w, h, yt, particles = [], stars = [];

        // Theo dõi con trỏ
        document.addEventListener('mousemove', (e) => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX - 20 + 'px';
            cursor.style.top = e.clientY - 20 + 'px';
        });

        function init() {
            w = bgC.width = fwC.width = window.innerWidth;
            h = bgC.height = fwC.height = window.innerHeight;
            stars = Array.from({length: 500}, () => ({
                x: Math.random()*w, y: Math.random()*h, r: Math.random()*2, 
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                o: Math.random()
            }));
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('nexus-player', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function controlNexus() {
            if(yt.isMuted()) { yt.unMute(); yt.playVideo(); } 
            else { yt.mute(); }
        }

        function launchOmni() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-ui').style.display = 'none';
                const nav = document.getElementById('vip-nav');
                nav.style.display = 'grid';
                setTimeout(() => nav.style.opacity = 1, 100);
                if(yt.isMuted()) controlNexus();
                galaxy(150);
            } else { alert("ACCESS DENIED. DNA MISMATCH."); }
        }

        // HỆ THỐNG HẠT LƯỢNG TỬ (GALAXY FIREWORKS)
        class QuantumParticle {
            constructor(x, y, hue) {
                this.x = x; this.y = y; this.hue = hue;
                this.angle = Math.random() * Math.PI * 2;
                this.v = 5 + Math.random() * 10;
                this.life = 1; this.decay = 0.005 + Math.random()*0.01;
                this.spin = 0;
            }
            update() {
                this.spin += 0.1;
                this.x += Math.cos(this.angle + this.spin) * this.v;
                this.y += Math.sin(this.angle + this.spin) * this.v;
                this.v *= 0.95; this.life -= this.decay;
            }
            draw() {
                ftx.globalAlpha = this.life;
                ftx.shadowBlur = 20; ftx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ftx.fillStyle = `hsl(${this.hue}, 100%, 75%)`;
                ftx.beginPath(); ftx.arc(this.x, this.y, 1.5, 0, 7); ftx.fill();
            }
        }

        function galaxy(n) {
            const h = Math.random()*360;
            const x = Math.random()*w, y = Math.random()*h;
            for(let i=0; i<n; i++) particles.push(new QuantumParticle(x, y, h));
        }

        function singularity() {
            alert("KÍCH HOẠT CHẾ ĐỘ ĐA VŨ TRỤ: BÌNH MINH ❤ THUÝ VÂN");
            for(let i=0; i<10; i++) setTimeout(() => galaxy(100), i*200);
        }

        function render() {
            btx.fillStyle = 'rgba(0,0,0,0.2)'; btx.fillRect(0,0,w,h);
            stars.forEach(s => {
                s.x += s.vx; s.y += s.vy;
                if(s.x<0 || s.x>w) s.vx *= -1;
                if(s.y<0 || s.y>h) s.vy *= -1;
                btx.fillStyle = `rgba(0, 242, 255, ${s.o})`;
                btx.beginPath(); btx.arc(s.x, s.y, s.r, 0, 7); btx.fill();
            });

            ftx.clearRect(0,0,w,h);
            particles = particles.filter(p => { p.update(); p.draw(); return p.life > 0; });
            if(Math.random()<0.03) galaxy(60);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', init);
        init(); render();
    </script>
</body>
</html>
