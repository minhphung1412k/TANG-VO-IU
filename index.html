<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Vợ Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* PHONG CẢNH THIÊN NHIÊN: AURORA & SAO BĂNG */
        #nature-scene {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at bottom, #0d0012 0%, #000 100%);
        }
        .aurora {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: radial-gradient(circle, rgba(255,182,193,0.08) 0%, transparent 60%);
            animation: moveAurora 20s ease-in-out infinite alternate;
        }
        @keyframes moveAurora { from { transform: translate(0,0); } to { transform: translate(10%, 10%); } }

        /* MÀN HÌNH CHỜ HOA HỒNG */
        #intro-screen {
            position: fixed; inset: 0; background: #000;
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .rose-main {
            font-size: 100px; filter: drop-shadow(0 0 35px #ff4d6d);
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        /* KHUNG ĐĂNG NHẬP SANG TRỌNG */
        .glass-box {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 45px 25px;
            width: 90%; max-width: 380px; text-align: center;
            display: none; box-shadow: 0 15px 45px rgba(0,0,0,0.7);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #ffb3c1; font-size: 2.7rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05); color: white;
            outline: none; text-align: center; font-size: 16px;
        }
        .pass-toggle {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            color: #ffb3c1; cursor: pointer; font-size: 22px;
        }

        .btn-magic {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            color: white; border: none; padding: 18px; width: 100%;
            border-radius: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 117, 140, 0.3);
        }

        /* NÚT BẬT TẮT LOA */
        #music-btn {
            position: fixed; bottom: 25px; left: 25px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: none; align-items: center;
            justify-content: center; font-size: 22px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2); z-index: 1000;
        }

        /* SAO BĂNG */
        .shooting-star {
            position: absolute; width: 120px; height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
            animation: shoot 4s linear infinite; opacity: 0;
        }
        @keyframes shoot {
            0% { transform: rotate(-45deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: rotate(-45deg) translateX(-300px); opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="nature-scene"><div class="aurora"></div></div>

    <div id="intro-screen" onclick="startExperience()">
        <div class="rose-main">🌹</div>
        <p style="color: #fff; margin-top: 30px; letter-spacing: 4px; opacity: 0.6;">CHẠM ĐỂ BẮT ĐẦU</p>
    </div>

    <audio id="piano-audio" loop preload="auto">
        <source src="https://files.catbox.moe/67x0e6.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-box" id="login-box">
            <h2>Vợ Yêu ❤️</h2>
            <div class="input-group">
                <input type="text" id="usr" placeholder="Tài khoản..." autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="pwd" placeholder="Mật khẩu..." autocomplete="off">
                <span class="pass-toggle" onclick="togglePwd()">👁️</span>
            </div>
            <button class="btn-magic" onclick="login()">MỞ CÁNH CỬA ✨</button>
            <p id="err" style="color: #ff4d6d; font-size: 14px; display: none; margin-top: 15px;">Sai rồi nha vợ ơi! ❌</p>
        </div>

        <div class="glass-box" id="main-menu">
            <h2>Dành Cho Em ❤️</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px;">
                <div style="background: rgba(255,255,255,0.05); padding: 25px 10px; border-radius: 20px; color: #ffb3c1; font-weight: 600; font-size: 13px;">CHUYỆN QUÁ KHỨ</div>
                <div style="background: rgba(255,255,255,0.05); padding: 25px 10px; border-radius: 20px; color: #ffb3c1; font-weight: 600; font-size: 13px;">CHUYỆN HIỆN TẠI</div>
                <div style="background: rgba(255,255,255,0.05); padding: 25px 10px; border-radius: 20px; color: #ffb3c1; font-weight: 600; font-size: 13px;">LỜI HỨA TƯƠNG LAI</div>
                <div style="background: rgba(255,255,255,0.05); padding: 25px 10px; border-radius: 20px; color: #ffb3c1; font-weight: 600; font-size: 13px;">LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <div id="music-btn" onclick="controlMusic()">🔊</div>

    <script>
        const audio = document.getElementById('piano-audio');

        function startExperience() {
            audio.play().catch(e => console.log("Audio waiting..."));
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('music-btn').style.display = 'flex';
                setInterval(createStar, 3000);
            }, 1200);
        }

        function togglePwd() {
            const p = document.getElementById('pwd');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function login() {
            const u = document.getElementById('usr').value;
            const p = document.getElementById('pwd').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-menu').style.display = "block";
            } else {
                document.getElementById('err').style.display = "block";
            }
        }

        function controlMusic() {
            if(audio.paused) {
                audio.play(); document.getElementById('music-btn').innerText = "🔊";
            } else {
                audio.pause(); document.getElementById('music-btn').innerText = "🔇";
            }
        }

        function createStar() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.top = Math.random() * 50 + 'vh';
            s.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 4000);
        }
    </script>
</body>
</html>
