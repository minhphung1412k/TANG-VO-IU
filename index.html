<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÌNH MINH YÊU THUÝ VÂN</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">

    <style>
        :root { --p: #ff2d75; --g: #ffcf5e; --b: #00e5ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- SIÊU CẤP NỀN THÀNH PHỐ (KHÔNG THỂ LỖI) --- */
        #city-master {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg');
            background-size: cover; background-position: center;
            z-index: 1; transition: 0.3s;
        }

        /* Lớp phủ lóe sáng hắt vào thành phố */
        #light-haze {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: transparent; transition: 0.2s;
        }

        canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* --- GIAO DIỆN ĐĂNG NHẬP LẤP LÁNH (VIP 80) --- */
        .universe-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 480px; z-index: 100;
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(30px);
            padding: 60px 40px; border-radius: 50px; text-align: center;
            border: 2px solid var(--p);
            box-shadow: 0 0 40px var(--p), inset 0 0 20px rgba(255, 45, 117, 0.3);
            opacity: 0; visibility: hidden; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .universe-box.active { opacity: 1; visibility: visible; animation: boxGlow 4s infinite alternate; }
        
        @keyframes boxGlow { 
            0% { box-shadow: 0 0 30px var(--p); border-color: var(--p); }
            50% { box-shadow: 0 0 60px var(--b); border-color: var(--b); }
            100% { box-shadow: 0 0 30px var(--g); border-color: var(--g); }
        }

        .title-vip { 
            font-family: 'Cinzel Decorative', cursive; color: #fff; font-size: 2.2rem; 
            margin-bottom: 40px; text-shadow: 0 0 20px #fff;
            animation: textShimmer 2s infinite;
        }
        @keyframes textShimmer { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; transform: scale(0.98); } }

        /* --- INPUTS SIÊU CẤP --- */
        .input-group { position: relative; margin-bottom: 30px; }
        .input-group i { 
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%); 
            color: var(--p); font-size: 22px; filter: drop-shadow(0 0 10px var(--p));
        }
        .input-group input {
            width: 100%; padding: 22px 65px; background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; 
            color: #fff; font-size: 17px; outline: none; transition: 0.5s;
        }
        .input-group input:focus { border-color: #fff; background: rgba(255,255,255,0.15); box-shadow: 0 0 25px var(--p); }

        .eye-icon { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; padding: 5px; }

        .btn-heart {
            width: 100%; padding: 22px; background: linear-gradient(45deg, var(--p), #ff758c, var(--p));
            background-size: 200%; border: none; border-radius: 30px; color: #fff; 
            font-weight: 900; letter-spacing: 3px; cursor: pointer; transition: 0.5s;
            animation: gradientMove 3s infinite linear;
        }
        @keyframes gradientMove { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        .btn-heart:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 40px var(--p); }

        /* --- MENU 4 MỤC VIP --- */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .menu-item {
            background: rgba(255,255,255,0.05); padding: 30px 10px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .menu-item:hover { background: var(--p); transform: translateY(-10px) rotate(3deg); box-shadow: 0 10px 30px var(--p); }
        .menu-item i { font-size: 30px; color: var(--g); }
        .menu-item span { color: #fff; font-size: 14px; font-weight: bold; }

        /* --- MUSIC PLAYER --- */
        #music-ctrl {
            position: fixed; top: 30px; right: 30px; z-index: 1000;
            width: 70px; height: 70px; cursor: pointer; display: none;
        }
        .disc {
            width: 100%; height: 100%; border-radius: 50%; background: #222;
            border: 4px solid #444; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--p); animation: rotate 4s linear infinite; animation-play-state: paused;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .disc i { color: var(--p); font-size: 25px; }

        /* --- NOTIF & INTRO --- */
        #notif-msg { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #fff; color: var(--p); padding: 15px 40px; border-radius: 50px; font-weight: 900; z-index: 2000; transition: 0.5s; }
        #notif-msg.active { top: 30px; }
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="city-master"></div>
    <div id="light-haze"></div>
    <canvas id="fw-canvas"></canvas>

    <div id="notif-msg">VỢ IU NHẬP SAI ÒI ĐÓ</div>

    <div id="intro-screen" onclick="launchApp()">
        <i class="fas fa-heart-pulse fa-beat" style="font-size: 100px; color: var(--p);"></i>
        <h2 style="margin-top: 30px; letter-spacing: 10px; font-family: 'Cinzel Decorative';">CHẠM ĐỂ BẮT ĐẦU</h2>
    </div>

    <div id="music-ctrl" onclick="toggleMusic()">
        <div class="disc" id="disc-ui"><i class="fas fa-compact-disc"></i></div>
    </div>

    <div class="universe-box" id="auth-ui">
        <h2 class="title-vip">BÌNH MINH ❤️ THUÝ VÂN</h2>
        <div class="input-group">
            <i class="fas fa-user-heart"></i>
            <input type="text" id="u-field" placeholder="Nhập tài khoản đi baby">
        </div>
        <div class="input-group">
            <i class="fas fa-key-heart"></i>
            <input type="password" id="p-field" placeholder="Nhập mật khẩu nha bé iu">
            <i class="fas fa-eye eye-icon" onclick="toggleEye()"></i>
        </div>
        <button class="btn-heart" onclick="verify()">ĐĂNG NHẬP VÀO TRÁI TIM</button>
    </div>

    <div class="universe-box" id="menu-ui">
        <h2 class="title-vip" style="font-size: 1.8rem;">ĐIỀU ANH MUỐN NÓI</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="massive(15)"><i class="fas fa-hourglass-half"></i><span>Kỉ niệm</span></div>
            <div class="menu-item" onclick="massive(15)"><i class="fas fa-heart-circle-bolt"></i><span>Hiện tại</span></div>
            <div class="menu-item" onclick="massive(15)"><i class="fas fa-rocket"></i><span>Lời hứa ở tương lai</span></div>
            <div class="menu-item" onclick="cheerUp()"><i class="fas fa-face-laugh-beam"></i><span>Nếu em buồn...</span></div>
        </div>
    </div>

    <div id="yt-player"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fw-canvas');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-master');
        const haze = document.getElementById('light-haze');
        
        let w, h, player, isPlaying = false;
        let rockets = [], particles = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const a = Math.random() * Math.PI * 2;
                const s = Math.random() * 10 + 2;
                this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            update() { this.vx *= 0.96; this.vy *= 0.96; this.vy += 0.15; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
            draw() {
                ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.35);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
            }
            update() {
                this.y -= 12;
                if(this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            explode() {
                // CHIẾU SÁNG THÀNH PHỐ
                city.style.filter = "brightness(1.5) contrast(1.2)";
                haze.style.background = `radial-gradient(circle at ${this.x}px ${this.targetY}px, ${this.color}44 0%, transparent 70%)`;
                haze.style.opacity = "1";
                setTimeout(() => { city.style.filter = "brightness(0.3) contrast(1.2)"; haze.style.opacity = "0"; }, 300);
                for(let i=0; i<250; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
            draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill(); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', { height: '0', width: '0', videoId: 'iXaw-jwmjjA', playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' }, events: { 'onReady': e => e.target.mute() } });
        }

        function toggleMusic() {
            const disc = document.getElementById('disc-ui');
            if(isPlaying) { player.pauseVideo(); disc.style.animationPlayState = 'paused'; isPlaying = false; }
            else { player.unMute(); player.playVideo(); disc.style.animationPlayState = 'running'; isPlaying = true; }
        }

        function toggleEye() { const p = document.getElementById('p-field'); p.type = p.type === 'password' ? 'text' : 'password'; }

        function verify() {
            const u = document.getElementById('u-field').value;
            const p = document.getElementById('p-field').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('auth-ui').classList.remove('active');
                setTimeout(() => document.getElementById('menu-ui').classList.add('active'), 800);
            } else { const n = document.getElementById('notif-msg'); n.classList.add('active'); setTimeout(() => n.classList.remove('active'), 3000); }
        }

        function launchApp() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('auth-ui').classList.add('active');
            document.getElementById('music-ctrl').style.display = 'block';
            toggleMusic();
            setInterval(() => { if(Math.random() < 0.25) rockets.push(new Rocket()); }, 800);
        }

        function massive(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function cheerUp() { massive(25); alert('Thuý Vân ơi, cười lên nhé! Thế giới này đẹp nhất khi có em cười.'); }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
