<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH YÊU EM - FINAL 60</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Cinzel+Decorative:wght@900&family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #ff2d75;
            --p-glow: 0 0 30px rgba(255, 45, 117, 0.8);
            --glass: rgba(0, 0, 0, 0.85);
            --v-speed: 2s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; cursor: crosshair; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- BACKGROUND: THÀNH PHỐ ĐÊM HUYỀN ẢO --- */
        #city-canvas-container {
            position: fixed; inset: 0; z-index: 1;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.02) contrast(1.8) saturate(0.2); /* Tối tối le lói */
            transition: filter 0.15s cubic-bezier(0, 1.2, 1, 1);
            transform: scale(1.1);
        }

        #light-diffusion {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            mix-blend-mode: screen; opacity: 0; transition: opacity 0.1s;
        }

        canvas#fireworks-engine { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

        /* --- GIAO DIỆN KHUNG ĐĂNG NHẬP (NEON KINETIC) --- */
        .supreme-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotateX(10deg);
            width: 90%; max-width: 550px; padding: 80px 40px;
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 50px; border: 2px solid rgba(255,255,255,0.05);
            text-align: center; opacity: 0; visibility: hidden;
            transition: 2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 20px rgba(255,45,117,0.2);
            z-index: 5000; perspective: 1000px;
        }
        .supreme-box.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) rotateX(0deg); }

        .glitch-title {
            font-family: 'Cinzel Decorative', cursive; font-size: 3rem;
            background: linear-gradient(to bottom, #fff 30%, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 50px; position: relative;
            animation: titleFloat 4s infinite ease-in-out;
        }
        @keyframes titleFloat { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-15px) rotate(1deg); } }

        /* --- INPUTS & ICONS CAO CẤP --- */
        .input-wrapper { position: relative; margin-bottom: 30px; transform: scale(0.9); transition: 0.5s; }
        .input-wrapper:focus-within { transform: scale(1); }

        .input-wrapper i.lead-icon {
            position: absolute; left: 25px; top: 50%; transform: translateY(-50%);
            color: var(--p); font-size: 24px; text-shadow: var(--p-glow);
            animation: iconPulse 2s infinite;
        }
        @keyframes iconPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; filter: scale(1.2); } }

        .input-wrapper input {
            width: 100%; padding: 25px 75px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            color: #fff; font-size: 18px; outline: none; transition: 0.4s;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .input-wrapper input:focus { border-color: var(--p); background: rgba(255,255,255,0.07); box-shadow: 0 0 30px rgba(255,45,117,0.2); }

        .eye-toggle {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #666; transition: 0.3s; padding: 10px;
        }
        .eye-toggle:hover { color: #fff; transform: translateY(-50%) scale(1.2); }

        .btn-final {
            width: 100%; padding: 25px; background: var(--p-g); border: none;
            background: linear-gradient(45deg, #ff2d75, #ff5e3a, #ff2d75); background-size: 200%;
            border-radius: 25px; color: #fff; font-size: 1.4rem; font-weight: 900;
            letter-spacing: 8px; cursor: pointer; transition: 0.5s;
            animation: gradientMove 3s infinite linear;
            box-shadow: 0 15px 40px rgba(255,45,117,0.5);
        }
        @keyframes gradientMove { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        .btn-final:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 25px 60px var(--p); }

        /* --- MENU SECTION (SỐNG ĐỘNG) --- */
        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .menu-card {
            background: rgba(255,255,255,0.05); padding: 35px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .menu-card::before { content: ''; position: absolute; inset: 0; background: var(--p); opacity: 0; transition: 0.4s; z-index: -1; }
        .menu-card:hover { transform: translateY(-15px) rotate(2deg); border-color: #fff; }
        .menu-card:hover::before { opacity: 1; }
        .menu-card i { font-size: 40px; margin-bottom: 20px; display: block; animation: floatIcon 3s infinite ease-in-out; }
        @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- NOTIFICATION SYSTEM (FIX ALERT) --- */
        #supreme-notify {
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); border: 2px solid var(--p);
            padding: 25px 50px; border-radius: 100px; z-index: 100000;
            color: #fff; font-weight: 700; font-size: 1.2rem;
            box-shadow: 0 20px 50px rgba(255,45,117,0.6);
            transition: 0.8s cubic-bezier(0.68, -0.6, 0.32, 1.6);
            display: flex; align-items: center; gap: 20px;
        }
        #supreme-notify.show { top: 50px; }

        /* --- MUSIC PLAYER --- */
        #music-console {
            position: fixed; bottom: 40px; right: 40px; z-index: 9999;
            width: 100px; height: 100px; cursor: pointer; opacity: 0; transition: 2s;
        }
        .vinyl {
            width: 100%; height: 100%; border-radius: 50%; background: #111;
            border: 5px solid #222; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--p);
        }
        .vinyl-inner {
            width: 90%; height: 90%; border-radius: 50%;
            background: repeating-radial-gradient(#222, #000 8px);
            display: flex; align-items: center; justify-content: center;
        }
        .vinyl-inner i { color: var(--p); font-size: 35px; text-shadow: var(--p-glow); }

        /* --- INTRO SCREEN --- */
        #grand-intro {
            position: fixed; inset: 0; background: #000; z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #grand-intro h1 { font-family: 'Montserrat', sans-serif; font-size: 6rem; color: #fff; letter-spacing: 40px; opacity: 0.2; transition: 1s; }
        #grand-intro:hover h1 { opacity: 1; text-shadow: 0 0 50px var(--p); }
    </style>
</head>
<body>

    <div id="city-canvas-container"></div>
    <div id="light-diffusion"></div>
    <canvas id="fireworks-engine"></canvas>

    <div id="supreme-notify">
        <i class="fas fa-heart-circle-exclamation fa-beat" style="font-size: 30px; color: var(--p);"></i>
        <span id="notif-text">VỢ IU NHẬP SAI ÒI ĐÓ</span>
    </div>

    <div id="grand-intro" onclick="beginFinalVersion()">
        <h1 class="fa-pulse">CHẠM</h1>
        <div style="margin-top: 50px; color: var(--p); font-size: 20px; letter-spacing: 5px;">PHIÊN BẢN 60 - VĨNH CỬU</div>
    </div>

    <div id="music-console" onclick="toggleAudioUnit()">
        <div class="vinyl"><div class="vinyl-inner" id="v-rot"><i class="fas fa-record-vinyl"></i></div></div>
    </div>
    <div id="yt-player-final"></div>

    <div class="supreme-box" id="auth-ui">
        <h2 class="glitch-title">PHÙNG LÝ BÌNH MINH<br>YÊU EM</h2>
        <div class="input-wrapper">
            <i class="fas fa-user-crown lead-icon"></i>
            <input type="text" id="u-field" placeholder="Nhập tài khoản đi baby" autocomplete="off">
        </div>
        <div class="input-wrapper">
            <i class="fas fa-fingerprint lead-icon"></i>
            <input type="password" id="p-field" placeholder="Nhập mật khẩu nha bé iu" autocomplete="off">
            <div class="eye-toggle" onclick="toggleSecret()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>
        <button class="btn-final" onclick="verifySupreme()">ĐĂNG NHẬP</button>
    </div>

    <div class="supreme-box" id="menu-ui">
        <h2 class="glitch-title" style="font-size: 2.2rem;">ĐIỀU ANH MUỐN NÓI</h2>
        <div class="menu-container">
            <div class="menu-card" onclick="massiveBoom(12)">
                <i class="fas fa-star-shooting" style="color: #ffeb3b;"></i>KỶ NIỆM
            </div>
            <div class="menu-card" onclick="massiveBoom(12)">
                <i class="fas fa-fireplace" style="color: #ff5722;"></i>ẤM ÁP
            </div>
            <div class="menu-card" onclick="massiveBoom(12)">
                <i class="fas fa-infinity" style="color: #00e5ff;"></i>TRỌN ĐỜI
            </div>
            <div class="menu-card" onclick="fireNotify('Bình Minh sẽ bảo vệ em mãi mãi!')">
                <i class="fas fa-gem" style="color: #e1bee7;"></i>QUÝ GIÁ
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fireworks-engine');
        const ctx = canvas.getContext('2d');
        const city = document.getElementById('city-canvas-container');
        const diffuse = document.getElementById('light-diffusion');
        
        let w, h, player, isPlay = false, rDegree = 0;
        let rockets = [], particles = [];

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        /* --- SIÊU CẤP ENGINE PHÁO HOA --- */
        class Particle {
            constructor(x, y, color, force) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * (force * 10) + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.01 + 0.005;
                this.gravity = 0.15; this.friction = 0.96;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction; this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.8, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.ty = Math.random() * (h * 0.35);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.v = 16;
            }
            update() {
                this.y -= this.v; this.v *= 0.99;
                if (this.y <= this.ty) { this.explode(); return false; }
                return true;
            }
            explode() {
                // HDR DYNAMIC LIGHTING: PHÁO NỔ CHIẾU SÁNG THÀNH PHỐ
                city.style.filter = `brightness(0.9) contrast(2) saturate(1.8) scale(1.15)`;
                diffuse.style.opacity = "1";
                diffuse.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}66 0%, transparent 80%)`;
                
                setTimeout(() => {
                    city.style.filter = `brightness(0.02) contrast(1.8) saturate(0.2) scale(1.1)`;
                    diffuse.style.opacity = "0";
                }, 400);

                for(let i=0; i<450; i++) particles.push(new Particle(this.x, this.y, this.color, 1.5));
            }
            draw() {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
                ctx.beginPath(); ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        /* --- HỆ THỐNG ĐIỀU KHIỂN --- */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player-final', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAudioUnit() {
            if(isPlay) { player.pauseVideo(); isPlay = false; }
            else { player.unMute(); player.playVideo(); isPlay = true; spinVinyl(); }
        }

        function spinVinyl() { if(!isPlay) return; rDegree += 4; document.getElementById('v-rot').style.transform = `rotate(${rDegree}deg)`; requestAnimationFrame(spinVinyl); }

        function toggleSecret() {
            const f = document.getElementById('p-field');
            const i = document.getElementById('eye-icon');
            if(f.type === "password") { f.type = "text"; i.className = "fas fa-eye-slash"; }
            else { f.type = "password"; i.className = "fas fa-eye"; }
        }

        function fireNotify(m) {
            const n = document.getElementById('supreme-notify');
            document.getElementById('notif-text').innerText = m;
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3500);
        }

        function beginFinalVersion() {
            document.getElementById('grand-intro').style.transform = "translateY(-100%) scale(2)";
            document.getElementById('grand-intro').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('grand-intro').style.display = "none";
                document.getElementById('auth-ui').classList.add('active');
                document.getElementById('music-console').style.opacity = "1";
                toggleAudioUnit();
                setInterval(() => { if(Math.random() < 0.18) rockets.push(new Rocket()); }, 800);
            }, 1200);
        }

        function verifySupreme() {
            const u = document.getElementById('u-field').value;
            const p = document.getElementById('p-field').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('auth-ui').classList.remove('active');
                setTimeout(() => document.getElementById('menu-ui').classList.add('active'), 1000);
            } else {
                fireNotify('VỢ IU NHẬP SAI ÒI ĐÓ');
            }
        }

        function massiveBoom(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }

        function engineLoop() {
            ctx.fillStyle = 'rgba(0,0,0,0.22)'; ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(engineLoop);
        }
        engineLoop();
    </script>
</body>
</html>
