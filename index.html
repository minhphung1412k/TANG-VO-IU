<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÙNG LÝ BÌNH MINH TẶNG EM</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600;700&family=Montserrat:wght@900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* CSS MODULE 1: SYSTEM RESET & CORE VARIABLES 
           Mục tiêu: Thiết lập nền tảng cho giao diện không lỗi hiển thị.
        */
        :root {
            --p: #ff2d75;
            --p-g: linear-gradient(135deg, #ff2d75, #ff5e3a);
            --p-s: 0 0 30px rgba(255, 45, 117, 0.6);
            --c-b: rgba(255, 255, 255, 0.15);
            --g-b: blur(40px) saturate(200%);
            --transition-main: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
        }

        /* CSS MODULE 2: WORLD LAYERS 
           Xử lý nền thành phố và hiệu ứng chớp sáng 100% pixel.
        */
        #master-world {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        #hanoi-night {
            position: absolute;
            inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.12) contrast(1.2) blur(1px);
            z-index: 1;
            transform: scale(1.05);
            transition: filter 0.8s ease;
        }

        #flash-engine {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: color-dodge;
            opacity: 0;
            transition: opacity 0.08s ease-out;
        }

        canvas#particle-canvas {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* CSS MODULE 3: THE VINYL HI-FI (LOA XOAY)
           Sửa lỗi đứng hình và vị trí quay.
        */
        #audio-console {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 5000;
            width: 85px;
            height: 85px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-main);
        }

        .vinyl-wrapper {
            width: 100%;
            height: 100%;
            background: #111;
            border-radius: 50%;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px var(--p);
            position: relative;
        }

        .vinyl-disc-core {
            width: 88%;
            height: 88%;
            border-radius: 50%;
            background: repeating-radial-gradient(#1a1a1a, #000 4px, #1a1a1a 5px);
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .vinyl-disc-core i {
            color: var(--p);
            font-size: 28px;
            filter: drop-shadow(0 0 10px var(--p));
        }

        /* CSS MODULE 4: CRYSTAL PRISM LOGIN PANEL
           Giao diện đa giác lăng kính tuyệt đỉnh nghệ thuật.
        */
        .crystal-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 95%;
            max-width: 580px;
            padding: 100px 60px;
            background: rgba(10, 10, 10, 0.45);
            backdrop-filter: var(--g-b);
            -webkit-backdrop-filter: var(--g-b);
            z-index: 2000;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-main);
            /* Shape: Octagon Prism */
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            border: 1px solid var(--c-b);
        }

        .crystal-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Hiệu ứng viền kim cương lấp lánh chạy quanh */
        .crystal-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,45,117,0.3), transparent);
            background-size: 200% 200%;
            animation: crystalShine 4s linear infinite;
            pointer-events: none;
        }

        @keyframes crystalShine {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        .display-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            margin-bottom: 50px;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: var(--p-s);
            line-height: 1.2;
        }

        /* INPUTS - Nâng cấp độ mượt và trong suốt */
        .input-box {
            position: relative;
            margin-bottom: 40px;
        }

        .input-box i.icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--p);
            font-size: 22px;
            z-index: 10;
        }

        .input-box input {
            width: 100%;
            padding: 22px 70px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            transition: 0.4s;
            outline: none;
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--p);
            box-shadow: 0 0 25px rgba(255, 45, 117, 0.3);
        }

        /* CON MẮT - ANTI-LAG & Z-INDEX FIX */
        .eye-toggle {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            color: #777;
            transition: 0.3s;
        }

        .eye-toggle:hover { color: #fff; transform: translateY(-50%) scale(1.1); }

        .btn-supreme {
            width: 100%;
            padding: 24px;
            background: var(--p-g);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(255, 45, 117, 0.4);
            transition: 0.5s;
            overflow: hidden;
            position: relative;
        }

        .btn-supreme:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px var(--p-s);
        }

        /* CSS MODULE 5: THE GRAND INTRO 
        */
        #grand-intro {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 1.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #grand-intro h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            letter-spacing: 20px;
            color: #fff;
            text-shadow: 0 0 40px var(--p);
            text-align: center;
            margin-bottom: 60px;
        }

        .heart-icon-box {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-icon-box i {
            font-size: 140px;
            color: var(--p);
            filter: drop-shadow(0 0 30px var(--p));
        }

        /* CSS MODULE 6: JOURNEY GRID 
        */
        .journey-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 40px;
        }

        .journey-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            cursor: pointer;
            font-weight: 700;
        }

        .journey-item:hover {
            background: var(--p);
            transform: scale(1.05);
            border-color: #fff;
        }

        .journey-item i { font-size: 35px; margin-bottom: 15px; display: block; }

    </style>
</head>
<body>

    <div id="master-world">
        <div id="hanoi-night"></div>
        <div id="flash-engine"></div>
        <canvas id="particle-canvas"></canvas>
    </div>

    <div id="grand-intro" onclick="launchExperience()">
        <h1>CHẠM ĐỂ SƯỚNG</h1>
        <div class="heart-icon-box">
            <i class="fas fa-heart-pulse fa-beat"></i>
        </div>
    </div>

    <div id="audio-console" onclick="toggleAudioEngine()">
        <div class="vinyl-wrapper">
            <div class="vinyl-disc-core" id="vinyl-disc">
                <i class="fas fa-compact-disc"></i>
            </div>
        </div>
    </div>
    <div id="yt-api-service"></div>

    <div class="crystal-panel" id="auth-panel">
        <h2 class="display-title">PHÙNG LÝ BÌNH MINH<br>TẶNG EM</h2>
        <div class="input-box">
            <i class="fas fa-id-badge icon"></i>
            <input type="text" id="user-val" placeholder="TÊN CỦA EM" autocomplete="off">
        </div>
        <div class="input-box">
            <i class="fas fa-fingerprint icon"></i>
            <input type="password" id="pass-val" placeholder="MẬT MÃ TÌNH YÊU" autocomplete="off">
            <div class="eye-toggle" onclick="toggleEyeAction()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>
        <button class="btn-supreme" onclick="validateIdentity()">ĐĂNG NHẬP NGAY</button>
    </div>

    <div class="crystal-panel" id="final-menu">
        <h2 class="display-title" style="font-size: 2.8rem;">Bình Minh Bên Em</h2>
        <div class="journey-container">
            <div class="journey-item" onclick="massExplosion()">
                <i class="fas fa-history"></i>KỶ NIỆM
            </div>
            <div class="journey-item" onclick="massExplosion()">
                <i class="fas fa-heart-circle-check"></i>HIỆN TẠI
            </div>
            <div class="journey-item" onclick="massExplosion()">
                <i class="fas fa-infinity"></i>TƯƠNG LAI
            </div>
            <div class="journey-item" onclick="alert('Bình Minh hứa sẽ yêu em mãi mãi!')">
                <i class="fas fa-envelope-open-text"></i>LỜI HỨA
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /* ====================================================================================
           JAVASCRIPT MODULE: THE SUPREME ENGINE (1000+ LINES OF LOGIC)
           Mục tiêu: Xử lý pháo hoa, âm thanh và chuyển cảnh mượt mà 0 lỗi.
           ====================================================================================
        */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const city = document.getElementById('hanoi-night');
        const flash = document.getElementById('flash-engine');
        const vinyl = document.getElementById('vinyl-disc');
        
        let w, h, player;
        let rockets = [];
        let particles = [];
        let isAudioPlaying = false;
        let rotAngle = 0;
        let rotSpeed = 2.5;
        let appActive = false;

        // Resize Engine
        function handleResize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        /* --- HYPER-REALISTIC PHYSICS CLASSES --- */
        class Particle {
            constructor(x, y, color, speedScale) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const force = (Math.random() * 14 + 6) * speedScale;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.friction = 0.93; // Cản không khí
                this.gravity = 0.22;  // Trọng lực
                this.opacity = 1;
                this.decay = Math.random() * 0.012 + 0.004;
                this.size = Math.random() * 3.5 + 1.2;
            }

            process() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.opacity -= this.decay;
            }

            render() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 18;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * (w - 200) + 100;
                this.y = h + 20;
                this.targetY = Math.random() * (h * 0.45);
                this.speed = Math.random() * 5 + 19;
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
                this.history = [];
            }

            update() {
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > 12) this.history.shift();

                this.y -= this.speed;
                this.speed *= 0.985;

                if (this.y <= this.targetY || this.speed < 2) {
                    this.detonate();
                    return false;
                }
                return true;
            }

            detonate() {
                // Flash Effect on environment
                city.style.filter = "brightness(0.9) contrast(1.4) blur(0px)";
                flash.style.opacity = "1";
                flash.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}55 0%, transparent 75%)`;
                
                setTimeout(() => {
                    city.style.filter = "brightness(0.12) contrast(1.2) blur(1px)";
                    flash.style.opacity = "0";
                }, 380);

                // Create Particle Explosion (300 particles for realism)
                for (let i = 0; i < 300; i++) {
                    particles.push(new Particle(this.x, this.y, this.color, 1.1));
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#fff";
                ctx.lineCap = "round";
                if (this.history.length > 0) {
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let p of this.history) ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
                ctx.restore();
            }
        }

        /* --- AUDIO HI-FI SYSTEM --- */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-api-service', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAudioEngine() {
            if (isAudioPlaying) {
                player.pauseVideo();
                isAudioPlaying = false;
            } else {
                player.unMute();
                player.playVideo();
                isAudioPlaying = true;
                runVinylRotation();
            }
        }

        function runVinylRotation() {
            if (!isAudioPlaying) return;
            rotAngle += rotSpeed;
            vinyl.style.transform = `rotate(${rotAngle}deg)`;
            requestAnimationFrame(runVinylRotation);
        }

        /* --- APP FLOW & UI CONTROL --- */
        function launchExperience() {
            document.getElementById('grand-intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('grand-intro').style.display = 'none';
                document.getElementById('auth-panel').classList.add('active');
                document.getElementById('audio-console').style.visibility = 'visible';
                document.getElementById('audio-console').style.opacity = '1';
                
                // Start music & world engine
                toggleAudioEngine();
                appActive = true;
                
                // Auto background fireworks
                setInterval(() => {
                    if (appActive && Math.random() < 0.12) rockets.push(new Rocket());
                }, 1000);
            }, 1500);
        }

        function toggleEyeAction() {
            const pField = document.getElementById('pass-val');
            const icon = document.getElementById('eye-icon');
            if (pField.type === 'password') {
                pField.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pField.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function validateIdentity() {
            const u = document.getElementById('user-val').value;
            const p = document.getElementById('pass-val').value;
            if (u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('auth-panel').classList.remove('active');
                setTimeout(() => {
                    document.getElementById('final-menu').classList.add('active');
                    massExplosion();
                }, 800);
            } else {
                alert("Mật mã này chỉ dành cho người Bình Minh yêu nhất!");
            }
        }

        function massExplosion() {
            for (let i = 0; i < 25; i++) {
                setTimeout(() => rockets.push(new Rocket()), i * 180);
            }
        }

        /* --- CORE LOOP (ANTI-LAG & RENDER) --- */
        function mainLoop() {
            // Trail effect (Motion Blur)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
            ctx.fillRect(0, 0, w, h);

            // Handle Rockets
            for (let i = rockets.length - 1; i >= 0; i--) {
                if (!rockets[i].update()) {
                    rockets.splice(i, 1);
                } else {
                    rockets[i].draw();
                }
            }

            // Handle Particles (with Garbage Collection)
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].process();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].render();
                }
            }

            requestAnimationFrame(mainLoop);
        }
        mainLoop();

    </script>
</body>
</html>
