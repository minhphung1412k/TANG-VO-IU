<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thiên Đường Của Vợ ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Quicksand', sans-serif;
        }

        /* NỀN ĐEN VỚI ĐIỂM NHẤN AURORA RỰC RỠ */
        #nature-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #1a001a 0%, #000 100%);
            z-index: -1;
        }

        .aurora {
            position: absolute; width: 200%; height: 200%;
            top: -50%; left: -50%;
            background: radial-gradient(circle, rgba(0,255,255,0.05) 0%, rgba(255,0,255,0.05) 50%, transparent 100%);
            animation: rotateBg 20s linear infinite;
        }

        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MÀN HÌNH CHỜ HOA HỒNG */
        #intro {
            position: fixed; inset: 0; background: #000;
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
        }

        .rose-btn {
            font-size: 100px; filter: drop-shadow(0 0 30px #ff0055);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* BOX ĐĂNG NHẬP */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px; padding: 35px;
            width: 90%; max-width: 380px; text-align: center;
            display: none; box-shadow: 0 0 50px rgba(255, 0, 150, 0.1);
        }

        h2 { font-family: 'Dancing Script', cursive; color: #fff; font-size: 2.2rem; margin-bottom: 25px; }

        /* INPUT VÀ NÚT ẨN HIỆN */
        .input-group { position: relative; margin-bottom: 15px; }
        input {
            width: 100%; padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: white;
            outline: none; text-align: center; font-size: 16px;
        }
        .toggle-pass {
            position: absolute; right: 15px; top: 15px;
            color: rgba(255,255,255,0.5); cursor: pointer; font-size: 20px;
        }

        .btn-submit {
            background: linear-gradient(45deg, #ff0055, #7000ff);
            color: white; border: none; padding: 16px; width: 100%;
            border-radius: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        /* MENU MỤC NỘI DUNG */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 5px; border-radius: 15px; color: #ddd;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }

        /* ĐOM ĐÓM / HẠT SÁNG CẦU VỒNG */
        .firefly {
            position: absolute; border-radius: 50%;
            pointer-events: none; animation: fly linear infinite;
        }

        @keyframes fly {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="nature-bg">
        <div class="aurora"></div>
    </div>

    <div id="intro" onclick="startApp()">
        <div class="rose-btn">🌹</div>
        <p style="color: #fff; margin-top: 20px; letter-spacing: 2px; opacity: 0.6;">CHẠM ĐỂ KHỞI ĐẦU TÌNH YÊU</p>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-card" id="login-box">
            <h2>Vợ Yêu ❤️</h2>
            <div class="input-group">
                <input type="text" id="u" placeholder="Tên tài khoản..." autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="p" placeholder="Mật khẩu..." autocomplete="off">
                <span class="toggle-pass" onclick="togglePass()">👁️</span>
            </div>
            <button class="btn-submit" onclick="go()">MỞ CÁNH CỬA ✨</button>
            <p id="err" style="color: #ff3366; font-size: 13px; display: none; margin-top: 10px;">Sai mật khẩu rồi vợ ơi! ❌</p>
        </div>

        <div class="glass-card" id="main-content">
            <h2>Chào Vợ Yêu ❤️</h2>
            <div class="menu-grid">
                <div class="menu-item">CHUYỆN QUÁ KHỨ</div>
                <div class="menu-item">CHUYỆN HIỆN TẠI</div>
                <div class="menu-item">HỨA HẸN TƯƠNG LAI</div>
                <div class="menu-item">LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');

        function startApp() {
            audio.play();
            document.getElementById('intro').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
            setInterval(spawnFirefly, 200);
        }

        function togglePass() {
            const p = document.getElementById('p');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function go() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
            } else {
                document.getElementById('err').style.display = "block";
            }
        }

        function spawnFirefly() {
            const f = document.createElement('div');
            f.className = 'firefly';
            const size = Math.random() * 6 + 2;
            f.style.width = size + "px";
            f.style.height = size + "px";
            // Màu sắc đom đóm rực rỡ
            const colors = ['#ff0055', '#00f2ff', '#7000ff', '#ffeb3b', '#4caf50'];
            f.style.background = colors[Math.floor(Math.random()*colors.length)];
            f.style.left = Math.random() * 100 + "vw";
            f.style.bottom = "0";
            f.style.boxShadow = `0 0 ${size*2}px ${f.style.background}`;
            f.style.animationDuration = Math.random() * 4 + 4 + "s";
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 8000);
        }
    </script>
</body>
</html>
