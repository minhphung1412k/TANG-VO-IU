<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VÂN PROJECT - KỶ NGUYÊN MỚI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --core: #00ffcc; --accent: #ff007b; --bg: #030305;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: #fff; overflow: hidden; 
            font-family: 'Orbitron', sans-serif; height: 100vh;
        }

        /* NỀN BẢNG MẠCH CHẠY NGẦM */
        #circuit-bg {
            position: fixed; inset: 0; z-index: 1; opacity: 0.3;
            background-image: radial-gradient(var(--core) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* LÕI NĂNG LƯỢNG TRUNG TÂM */
        .main-frame {
            position: relative; z-index: 10; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
        }

        .quantum-shell {
            width: 380px; background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(0, 255, 204, 0.2);
            padding: 50px 30px; border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 100px rgba(0, 255, 204, 0.05);
            text-align: center; transform-style: preserve-3d;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .quantum-shell:hover { transform: rotateX(5deg) rotateY(5deg); border-color: var(--core); }

        .header h1 {
            font-family: 'Syncopate', sans-serif; font-size: 1.2rem;
            letter-spacing: 10px; margin-bottom: 40px; color: var(--core);
            text-shadow: 0 0 15px var(--core);
        }

        /* INPUT KIỂU SCANNER */
        .scanner-group { position: relative; margin-bottom: 30px; text-align: left; }
        .scanner-group label { 
            font-size: 9px; letter-spacing: 3px; color: #666; 
            display: block; margin-bottom: 8px; padding-left: 10px;
        }

        .input-wrapper {
            position: relative; display: flex; align-items: center;
            background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.1);
            border-radius: 8px; overflow: hidden;
        }

        .input-wrapper i { padding: 0 15px; color: var(--core); font-size: 14px; }

        input {
            width: 100%; background: transparent; border: none; padding: 15px 10px;
            color: #fff; font-family: 'Orbitron'; font-size: 13px; outline: none;
        }

        /* NÚT KÍCH HOẠT (FUSION BUTTON) */
        .fusion-btn {
            width: 100%; padding: 20px; margin-top: 10px;
            background: transparent; border: 1px solid var(--core);
            color: var(--core); font-family: 'Syncopate'; font-size: 10px;
            letter-spacing: 5px; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.4s;
        }

        .fusion-btn:hover {
            background: var(--core); color: #000;
            box-shadow: 0 0 40px var(--core);
        }

        /* HỆ THỐNG PHÁO HOA "ELECTRON" */
        #particle-canvas {
            position: fixed; inset: 0; z-index: 5; pointer-events: none;
        }

        /* CỬA SỔ DASHBOARD SAU KHI VÀO */
        #dashboard { display: none; opacity: 0; transition: 1s; }
        
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .nav-item {
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover { background: rgba(255, 0, 123, 0.2); border-color: var(--accent); }

        /* NÚT NHẠC KIỂU HOLOGRAM */
        #audio-node {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid var(--core); display: flex; align-items: center; justify-content: center;
            cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }
    </style>
</head>
<body>

    <div id="circuit-bg"></div>
    <canvas id="particle-canvas"></canvas>

    <div id="audio-node" onclick="toggleAudio()">
        <i id="music-icon" class="fas fa-satellite-dish" style="color: var(--core);"></i>
    </div>

    <div class="main-frame">
        <div class="quantum-shell" id="auth-box">
            <div class="header">
                <h1>PROJECT VÂN</h1>
                <div style="width: 50px; height: 2px; background: var(--core); margin: -30px auto 40px;"></div>
            </div>

            <div class="scanner-group">
                <label>IDENTITY SCAN</label>
                <div class="input-wrapper">
                    <i class="fas fa-fingerprint"></i>
                    <input type="text" id="u-name" placeholder="Nhập tk nha Vân iu">
                </div>
            </div>

            <div class="scanner-group">
                <label>ENCRYPTION KEY</label>
                <div class="input-wrapper">
                    <i class="fas fa-terminal"></i>
                    <input type="password" id="u-pass" placeholder="Nhập mật khẩu nhá bấy bì">
                </div>
            </div>

            <button class="fusion-btn" onclick="initFusion()">KÍCH HOẠT</button>
        </div>

        <div class="quantum-shell" id="dashboard">
            <div class="header">
                <h1>ACCESS GRANTED</h1>
                <p style="font-size: 8px; color: var(--accent); letter-spacing: 5px; margin: -25px 0 35px;">HELLO THUÝ VÂN</p>
            </div>
            <div class="nav-grid">
                <div class="nav-item" onclick="bang(50)">MEMORY</div>
                <div class="nav-item" onclick="bang(50)">PRESENT</div>
                <div class="nav-item" onclick="bang(50)">FUTURE</div>
                <div class="nav-item" style="grid-column: span 2;" onclick="loveMode()">ETERNAL LOVE</div>
            </div>
        </div>
    </div>

    <div id="yt-wrap" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, yt, audioCtx, active = false;
        let particles = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Electron {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.v = { x: (Math.random()-0.5)*12, y: (Math.random()-0.5)*12 };
                this.life = 1;
                this.decay = 0.01 + Math.random()*0.02;
                this.color = color;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.v.x; this.y += this.v.y;
                this.v.y += 0.05; // Gravity
                this.life -= this.decay;
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-wrap', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function toggleAudio() {
            active = !active;
            const icon = document.getElementById('music-icon');
            if(active) {
                yt.unMute(); yt.playVideo();
                icon.className = "fas fa-broadcast-tower";
                icon.style.color = "var(--accent)";
            } else {
                yt.mute();
                icon.className = "fas fa-satellite-dish";
                icon.style.color = "var(--core)";
            }
        }

        function initFusion() {
            const u = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('auth-box').style.display = 'none';
                const db = document.getElementById('dashboard');
                db.style.display = 'block';
                setTimeout(() => db.style.opacity = 1, 100);
                bang(100);
            } else {
                alert("HỆ THỐNG TỪ CHỐI: SAI MÃ TRUY CẬP");
            }
        }

        function bang(n) {
            const colors = ['#00ffcc', '#ff007b', '#7000ff', '#ffffff'];
            for(let i=0; i<n; i++) {
                setTimeout(() => {
                    const x = Math.random()*w; const y = Math.random()*h;
                    const c = colors[Math.floor(Math.random()*colors.length)];
                    for(let j=0; j<30; j++) particles.push(new Electron(x, y, c));
                }, i*100);
            }
        }

        function loveMode() {
            alert("VÂN LÀ NGUỒN NĂNG LƯỢNG DUY NHẤT CỦA BÌNH MINH!");
            bang(150);
        }

        function render() {
            ctx.clearRect(0, 0, w, h);
            particles = particles.filter(p => {
                p.update(); p.draw();
                return p.life > 0;
            });
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
