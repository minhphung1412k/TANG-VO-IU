<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THVAN: PINK GALAXY LOVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light: #ffc1e3;
            --pink-main: #ff85c0;
            --pink-dark: #f759ab;
            --gold: #fff1b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #2d0015; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }

        /* HUD GIAO DIỆN */
        #hud {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            padding: 15px; border-left: 5px solid var(--pink-main);
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px);
        }
        .label { font-size: 10px; letter-spacing: 2px; color: var(--pink-light); margin-bottom: 5px; }
        .energy-bar { width: 200px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--pink-main), #fff); transition: 0.2s; }

        /* MÀN HÌNH BẮT ĐẦU */
        #overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle, #4d0025, #1a000d);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        h1 { font-family: 'Pacifico', cursive; font-size: 3.5rem; color: var(--pink-light); text-shadow: 0 0 20px var(--pink-dark); margin-bottom: 20px; }
        .btn-start {
            padding: 20px 50px; border: 2px solid var(--pink-main); background: transparent;
            color: var(--pink-main); font-family: 'Orbitron'; font-weight: bold;
            letter-spacing: 5px; cursor: pointer; border-radius: 50px; transition: 0.4s;
        }
        .btn-start:hover { background: var(--pink-main); color: white; box-shadow: 0 0 30px var(--pink-dark); transform: scale(1.1); }

        /* THÔNG BÁO */
        #popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Pacifico'; font-size: 2rem; color: var(--gold);
            pointer-events: none; opacity: 0; z-index: 200;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="label">MISSION: COLLECT HEARTS</div>
        <div class="label">LOVE LEVEL: <span id="percent">0</span>%</div>
        <div class="energy-bar"><div id="fill"></div></div>
    </div>

    <div id="popup">Vân Tuyệt Nhất!</div>

    <div id="overlay">
        <h1>Thuý Vân Princess</h1>
        <p style="margin-bottom: 30px; letter-spacing: 3px; color: var(--pink-main)">TRẠM NĂNG LƯỢNG TÌNH YÊU CỦA BÌNH MINH</p>
        <button class="btn-start" onclick="initGame()">BẮT ĐẦU QUAY PHIM</button>
    </div>

    <div id="yt-player" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.body.appendChild(canvas);

        let w, h, yt, score = 0, active = false;
        let player = { x: 0, y: 0 };
        let items = [], particles = [], hearts = [];
        let frameCount = 0;

        const messages = ["Yêu Vân!", "Xinh đẹp quá!", "Công chúa của anh", "Bình Minh ❤️ Thuý Vân", "Moahhh!"];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            player.x = w/2; player.y = h/2;
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('yt-player', {
                videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        window.addEventListener('mousemove', (e) => {
            player.x = e.clientX; player.y = e.clientY;
        });

        function initGame() {
            document.getElementById('overlay').style.display = 'none';
            active = true;
            yt.unMute();
            yt.playVideo();
            loop();
        }

        function spawnHeart() {
            items.push({
                x: Math.random() * w,
                y: -50,
                s: Math.random() * 15 + 10,
                v: Math.random() * 3 + 2,
                a: 0
            });
        }

        function showPopup() {
            const p = document.getElementById('popup');
            p.innerText = messages[Math.floor(Math.random() * messages.length)];
            p.style.opacity = 1;
            setTimeout(() => p.style.opacity = 0, 1000);
        }

        function drawHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x, y-3, x-size, y-3, x-size, y+size/3);
            ctx.bezierCurveTo(x-size, y+size, x, y+size*1.3, x, y+size*1.5);
            ctx.bezierCurveTo(x, y+size*1.3, x+size, y+size, x+size, y+size/3);
            ctx.bezierCurveTo(x+size, y-3, x, y-3, x, y);
            ctx.fill();
        }

        function loop() {
            if(!active) return;
            ctx.fillStyle = '#1a000d'; // Nền tím đen cực sang
            ctx.fillRect(0,0,w,h);

            // Spawn vật phẩm mỗi 60 frame (khoảng 1 giây)
            frameCount++;
            if(frameCount % 60 === 0) spawnHeart();

            // Vẽ Player (Vòng tròn hào quang hồng)
            ctx.shadowBlur = 30; ctx.shadowColor = '#ff85c0';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, 7); ctx.stroke();

            // Xử lý Hearts (Items)
            items.forEach((item, i) => {
                item.y += item.v;
                item.a += 0.05;
                let ox = Math.sin(item.a) * 2; // Bay lướt lướt
                
                drawHeart(item.x + ox, item.y, item.s, '#ff85c0');

                // Va chạm
                let dx = player.x - item.x;
                let dy = player.y - item.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if(dist < 30) {
                    items.splice(i, 1);
                    score += 10;
                    if(score > 100) score = 100;
                    document.getElementById('percent').innerText = score;
                    document.getElementById('fill').style.width = score + '%';
                    showPopup();
                    if(score >= 100) victory();
                }

                if(item.y > h + 50) items.splice(i, 1);
            });

            // Hiệu ứng hạt bụi (Dust)
            if(Math.random() > 0.9) {
                particles.push({x: Math.random()*w, y: Math.random()*h, o: 1});
            }
            particles.forEach((p, i) => {
                p.o -= 0.01;
                ctx.fillStyle = `rgba(255, 193, 227, ${p.o})`;
                ctx.fillRect(p.x, p.y, 2, 2);
                if(p.o <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(loop);
        }

        function victory() {
            active = false;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').innerHTML = `
                <h1 style="font-size: 4rem">MISSION COMPLETE</h1>
                <p style="font-family: 'Pacifico'; font-size: 2rem; color: #fff">Bình Minh Yêu Vân Mãi Mãi!</p>
                <div style="margin-top: 50px">✨💖✨</div>
            `;
            // Hiệu ứng pháo hoa trái tim liên tục
            setInterval(() => {
                drawHeart(Math.random()*w, Math.random()*h, 30, '#f759ab');
            }, 100);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
