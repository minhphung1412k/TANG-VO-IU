<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thế Giới Của Vợ Yêu ❤️</title>
    <style>
        /* Hiệu ứng nền chuyển động đa sắc */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffecd2, #fcb69f);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Khung kính Glassmorphism */
        #login-box, #main-content {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            text-align: center; width: 340px;
            z-index: 100; transition: 0.8s ease;
        }

        h2 { color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); font-size: 1.4rem; }

        .input-group { position: relative; margin-bottom: 20px; }

        input {
            width: 100%; padding: 15px; border: none; border-radius: 50px;
            background: rgba(255, 255, 255, 0.8); outline: none;
            box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }

        input:focus { background: #fff; transform: scale(1.02); }

        #toggleEye { position: absolute; right: 20px; top: 12px; cursor: pointer; font-size: 1.4rem; }

        button#btnSubmit {
            background: #ff4d6d; color: white; border: none; padding: 15px;
            width: 100%; border-radius: 50px; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
            transition: 0.3s; font-size: 1rem;
        }

        button#btnSubmit:hover { background: #ff758f; transform: translateY(-3px); }

        /* Menu rực rỡ */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }

        .menu-btn {
            background: rgba(255, 255, 255, 0.4);
            padding: 25px 10px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }

        .menu-btn:hover { background: rgba(255, 255, 255, 0.6); transform: scale(1.05) rotate(2deg); color: #ff4d6d; }

        /* Nút loa rực rỡ */
        #music-control {

            border-radius
