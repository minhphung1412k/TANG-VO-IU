<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà Tặng Vợ Yêu ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background: #ffebee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #d32f2f;
        }

        /* Màn hình đăng nhập */
        #login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
            z-index: 100;
            border: 2px solid #ff85a2;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            box-sizing: border-box;
            outline: none;
        }

        /* Nút con mắt đơn giản bằng text để không bao giờ lỗi */
        #toggleEye {
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            font-size: 1.2em;
        }

        button#btnSubmit {
            background: #ff85a2;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        #error-msg {
            color: red;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        /* Nội dung sau khi đăng nhập */
        #main-content {
            display: none;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .menu-btn {
            background: white;
            padding: 20px 10px;
            border-radius: 15px;
            border: 2px solid #ff85a2;
            color: #f73378;
            font-weight: bold;
            cursor: pointer;
        }

        /* Nhạc và Tim */
        #music-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: white; width: 50px; height: 50px;
            border-radius: 50%; display: none; cursor: pointer;
            border: 1px solid #ff85a2; font-size: 20px;
        }

        .heart { position: absolute; color: #ff85a2; animation: fly 4s linear infinite; z-index: -1; }
        @keyframes fly {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="font-size: 1.1em;">VỢ YÊU ĐĂNG NHẬP MỚI ĐƯỢC XEM</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="Tài khoản...">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Mật khẩu...">
            <span id="toggleEye">👁️</span>
        </div>
        <button id="btnSubmit">Mở Quà Ngay</button>
        <p id="error-msg">VỢ IU NHẬP SAI ÒI</p>
    </div>

    <div id="main-content">
        <h1>Gửi Vợ Yêu ❤️</h1>
        <div class="menu-grid">
            <div class="menu-btn">CHUYỆN QUÁ KHỨ</div>
            <div class="menu-btn">CHUYỆN HIỆN TẠI</div>
            <div class="menu-btn">LỜI HỨA CỦA TƯƠNG LAI</div>
            <div class="menu-btn">LÝ DO ANH YÊU EM VÀ LỜI NHẮN NHỦ</div>
        </div>
    </div>

    <button id="music-btn">🎵</button>
    <audio id="mySong" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Fix lỗi con mắt
        const passInput = document.getElementById('pass');
        const eyeBtn = document.getElementById('toggleEye');
        
        eyeBtn.addEventListener('click', function() {
            if (passInput.type === 'password') {
                passInput.type = 'text';
                this.innerText = '🔒';
            } else {
                passInput.type = 'password';
                this.innerText = '👁️';
            }
        });

        // Fix lỗi nút đăng nhập bị đơ
        document.getElementById('btnSubmit').addEventListener('click', function() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const error = document.getElementById('error-msg');

            if (u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('music-btn').style.display = 'block';
                
                // Chạy nhạc và tim
                document.getElementById('mySong').play();
                startHearts();
            } else {
                error.style.display = 'block';
                document.getElementById('pass').value = "";
            }
        });

        // Điều khiển nhạc
        document.getElementById('music-btn').addEventListener('click', function() {
            const s = document.getElementById('mySong');
            if (s.paused) s.play(); else s.pause();
        });

        function startHearts() {
            setInterval(() => {
                const h = document.createElement('div');
                h.classList.add('heart');
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 20 + 10) + 'px';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 400);
        }
    </script>
</body>
</html>
