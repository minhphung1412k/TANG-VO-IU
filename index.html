<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #ff2d75; --s: #00e5ff; --g: #ffcf5e; --bg: #020205;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* --- SIÊU ĐỒ HỌA THÀNH PHỐ ĐA TẦNG --- */
        #cinematic-world {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(circle at center, #101025 0%, #020205 100%);
        }

        /* Lớp thành phố ảo ảnh không bao giờ lỗi */
        .city-background {
            position: absolute; bottom: 0; width: 100%; height: 60%;
            background: 
                /* Lớp cửa sổ lung linh */
                radial-gradient(circle, var(--g) 0.5px, transparent 1px) 0 0/30px 50px,
                /* Khối tòa nhà bóng đêm */
                linear-gradient(90deg, #050510 10%, transparent 10%, transparent 15%, #08081a 15%, #08081a 30%, transparent 30%),
                linear-gradient(90deg, transparent 40%, #04040d 40%, #04040d 60%, transparent 60%, transparent 70%, #060615 70%, #060615 90%, transparent 90%);
            opacity: 0.6; filter: blur(1px); animation: cityBreath 8s infinite ease-in-out;
        }

        @keyframes cityBreath { 0%, 100% { opacity: 0.4; transform: translateY(0); } 50% { opacity: 0.7; transform: translateY(-5px); } }

        /* Lớp lan can tòa tháp - tạo cảm giác đứng từ trên cao */
        .balcony-view {
            position: absolute; bottom: 0; width: 100%; height: 120px;
            background: linear-gradient(to top, #000 20%, rgba(255,255,255,0.05) 100%);
            border-top: 2px solid rgba(255,255,255,0.1); z-index: 5;
        }

        canvas#fireworks-canvas { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* --- INTRO PHIM ĐIỆN ẢNH --- */
        #movie-intro {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 2s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .portal-heart {
            width: 150px; height: 150px; fill: var(--p);
            filter: drop-shadow(0 0 30px var(--p));
            animation: pulsePortal 2s infinite ease-in-out;
        }

        @keyframes pulsePortal { 0% { transform: scale(1); filter: drop-shadow(0 0 20px var(--p)); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 60px var(--p)); } 100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--p)); } }

        /* --- GIAO DIỆN HOLOGRAM (MODERN UI) --- */
        .stage {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 450px; z-index: 1000; display: none;
            perspective: 1000px;
        }

        .hologram-card {
            background: rgba(10, 10, 30, 0.6); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 50px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 80px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,45,117,0.1);
            text-align: center; transform: rotateX(5deg); transition: 0.5s;
        }

        .title-glow {
            font-family: 'Cinzel Decorative', cursive; font-size: 2rem;
            margin-bottom: 40px; color: #fff; text-shadow: 0 0 20px var(--p);
            background: linear-gradient(to bottom, #fff, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- INPUTS & SVG FIXED --- */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group svg.field-icon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; fill: var(--s); filter: drop-shadow(0 0 5px var(--s));
        }
        .input-group input {
            width: 100%; padding: 20px 55px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            color: #fff; font-size: 16px; transition: 0.4s;
        }
        .input-group input:focus { border-color: var(--p); background: rgba(255,45,117,0.05); }

        .eye-trigger {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            cursor: pointer; width: 22px; height: 22px; fill: #fff; opacity: 0.5; z-index: 10;
        }

        /* --- NÚT BẤM SIÊU VIP --- */
        .btn-genesis {
            width: 100%; padding: 22px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, var(--p), #7000ff);
            color: #fff; font-weight: 900; letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 10px 40px rgba(112,0,255,0.4); transition: 0.4s;
        }
        .btn-genesis:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 50px var(--p); }

        /* --- BỐ CỤC MENU MỚI --- */
        .hologram-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .grid-node {
            background: rgba(255,255,255,0.05); padding: 30px 10px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.5s;
        }
        .grid-node:hover {
            background: var(--p); transform: translateY(-10px) rotate(-3deg);
            box-shadow: 0 20px 40px var(--p);
        }
        .grid-node svg { width: 35px; fill: var(--g); margin-bottom: 12px; filter: drop-shadow(0 0 10px var(--g)); }
        .grid-node span { display: block; font-weight: 700; font-size: 14px; text-transform: uppercase; }

        /* --- CONTROLLER NHẠC --- */
        #music-hub { position: fixed; top: 30px; right: 30px; z-index: 2000; display: none; }
        .music-circle {
            width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--s);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: rgba(0,0,0,0.8); box-shadow: 0 0 20px var(--s);
        }
        .music-circle svg { width: 25px; fill: var(--s); }
        .pulse-anim { animation: musicPulse 1.5s infinite; }
        @keyframes musicPulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #toast-msg {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: var(--p); padding: 18px 45px; border-radius: 50px;
            font-weight: 800; z-index: 1000000; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #toast-msg.show { top: 40px; }
    </style>
</head>
<body>

    <div id="cinematic-world">
        <div class="city-background"></div>
        <div class="balcony-view"></div>
    </div>

    <canvas id="fireworks-canvas"></canvas>
    <div id="toast-msg">VỢ IU NHẬP SAI ÒI ĐÓ!</div>

    <div id="movie-intro" onclick="openCinema()">
        <svg class="portal-heart" viewBox="0 0 32 32"><path d="M16 28.5s-12-7-12-14.5c0-4 3-7 7-7 2.5 0 4.5 1.5 5 3.5.5-2 2.5-3.5 5-3.5 4 0 7 3 7 7 0 7.5-12 14.5-12 14.5z"/></svg>
        <div style="color: white; margin-top: 30px; letter-spacing: 12px; font-weight: 300; opacity: 0.6;">START THE STORY</div>
    </div>

    <div id="music-hub" onclick="handleAudio()">
        <div class="music-circle" id="audio-ui"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
    </div>
    <div id="yt-api-box"></div>

    <div class="stage" id="login-stage">
        <div class="hologram-card">
            <h1 class="title-glow">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-group">
                <svg class="field-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="username" placeholder="Tài khoản của baby">
            </div>
            <div class="input-group">
                <svg class="field-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="password" placeholder="Mật khẩu của bé iu">
                <svg class="eye-trigger" onclick="togglePass()" viewBox="0 0 24 24">
                    <path id="eye-p" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
            </div>
            <button class="btn-genesis" onclick="doLogin()">XÁC NHẬN TRUY CẬP</button>
        </div>
    </div>

    <div class="stage" id="menu-stage">
        <div class="hologram-card">
            <h1 class="title-glow" style="font-size: 1.8rem;">GỬI THUÝ VÂN</h1>
            <div class="hologram-grid">
                <div class="grid-node" onclick="boom(15)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>Kỉ niệm</span></div>
                <div class="grid-node" onclick="boom(15)"><svg viewBox="0 0 24 24"><path d="M12 2c-4.97 0-9 4.03-9 9 0 4.17 2.84 7.67 6.69 8.69L12 22l2.31-2.31C18.16 18.67 21 15.17 21 11c0-4.97-4.03-9-9-9zm0 2c3.87 0 7 3.13 7 7 0 3.47-2.52 6.34-5.83 6.89L12 19.05l-1.17-1.16C7.52 17.34 5 14.47 5 11c0-3.87 3.13-7 7-7z"/></svg><span>Hiện tại</span></div>
                <div class="grid-node" onclick="boom(15)"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span>Tương lai</span></div>
                <div class="grid-node" onclick="surprise()"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Yêu em</span></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, player, active = false;
        let rockets = [], particles = [];

        function setBounds() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.onresize = setBounds; setBounds();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 7 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            update() { this.vx *= 0.96; this.vy *= 0.96; this.vy += 0.15; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.4) + 50;
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
                this.v = -Math.random() * 5 - 12;
            }
            update() {
                this.y += this.v; this.v += 0.1;
                if(this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            explode() {
                for(let i=0; i<150; i++) particles.push(new Particle(this.x, this.y, this.color));
            }
            draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill(); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-api-box', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function handleAudio() {
            const ui = document.getElementById('audio-ui');
            if(active) { player.mute(); ui.classList.remove('pulse-anim'); active = false; }
            else { player.unMute(); player.playVideo(); ui.classList.add('pulse-anim'); active = true; }
        }

        function togglePass() {
            const p = document.getElementById('password');
            const path = document.getElementById('eye-p');
            if(p.type === 'password') {
                p.type = 'text';
                path.setAttribute('d', 'M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3-3zM12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z');
            } else {
                p.type = 'password';
                path.setAttribute('d', 'M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z');
            }
        }

        function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-stage').style.display = 'none';
                document.getElementById('menu-stage').style.display = 'block';
                boom(25);
            } else {
                const t = document.getElementById('toast-msg');
                t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
            }
        }

        function openCinema() {
            document.getElementById('movie-intro').style.transform = "scale(2)";
            document.getElementById('movie-intro').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('movie-intro').style.display = 'none';
                document.getElementById('login-stage').style.display = 'block';
                document.getElementById('music-hub').style.display = 'block';
                handleAudio();
                setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 800);
            }, 1200);
        }

        function boom(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function surprise() { alert('Bình Minh yêu Thuý Vân vô điều kiện!'); boom(40); }

        function run() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.25)';
            ctx.fillRect(0,0,w,h);
            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(run);
        }
        run();
    </script>
</body>
</html>
