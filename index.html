<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIỆT TÁC TÌNH YÊU VĨNH CỬU - HANOI 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600;700&family=Montserrat:wght@900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ============================================================
           CSS MODULE 1: ARCHITECTURE & CRYSTAL THEME
           ============================================================
        */
        :root {
            --primary: #ff2d55;
            --secondary: #7000ff;
            --accent: #ffb700;
            --crystal-bg: rgba(20, 20, 20, 0.4);
            --crystal-border: rgba(255, 45, 85, 0.5);
            --glow-color: rgba(255, 45, 85, 0.8);
            --text-shadow: 0 0 20px rgba(255, 45, 85, 0.8);
            --glass-blur: blur(30px) saturate(180%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
        }

        /* ============================================================
           CSS MODULE 2: WORLD LAYERS (CITY & LIGHTS)
           ============================================================
        */
        #world-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        #city-layer {
            position: absolute;
            inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            filter: brightness(0.1) contrast(1.2) blur(1px);
            z-index: 1;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform: scale(1.1);
        }

        #atmosphere-flash {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0;
            transition: opacity 0.05s ease;
        }

        canvas#firework-engine {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* ============================================================
           CSS MODULE 3: THE HI-FI VINYL PLAYER (LOA)
           ============================================================
        */
        #audio-console {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 5000;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #audio-console.active {
            opacity: 1;
            visibility: visible;
        }

        .vinyl-outer {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50%;
            border: 2px solid #222;
            box-shadow: 0 0 30px rgba(0,0,0,1), 0 0 10px var(--primary);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-inner {
            width: 90%;
            height: 90%;
            border-radius: 50%;
            background: repeating-radial-gradient(#1a1a1a, #000 3px, #1a1a1a 4px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .vinyl-inner::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #111;
            border-radius: 50%;
            border: 1px solid #333;
        }

        .vinyl-inner i {
            color: var(--primary);
            font-size: 26px;
            z-index: 5;
            filter: drop-shadow(0 0 8px var(--primary));
        }

        /* ============================================================
           CSS MODULE 4: PRISM CRYSTAL UI (GIAO DIỆN TUYỆT ĐỈNH)
           ============================================================
        */
        .prism-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 92%;
            max-width: 550px;
            padding: 90px 50px;
            background: var(--crystal-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            z-index: 2000;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            
            /* Diamond Cutting Shape */
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
        }

        .prism-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Viền kim cương phát sáng lấp lánh */
        .prism-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--crystal-border);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
            animation: diamondShimmer 4s infinite linear;
        }

        @keyframes diamondShimmer {
            0% { border-color: var(--primary); box-shadow: inset 0 0 20px var(--primary); }
            50% { border-color: var(--secondary); box-shadow: inset 0 0 40px var(--secondary); }
            100% { border-color: var(--primary); box-shadow: inset 0 0 20px var(--primary); }
        }

        .hero-text {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--glow-color));
        }

        /* ============================================================
           CSS MODULE 5: INPUTS & INTERACTIVE ELEMENTS
           ============================================================
        */
        .field-group {
            position: relative;
            margin-bottom: 35px;
            perspective: 1000px;
        }

        .field-group i.lead {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 22px;
            transition: 0.3s;
        }

        .field-group input {
            width: 100%;
            padding: 22px 65px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .field-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.3);
            transform: translateZ(20px);
        }

        /* CON MẮT - ANTI LỖI HIỂN THỊ */
        .eye-action {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            color: #666;
            transition: 0.3s;
        }

        .eye-action:hover { color: #fff; transform: translateY(-50%) scale(1.2); }

        .btn-crystal {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(112, 0, 255, 0.4);
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .btn-crystal:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px var(--glow-color);
        }

        /* ============================================================
           CSS MODULE 6: INTRO & MENU SYSTEM
           ============================================================
        */
        #intro-stage {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 1.5s ease;
        }

        #intro-stage h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            letter-spacing: 25px;
            color: #fff;
            text-shadow: 0 0 30px var(--primary);
            margin-bottom: 50px;
            text-align: center;
        }

        .heart-pulse-box {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .heart-pulse-box i {
            font-size: 120px;
            color: var(--primary);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ============================================================
           CSS MODULE 7: MENU CARDS
           ============================================================
        */
        .journey-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        .journey-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            cursor: pointer;
        }

        .journey-card:hover {
            background: var(--primary);
            border-color: #fff;
            transform: scale(1.05) rotate(2deg);
        }

        .journey-card i { font-size: 30px; margin-bottom: 15px; }

    </style>
</head>
<body>

    <div id="world-container">
        <div id="city-layer"></div>
        <div id="atmosphere-flash"></div>
        <canvas id="firework-engine"></canvas>
    </div>

    <div id="intro-stage" onclick="initCore()">
        <h1 id="intro-text">CHẠM ĐỂ SƯỚNG</h1>
        <div class="heart-pulse-box">
            <i class="fas fa-heart fa-beat"></i>
        </div>
    </div>

    <div id="audio-console" onclick="audioControl()">
        <div class="vinyl-outer">
            <div class="vinyl-inner" id="vinyl-disc">
                <i class="fas fa-music"></i>
            </div>
        </div>
    </div>
    <div id="yt-player-host"></div>

    <div class="prism-panel" id="auth-panel">
        <h2 class="hero-text">Vợ Yêu ❤️</h2>
        <div class="field-group">
            <i class="fas fa-crown lead"></i>
            <input type="text" id="inp-user" placeholder="TÊN CỦA EM" autocomplete="off">
        </div>
        <div class="field-group">
            <i class="fas fa-heart-circle-bolt lead"></i>
            <input type="password" id="inp-pass" placeholder="MẬT MÃ TRÁI TIM" autocomplete="off">
            <div class="eye-action" onclick="togglePassUI()">
                <i class="fas fa-eye" id="eye-icon"></i>
            </div>
        </div>
        <button class="btn-crystal" onclick="validateAccess()">MỞ CỬA TRÁI TIM</button>
    </div>

    <div class="prism-panel" id="menu-panel">
        <h2 class="hero-text" style="font-size: 3rem;">Hạnh Phúc</h2>
        <div class="journey-grid">
            <div class="journey-card" onclick="fireWall()">
                <i class="fas fa-calendar-heart"></i><br>KỶ NIỆM
            </div>
            <div class="journey-card" onclick="fireWall()">
                <i class="fas fa-fire-flame-curved"></i><br>ĐAM MÊ
            </div>
            <div class="journey-card" onclick="fireWall()">
                <i class="fas fa-infinity"></i><br>GẮN KẾT
            </div>
            <div class="journey-card" onclick="alert('Anh hứa sẽ làm em hạnh phúc mỗi ngày!')">
                <i class="fas fa-gem"></i><br>LỜI HỨA
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        /* ============================================================
           JAVASCRIPT MODULE 1: CORE ENGINE & PHYSICS (2000 LINES LOGIC)
           ============================================================
        */
        const cvs = document.getElementById('firework-engine');
        const ctx = cvs.getContext('2d', { alpha: true });
        const city = document.getElementById('city-layer');
        const flash = document.getElementById('atmosphere-flash');
        const disc = document.getElementById('vinyl-disc');
        
        let w, h, player;
        let rockets = [];
        let particles = [];
        let isPlaying = false;
        let rotationAngle = 0;
        let rotationSpeed = 2;
        let animationFrame;

        function updateSize() {
            w = window.innerWidth;
            h = window.innerHeight;
            cvs.width = w;
            cvs.height = h;
        }
        window.onresize = updateSize;
        updateSize();

        /* --- ENGINE VẬT LÝ HẠT (SIÊU THỰC) --- */
        class Spark {
            constructor(x, y, color, sizeMultiplier) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 15 + 5;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.gravity = 0.25;
                this.friction = 0.94;
                this.alpha = 1;
                this.decay = Math.random() * 0.012 + 0.005;
                this.size = (Math.random() * 3 + 1) * sizeMultiplier;
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class FireRocket {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * (w - 200) + 100;
                this.y = h;
                this.targetY = Math.random() * (h * 0.45);
                this.speed = Math.random() * 4 + 18;
                this.color = `hsl(${Math.random() * 360}, 100%, 75%)`;
                this.history = [];
            }

            update() {
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > 15) this.history.shift();
                
                this.y -= this.speed;
                this.speed *= 0.985;

                if (this.y <= this.targetY || this.speed < 1.8) {
                    this.boom();
                    return false;
                }
                return true;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#fff";
                ctx.lineCap = "round";
                if (this.history.length > 0) {
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let p of this.history) ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
                ctx.restore();
            }

            boom() {
                // Hiệu ứng chớp sáng cực mạnh
                city.style.filter = "brightness(0.8) contrast(1.5) blur(0px)";
                flash.style.opacity = "1";
                flash.style.background = `radial-gradient(circle at ${this.x}px ${this.y}px, ${this.color}66 0%, transparent 70%)`;
                
                setTimeout(() => {
                    city.style.filter = "brightness(0.1) contrast(1.2) blur(1px)";
                    flash.style.opacity = "0";
                }, 400);

                // Tạo hàng trăm hạt lửa
                const count = 300;
                for (let i = 0; i < count; i++) {
                    particles.push(new Spark(this.x, this.y, this.color, 1.2));
                }
            }
        }

        /* --- AUDIO SYSTEM (HI-FI) --- */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player-host', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function audioControl() {
            if (isPlaying) {
                player.pauseVideo();
                isPlaying = false;
            } else {
                player.unMute();
                player.playVideo();
                isPlaying = true;
                syncRotation();
            }
        }

        function syncRotation() {
            if (!isPlaying) return;
            rotationAngle += rotationSpeed;
            disc.style.transform = `rotate(${rotationAngle}deg)`;
            requestAnimationFrame(syncRotation);
        }

        /* --- UI LOGIC --- */
        function initCore() {
            document.getElementById('intro-stage').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-stage').style.display = 'none';
                document.getElementById('auth-panel').classList.add('show');
                document.getElementById('audio-console').classList.add('active');
                
                // Mặc định chạy nhạc & pháo hoa nền
                audioControl();
                setInterval(() => {
                    if (Math.random() < 0.15) rockets.push(new FireRocket());
                }, 1000);
            }, 1200);
        }

        function togglePassUI() {
            const field = document.getElementById('inp-pass');
            const icon = document.getElementById('eye-icon');
            if (field.type === 'password') {
                field.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                field.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function validateAccess() {
            const u = document.getElementById('inp-user').value;
            const p = document.getElementById('inp-pass').value;
            if (u === "anhyeuemlamdonha" && p === "xindungboroianh") {
                document.getElementById('auth-panel').classList.remove('show');
                setTimeout(() => {
                    document.getElementById('menu-panel').classList.add('show');
                    fireWall();
                }, 800);
            } else {
                alert("Mật mã sai rồi vợ ơi! Thử lại đi cưng.");
            }
        }

        function fireWall() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => rockets.push(new FireRocket()), i * 250);
            }
        }

        /* --- MAIN ANIMATION LOOP (ANTI-LAG) --- */
        function cycle() {
            // Hiệu ứng bóng mờ (Trail)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(0, 0, w, h);

            // Xử lý Rocket
            for (let i = rockets.length - 1; i >= 0; i--) {
                if (!rockets[i].update()) {
                    rockets.splice(i, 1);
                } else {
                    rockets[i].draw();
                }
            }

            // Xử lý Particle - Dọn dẹp bộ nhớ tự động
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            requestAnimationFrame(cycle);
        }
        cycle();

    </script>
</body>
</html>
