<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hanoi Romance Crystal - Final Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================================
           CSS MODULE: CRYSTAL NEON UI (FIXED & OPTIMIZED)
           ============================================================ */
        :root {
            --neon: #ff2d75;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.2);
            --shadow: 0 0 30px rgba(255, 45, 117, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Quicksand', sans-serif; }

        /* NỀN THÀNH PHỐ - FIX LỖI HIỂN THỊ TRÀN VIỀN */
        #city-canvas {
            position: fixed; inset: 0;
            background: url('https://vtv1.mediacdn.vn/zoom/640_400/2023/1/1/hanoi-16725350353111867184281.jpg') center/cover no-repeat;
            z-index: 1; filter: brightness(0.12) contrast(1.1) blur(1px);
            transform: scale(1.05); transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ENGINE PHÁO HOA - TÁCH BIỆT LAYER ĐỂ KHÔNG ĐÈ LÊN UI */
        canvas#firework-layer { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* KHUNG ĐĂNG NHẬP PHA LÊ ĐA GIÁC (FIXED) */
        .crystal-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 480px; padding: 70px 40px;
            background: rgba(10, 10, 10, 0.45); /* Trong suốt để pháo hoa nổ xuyên qua */
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            
            /* Clip-path đa giác kim cương */
            clip-path: polygon(15% 0%, 85% 0%, 100% 20%, 100% 80%, 85% 100%, 15% 100%, 0% 80%, 0% 20%);
            
            border: 1px solid var(--border);
            z-index: 1000; text-align: center; opacity: 0; visibility: hidden;
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: inset 0 0 40px rgba(255,255,255,0.05);
        }

        .crystal-box.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        /* VIỀN NEON CHẠY QUANH KHUNG PHA LÊ */
        .crystal-box::after {
            content: ''; position: absolute; inset: 0;
            border: 2px solid var(--neon);
            clip-path: polygon(15% 0%, 85% 0%, 100% 20%, 100% 80%, 85% 100%, 15% 100%, 0% 80%, 0% 20%);
            animation: neonPulse 2.5s infinite alternate;
            pointer-events: none;
        }

        @keyframes neonPulse {
            from { opacity: 0.3; filter: drop-shadow(0 0 5px var(--neon)); }
            to { opacity: 1; filter: drop-shadow(0 0 20px var(--neon)); }
        }

        .love-title {
            font-family: 'Dancing Script', cursive; color: #fff; font-size: 3.5rem;
            margin-bottom: 35px; filter: drop-shadow(0 0 10px var(--neon));
        }

        /* INPUT STYLING - TRONG SUỐT VÀ TINH TẾ */
        .input-wrap { position: relative; margin-bottom: 25px; }
        .input-wrap i.lead-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--neon); font-size: 18px; }
        .input-wrap input {
            width: 100%; padding: 18px 55px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            color: #fff; font-size: 16px; transition: 0.4s; outline: none;
        }
        .input-wrap input:focus { border-color: var(--neon); background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,45,117,0.2); }

        /* CON MẮT - FIX LỖI CLICK KHÔNG NHẠY */
        .eye-icon {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            color: #777; cursor: pointer; padding: 5px; z-index: 10; transition: 0.3s;
        }
        .eye-icon:hover { color: #fff; }

        .btn-premium {
            width: 100%; padding: 18px; background: linear-gradient(45deg, #ff2d75, #ff5e3a);
            border: none; border-radius: 15px; color: #fff; font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 45, 117, 0.4); transition: 0.4s;
        }
        .btn-premium:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 35px rgba(255, 45, 117, 0.6); }

        /* MUSIC DISC - FIX LỖI XOAY TRÊN MOBILE */
        #music-trigger {
            position: fixed; top: 25px; right: 25px; z-index: 5000;
            width: 60px; height: 60px; background: #000; border-radius: 50%;
            border: 2px solid #333; display: flex; justify-content: center; align-items: center;
            cursor: pointer; opacity: 0; transition: 1s;
        }
        .disc-spin { animation: discRotate 5s linear infinite; }
        @keyframes discRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* INTRO ENGINE */
        #intro-engine {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 1.5s ease-in-out;
        }
    </style>
</head>
