<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Vợ Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #1a0a0c;
            font-family: 'Quicksand', sans-serif;
        }

        /* NỀN HỒNG TRÔ SANG TRỌNG */
        #bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #3d1a1e 0%, #1a0a0c 100%);
            z-index: -1;
        }

        /* MÀN HÌNH CHỜ HOA HỒNG */
        #intro {
            position: fixed; inset: 0; background: #000;
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: 1.5s ease;
        }

        .rose-icon {
            font-size: 100px; filter: drop-shadow(0 0 20px #b76e79);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* KHUNG NỘI DUNG CHÍNH */
        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(183, 110, 121, 0.3);
            border-radius: 30px; padding: 30px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: none; position: relative;
        }

        h2 { 
            font-family: 'Dancing Script', cursive; 
            color: #fce4ec; font-size: 2rem; margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(183, 110, 121, 0.5);
        }

        /* CÁC MỤC NỘI DUNG THEO YÊU CẦU */
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;
        }
        .menu-item {
            background: rgba(183, 110, 121, 0.15);
            border: 1px solid rgba(183, 110, 121, 0.4);
            padding: 20px 10px; border-radius: 15px;
            color: #fce4ec; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }
        .menu-item:active { background: rgba(183, 110, 121, 0.4); transform: scale(0.95); }

        /* Ô NHẬP LIỆU TĨNH */
        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border-radius: 12px; border: 1px solid rgba(183, 110, 121, 0.3);
            background: rgba(255,255,255,0.05); color: white;
            outline: none; text-align: center;
        }

        .btn-login {
            background: #b76e79; color: white; border: none;
            padding: 14px; width: 100%; border-radius: 12px;
            font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        /* CÁNH HOA RƠI NHẸ NHÀNG */
        .petal {
            position: absolute; pointer-events: none;
            z-index: 5; animation: fall linear forwards;
            color: #b76e79; opacity: 0.6;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* NÚT LOA */
        #music-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 45px; height: 45px; background: rgba(183, 110, 121, 0.2);
            border-radius: 50%; display: none; align-items: center;
            justify-content: center; font-size: 20px; cursor: pointer;
            border: 1px solid rgba(183, 110, 121, 0.5); z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="intro" onclick="startExperience()">
        <div class="rose-icon">🌹</div>
        <p style="color: #b76e79; margin-top: 20px; letter-spacing: 2px; font-size: 0.9rem;">CHẠM VÀO HOA HỒNG ĐỂ BẮT ĐẦU</p>
    </div>

    <audio id="piano" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-container" id="login-box">
            <h2>Vợ Yêu ❤️</h2>
            <input type="text" id="u" placeholder="Tên tài khoản..." autocomplete="off">
            <input type="password" id="p" placeholder="Mật khẩu..." autocomplete="off">
            <button class="btn-login" onclick="login()">MỞ QUÀ ✨</button>
            <p id="err" style="color: #ff8a80; font-size: 13px; display: none; margin-top: 10px;">Sai rồi nha vợ ơi! ❌</p>
        </div>

        <div class="glass-container" id="main-content">
            <h2>Chào Vợ Yêu ❤️</h2>
            <div class="menu-grid">
                <div class="menu-item">CHUYỆN QUÁ KHỨ</div>
                <div class="menu-item">CHUYỆN HIỆN TẠI</div>
                <div class="menu-item">LỜI HỨA TƯƠNG LAI</div>
                <div class="menu-item">LÝ DO ANH YÊU EM</div>
            </div>
        </div>
    </div>

    <div id="music-btn" onclick="toggle()">🔊</div>

    <script>
        const audio = document.getElementById('piano');

        function startExperience() {
            audio.play().catch(() => {
                console.log("Chờ tương tác loa");
            });
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
                document.getElementById('music-btn').style.display = 'flex';
            }, 1000);
            setInterval(spawnPetal, 600); // Rơi thưa hơn để tạo sự nhẹ nhàng
        }

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(user === "anhyeuemlamdonha" && pass === "xindungboroianh") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('main-content').style.display = "block";
            } else {
                document.getElementById('err').style.display = "block";
            }
        }

        function toggle() {
            if(audio.paused) {
                audio.play(); document.getElementById('music-btn').innerText = "🔊";
            } else {
                audio.pause(); document.getElementById('music-btn').innerText = "🔇";
            }
        }

        function spawnPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.innerHTML = '🌹';
            p.style.left = Math.random() * 100 + "vw";
            p.style.fontSize = Math.random() * 15 + 10 + "px";
            p.style.animationDuration = Math.random() * 5 + 7 + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 12000);
        }
    </script>
</body>
</html>
