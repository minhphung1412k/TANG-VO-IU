<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÌNH MINH ❤️ THUÝ VÂN - GENESIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff2d75; --s: #00e5ff; --g: #ffcf5e; --bg: #020205; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); overflow: hidden; font-family: 'Orbitron', sans-serif; color: #fff; }

        /* --- SIÊU ĐỘNG CƠ ĐỒ HỌA (KHÔNG THỂ LỖI) --- */
        #world { position: fixed; inset: 0; z-index: 1; }
        canvas#stage { position: absolute; inset: 0; }

        /* --- GIAO DIỆN PHI THUYỀN (FUTURISTIC UI) --- */
        .ui-container {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
        }

        .glass-orb {
            width: 90%; max-width: 450px; padding: 50px 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px; text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 30px rgba(255,255,255,0.05);
            animation: float 6s infinite ease-in-out;
            transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-20px) rotate(1deg); } }

        .title-neon {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem;
            margin-bottom: 40px; color: #fff;
            text-shadow: 0 0 20px var(--p), 0 0 40px var(--p);
            background: linear-gradient(to right, #fff, var(--p));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- INPUTS: DẢI SÁNG NĂNG LƯỢNG --- */
        .input-wrap { position: relative; margin-bottom: 30px; }
        .input-wrap input {
            width: 100%; padding: 22px 30px; padding-left: 60px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; color: #fff; font-size: 15px; letter-spacing: 1px;
            transition: 0.5s; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .input-wrap input:focus { border-color: var(--s); box-shadow: 0 0 30px rgba(0,229,255,0.2); }
        .input-wrap svg { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); width: 22px; fill: var(--s); filter: drop-shadow(0 0 10px var(--s)); }

        .eye-trigger { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); cursor: pointer; width: 24px; fill: #fff; opacity: 0.5; }

        /* --- BUTTON: NÚT BẤM VÔ CỰC --- */
        .btn-genesis {
            width: 100%; padding: 22px; border: none; border-radius: 30px;
            background: linear-gradient(45deg, var(--p), #7000ff);
            color: #fff; font-weight: 900; letter-spacing: 6px; cursor: pointer;
            box-shadow: 0 15px 40px rgba(112,0,255,0.4); transition: 0.4s;
            text-transform: uppercase;
        }
        .btn-genesis:hover { transform: scale(1.05); filter: brightness(1.2); box-shadow: 0 20px 60px var(--p); }

        /* --- MENU: BỐ CỤC ĐỘC LẠ --- */
        .menu-circle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .circle-node {
            background: rgba(255,255,255,0.05); padding: 35px 10px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: 0.5s;
        }
        .circle-node:hover {
            background: var(--p); border-color: #fff; transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 20px 50px var(--p);
        }
        .circle-node svg { width: 35px; fill: var(--g); margin-bottom: 12px; filter: drop-shadow(0 0 10px var(--g)); }
        .circle-node span { display: block; font-size: 12px; font-weight: 700; color: #fff; }

        /* --- INTRO CINEMATIC --- */
        #intro {
            position: fixed; inset: 0; z-index: 1000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 1.5s ease-in-out;
        }
        .gate-pulse { width: 120px; fill: var(--p); filter: drop-shadow(0 0 50px var(--p)); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.3); opacity: 1; } }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 20px 50px; border-radius: 50px;
            font-weight: 900; z-index: 10000; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #toast.show { top: 40px; box-shadow: 0 0 30px #fff; }

        #music-orb {
            position: fixed; top: 30px; right: 30px; z-index: 500; display: none;
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--s);
            background: rgba(0,0,0,0.8); cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--s);
        }
    </style>
</head>
<body>

    <div id="intro" onclick="launch()">
        <svg class="gate-pulse" viewBox="0 0 32 32"><path d="M16 28.5s-12-7-12-14.5c0-4 3-7 7-7 2.5 0 4.5 1.5 5 3.5.5-2 2.5-3.5 5-3.5 4 0 7 3 7 7 0 7.5-12 14.5-12 14.5z"/></svg>
        <p style="margin-top: 40px; letter-spacing: 15px; font-size: 14px; color: rgba(255,255,255,0.4);">START PROJECT</p>
    </div>

    <div id="world"><canvas id="stage"></canvas></div>
    
    <div id="music-orb" onclick="audioAction()">
        <svg style="width:25px; fill:var(--s)" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>
    <div id="yt-player"></div>

    <div class="ui-container">
        <div class="glass-orb" id="login-panel" style="display: none;">
            <h1 class="title-neon">BÌNH MINH ❤️ THUÝ VÂN</h1>
            <div class="input-wrap">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="user" placeholder="USER ID">
            </div>
            <div class="input-wrap">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="pass" placeholder="ACCESS CODE">
                <svg class="eye-trigger" onclick="eyeToggle()" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
            <button class="btn-genesis" onclick="verify()">INITIALIZE ACCESS</button>
        </div>

        <div class="glass-orb" id="menu-panel" style="display: none; transform: scale(0.8); opacity: 0;">
            <h1 class="title-neon" style="font-size: 1.8rem;">GỬI THUÝ VÂN</h1>
            <div class="menu-circle-grid">
                <div class="circle-node" onclick="boom(15)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>KỈ NIỆM</span></div>
                <div class="circle-node" onclick="boom(15)"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg><span>HIỆN TẠI</span></div>
                <div class="circle-node" onclick="boom(15)"><svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span>TƯƠNG LAI</span></div>
                <div class="circle-node" onclick="love()"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>YÊU EM</span></div>
            </div>
        </div>
    </div>

    <div id="toast">ACCESS DENIED - SAI RỒI VỢ IU!</div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        let w, h, player, active = false;
        let rockets = [], particles = [], buildings = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            initCity();
        }
        window.onresize = resize;
        
        // THUẬT TOÁN THÀNH PHỐ VÔ TẬN
        function initCity() {
            buildings = [];
            for(let i=0; i<40; i++) {
                buildings.push({
                    x: Math.random() * w,
                    w: 30 + Math.random() * 60,
                    h: Math.random() * (h * 0.4),
                    color: '#050510',
                    light: Math.random() > 0.5
                });
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * w; this.y = h;
                this.targetY = Math.random() * (h * 0.5);
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.v = -Math.random() * 4 - 10;
            }
            update() { this.y += this.v; if(this.y <= this.targetY) { this.explode(); return false; } return true; }
            explode() { for(let i=0; i<100; i++) particles.push(new Particle(this.x, this.y, this.color)); }
            draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, 7); ctx.fill(); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'iXaw-jwmjjA',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'iXaw-jwmjjA' },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }

        function audioAction() {
            if(active) { player.mute(); active = false; }
            else { player.unMute(); player.playVideo(); active = true; }
        }

        function launch() {
            document.getElementById('intro').style.transform = "scale(2)";
            document.getElementById('intro').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('login-panel').style.display = 'block';
                document.getElementById('music-orb').style.display = 'flex';
                resize(); audioAction();
                setInterval(() => { if(Math.random() < 0.2) rockets.push(new Rocket()); }, 700);
                run();
            }, 1000);
        }

        function verify() {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            if(u === "thuyvanchithuongbminh" && p === "bminhcungchicuoithvanthoi") {
                document.getElementById('login-panel').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-panel').style.display = 'none';
                    const m = document.getElementById('menu-panel');
                    m.style.display = 'block';
                    setTimeout(() => { m.style.opacity = '1'; m.style.transform = 'scale(1)'; }, 50);
                    boom(20);
                }, 800);
            } else {
                const t = document.getElementById('toast');
                t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
            }
        }

        function boom(n) { for(let i=0; i<n; i++) setTimeout(() => rockets.push(new Rocket()), i*200); }
        function love() { alert('Bình Minh yêu Thuý Vân vô cùng!'); boom(30); }
        function eyeToggle() { const p = document.getElementById('pass'); p.type = p.type === 'password' ? 'text' : 'password'; }

        function run() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
            ctx.fillRect(0,0,w,h);
            
            // VẼ THÀNH PHỐ TRONG MỖI KHUNG HÌNH (Đảm bảo không biến mất)
            buildings.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, h - b.h, b.w, b.h);
                if(b.light) {
                    ctx.fillStyle = 'rgba(255, 207, 94, 0.1)';
                    ctx.fillRect(b.x + 5, h - b.h + 5, b.w - 10, b.h - 10);
                }
            });

            rockets = rockets.filter(r => { r.draw(); return r.update(); });
            particles = particles.filter(p => { p.draw(); p.update(); return p.alpha > 0; });
            requestAnimationFrame(run);
        }
    </script>
</body>
</html>
